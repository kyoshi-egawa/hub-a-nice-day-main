// ファイルをチャンクに分割してGASに保存。
// ★prevCustomers（保存前のサーバー値）を渡すと、中身が変わったチャンクだけ書く。
//   1行の予約で3チャンク（各40KB弱＝GASのDrive書き込み）を毎回書き直しており、GASのロック
//   （全書き込み共通・25秒）を長時間占有して他の保存をlock_timeoutで無言failさせていた。
let __saveCount=0;
const splitChunks=custs=>{const cs=[];for(let i=0;i<custs.length;i+=CHUNK_SIZE)cs.push(custs.slice(i,i+CHUNK_SIZE));return cs;};
const saveFileChunked=async(file,prevCustomers)=>{
  __saveCount++;
  try{
  const name=safeName(file.name);
  const chunks=splitChunks(file.customers);
  const prev=Array.isArray(prevCustomers)?splitChunks(prevCustomers):null;
  const idx={name:file.name,total:file.customers.length,chunks:chunks.length};
  const jobs=[];
  // インデックスは件数かチャンク数が変わった時だけ書く
  if(!prev||prev.length!==chunks.length||prevCustomers.length!==file.customers.length)
    jobs.push(sSet(STOR+'cf-'+name+'-index',idx));
  chunks.forEach((c,i)=>{
    const same=prev&&prev[i]&&JSON.stringify(prev[i])===JSON.stringify(c);
    if(!same)jobs.push(sSet(STOR+'cf-'+name+'-chunk-'+i,c));
  });
  await Promise.all(jobs);
  }finally{
    setTimeout(()=>{__saveCount=Math.max(0,__saveCount-1);},70000);
  }
};

};

// ── 予約1件を insp（サーバー最新値）に適用する純関数 ──
// ★必ず「サーバーから読んだ最新値」を base に渡すこと。以前は保存開始時に一度読んだ値を
//   使い回して全文を書き戻していたため、その間に他PCが入れた予約を巻き添えで消していた。
const applyBookingToInsp=(base,{customer,dkFormatted,row,inspLimits})=>{
  const data=(base&&typeof base==='object'&&!Array.isArray(base))?{...base}:{};
  const recalc=new Set();
  let oldRow=null,oldDk=null;
  for(const d of Object.keys(data)){
    if(!Array.isArray(data[d]))continue;
    const before=data[d].length;
    const hit=data[d].find(r=>r&&r.custId===customer.custId&&r.bookingStatus!=='cancelled');
    if(hit){oldRow=hit;oldDk=d;}
    data[d]=data[d].filter(r=>r&&r.custId!==customer.custId); // 入庫日変更に対応（旧行を除去）
    if(data[d].length!==before)recalc.add(d);
  }
  const sameDay=!!(oldRow&&oldDk===dkFormatted);
  // 同じ日への再保存は予約順(seq)と手動承認(approved)を引き継ぐ。日付変更は移動先の最後尾＝新seq
  const newRow={...row,
    seq:(sameDay&&oldRow.seq!=null)?oldRow.seq:(row.seq||Date.now()),
    ...(sameDay&&oldRow.approved?{approved:true}:{})};
  if(!Array.isArray(data[dkFormatted]))data[dkFormatted]=[];
  data[dkFormatted]=[...data[dkFormatted],newRow];
  const idx=data[dkFormatted].length-1;
  const bKey=`insp-${dkFormatted}-${idx}`;
  data[dkFormatted][idx]={...newRow,bookingKey:bKey};
  const lim=(inspLimits&&inspLimits[dkFormatted])??6;
  data[dkFormatted]=recomputeInspApproval(data[dkFormatted],lim);
  data[dkFormatted]=applyMahPendingRule(data[dkFormatted],idx);
  recalc.delete(dkFormatted);
  recalc.forEach(d=>{data[d]=recomputeInspApproval(data[d],(inspLimits&&inspLimits[d])??6);});
  return {data,idx,bKey};
};
const inspHasCust=(insp,dk,custId,name)=>((insp&&insp[dk])||[]).some(r=>r&&r.bookingStatus!=='cancelled'&&(custId?r.custId===custId:r.name===name));

// ── 予約順(seq)ベースの承認状態 再計算（index_dev.htmlのBLOCK-Cと同一の純関数。変更時は両方同時に）──
// 各insp行の seq（予約順）で昇順に並べ、先着 limit 台=確定 / 超過分=承認待ち(pendingApproval=true)。
// レギュラー車検(course=3)は別途1日3台まで。承認は予約に固定されず枠に紐づく:
// 先着枠内に入った行は承認待ち・手動承認(approved)とも外して通常確定（6台以内に繰り上がれば承認バッジが消える）。
// 枠外でも本店が手動承認(approved)した行だけは確定維持（承認済みバッジ）。
const recomputeInspApproval = (rows, limit) => {
  const lim = (limit!=null) ? limit : 6;
  const out = rows.map(r => (r ? {...r} : r));
  const active = out
    .map((r, i) => ({ r, i }))
    .filter(x => x.r && x.r.name && x.r.course && x.r.bookingStatus !== 'cancelled');
  active.sort((a, b) => {
    const sa = (a.r.seq != null) ? a.r.seq : a.i;
    const sb = (b.r.seq != null) ? b.r.seq : b.i;
    return sa - sb;
  });
  let conf = 0, reg = 0;
  for (const { r } of active) {
    const isReg = Number(r.course) === 3;
    const eligible = (conf < lim) && (!isReg || reg < 3);
    if (eligible) {
      delete r.pendingApproval;       // 先着枠内 → 確定
      delete r.approved;              // 枠内に繰り上がった → 手動承認も解除
      conf++; if (isReg) reg++;
    } else if (r.approved) {
      delete r.pendingApproval;       // 枠外だが手動承認済み → 確定維持
      conf++; if (isReg) reg++;
    } else {
      r.pendingApproval = true;       // 枠外・未承認 → 承認待ち
    }
  }
  return out;
};
// マッハ車検1日2台ルール（リスト経由の予約だけの追加条件・従来挙動の維持）。
// 注: スケジュール側のrecomputeにはこのルールが無いため、スケジュール側で保存されると外れる。
const applyMahPendingRule=(rows,targetIdx)=>{
  const t=rows[targetIdx];
  if(!t||Number(t.course)!==1||t.pendingApproval)return rows;
  const others=rows.filter((r,i)=>i!==targetIdx&&r&&r.name&&Number(r.course)===1&&!r.pendingApproval&&r.bookingStatus!=='cancelled');
  if(others.length>=2){const out=[...rows];out[targetIdx]={...t,pendingApproval:true};return out;}
  return rows;
};

// GAS通信
// ═══════════════════════════════════════════
const sGet=async(k,retries=3)=>{
  for(let i=0;i<retries;i++){
    try{
      const r=await fetch(`${GAS_URL}?key=${encodeURIComponent(k)}&apiKey=${encodeURIComponent(GAS_API_KEY)}`,{cache:'no-store'});
      if(r.status===503){
        if(i<retries-1){await new Promise(r=>setTimeout(r,2000*(i+1)));continue;}
        return null;
      }
      const t=await r.text();
      if(!t||t==='null'||t.startsWith('error')||t==='unauthorized')return null;
      try{return JSON.parse(t);}catch{return null;}
    }catch{if(i===retries-1)return null;}
  }
  return null;
};
const sSet=async(k,v,retries=3)=>{
  for(let i=0;i<retries;i++){
    try{
      await fetch(GAS_URL,{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({key:k,value:JSON.stringify(v),apiKey:GAS_API_KEY}),
      });
      return;
    }catch{if(i<retries-1)await new Promise(r=>setTimeout(r,1500*(i+1)));}
  }
};
// ★sSetはno-cors。GASが 'error: lock_timeout' を返しても成功として返るため、書けたことにならない。
//   重要なキーは必ずこれで書く: 書く→読み返す→期待どおりでなければサーバー最新値から作り直して再送。
//   mutate(server最新値)→保存する値 を返す関数。check(読み返した値)→true で成功。
const writeVerified=async(key,mutate,check,tries=3)=>{
  for(let i=0;i<tries;i++){
    let base=null;
    try{base=await sGet(key);}catch(e){}
    let val;
    try{val=mutate(base);}catch(e){return false;}
    if(val===undefined)return true; // 変更不要
    await sSet(key,val);
    await new Promise(r=>setTimeout(r,1500+1500*i));
    try{
      const back=await sGet(key);
      if(check(back))return true;
    }catch(e){}
    console.warn('[WRITE] 未反映→再送',key,'attempt',i+1);
  }
  console.error('[WRITE] GASに反映できませんでした:',key);
  return false;
};

const parseExcelDate=v=>{
  if(v===null||v===undefined||v==='')return'';
  // Dateオブジェクトの場合
  if(v instanceof Date){
    if(isNaN(v.getTime()))return'';
    return`${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;
  }
  // Excel数値（シリアル値）
  if(typeof v==='number'&&v>1000){
    const d=new Date(Math.round((v-25569)*86400*1000));
    return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const s=String(v).trim();
  if(!s)return'';
  // ISO形式・スラッシュ形式
  let m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  // MM/DD/YYYY形式
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){const y=m[3].length===2?`20${m[3]}`:m[3];return`${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;}
  // JavaScriptのDate.toString()の場合（Mon Jun 01 2026...）
  const d2=new Date(s);
  if(!isNaN(d2.getTime())&&s.length>6){
    return`${d2.getFullYear()}-${String(d2.getMonth()+1).padStart(2,'0')}-${String(d2.getDate()).padStart(2,'0')}`;
  }
  return'';
};

};

const makeCustId=(fileName,rowIdx,name,no)=>{
  // 全角スペース・スペースを除去、全角英数を半角に正規化
  const normName=String(name||'').replace(/[\s　]/g,'').replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  const normNo=String(no||'').trim();
  return `${fileName}__${rowIdx}__${normName}__${normNo}`;
};

// セル背景色 → ステータス変換
const cellColorToStatus=hexColor=>{
  if(!hexColor)return null;
  const h=hexColor.replace('#','').toUpperCase();
  // 黄系 → 初回車検
  if(/^FF(F[5-9A-F]|[A-E][0-9A-F])[0-9A-F]{2}$/i.test(h)||h==='FFFF00'||h==='FFFF99'||h==='FFFACD'||h.startsWith('FFE')||h.startsWith('FFF'))
    return'new_car';
  // 青系 → 本予約
  if(h.startsWith('ADD')||h.startsWith('B0C')||h.startsWith('9FC')||h==='87CEEB'||h==='87CEFA'||h.startsWith('00B')||h.startsWith('00C')||(/^[0-9A-F]{2}[0-9A-F]{2}F[0-9A-F]$/i.test(h)))
    return'confirm';
  // 緑系 → 仮予約
  if(h.startsWith('90E')||h.startsWith('98F')||h==='00FF00'||h.startsWith('00F')||h.startsWith('7FFF')||(/^[0-9A-F]{2}[C-F][0-9A-F]{3}$/i.test(h)))
    return'temp';
  // 赤系 → キャンセル
  if(h==='FF0000'||h.startsWith('FF0')||h.startsWith('FF4')||h.startsWith('F08')||h.startsWith('FA8'))
    return'cancel';
  return null;
};

const parseExcelFile=async(file)=>{
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true,cellStyles:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

        // ヘッダー行検出
        let headerRow=-1;
        // ヘッダー行検出：「名称」「NO」「車種」のうち2つ以上一致
        const kws=['名称','NO','車種','点検','満期'];
        for(let i=0;i<Math.min(15,rows.length);i++){
          const s=rows[i].join('');
          if(kws.filter(k=>s.includes(k)).length>=2){headerRow=i;break;}
        }
        if(headerRow<0){reject(new Error('ヘッダー行が見つかりません（名称・NO・車種 のいずれかを含む列が必要です）'));return;}

        // ヘッダー行：Dateオブジェクトや数値は日付文字列に変換
        const headers=rows[headerRow].map((h,hi)=>{
          if(h instanceof Date) return isNaN(h.getTime())?`__date_col_${hi}__`:h.toISOString().slice(0,10);
          if(typeof h==='number'&&h>1000){
            // Excelシリアル値を日付に変換して列名とする
            const d=new Date(Math.round((h-25569)*86400*1000));
            return isNaN(d.getTime())?`__date_col_${hi}__`:d.toISOString().slice(0,10);
          }
          return String(h||'').trim();
        });
        // 全角半角・スペース正規化して列名検索
        const norm=s=>String(s||'').replace(/[\s　]/g,'').replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).toUpperCase();
        const fc=(...kws)=>{for(const k of kws){const nk=norm(k);const i=headers.findIndex(h=>norm(h).includes(nk));if(i>=0)return i;}return-1;};

        const cExpiry =fc('点検満期','満期');
        const cName   =fc('名称','氏名');
        const cNo     =fc('NO','ナンバー');
        const cCar    =fc('車種');
        // 投函日列：①②の検索（複数パターン対応）
        // 投函日列検索：文字列パターン or Excelで日付ヘッダーになっているケース
        const allToukanCols=headers.map((h,i)=>{
          const hn=h.replace(/[\s　]/g,'');
          const isDm=(hn.includes('投函')||hn.includes('DM')||hn.includes('案内')||hn.includes('発送'))&&!hn.includes('予約')&&!hn.includes('後');
          return isDm?i:-1;
        }).filter(i=>i>=0);
        // 日付型ヘッダー列（ExcelでDateが列名になっているケース）
        const isDateCol=h=>h==='Invalid Date'||/^__date_col_/.test(h)||/^\d{4}-\d{2}-\d{2}$/.test(h);
        const allDateCols=headers.map((h,i)=>isDateCol(h)?i:-1).filter(i=>i>=0);
        let cDm1D,cDm2D;
        if(allToukanCols.length>=1){
          // 「投函」等の文字列で見つかった場合
          cDm1D=allToukanCols[0];
          cDm2D=allToukanCols[1]??-1;
        } else if(allDateCols.length>=2){
          // 日付型ヘッダーが2個以上 → 奇数番目=投函日、偶数番目=予約日
          cDm1D=allDateCols[0]??-1;
          cDm2D=allDateCols[2]??allDateCols[1]??-1;
        } else {
          cDm1D=fc('投函日①','投函①','投函日1','投函日','DM1','ＤＭ①','第１回','案内①');
          cDm2D=fc('投函日②','投函②','投函日2','DM2','ＤＭ②','第２回','案内②');
        }
        // 予約列（日付型ヘッダーの場合は偶数番目、文字列の場合は「予約」含む列）
        let cBook1=-1,cBook2=-1;
        if(allDateCols.length>=2&&allToukanCols.length===0){
          cBook1=allDateCols[1]??-1;
          cBook2=allDateCols[3]??-1;
        }
        // デバッグ保存
        window.__lastImportHeaders=headers;
        window.__lastImportDmCols={allToukanCols,allDateCols,cDm1D,cDm2D,cBook1,cBook2};
        // cBook1/cBook2は上部で定義済み（日付型ヘッダー対応）
        // 文字列「予約」含む列で上書き
        const bookColsStr=headers.map((h,i)=>h.includes('予約')?i:-1).filter(i=>i>=0);
        const cBook1f=bookColsStr[0]??cBook1??-1;
        const cBook2f=bookColsStr[1]??cBook2??-1;

        const cEntry  =fc('入庫日');
        const cTok    =fc('特典');
        const cCourse =fc('種類','コース');
        const cStore  =fc('入庫店舗','店舗');
        const cStaff  =fc('担当');
        const cNote   =fc('備考');
        const cPhoneHome   =fc('自宅','tel（自宅）','自宅電話','自宅tel','tel(自宅)');
        const cPhoneMobile =fc('携帯','mobile','tel（携帯）','携帯電話','携帯tel','tel(携帯)');
        const cAddress     =fc('住所','address','所在地','住居','お住まい','〒','郵便');
        window.__lastImportCols={
          phoneHomeHeader:cPhoneHome>=0?headers[cPhoneHome]:'(未検出)',
          phoneMobileHeader:cPhoneMobile>=0?headers[cPhoneMobile]:'(未検出)',
          addressHeader:cAddress>=0?headers[cAddress]:'(未検出)',
        };

        const fileName=file.name.replace(/\.[^.]+$/,'');
        const customers=[];

        for(let i=headerRow+1;i<rows.length;i++){
          const row=rows[i];
          const name=String(row[cName]||'').trim();
          if(!name||name.includes('合計')||name.includes('件数'))continue;

          const expiry =parseExcelDate(row[cExpiry]);
          const no     =String(row[cNo]||'').trim();
          const carType=String(row[cCar>=0?cCar:0]||'').trim();
          const dm1Date=parseExcelDate(row[cDm1D>=0?cDm1D:null]);
          const dm1Book=parseExcelDate(row[cBook1f>=0?cBook1f:null]);
          const dm2Date=parseExcelDate(row[cDm2D>=0?cDm2D:null]);
          const dm2Book=parseExcelDate(row[cBook2f>=0?cBook2f:null]);
          const entryDate=parseExcelDate(row[cEntry>=0?cEntry:null]);
          const tokRaw =String(row[cTok>=0?cTok:null]||'').trim();
          const courseRaw=(cCourse>=0?String(row[cCourse]||''):'').trim();
          const storeRaw=String(row[cStore>=0?cStore:null]||'').trim();
          const staff  =String(row[cStaff>=0?cStaff:null]||'').trim();
          const note   =String(row[cNote>=0?cNote:null]||'').trim();
          const phoneHome   =String(row[cPhoneHome>=0?cPhoneHome:null]||'').trim();
          const phoneMobile =String(row[cPhoneMobile>=0?cPhoneMobile:null]||'').trim();
          const address     =String(row[cAddress>=0?cAddress:null]||'').trim();

          // セル背景色からステータス取得
          const cellRef=XLSX.utils.encode_cell({r:i,c:cName>=0?cName:0});
          const cell=ws[cellRef];
          let statusFromColor=null;
          if(cell&&cell.s&&cell.s.fgColor){
            const fg=cell.s.fgColor;
            const hex=fg.rgb||fg.theme||'';
            statusFromColor=cellColorToStatus(hex);
          }

          // ステータス自動判定
          let status=statusFromColor||'none';
          if(!statusFromColor){
            if(entryDate)status='confirm';
            else if(dm1Book||dm2Book)status='confirm';
          }

          // コース変換（省略形・数字・部分一致も対応）
          const courseObj=COURSES.find(c=>courseRaw.includes(c.name)||courseRaw===c.short)
            ||(/^[123]$/.test(courseRaw)?COURSES.find(c=>c.id===Number(courseRaw)):null)
            ||(courseRaw.length>=2?COURSES.find(c=>courseRaw.includes(c.name.replace('車検',''))):null);

          // 店舗変換
          let storeId='';
          if(storeRaw.includes('三田')||storeRaw==='sanda')storeId='sanda';
          else if(storeRaw.includes('本店')||storeRaw==='honten')storeId='honten';

          // 特典変換
          const tokuten=tokRaw==='①'||tokRaw==='1'?'①':tokRaw==='②'||tokRaw==='2'?'②':tokRaw||'-';

          const custId=makeCustId(fileName,i,name,no);

          customers.push({
            custId,rowIdx:i,
            expiry,name,no:isNaN(Number(no))?no:Number(no),carType,
            phoneHome,phoneMobile,address,
            dm1Date,dm1Book,dm2Date,dm2Book,
            entryDate,tokuten,
            course:courseObj?courseObj.id:null,
            store:storeId,staff,note,status,
            bookingTime:'',
            linkedInspDate:'',
          });
        }
        resolve({name:fileName,customers});
      }catch(err){reject(err);}
    };
    reader.onerror=()=>reject(new Error('ファイル読み込みエラー'));
    reader.readAsBinaryString(file);
  });
};

// 代車グリッド（モーダル内）
// ═══════════════════════════════════════════
const LoanerGrid=memo(({storeId,entryDate,loanerRes,loanerList,onSelect,selCarId,selDays})=>{
  const loaners=(loanerList&&loanerList.length>0)?loanerList:(storeId==='honten'?LOANERS_H:LOANERS_S);
  const dragRef=useRef({});

  // Hooksはreturnの前に全て宣言する必要がある
  const [startOffset,setStartOffset]=useState(0);
  const prevEntryRef=useRef(entryDate);

  // entryDate変化時にoffsetをリセット（useEffectで行う）
  useEffect(()=>{
    if(prevEntryRef.current!==entryDate){
      prevEntryRef.current=entryDate;
      setStartOffset(0);
    }
  },[entryDate]);

  if(!entryDate)return(
    <div style={{padding:'16px 0',color:'#94a3b8',fontSize:12,textAlign:'center'}}>
      入庫日を先に入力してください
    </div>
  );

  const toNum=(y,mo,d)=>y*10000+mo*100+d;
  const [y0,m0,d0]=entryDate.split('-').map(Number);

  // 表示開始日（入庫日-2日 + startOffset）
  const viewStart=new Date(y0,m0-1,d0-2+startOffset);

  // 30日分の日付配列
  const dates=Array.from({length:30},(_,i)=>{
    const d=new Date(viewStart.getFullYear(),viewStart.getMonth(),viewStart.getDate()+i);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dow=d.getDay();
    const isEntry=key===entryDate;
    const isMonthStart=d.getDate()===1;
    return{key,label:d.getDate(),month:d.getMonth()+1,dow,isEntry,isMonthStart};
  });

  const isBooked=(carId,key)=>{
    const [ky,km,kd]=key.split('-').map(Number);
    const dn=toNum(ky,km-1,kd);
    return Object.values(loanerRes[carId]||{}).some(r=>{
      const s=toNum(r.fy,r.fm,r.fd),e=toNum(r.ty,r.tm,r.td);
      return dn>=s&&dn<=e;
    });
  };

  const CELL=36;
  const NAME_W=88;

  return(
    <div style={{fontSize:11,userSelect:'none'}}>
      {/* ナビゲーター */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,paddingLeft:NAME_W}}>
        <button onClick={()=>setStartOffset(p=>p-30)}
          style={{background:'#e0e7ff',border:'none',borderRadius:5,padding:'2px 10px',cursor:'pointer',fontWeight:700,color:'#3730a3',fontSize:13}}>‹ 前</button>
        <span style={{fontSize:11,color:'#64748b',fontWeight:600}}>
          {dates[0].month}/{dates[0].label} 〜 {dates[29].month}/{dates[29].label}
        </span>
        <button onClick={()=>setStartOffset(p=>p+30)}
          style={{background:'#e0e7ff',border:'none',borderRadius:5,padding:'2px 10px',cursor:'pointer',fontWeight:700,color:'#3730a3',fontSize:13}}>次 ›</button>
      </div>
      {/* グリッド */}
      <div style={{overflowX:'auto'}}>
        <div style={{minWidth:NAME_W+CELL*30}}>
          {/* 日付ヘッダー */}
          <div style={{display:'flex',background:'#dbeafe',borderBottom:'2px solid #93c5fd'}}>
            <div style={{width:NAME_W,minWidth:NAME_W,padding:'4px 6px',fontWeight:700,color:'#374151',borderRight:'2px solid #93c5fd',fontSize:11,flexShrink:0}}>代車</div>
            {dates.map(({key,label,month,dow,isEntry,isMonthStart})=>(
              <div key={key} style={{
                width:CELL,minWidth:CELL,textAlign:'center',padding:'2px 1px',flexShrink:0,
                background:isEntry?'#1d4ed8':isMonthStart?'#ecfdf5':'#dbeafe',
                color:isEntry?'white':dow===0?'#dc2626':dow===6?'#7c3aed':'#1e1b4b',
                fontWeight:isEntry?800:isMonthStart?700:400,
                borderRight:'1px solid #bfdbfe',
                borderLeft:isMonthStart?'2px solid #22c55e':undefined,
                fontSize:10,lineHeight:1.3}}>
                {isMonthStart&&<div style={{fontSize:8,color:'#16a34a',fontWeight:800}}>{month}月</div>}
                <div>{label}</div>
                {isEntry&&<div style={{fontSize:8}}>◎</div>}
              </div>
            ))}
          </div>
          {/* 代車行 */}
          {loaners.map((car,ci)=>(
            <div key={car.id} style={{display:'flex',borderBottom:'1px solid #e0e7ff',background:ci%2===0?'white':'#f8faff'}}>
              <div style={{width:NAME_W,minWidth:NAME_W,padding:'5px 7px',borderRight:'2px solid #93c5fd',flexShrink:0}}>
                <div style={{fontWeight:700,fontSize:11,color:'#1e1b4b',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{car.name}</div>
                <div style={{fontSize:9,color:'#94a3b8'}}>{car.num}</div>
              </div>
              {dates.map(({key})=>{
                const booked=isBooked(car.id,key);
                const sel=selCarId===car.id&&(selDays||[]).includes(key);
                return(
                  <div key={key}
                    style={{width:CELL,minWidth:CELL,height:32,borderRight:'1px solid #e0e7ff',flexShrink:0,
                      background:booked?'#fca5a5':sel?'#bfdbfe':'transparent',
                      cursor:booked?'not-allowed':'pointer',
                      display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,
                      outline:sel?'2px solid #3b82f6':'none'}}
                    onMouseDown={()=>{
                      if(booked)return;
                      if(sel){onSelect(null,[]);return;}
                      dragRef.current={dragging:true,carId:car.id,startKey:key,days:[key]};
                      onSelect(car.id,[key]);
                    }}
                    onMouseEnter={()=>{
                      if(!dragRef.current.dragging||dragRef.current.carId!==car.id)return;
                      const allKeys=dates.map(d=>d.key);
                      const si=allKeys.indexOf(dragRef.current.startKey);
                      const ei=allKeys.indexOf(key);
                      if(si<0||ei<0)return;
                      const range=allKeys.slice(Math.min(si,ei),Math.max(si,ei)+1);
                      if(range.some(k=>isBooked(car.id,k)))return;
                      dragRef.current.days=range;
                      onSelect(car.id,range);
                    }}
                    onMouseUp={()=>{dragRef.current.dragging=false;}}
                  >
                    {booked&&<span style={{color:'#ef4444',fontWeight:700}}>×</span>}
                    {sel&&!booked&&<span style={{color:'#1d4ed8',fontWeight:700}}>✓</span>}
                  </div>
                );
              })}
            </div>
          ))}
          {/* 凡例 */}
          <div style={{display:'flex',gap:12,padding:'4px 6px',background:'#f8faff',borderTop:'1px solid #e0e7ff',flexWrap:'wrap'}}>
            <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:'#64748b'}}><span style={{width:12,height:12,background:'#1d4ed8',borderRadius:2,display:'inline-block'}}/>◎入庫日</span>
            <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:'#64748b'}}><span style={{width:12,height:12,background:'#bfdbfe',border:'1px solid #3b82f6',borderRadius:2,display:'inline-block'}}/>選択中</span>
            <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:'#64748b'}}><span style={{width:12,height:12,background:'#fca5a5',borderRadius:2,display:'inline-block'}}/>使用中</span>
          </div>
        </div>
      </div>
    </div>
  );
});

// ── 第2火曜日（両店共通定休）判定ユーティリティ ──
// index_dev.html と同一ロジック。1月・5月・8月の第2火曜は通常営業（除外）。
// overrideOpen に入っている日付は個別に「通常営業」へ戻す。
const _secTueExemptMonths=new Set([0,4,7]); // 1月・5月・8月（0-indexed）
const getSecondTuesday=(year,month)=>{
  if(_secTueExemptMonths.has(month))return null;
  let count=0;
  for(let d=1;d<=31;d++){
    const dt=new Date(year,month,d);
    if(dt.getMonth()!==month)break;
    if(dt.getDay()===2){count++;if(count===2)return d;}
  }
  return null;
};
const isSecondTuesdayHoliday=(year,month,day,overrideOpen)=>{
  const d2=getSecondTuesday(year,month);
  if(d2===null||d2!==day)return false;
  const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  if(overrideOpen&&overrideOpen.includes(ds))return false;
  return true;
};

// ── 車検カレンダーピッカー（入庫日選択用）──
function InspCalendarPicker({value,onChange,inspData,closedDays,closedDates,overrideOpen,inspLimits,open,onClose}){
  const [calMonth,setCalMonth]=useState(()=>{
    if(value){const p=value.split('-');return new Date(Number(p[0]),Number(p[1])-1,1);}
    return new Date();
  });
  if(!open)return null;
  const cy=calMonth.getFullYear(),cm=calMonth.getMonth();
  const dim=new Date(cy,cm+1,0).getDate();
  const first=new Date(cy,cm,1).getDay();
  const weeks=[];let wk=Array(7).fill(null);
  for(let d=1;d<=dim;d++){
    const dow=(first+d-1)%7;wk[dow]=d;
    if(dow===6){weeks.push([...wk]);wk=Array(7).fill(null);}
  }
  if(wk.some(x=>x!==null))weeks.push([...wk]);
  function getDk(d){return `${cy}-${cm+1}-${d}`;}
  function getCounts(d){
    const raw=(inspData&&inspData[getDk(d)])||[];
    // データ上に古い承認待ちフラグが残っていても正しい空き数になるよう、表示用に再計算してから数える
    const rows=recomputeInspApproval(raw,getLmt(d));
    const v=rows.filter(r=>r&&r.name&&!r.pendingApproval&&r.bookingStatus!=='cancelled');
    return{1:v.filter(r=>Number(r.course)===1).length,2:v.filter(r=>Number(r.course)===2).length,3:v.filter(r=>Number(r.course)===3).length,total:v.length};
  }
  function getLmt(d){return(inspLimits&&inspLimits[getDk(d)])||6;}
  function closed(d){
    const dt=new Date(cy,cm,d);
    const cdays=Array.isArray(closedDays)?closedDays:[];
    const cdates=Array.isArray(closedDates)?closedDates:[];
    if(cdays.includes(dt.getDay()))return true;
    const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(cdates.includes(ds))return true;
    // 第2火曜日（両店共通定休。overrideOpenで個別に通常営業化）
    if(isSecondTuesdayHoliday(cy,cm,d,Array.isArray(overrideOpen)?overrideOpen:[]))return true;
    return false;
  }
  const DOW=['日','月','火','水','木','金','土'];
  const today=new Date();
  const COLORS={1:{bg:'#fca5a5',tc:'#b91c1c',label:'マ'},2:{bg:'#93c5fd',tc:'#1d4ed8',label:'ク'},3:{bg:'#fde68a',tc:'#b45309',label:'レ'}};
  return (
    <div style={{border:'1.5px solid #e5e7eb',borderRadius:9,overflow:'hidden',fontSize:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 12px',background:'#f8fafc',borderBottom:'1px solid #e5e7eb'}}>
        <button onClick={()=>setCalMonth(new Date(cy,cm-1,1))} style={{padding:'3px 10px',border:'1px solid #d1d5db',borderRadius:6,background:'white',cursor:'pointer',fontSize:13}}>&#8249;</button>
        <span style={{fontWeight:800,color:'#1e1b4b',fontSize:13}}>{cy}年{cm+1}月</span>
        <button onClick={()=>setCalMonth(new Date(cy,cm+1,1))} style={{padding:'3px 10px',border:'1px solid #d1d5db',borderRadius:6,background:'white',cursor:'pointer',fontSize:13}}>&#8250;</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',background:'#eef2ff',borderBottom:'1px solid #e5e7eb'}}>
        {DOW.map((d,i)=>(
          <div key={d} style={{textAlign:'center',padding:'4px 0',fontWeight:700,fontSize:10,color:i===0?'#dc2626':i===6?'#2563eb':'#374151'}}>{d}</div>
        ))}
      </div>
      {weeks.map((wk,wi)=>(
        <div key={wi} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
          {wk.map((d,di)=>{
            if(!d)return <div key={di} style={{minHeight:66,borderTop:'1px solid #f3f4f6',borderLeft:di>0?'1px solid #f3f4f6':'none',background:'#f9fafb'}}/>;
            const cc=getCounts(d);
            const lmt=getLmt(d);
            const isClosed=closed(d);
            const isToday=d===today.getDate()&&cm===today.getMonth()&&cy===today.getFullYear();
            const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isSel=value===ds;
            const isFull=cc.total>=lmt;
            const numColor=di===0?'#dc2626':di===6?'#2563eb':'#111';
            let bg='white';
            if(isSel)bg='#dbeafe';
            else if(isClosed)bg='repeating-linear-gradient(45deg,#f9fafb,#f9fafb 3px,#f3f4f6 3px,#f3f4f6 6px)';
            else if(isFull)bg='#fee2e2';
            // 6枠スロットを生成
            const slots=[];
            for(let i=0;i<cc[1];i++)slots.push(1);
            for(let i=0;i<cc[2];i++)slots.push(2);
            for(let i=0;i<cc[3];i++)slots.push(3);
            while(slots.length<6)slots.push(0);
            // 台数制限を掛けた日で上限に達していたら選べない（制限を掛けていない日は従来どおり）
            const limitBlocked=!!(inspLimits&&inspLimits[getDk(d)]!=null&&cc.total>=lmt);
            return (
              <div key={di}
                onClick={()=>{if(isClosed)return;if(limitBlocked){alert(`🚫 ${cm+1}/${d} は台数制限（最大${lmt}台）に達しているため、予約できません。`);return;}onChange(ds);if(onClose)onClose();}}
                style={{minHeight:66,padding:'3px 2px',cursor:(isClosed||limitBlocked)?'not-allowed':'pointer',
                  borderTop:'1px solid #f3f4f6',borderLeft:di>0?'1px solid #f3f4f6':'none',
                  background:bg,outline:isSel?'2px solid #2563eb':isToday?'2px solid #93c5fd':'none',position:'relative'}}>
                <div style={{textAlign:'center',fontWeight:isToday?900:700,fontSize:11,
                  color:isSel?'#1d4ed8':isClosed?'#9ca3af':numColor,lineHeight:1.3}}>{d}</div>
                {!isClosed&&(
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:1,padding:'2px 2px'}}>
                    {slots.map((cid,si)=>(
                      <div key={si} style={{
                        height:14,borderRadius:2,
                        background:cid?COLORS[cid].bg:'#f3f4f6',
                        border:cid?'none':'1px solid #e5e7eb',
                        display:'flex',alignItems:'center',justifyContent:'center'}}>
                        {cid?<span style={{fontSize:7,fontWeight:900,color:COLORS[cid].tc}}>{COLORS[cid].label}</span>:null}
                      </div>
                    ))}
                  </div>
                )}
                {isClosed&&<div style={{textAlign:'center',fontSize:9,color:'#9ca3af',marginTop:2}}>休</div>}
                {!isClosed&&limitBlocked&&<div style={{textAlign:'center',fontSize:8,color:'#dc2626',fontWeight:800,marginTop:1}}>予約不可</div>}
                {isSel&&<div style={{position:'absolute',top:1,right:1,width:5,height:5,borderRadius:'50%',background:'#2563eb'}}/>}
              </div>
            );
          })}
        </div>
      ))}
      <div style={{display:'flex',gap:8,padding:'5px 10px',background:'#f8fafc',borderTop:'1px solid #e5e7eb',flexWrap:'wrap',alignItems:'center'}}>
        {[1,2,3].map(cid=>(
          <span key={cid} style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:9,fontWeight:700}}>
            <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:14,height:10,borderRadius:2,background:COLORS[cid].bg}}>
              <span style={{fontSize:6,fontWeight:900,color:COLORS[cid].tc}}>{COLORS[cid].label}</span>
            </span>
            {cid===1?'マッハ':cid===2?'クイック':'レギュラー'}
          </span>
        ))}
        <span style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:9,color:'#9ca3af'}}>
          <span style={{width:10,height:8,display:'inline-block',background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:2}}/>6台満
        </span>
        <span style={{fontSize:9,color:'#9ca3af'}}>休=休業</span>
      </div>
    </div>
  );
}


const BookingModal=({customer,inspData,loanerResH,loanerResS,loanerListH,loanerListS,onSave,onClose,currentUser,closedDaysH,closedDaysS,closedDatesH,closedDatesS,overrideOpen,inspLimits})=>{
  const normStore=s=>{if(!s)return'honten';if(s==='三田店'||s==='sanda')return'sanda';return'honten';};
  const defaultStaff=customer.staff||currentUser?.name||'';
  // デフォルト店舗: 顧客の店舗 > ログインユーザーの店舗 > 本店
  // 店舗優先順位: 顧客の既存店舗 > ログインユーザーの店舗 > 本店
  // normStoreは空でも'honten'を返すのでcustomer.storeが空かを先にチェック
  const userStore=currentUser?.store?.id||currentUser?.store||'honten';
  const defaultStore=customer.store?normStore(customer.store):userStore;
  const defaultTokuten=(()=>{
    if(customer.tokuten&&customer.tokuten!=='-')return customer.tokuten;
    if(customer.expiry){const today=new Date().toISOString().slice(0,10);return calcTokuten(customer.expiry,today);}
    return'-';
  })();
  const [form,setForm]=useState({
    entryDate:customer.entryDate||'',
        store:defaultStore,
    bookingTime:customer.bookingTime||'',
    course:customer.course||0,
    tokuten:defaultTokuten,
    staff:defaultStaff,
    note:customer.note||'',
  });
  const [showCal,setShowCal]=useState(true);
  const [selCarId,setSelCarId]=useState(null);
  const [selDays,setSelDays]=useState([]);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  // キーボード操作用state/ref（Hooksはreturnより前に全定義）
  const [focusField,setFocusField]=useState('time');
  const [showTimePicker,setShowTimePicker]=useState(false);
  const timeRef=useRef(null);
  const noteRef=useRef(null);
  // モーダルを開いたとき入庫時間にフォーカス
  useEffect(()=>{
    // モーダルを開いたとき最上部にスクロール（日付入力が最初のため）
    const el=document.getElementById('booking-modal-scroll');
    if(el) el.scrollTop=0;
  },[customer.custId]);

  const dynListH=(loanerListH&&loanerListH.length>0)?loanerListH:LOANERS_H;
  const dynListS=(loanerListS&&loanerListS.length>0)?loanerListS:LOANERS_S;
  const loanerRes=form.store==='honten'?loanerResH:loanerResS;
  const closedDays=form.store==='honten'?closedDaysH:closedDaysS;
  const closedDates=form.store==='honten'?closedDatesH:closedDatesS;
  const storeObj=STORES.find(s=>s.id===form.store)||STORES[0];
  const upd=k=>e=>setForm(p=>({...p,[k]:typeof e==='object'&&e.target?e.target.value:e}));

  const handleSave=async(isTemp)=>{
    setErr('');
    if(isTemp){
      // 仮予約：特典は必須でない（-=なしも有効）
    }else{
      const missing=[];
      if(!form.entryDate)missing.push('入庫日');
      if(!form.course)missing.push('車検コース');
      if(!form.bookingTime)missing.push('入庫時間');
      if(!form.tokuten)missing.push('特典');
      // 特典「-」は「特典なし」として有効（エラーにしない）
      if(missing.length){setErr(`本予約には ${missing.join('・')} が必要です`);return;}
    }
    setSaving(true);
    // モーダルは即座に閉じ、GAS保存はバックグラウンドで継続させる。
    // GAS書き込みは直列ロック(最大25秒)＋チャンク保存で長時間かかることがあり、
    // await完了まで待つと「保存中...」のままフリーズして見えるため。
    // 予約はローカルstateへ即時反映されるので、閉じても予約内容は失われない。
    onClose();
    Promise.resolve(onSave({...form,isTemp,selCarId,selDays},customer))
      .catch(e=>console.error('onSave error:',e))
      .finally(()=>setSaving(false));
  };

  const courseObj=COURSES.find(c=>c.id===Number(form.course));

  // ── キーボード操作ロジック（return前に定義）──────────────────
  // フィールド順序：時間 → コース → 特典 → 備考
  const FIELD_ORDER=['time','course','tokuten','note'];
  const FOCUS_STYLE={outline:'3px solid #1d4ed8',outlineOffset:'2px',boxShadow:'0 0 0 4px rgba(29,78,216,0.15)'};
  const FR=(key)=>focusField===key?FOCUS_STYLE:{};

  // 時間リスト
  const TIME_LIST=Array.from({length:19},(_,i)=>{
    const h=Math.floor(i/2)+9,m=i%2===0?'00':'30';
    return`${String(h).padStart(2,'0')}:${m}`;
  });

  // 次のフィールドへ移動
  // フォーカス移動ヘルパー
  const gotoField=(key)=>{
    setFocusField(key);
    if(key==='time'){setTimeout(()=>timeRef.current?.focus(),20);}
    else if(key==='note'){setTimeout(()=>noteRef.current?.focus(),20);}
    else{// course/tokuten: data属性でdivを探してfocus
      setTimeout(()=>{
        const el=document.querySelector('[data-bmfield="'+key+'"]');
        if(el)el.focus();
      },20);
    }
  };
  const moveNext=(from)=>{
    const cur=FIELD_ORDER.indexOf(from);
    const next=FIELD_ORDER[cur+1];
    if(!next)return;
    gotoField(next);
  };
  const movePrev=(from)=>{
    const cur=FIELD_ORDER.indexOf(from);
    const prev=FIELD_ORDER[cur-1];
    if(!prev)return;
    gotoField(prev);
  };

  // 入庫時間キー操作
  const onTimeKey=(e)=>{
    if(!showTimePicker){
      if(e.key==='Enter'||e.key==='ArrowDown'||e.key==='ArrowUp'){e.preventDefault();setShowTimePicker(true);}
      return;
    }
    const cur=TIME_LIST.indexOf(form.bookingTime);
    if(e.key==='ArrowDown'){e.preventDefault();upd('bookingTime')(TIME_LIST[Math.min(cur+1,TIME_LIST.length-1)]);}
    else if(e.key==='ArrowUp'){e.preventDefault();upd('bookingTime')(TIME_LIST[Math.max(cur-1,0)]);}
    else if(e.key==='Enter'||e.key==='Escape'){e.preventDefault();setShowTimePicker(false);if(e.key==='Enter')setTimeout(()=>moveNext('time'),50);}
  };

  // コースキー操作（←→）
  const onCourseKey=(e)=>{
    const ids=COURSES.map(c=>c.id);
    const cur=ids.indexOf(Number(form.course));
    if(e.key==='ArrowLeft'&&cur>0){e.preventDefault();upd('course')(ids[cur-1]);}
    else if(e.key==='ArrowRight'&&cur<ids.length-1){e.preventDefault();upd('course')(ids[cur+1]);}
    else if(e.key==='ArrowDown'||e.key==='Enter'){e.preventDefault();moveNext('course');}
    else if(e.key==='ArrowUp'){e.preventDefault();movePrev('course');}
  };

  // 特典キー操作（←→）
  const TOK_LIST=['-','①','②'];
  const onTokKey=(e)=>{
    const cur=TOK_LIST.indexOf(form.tokuten);
    if(e.key==='ArrowLeft'&&cur>0){e.preventDefault();upd('tokuten')(TOK_LIST[cur-1]);}
    else if(e.key==='ArrowRight'&&cur<TOK_LIST.length-1){e.preventDefault();upd('tokuten')(TOK_LIST[cur+1]);}
    else if(e.key==='ArrowDown'||e.key==='Enter'){e.preventDefault();moveNext('tokuten');}
    else if(e.key==='ArrowUp'){e.preventDefault();movePrev('tokuten');}
  };
  // ─────────────────────────────────────────────────────────────

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:'white',borderRadius:14,width:'100%',maxWidth:860,maxHeight:'92vh',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,.3)'}}>
        <div style={{padding:'14px 18px',borderRadius:'14px 14px 0 0',background:storeObj.id==='sanda'?'linear-gradient(135deg,#991b1b,#dc2626)':`linear-gradient(135deg,#1e1b4b,${storeObj.color})`,display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1}}>
            <div style={{color:'white',fontWeight:900,fontSize:17}}>{customer.name}</div>
            <div style={{color:'rgba(255,255,255,.7)',fontSize:11,marginTop:2,display:'flex',gap:12,flexWrap:'wrap'}}>
              <span>🚗 {customer.carType}</span><span>No.{customer.no}</span><span>満期: {fmtDate(customer.expiry)}</span>
            </div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.15)',border:'none',borderRadius:8,padding:'6px 12px',color:'white',fontSize:13,fontWeight:700}}>✕</button>
        </div>
        <div id='booking-modal-scroll' style={{overflowY:'auto',flex:1,padding:18}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:5,flexWrap:'wrap'}}>
                <span style={{fontSize:11,fontWeight:700,color:'#374151'}}>📅 入庫日 <span style={{color:'#dc2626',fontSize:10}}>（本予約必須）</span></span>
                {form.entryDate&&<span style={{fontWeight:800,color:'#1d4ed8',fontSize:12}}>{form.entryDate}</span>}
                <button type="button" onClick={()=>setShowCal(p=>!p)}
                  style={{padding:'2px 10px',fontSize:10,borderRadius:6,border:'1.5px solid #3b82f6',
                    background:showCal?'#2563eb':'white',color:showCal?'white':'#2563eb',
                    fontWeight:700,cursor:'pointer',flexShrink:0}}>
                  {showCal?'▲ 閉じる':'📅 カレンダーを開く'}
                </button>
              </div>
              <InspCalendarPicker
                value={form.entryDate}
                onChange={v=>setForm(p=>({...p,entryDate:v}))}
                inspData={inspData}
                closedDays={closedDays}
                closedDates={closedDates}
                overrideOpen={overrideOpen}
                inspLimits={inspLimits}
                open={showCal}
                onClose={()=>setShowCal(false)}
              />
            </div>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#374151',marginBottom:5}}>店舗</label>
              <div style={{display:'flex',gap:8}}>
                {STORES.map(s=>(
                  <button key={s.id} onClick={()=>setForm(p=>({...p,store:s.id}))}
                    style={{flex:1,padding:'8px',border:`2px solid ${form.store===s.id?s.color:'#e5e7eb'}`,borderRadius:8,background:form.store===s.id?s.color:'white',color:form.store===s.id?'white':'#374151',fontWeight:700,fontSize:12,cursor:'pointer'}}>
                    {s.name}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#374151',marginBottom:5}}>入庫時間 <span style={{color:'#dc2626',fontSize:10}}>（本予約必須）</span></label>
              <div data-bmfield="time" ref={timeRef} tabIndex={0}
                onFocus={()=>setFocusField('time')} onBlur={()=>{setFocusField('');setTimeout(()=>setShowTimePicker(false),150);}}
                onKeyDown={onTimeKey}
                onClick={()=>setShowTimePicker(p=>!p)}
                style={{width:'100%',padding:'8px 10px',border:'1.5px solid #e5e7eb',borderRadius:8,fontSize:13,boxSizing:'border-box',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',...FR('time')}}>
                <span style={{color:form.bookingTime?'#0284c7':'#9ca3af',fontWeight:form.bookingTime?700:400}}>
                  {form.bookingTime||'時間を選択（Enterで開く）'}
                </span>
                <span style={{fontSize:10,color:'#6b7280'}}>{showTimePicker?'▲':'▼'}</span>
              </div>
              {showTimePicker&&(
                <div style={{border:'2px solid #0284c7',borderRadius:8,marginTop:4,maxHeight:180,overflowY:'auto',background:'white',boxShadow:'0 4px 12px rgba(0,0,0,0.15)'}}>
                  {TIME_LIST.map(v=>(
                    <div key={v}
                      onMouseDown={e=>{e.preventDefault();upd('bookingTime')(v);setShowTimePicker(false);moveNext('time');}}
                      style={{padding:'7px 14px',cursor:'pointer',fontSize:13,fontWeight:form.bookingTime===v?800:400,
                        background:form.bookingTime===v?'#e0f2fe':'white',color:form.bookingTime===v?'#0284c7':'#374151',
                        borderLeft:form.bookingTime===v?'4px solid #0284c7':'4px solid transparent'}}>
                      {v}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#374151',marginBottom:5}}>担当</label>
              <input value={form.staff} onChange={upd('staff')} placeholder="担当者名"
                style={{width:'100%',padding:'8px 10px',border:'1.5px solid #e5e7eb',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
            </div>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#374151',marginBottom:5}}>車検コース</label>
              <div data-bmfield="course" tabIndex={0}
                onFocus={()=>setFocusField('course')} onBlur={()=>setFocusField('')}
                onKeyDown={onCourseKey}
                style={{display:'flex',gap:6,outline:'none'}}>
                {COURSES.map(c=>(
                  <button key={c.id} tabIndex={-1}
                    onMouseDown={e=>{e.preventDefault();upd('course')(c.id);}}
                    style={{flex:1,padding:'9px 4px',borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:11,
                      border:`2px solid ${Number(form.course)===c.id?c.color:'#e5e7eb'}`,
                      background:Number(form.course)===c.id?c.bg:'white',
                      color:Number(form.course)===c.id?c.color:'#6b7280',
                      outline:focusField==='course'&&Number(form.course)===c.id?`3px solid ${c.color}`:'none',
                      outlineOffset:'2px'}}>
                    {c.name}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#374151',marginBottom:5}}>特典</label>
              <div data-bmfield="tokuten" tabIndex={0}
                onFocus={()=>setFocusField('tokuten')} onBlur={()=>setFocusField('')}
                onKeyDown={onTokKey}
                style={{display:'flex',gap:6,outline:'none'}}>
                {TOK_LIST.map(t=>(
                  <button key={t} tabIndex={-1}
                    onMouseDown={e=>{e.preventDefault();upd('tokuten')(t);}}
                    style={{flex:1,padding:'8px',
                      border:`2px solid ${form.tokuten===t?'#7c3aed':'#e5e7eb'}`,
                      borderRadius:8,background:form.tokuten===t?'#ede9fe':'white',
                      color:form.tokuten===t?'#7c3aed':'#374151',fontWeight:700,fontSize:13,cursor:'pointer',
                      outline:focusField==='tokuten'&&form.tokuten===t?'3px solid #7c3aed':'none',
                      outlineOffset:'2px'}}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{display:'block',fontSize:11,fontWeight:700,color:'#374151',marginBottom:5}}>備考</label>
            <textarea ref={noteRef} value={form.note} onChange={upd('note')} rows={2} placeholder="備考・メモ"
              onFocus={()=>setFocusField('note')} onBlur={()=>setFocusField('')}
              onKeyDown={e=>{if(e.key==='ArrowUp'&&e.target.selectionStart===0){e.preventDefault();movePrev('note');}}}
              style={{width:'100%',padding:'8px 10px',border:'1.5px solid #e5e7eb',borderRadius:8,fontSize:13,resize:'vertical',boxSizing:'border-box',...FR('note')}}/>
          </div>
          <div>
            <label style={{display:'block',fontSize:11,fontWeight:700,color:'#374151',marginBottom:5}}>
              代車
              {selCarId&&selDays.length>0&&(
                <span style={{marginLeft:8,fontSize:11,color:'#0284c7',fontWeight:400}}>
                  {[...dynListH,...dynListS].find(c=>c.id===selCarId)?.name}　{selDays.length}日間選択中
                </span>
              )}
            </label>
            <div style={{border:'2px solid #bfdbfe',borderRadius:10,padding:8,background:'#eff6ff'}}>
              <LoanerGrid storeId={form.store} entryDate={form.entryDate} loanerRes={loanerRes}
                loanerList={form.store==='honten'?loanerListH:loanerListS}
                onSelect={(cid,days)=>{setSelCarId(cid);setSelDays(days);}}
                selCarId={selCarId} selDays={selDays}/>
            </div>
          </div>
          {err&&<div style={{marginTop:10,padding:'8px 12px',background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:8,color:'#dc2626',fontSize:12}}>{err}</div>}
        </div>
        <div style={{padding:'12px 18px',borderTop:'1px solid #f1f5f9',display:'flex',gap:8,justifyContent:'flex-end',background:'#fafafa',borderRadius:'0 0 14px 14px'}}>
          <button onClick={onClose} style={{padding:'9px 20px',border:'1.5px solid #e5e7eb',borderRadius:9,background:'white',color:'#374151',fontWeight:600,cursor:'pointer'}}>キャンセル</button>
          <button onClick={()=>handleSave(true)} disabled={saving} style={{padding:'9px 20px',border:'1.5px solid #86efac',borderRadius:9,background:'#f0fdf4',color:'#16a34a',fontWeight:700,cursor:'pointer'}}>仮予約</button>
          <button onClick={()=>handleSave(false)} disabled={saving}
            style={{padding:'9px 20px',border:'none',borderRadius:9,background:storeObj.id==='sanda'?'linear-gradient(135deg,#991b1b,#dc2626)':`linear-gradient(135deg,#1d4ed8,${storeObj.color})`,color:'white',fontWeight:700,cursor:'pointer',boxShadow:storeObj.id==='sanda'?'0 2px 8px rgba(220,38,38,0.3)':'0 2px 8px rgba(29,78,216,0.3)'}}>
            {saving?'保存中...':'✓ 本予約'}
          </button>
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════

const App=()=>{
  // index.htmlのlocalStorageからログインユーザーを取得
  const currentUser=useMemo(()=>{
    try{const u=sessionStorage.getItem('hub_currentUser');return u?JSON.parse(u):null;}catch{return null;}
  },[]);
  const [files,setFiles]=useState([]);
  const filesRef = useRef([]); // setFilesと同期して常に最新値を保持
  useEffect(()=>{filesRef.current=files;},[files]); // 初回ロード含めfilesを常にfilesRefへ反映（最初の予約でchangedFileがnullになりリスト未保存になるのを防ぐ）
  const pollUpdatesRef = useRef(null);
  const reconcileRef = useRef(null); // スケジュール→リスト突き合わせ（自己修復）
  const [activeIdx,setActiveIdx]=useState(0);
  const [search,setSearch]=useState('');
  const [filterStatus,setFilterStatus]=useState('all');
  const [gasOk,setGasOk]=useState(null);
  const [gasLoading,setGasLoading]=useState(true);
  // 全画面表示（index_dev.htmlと同一の仕組み。sessionStorageのSTOR+'fs-restore'で
  // ページ間の全画面状態を引き継ぎ、遷移直後の最初のクリックで自動復帰する）
  const [isFullscreen,setIsFullscreen]=useState(false);
  useEffect(()=>{
    let unloading=false;
    const onHide=()=>{unloading=true;};
    const h=()=>{
      const fs=!!(document.fullscreenElement||document.webkitFullscreenElement);
      setIsFullscreen(fs);
      if(!unloading){try{sessionStorage.setItem(STOR+'fs-restore',fs?'1':'0');}catch(e){}}
    };
    document.addEventListener('fullscreenchange',h);
    document.addEventListener('webkitfullscreenchange',h);
    window.addEventListener('pagehide',onHide);
    let restore=null;
    try{
      if(!IS_EMBED&&sessionStorage.getItem(STOR+'fs-restore')==='1'&&!(document.fullscreenElement||document.webkitFullscreenElement)){
        restore=()=>{
          document.removeEventListener('pointerdown',restore,true);restore=null;
          const el=document.documentElement;
          const req=el.requestFullscreen||el.webkitRequestFullscreen;
          if(req)Promise.resolve(req.call(el)).catch(()=>{});
        };
        document.addEventListener('pointerdown',restore,true);
      }
    }catch(e){}
    return()=>{
      document.removeEventListener('fullscreenchange',h);
      document.removeEventListener('webkitfullscreenchange',h);
      window.removeEventListener('pagehide',onHide);
      if(restore)document.removeEventListener('pointerdown',restore,true);
    };
  },[]);
  const toggleFullscreen=useCallback(()=>{
    try{
      if(document.fullscreenElement||document.webkitFullscreenElement){
        const ex=document.exitFullscreen||document.webkitExitFullscreen;
        if(ex)Promise.resolve(ex.call(document)).catch(()=>{});
      }else{
        const el=document.documentElement;
        const req=el.requestFullscreen||el.webkitRequestFullscreen;
        if(req)Promise.resolve(req.call(el)).catch(()=>{});
      }
    }catch(e){/* 非対応ブラウザは無視 */}
  },[]);
  const [bgSyncing,setBgSyncing]=useState(false); // GASバックグラウンド同期中（キャッシュ表示中の読み込みアピール）
  const [importing,setImporting]=useState(false);
  const [inspData,setInspData]=useState({});
  const inspWriteRef=useRef(0); // 最後にローカル書き込みした時刻
  const [syncToast,setSyncToast]=useState(null); // スケジュール反映状況トースト {status,name,retry}
  const [pendings,setPendings]=useState([]);     // 未反映の予約（localStorageの控え。起動時にサーバーと突き合わせて残ったもの）
  const [resending,setResending]=useState('');   // 再送中のpid
  const [pendingSync,setPendingSync]=useState({}); // スケジュール側からの変更が反映待ちの顧客 {custId|name__no:{name,entryDate,ts}}
  const [syncFlash,setSyncFlash]=useState(null);   // スケジュール変更の反映完了フラッシュ {items:[{name,entryDate}],ts}
  const [recentApplied,setRecentApplied]=useState({}); // 反映直後の行ハイライト {custId|name__no:ts}
  const [loanerResH,setLoanerResH]=useState({});
  const [loanerResS,setLoanerResS]=useState({});
  const [loanerListH,setLoanerListH]=useState([]);
  const [loanerListS,setLoanerListS]=useState([]);
  const [bookingModal,setBookingModal]=useState(null);
  // ★予約モーダルを開く瞬間にスケジュール(insp)を再取得して、カレンダーの予約済み枠が
  //   常に最新で表示されるようにする（起動直後やinsp読込失敗時に枠が空表示になる不具合の対策）。
  const openBookingModal=useCallback((customer)=>{
    setBookingModal(customer);
    sGet(STOR+'insp').then(v=>{if(v&&typeof v==='object')setInspData(v);}).catch(()=>{});
  },[]);
  const [closedDaysH,setClosedDaysH]=useState([]);
  const [closedDaysS,setClosedDaysS]=useState([3]);
  const [closedDatesH,setClosedDatesH]=useState([]);
  const [closedDatesS,setClosedDatesS]=useState([]);
  const [overrideOpen,setOverrideOpen]=useState([]);
  const [inspLimits,setInspLimits]=useState({});
  const [syncDialog,setSyncDialog]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const fileInputRef=useRef();

  // GASからデータ取得
  useEffect(()=>{
    (async()=>{
      // まずlocalStorageキャッシュから即座に表示（GASを待たない）
      const SAFE=n=>n.replace(/[^a-zA-Z0-9　-鿿゠-ヿ぀-ゟ]/g,'_').slice(0,30);
      const cachedIndex=localStorage.getItem(STOR+'cf-index');
      if(cachedIndex){
        try{
          const cidx=JSON.parse(cachedIndex);
          const cached=cidx.map(fi=>{
            const d=localStorage.getItem(STOR+'cf-'+SAFE(fi.name));
            return d?JSON.parse(d):null;
          }).filter(Boolean);
          if(cached.length>0){
            setFiles(cached);
            setGasLoading(false); // キャッシュがあれば即表示
          }
        }catch{}
      }
      // GASから最新データをバックグラウンドで取得
      setBgSyncing(true);
      try{
        const [insp,lh,ls,fileIndex,llh,lls,cdh,cdate,ov,ilim,cdhS,cdateS]=await Promise.all([
          sGet(STOR+'insp'),
          sGet(storKey('lres','honten')),
          sGet(storKey('lres','sanda')),
          sGet(STOR+'cf-index'),
          sGet(storKey('cars','honten')),
          sGet(storKey('cars','sanda')),
          sGet(storKey('cdow','honten')),
          sGet(storKey('cdate','honten')),
          sGet(storKey('overrideOpen','honten')),
          sGet(STOR+'insp-limits'),
          sGet(storKey('cdow-v2','sanda')),
          sGet(storKey('cdate','sanda')),
        ]);
        // 書き込み後5秒以内はGASからの上書きをしない（ローカル更新を保護）
        if(insp&&(Date.now()-inspWriteRef.current)>8000)setInspData(insp);
        if(lh)setLoanerResH(lh);
        if(ls)setLoanerResS(ls);
        if(Array.isArray(llh)&&llh.length>0)setLoanerListH(llh);
        if(Array.isArray(lls)&&lls.length>0)setLoanerListS(lls);
        if(Array.isArray(cdh))setClosedDaysH(cdh);
        if(Array.isArray(cdate))setClosedDatesH(cdate);
        if(Array.isArray(cdhS))setClosedDaysS(cdhS);
        if(Array.isArray(cdateS))setClosedDatesS(cdateS);
        if(Array.isArray(ov))setOverrideOpen(ov);
        if(ilim&&typeof ilim==='object')setInspLimits(ilim);
        // GASから最新ファイルデータを取得してキャッシュ更新
        if(Array.isArray(fileIndex)&&fileIndex.length>0){
          localStorage.setItem(STOR+'cf-index',JSON.stringify(fileIndex));
          for(const fi of fileIndex){
            if(__saveCount>0)continue; // 書き込み中はGASからの上書きをスキップ
            loadFileChunked(fi.name).then(f=>{
              if(f){
                // GASキャッシュが古い場合でもローカルの予約状態を守る
                setFiles(prev=>{
                  const existing=prev.find(p=>p.name===f.name);
                  if(existing){
                    // ローカルのconfirm/tempをGASの古いデータで上書きしない
                    const merged={...f,customers:f.customers.map(fc=>{
                      const lc=existing.customers.find(c=>c.custId===fc.custId);
                      if(!lc)return fc;
                      // ローカルの方がステータスが進んでいれば保持
                      // 同優先度の場合もローカルを優先（GASの古いデータでcourse等が上書きされない）
                      const priority={cancel:4,confirm:3,temp:2,new_car:2,none:0};
                      const lp=priority[lc.status||'none']||0;
                      const fp=priority[fc.status||'none']||0;
                      if(lp>fp)return lc;
                      if(fp>lp)return fc;
                      // 同優先度: GAS(他端末の最新)に入庫日があってローカルに無ければGASを採用（PCごとに表示が違う問題の修正）
                      if(fc.entryDate&&!lc.entryDate)return fc;
                      // 同優先度で両方入庫日あり・日付が異なれば他端末の変更としてGAS優先（自端末はsaveCount中スキップで保護）
                      if(fc.entryDate&&lc.entryDate&&fc.entryDate!==lc.entryDate)return fc;
                      return lc;
                    })};
                    localStorage.setItem(STOR+'cf-'+SAFE(fi.name),JSON.stringify(merged));
                    return prev.map(p=>p.name===f.name?merged:p);
                  }
                  localStorage.setItem(STOR+'cf-'+SAFE(fi.name),JSON.stringify(f));
                  return [...prev,f];
                  const i=prev.findIndex(x=>x.name===f.name);
                  if(i>=0){const n=[...prev];n[i]=f;return n;}
                  return[...prev,f];
                });
              }
            });
          }
        }
        setGasLoading(false);
        setGasOk(true);
        setBgSyncing(false);
      }catch{setGasOk(false);setGasLoading(false);setBgSyncing(false);}
    })();

    // cust-updatesポーリング（スケジュール側からの即時連動）
    const pollUpdates=async()=>{
      if(document.visibilityState==='hidden')return; // 非表示タブはポーリング停止（復帰時はonVisibleが即時実行）
      // ★「反映中」バッジ表示は、重い適用処理のガード(__saveCount/__pollUpdatesBusy)より前に・毎回更新する。
      //   取得は軽量なcust-updatesのみ。保存検証中(最大6秒)や書込中でもバッジは止めない＝
      //   スケジュールでキャンセル後にリストを開いた時、バッジが出るまでのラグを最小化する。
      let arr=[];
      // ★リストに該当する顧客がいない通知（スケジュール側で手入力された予約のキャンセル等）は
      //   永久に適用されない。これを「反映中」に出すと消えないポップアップになる（2026-07-13の菊池）。
      //   バッジ判定とキュー掃除の両方で使うので、この関数スコープの先頭で定義する。
      const matchesCust=u=>(filesRef.current||[]).some(f=>(f.customers||[]).some(c=>
        (u.custId&&u.custId===c.custId)||(u.name&&((!u.no&&u.name===c.name)||(u.no&&u.name===c.name&&String(u.no)===String(c.no))))
      ));
      try{
        const updates=await sGet(STOR+'cust-updates');
        arr=Array.isArray(updates)?updates:[];
        if(!window.__appliedUpdTs)window.__appliedUpdTs=new Set();
        // ★「反映中」サイン：キュー上の未適用通知を行バッジ＋トーストで可視化
        //   （反映までの数秒〜数十秒、現場で正常動作と分かるように）。顧客ファイル読込済みのときは
        //   一致相手がいる通知だけを出す。
        const loaded=!!(filesRef.current&&filesRef.current.length>0);
        const pend={};
        arr.forEach(u=>{
          if(!u||!u.ts||window.__appliedUpdTs.has(u.ts))return;
          if(loaded&&!matchesCust(u))return; // 宛先不明 → 反映待ちではない
          pend[u.custId||`${u.name}__${u.no}`]={name:u.name,entryDate:u.entryDate,ts:u.ts};
        });
        setPendingSync(prev=>JSON.stringify(prev)===JSON.stringify(pend)?prev:pend);
      }catch{return;}
      if(arr.length===0)return;
      // ここから先は実際にリストへ反映する重い処理（チャンク保存・読み返し検証を伴う）。書込中・
      // 前回の保存検証走行中はスキップ（バッジは上で更新済みなので表示が遅れることはない）。
      if(__saveCount>0)return; // 書き込み中はスキップ
      if(window.__pollUpdatesBusy)return; // 前回のGAS反映確認(最大6秒)が走行中なら多重実行しない
      window.__pollUpdatesBusy=true;
      try{
        // ★顧客データ未ロード中は消費しない（反映中サインだけ出して待つ）。起動直後の
        //   即時ポーリングがチャンク読込完了前にキューを空読みして通知を消す不具合の修正。
        if(!filesRef.current||filesRef.current.length===0)return;
        // tsありで未適用のものだけを対象（古い無タイムスタンプ項目は無視してクリーンアップ）
        const fresh=arr.filter(u=>u.ts&&!window.__appliedUpdTs.has(u.ts));
        if(fresh.length===0)return;
        // custIdまたはname+noでマッチング
        const findUpd=(c)=>fresh.find(u=>
          (u.custId&&u.custId===c.custId)||(u.name&&((!u.no&&u.name===c.name)||(u.no&&u.name===c.name&&String(u.no)===String(c.no))))
        );
        // ★適用先の有無をsetFilesの外で先に判定（filesRef基準）。
        //   マッチした通知だけを処理済み扱いにし、マッチしない通知はキューに残す（後でデータが揃ったら適用）。
        const appliedTs=new Set();
        const changedFiles=new Set();
        const tsFiles={};            // ts→該当ファイル名(月)の集合。ファイル単位でGAS反映を確認するため
        let verifiedTs=new Set();    // GASチャンクに確実に保存できた通知のtsだけ。これだけをキューから消す
        filesRef.current.forEach(f=>(f.customers||[]).forEach(c=>{
          const u=findUpd(c);
          if(u){appliedTs.add(u.ts);changedFiles.add(f.name);(tsFiles[u.ts]=tsFiles[u.ts]||new Set()).add(f.name);}
        }));
        if(appliedTs.size>0){
          // 保存後にGASを読み返して実反映を確認（sSetはno-corsで失敗を検知できないため）。
          // 未反映なら最大3回再試行。成否をbooleanで返し、確認できたファイルの通知だけをキューから消す。
          const saveChunkVerified=async(f)=>{
            for(let _a=0;_a<3;_a++){
              try{
                await saveFileChunked(f);
                try{localStorage.setItem(STOR+'cf-'+safeName(f.name),JSON.stringify(f));}catch(e){}
                await new Promise(r=>setTimeout(r,2000));
                const chk=await loadFileChunked(f.name);
                const okAll=chk&&Array.isArray(chk.customers)&&fresh.every(u=>{
                  if(!appliedTs.has(u.ts))return true;
                  const c=chk.customers.find(x=>(u.custId&&x.custId===u.custId)||(x.name===u.name&&String(x.no||'')===String(u.no||'')));
                  if(!c)return true; // このファイルの顧客でなければ対象外
                  const{custId:_,name:__,no:___,ts:____,...sf}=u;
                  return Object.keys(sf).every(k=>String(c[k]??'')===String(sf[k]??''));
                });
                if(okAll)return true;
                console.warn('[SYNC] chunk保存 未反映 retry',_a+1,f.name);
              }catch(e){console.error('[SYNC] chunk保存エラー:',e);}
            }
            console.error('[SYNC] chunk保存がGASに反映できませんでした:',f.name);
            return false;
          };
          // 先にローカル状態を更新（即時反映）。GAS保存の確認は後で行い、確認できた通知だけ消す。
          const next=filesRef.current.map(f=>{
            if(!changedFiles.has(f.name))return f;
            const custs=f.customers.map(c=>{
              const upd=findUpd(c);
              if(!upd)return c;
              // statusとextraFieldsのみ更新（他フィールドは保護）
              const{custId:_,name:__,no:___,ts:____,...safeFields}=upd;
              return{...c,...safeFields};
            });
            return{...f,customers:custs};
          });
          filesRef.current=next; // filesRef同期
          setFiles(next);
          // ★体感速度優先: ローカル適用の時点で「反映中」バッジを即クリア＋完了フラッシュを出す。
          //   GAS保存の確認(数秒)は待たせない。__appliedUpdTsにも即追加し、次ポーリングでの
          //   再処理・再フラッシュを防ぐ。
          //   信頼性: キューからの削除だけは保存確認後(verifiedTs)に限定。未確認はキューに残り、
          //   saveChunkVerified自体の3回読み返し再試行＋リロード時の再適用で最終的に必ず反映される。
          appliedTs.forEach(ts=>window.__appliedUpdTs.add(ts));
          setPendingSync(prev=>{
            const n={...prev};
            fresh.forEach(u=>{if(appliedTs.has(u.ts))delete n[u.custId||`${u.name}__${u.no}`];});
            return n;
          });
          const doneItems=fresh.filter(u=>appliedTs.has(u.ts)).map(u=>({name:u.name,entryDate:u.entryDate}));
          if(doneItems.length>0){
            const _fts=Date.now();
            setSyncFlash({items:doneItems,ts:_fts});
            setTimeout(()=>setSyncFlash(f=>(f&&f.ts===_fts)?null:f),4000);
            // 反映された行をハイライト（どの顧客が変わったか一目で分かるように）
            const _keys=fresh.filter(u=>appliedTs.has(u.ts)).map(u=>u.custId||`${u.name}__${u.no}`);
            setRecentApplied(prev=>{const n={...prev};_keys.forEach(k=>{n[k]=_fts;});return n;});
            setTimeout(()=>setRecentApplied(prev=>{
              const n={...prev};_keys.forEach(k=>{if(n[k]===_fts)delete n[k];});return n;
            }),4500);
          }
          // ★GAS保存＋読み返し確認は背景で実行（バッジ表示はもう待たせない）。確認できた月の
          //   通知だけをキューから消す。未確認はキューに残してリロード時に再試行する。
          const okFiles=new Set();
          await Promise.all([...changedFiles].map(async fn=>{
            const f=next.find(x=>x.name===fn);
            if(f&&await saveChunkVerified(f))okFiles.add(fn);
          }));
          verifiedTs=new Set([...appliedTs].filter(ts=>{
            const fs=tsFiles[ts];return fs&&[...fs].every(fn=>okFiles.has(fn));
          }));
        }
        // ★GAS反映を確認できた通知のみキューから削除。未確認・未マッチは残して次回再試行。
        //   無ts(旧式)と60日超(最終backstop)だけ掃除。キャンセル通知が7日で消えて反映漏れが
        //   恒久化していた不具合の対策として、保持期間を7日→60日へ延長。
        const remaining=arr.filter(u=>{
          if(u.ts&&verifiedTs.has(u.ts))return false;
          if(!u.ts||Date.now()-u.ts>60*24*60*60*1000)return false;
          // 宛先の顧客がリストに存在しない通知は、10分待っても適用先が現れなければ捨てる
          //（スケジュールで手入力された予約のキャンセル通知など。放置すると60日間キューに残り続ける）
          if(!matchesCust(u)&&Date.now()-u.ts>10*60*1000){
            console.warn('[SYNC] 宛先不明の通知を破棄:',u.name);
            return false;
          }
          return true;
        });
        if(remaining.length!==arr.length)await sSet(STOR+'cust-updates',remaining.length>0?remaining:[]);
      }catch{}finally{window.__pollUpdatesBusy=false;}
    };
    pollUpdatesRef.current=pollUpdates;
    pollUpdates(); // 開いた瞬間に即時適用
    const pollTimer=setInterval(pollUpdates,15000);
    return()=>clearInterval(pollTimer);
  },[]);

  // 画面復帰時（タブ切替・スリープ復帰）に即時リフレッシュ
  useEffect(()=>{
    const onVisible=()=>{

      sGet(storKey('lres','honten')).then(v=>{if(v)setLoanerResH(v);});
      sGet(storKey('lres','sanda')).then(v=>{if(v)setLoanerResS(v);});
      // 突き合わせ自己修復（GASから最新inspを読み直して照合）

  // ── スケジュール→リスト突き合わせ（自己修復）──────────────────────
  // 同期通知（cust-updates）が通信障害・旧コード端末などで失われても、リスト起動時と
  // 画面復帰時にスケジュール(insp)の実予約と照合し、ズレた本予約の入庫日・コース・
  // 入庫時間を自動修正して収束させる。statusは変更しない（キャンセル等の判断は同期チェックの領分）。
  const reconcileListWithInsp=useCallback(async()=>{
    try{
      if(__saveCount>0)return;
      if(Date.now()-(window.__lastReconcile||0)<15000)return; // 15秒スロットル
      window.__lastReconcile=Date.now();
      const files=filesRef.current||[];
      if(!files.length)return;
      // 必ずGASから最新inspを読む（手元の古いinspDataで逆方向に巻き戻さないため）
      const inspObj=await sGet(STOR+'insp');
      if(!inspObj||typeof inspObj!=='object')return; // 読めない時は何もしない
      // custId→最新のアクティブinsp行（キャンセル除外・同一顧客はseq最大を採用）
      const byCust={};
      for(const dk of Object.keys(inspObj)){
        const rows=inspObj[dk];
        if(!Array.isArray(rows))continue;
        rows.forEach(r=>{
          if(!r||!r.custId||!r.name||r.bookingStatus==='cancelled')return;
          const prev=byCust[r.custId];
          if(!prev||(r.seq||0)>(prev.r.seq||0))byCust[r.custId]={r,dk};
        });
      }
      const pad=(dk)=>{const p=String(dk).split('-').map(Number);return(p.length===3&&!isNaN(p[0]))?`${p[0]}-${String(p[1]).padStart(2,'0')}-${String(p[2]).padStart(2,'0')}`:String(dk);};
      const fixFor=(c)=>{
        const hit=byCust[c.custId];
        if(!hit)return null;
        const ed=pad(hit.dk),r=hit.r;
        const upd={};
        if(c.entryDate!==ed){upd.entryDate=ed;upd.linkedInspDate=ed;}
        if(r.course!=null&&Number(c.course)!==Number(r.course))upd.course=Number(r.course)||0;
        const bt=r.time||r.bookingTime||'';
        if(bt&&c.bookingTime!==bt)upd.bookingTime=bt;
        return Object.keys(upd).length?upd:null;
      };
      const changedFiles=new Set();
      const fixedItems=[];
      const fixedByCustId={};
      const next=files.map(f=>{
        let changed=false;
        const custs=f.customers.map(c=>{
          if(!c||c.status!=='confirm'||!c.custId)return c;
          const upd=fixFor(c);
          if(!upd)return c;
          changed=true;changedFiles.add(f.name);
          fixedByCustId[c.custId]=upd;
          fixedItems.push({name:c.name,entryDate:upd.entryDate||c.entryDate,key:c.custId});
          return{...c,...upd};
        });
        return changed?{...f,customers:custs}:f;
      });
      if(changedFiles.size===0)return;
      filesRef.current=next;
      setFiles(next);
      console.log('[RECONCILE] スケジュールに合わせてリスト修正:',fixedItems.map(i=>i.name).join('・'));
      // 完了フラッシュ＋行ハイライト（どこが直ったか見えるように）
      const _fts=Date.now();
      setSyncFlash({items:fixedItems.map(i=>({name:i.name,entryDate:i.entryDate})),ts:_fts});
      setTimeout(()=>setSyncFlash(f=>(f&&f.ts===_fts)?null:f),4000);
      setRecentApplied(prev=>{const n={...prev};fixedItems.forEach(i=>{n[i.key]=_fts;});return n;});
      setTimeout(()=>setRecentApplied(prev=>{const n={...prev};fixedItems.forEach(i=>{if(n[i.key]===_fts)delete n[i.key];});return n;}),4500);
      // 変更ファイルを保存。GAS最新とマージし、直した顧客のフィールドだけ上書き（他端末の更新を消さない）
      for(const f of next){
        if(!changedFiles.has(f.name))continue;
        try{
          const latest=await loadFileChunked(f.name);
          const base=(latest&&Array.isArray(latest.customers))?latest.customers:f.customers;
          const merged=base.map(c=>(c&&c.custId&&fixedByCustId[c.custId])?{...c,...fixedByCustId[c.custId]}:c);
          await saveFileChunked({...f,customers:merged});
          try{localStorage.setItem(STOR+'cf-'+safeName(f.name),JSON.stringify({...f,customers:merged}));}catch(e){}
        }catch(e){console.error('[RECONCILE] 保存エラー:',e);}
      }
    }catch(e){console.error('[RECONCILE] エラー:',e);}
  },[]);
  reconcileRef.current=reconcileListWithInsp;
  // 起動時にも一度実行（チャンク読込完了を待って20秒後）
  useEffect(()=>{
    const t=setTimeout(()=>{if(reconcileRef.current)reconcileRef.current();},20000);
    return()=>clearTimeout(t);
  },[]);

  // Excelインポート
  const handleImport=useCallback(async e=>{

    if(!fileList.length)return;

    }catch(err){alert('インポートエラー: '+err.message);}

  // ファイル削除
  const handleDeleteFile=useCallback(idx=>{
    if(!confirm(`「${files[idx].name}」を削除しますか？`))return;
    const deletedFile=files[idx];

  // 予約保存（スケジュール・代車に連動）
  // キャンセルから未予約に復活
  const handleRevive=useCallback((customer)=>{
    if(!confirm(`「${customer.name}」をキャンセルから未予約に戻しますか？`))return;
    const revived={...customer,status:'none',entryDate:'',linkedInspDate:'',

      const filtered=updates.filter(u=>

      );
