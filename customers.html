  // スケジュール(insp)をGASへ保存し、反映状況をトーストで可視化する。
  // sSetのawaitはGASが実際に書き終えた応答で解決するので「解決＝反映完了」。
  // 30秒(GASロック最大25秒＋余裕)を超えても未解決なら「遅延・再試行」を表示。
  // スケジュール(insp)をGASへ保存。体感を最短にするため、書き込み送信(sSet)が完了した時点で
  // すぐ「完了」を表示し、返すPromiseもそこで resolve する（予約処理は先へ進む）。
  // 実際に保存されたかの読み返し検証はバックグラウンドで行い、万一サーバーが受け付けていなければ
  // 「完了」を「エラー」に自動訂正＋再送する（速度を優先しつつデータ消失は検知する設計）。
  const saveInspWithStatus=useCallback((data,name,verify)=>{
    const start=()=>{
      // ★楽観的UI: 書込の往復(約0.7秒)を待たず、その場で即「反映しました」を表示して体感を即時化。
      //   実保存はバックグラウンドで読み返し検証し、未反映なら再送→最終的に失敗した時のみ
      //   「エラー」に訂正する（速度を優先しつつデータ消失は必ず検知する設計）。
      setSyncToast({status:'done',name});
      setTimeout(()=>setSyncToast(s=>(s&&s.status==='done'&&s.name===name)?null:s),4000);
      // 読み返し検証＋自動再送（完全バックグラウンド）。GAS書き込み完了を待って1.5秒後に確認。
      // 反映済み→何もしない（既に「完了」表示）。未反映→再送（最大2回）。最終的に未反映なら
      // 「完了」を「エラー」に訂正。読み返し自体の失敗も「未確認」として成功側に倒さない。
      const verifyBg=async(attempt)=>{
        await new Promise(r=>setTimeout(r,1500));
        let ok=false;
        try{
          const rb=await sGet(STOR+'insp');
          if(rb&&typeof rb==='object'){
            const rows=rb[verify.dk]||[];
            ok=rows.some(r=>r&&(verify.custId?r.custId===verify.custId:(r.name===verify.name&&String(r.no||'')===String(verify.no||''))));
          }
        }catch(e){}
        if(ok)return; // 反映確認OK → 既に出している「完了」のままでよい
        if(attempt<2){await sSet(STOR+'insp',data);return verifyBg(attempt+1);} // 未反映→再送
        setSyncToast({status:'error',name,retry:start}); // 最終的に未反映 → 「完了」をエラーに訂正
      };
      const p=sSet(STOR+'insp',data);
      p.then(()=>{
        inspWriteRef.current=Date.now(); // 保護延長
        if(verify&&verify.dk)verifyBg(0); // 裏で実反映を検証。失敗時のみ上で「エラー」に訂正
      }).catch(()=>{
        setSyncToast({status:'error',name,retry:start});
      });
      return p; // ★呼び出し側はsSet解決で先へ進む（検証待ちを待たない）
    };
    return start();
  },[]);

  const handleBookingSave=useCallback(async(form,customer)=>{
    const{entryDate,store,bookingTime,course,tokuten,staff,note,isTemp,selCarId,selDays}=form;
    const status=isTemp?'temp':'confirm';
    // 予約1件の保存（insp／顧客ファイル）を1つのIDで追跡し、両方の反映が確認できるまで
    // localStorageの控え（pending）を消さない。消えていなければ起動時に「未反映の予約」として拾える。
    const pid=`${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
    const _done={insp:!(entryDate&&!isTemp),file:false};
    const _maybeDrop=()=>{if(_done.insp&&_done.file)pendDrop(pid);};
    // ★本予約確定の瞬間に楽観的に「反映しました」を即表示（書込往復もバックグラウンド処理も待たない）。
    //   後段の writeVerified が裏でGAS反映を検証し、万一未反映なら「エラー」に訂正する。
    if(entryDate&&!isTemp){
      setSyncToast({status:'done',name:customer.name});
      setTimeout(()=>setSyncToast(s=>(s&&s.status==='done'&&s.name===customer.name)?null:s),4000);
    }
    const bookDate=today();
    const dm1=customer.dm1Date,dm2=customer.dm2Date;
    const dmCol=calcDMCol(dm1,dm2,bookDate);

    // 1. 顧客リスト更新
    const updCustomer={...customer,status,entryDate,store,bookingTime,course:Number(course)||0,tokuten,staff,note,
      linkedInspDate:entryDate,
      ...(dmCol==='dm1'?{dm1Book:bookDate}:{dm2Book:bookDate}),
    };

    // 顧客リスト更新
    // filesRefから直接changedFileを作成（setFilesの非同期問題を回避）
    const currentFiles = filesRef.current || [];
    let changedFile = null;
    const targetFile = currentFiles.find(f => f.customers.some(c => c.custId === customer.custId));
    if(targetFile){
      const custs = targetFile.customers.map(c => c.custId === customer.custId ? updCustomer : c);
      changedFile = {...targetFile, customers: custs};
    }
    setFiles(prev=>{
      const next=prev.map((f)=>{
        const ci=f.customers.findIndex(c=>c.custId===customer.custId);
        if(ci<0)return f;
        const custs=[...f.customers];
        custs[ci]=updCustomer;
        return {...f,customers:custs};
      });
      filesRef.current = next; // filesRefを同期
      const _updFile=next.find(f=>f.customers?.some(c=>c.custId===customer.custId));
      if(_updFile){
        // localStorageキャッシュ即時更新（タブ切替後の上書きを防ぐ）
        // ※従来はSAFE（スコープ外）参照のReferenceErrorをcatchで握り潰し、一度も動いていなかった
        try{localStorage.setItem(STOR+'cf-'+safeName(_updFile.name),JSON.stringify(_updFile));}catch(e){}
      }
      return next;
    });
    // 2. inspDataに予約追加（本予約のみ。仮予約はリスト表示のみでスケジュールには載せない）
    if(entryDate&&!isTemp){
      const dk=entryDate;
      if(dk){
        // index.htmlのdateKey形式に変換（"2026-3-16" ← ゼロなし）
        const parts=dk.split('-');
        const dkFormatted=parts.length===3?`${parts[0]}-${parseInt(parts[1])}-${parseInt(parts[2])}`:dk;

        const courseNum=Number(course)||0;
        const rowBase={
          name:customer.name,carType:customer.carType,
          course:courseNum,store,staff,tokuten:tokuten||'-',
          note,no:customer.no,
          bookingStatus:isTemp?'provisional':'confirmed',
          custId:customer.custId,
          bookingTime,
          time:bookingTime||'',  // index.htmlのrow.time表示用
        };
        // ★保存を始める前に「予約したという事実」を端末に残す（未反映なら起動時に検出して再送できる）
        pendAdd({pid,ts:Date.now(),custId:customer.custId,name:customer.name,no:customer.no,
          dk:dkFormatted,row:rowBase,cust:updCustomer,fileName:targetFile?targetFile.name:''});

        // ★スケジュール(insp)を最優先で・確実に書き込む。書くたびにサーバー最新値を読み直して
        //   適用し直すので、他PCの予約を巻き添えで消さない。読み返して入っていなければ再送。
        let bKey=`insp-${dkFormatted}-0`;
        let localInsp=null;
        const inspOk=await writeVerified(STOR+'insp',
          base=>{
            const r=applyBookingToInsp(base,{customer,dkFormatted,row:rowBase,inspLimits});
            bKey=r.bKey;localInsp=r.data;
            return r.data;
          },
          back=>inspHasCust(back,dkFormatted,customer.custId,customer.name)
        );
        if(localInsp){setInspData(localInsp);inspWriteRef.current=Date.now();}
        _done.insp=inspOk;_maybeDrop();
        if(!inspOk){
          setSyncToast({status:'error',name:customer.name});
          setPendings(pendLoad());
          alert(`⚠️ ${customer.name} の予約をスケジュールに反映できませんでした（サーバー混雑）。\n画面上部の「未反映の予約」バナーから再送できます。`);
        }

        // 4. custbk（カレンダー6枠）にも保存
        // キー形式: "氏名::2026-3-16"（ゼロなし）
        const bkKey=`${customer.name.trim()}::${dkFormatted}`;
        const custbkEntry={
          status:isTemp?'provisional':'confirmed',
          formData:{
            name:customer.name,
            staff:staff||'',
            carType:customer.carType,
            course:course||0,
            tokuten:tokuten||'-',
            loaner:'',loanerId:null,
            rentalLabel:'',rentalCarId:null,
            time:bookingTime||'',
            note:note||'',
            bookingStatus:isTemp?'provisional':'confirmed',
            custId:customer.custId,
            store:store,
          },
          custMonth:null,
          custRowIdx:null,
          dk:dkFormatted,
          idx:Number(String(bKey).split('-').pop())||0,
          savedAt:Date.now(),
        };
        // custbkもサーバー最新値にマージして書き、読み返して確認する（従来は投げっぱなしで、
        // lock_timeout時に無言で消えていた）
        writeVerified(STOR+'custbk',
          base=>({...((base&&typeof base==='object')?base:{}),[bkKey]:custbkEntry}),
          back=>!!(back&&back[bkKey])
        );

        // 3. 代車予約追加（bookingKey付き）
        if(selCarId&&selDays&&selDays.length>0){
          const allLoaners=[...(loanerListH.length>0?loanerListH:LOANERS_H),...(loanerListS.length>0?loanerListS:LOANERS_S)];
          const car=allLoaners.find(c=>c.id===selCarId);
          const carStore=car?.store||store;
          const resKey=storKey('lres',carStore);
          const loanerRes=carStore==='honten'?{...loanerResH}:{...loanerResS};

          // 既存の同一custIdを削除
          for(const k of Object.keys(loanerRes)){
            const _days={...(loanerRes[k]||{})};Object.keys(_days).forEach(d=>{if(_days[d]?.custId===customer.custId)delete _days[d];});loanerRes[k]=_days;
          }

          const sorted=[...selDays].sort();
          const s=new Date(sorted[0]),e=new Date(sorted[sorted.length-1]);
          const newRes={
            id:Date.now(),
            bookingKey:bKey,
            user:customer.name,
            custId:customer.custId,
            fy:s.getFullYear(),fm:s.getMonth(),fd:s.getDate(),
            ty:e.getFullYear(),tm:e.getMonth(),td:e.getDate(),
            color:null, // setLoanerResH/S 内で計算
            carName:car?.name||'',
            carNum:car?.num||'',
          };
          if(!loanerRes[selCarId])loanerRes[selCarId]={};
          const _dKey=String(s.getDate());
          loanerRes[selCarId]={...loanerRes[selCarId],[_dKey]:newRes};

          // ★サーバー最新のlresを取得してからマージして保存（2026-07-03修正）。
          // 以前はローカルstateベースで丸ごと上書きしていたため、このタブを開いてから
          // 他端末（モバイル等）が入れた代車予約を巻き添えで消す事故があり得た。
          (async()=>{
            const _sD=new Date(sorted[0]);
            const _ci=customer.custId?[...String(customer.custId)].reduce((a,c)=>a+c.charCodeAt(0),0)%RES_COLORS.length:0;
            const _localBase=carStore==='honten'?loanerResH:loanerResS;
            const _fresh=await sGet(resKey);
            const _base=(_fresh&&typeof _fresh==='object'&&!Array.isArray(_fresh))?_fresh:(_localBase||{});
            const merged=JSON.parse(JSON.stringify(_base));
            // 同顧客の古いエントリをクリア
            for(const k of Object.keys(merged)){
              const days={...(merged[k]||{})};
              Object.keys(days).forEach(d=>{if(days[d]?.custId===customer.custId)delete days[d];});
              merged[k]=days;
            }
            if(!merged[selCarId])merged[selCarId]={};
            const _resDay=String(_sD.getDate());
            merged[selCarId]={...merged[selCarId],[_resDay]:{...newRes,color:RES_COLORS[_ci]}};
            if(carStore==='honten')setLoanerResH(merged);else setLoanerResS(merged);
            // 代車も読み返し検証つきで書く（無言failで「車検には代車名があるのに代車表に帯が無い」状態を作らない）
            await writeVerified(resKey,
              base=>{
                const b=(base&&typeof base==='object'&&!Array.isArray(base))?JSON.parse(JSON.stringify(base)):{};
                for(const k of Object.keys(b)){
                  const days={...(b[k]||{})};
                  Object.keys(days).forEach(d=>{if(days[d]&&days[d].custId===customer.custId)delete days[d];});
                  b[k]=days;
                }
                if(!b[selCarId])b[selCarId]={};
                b[selCarId]={...b[selCarId],[_resDay]:{...newRes,color:RES_COLORS[_ci]}};
                return b;
              },
              back=>!!(back&&back[selCarId]&&back[selCarId][_resDay]&&back[selCarId][_resDay].custId===customer.custId)
            );
          })();
        }
      }
    }
    // 顧客ファイルをGAS最新とマージして保存（他端末の更新を消さない）。
    // ★insp書き込みの後に・バックグラウンドで実行。先にスケジュールを確実に反映し、
    //   その後で（多数チャンクの）顧客ファイル保存を行うことでGASロック競合を避ける。
    //   sSetはno-corsで失敗を検知できないため、読み返して実反映を確認し、最大3回まで再試行。
    if(changedFile){
      (async()=>{
        for(let _attempt=0;_attempt<3;_attempt++){
          try{
            const _latest=await loadFileChunked(changedFile.name);
            const _base=(_latest&&Array.isArray(_latest.customers))?_latest.customers:changedFile.customers;
            let _merged=_base.map(c=>c.custId===customer.custId?updCustomer:c);
            if(!_merged.some(c=>c.custId===customer.custId))_merged.push(updCustomer);
            const _mf={...changedFile,customers:_merged};
            await saveFileChunked(_mf,_base); // 変わったチャンクだけ書く
            try{localStorage.setItem(STOR+'cf-'+safeName(changedFile.name),JSON.stringify(_mf));}catch(e){}
            // 読み返し検証：保存した顧客のstatus/entryDateがGASに入ったか
            await new Promise(r=>setTimeout(r,2000));
            const _check=await loadFileChunked(changedFile.name);
            const _saved=_check&&(_check.customers||[]).find(c=>c.custId===customer.custId);
            if(_saved&&_saved.status===updCustomer.status&&_saved.entryDate===updCustomer.entryDate){
              _done.file=true;_maybeDrop();
              return;
            }
            console.warn('顧客ファイル保存 未反映 retry',_attempt+1,customer.name);
          }catch(e){console.error('顧客ファイル保存エラー:',e);}
        }
        setPendings(pendLoad());
        alert(`⚠️ ${customer.name} のリスト保存がサーバーに反映できませんでした。\n画面上部の「未反映の予約」バナーから再送できます。`);
      })();
    }else{ _done.file=true;_maybeDrop(); }
    // 再予約時はcust-updatesの古いキャンセル通知を削除（cancel優先度コリジョン防止）
    sGet(STOR+'cust-updates').then(updates=>{
      if(!Array.isArray(updates)||updates.length===0)return;
      const filtered=updates.filter(u=>
        !(u.custId&&u.custId===customer.custId)&&
        !(u.name&&u.name===customer.name&&String(u.no||'')===String(customer.no||''))
      );
      if(filtered.length!==updates.length)sSet(STOR+'cust-updates',filtered);
    }).catch(()=>{});
  },[loanerListH,loanerListS,saveInspWithStatus]);

  // ── 未反映の予約（pending）を起動時にサーバーと突き合わせる ──
  // 「保存できたつもりで消えていた」予約を、端末を閉じても見失わないための最後の砦。
  // insp に入っていれば控えを消し、入っていなければバナーに出して再送できるようにする。
  const checkPendings=useCallback(async()=>{
    const list=pendLoad();
    if(list.length===0){setPendings([]);return;}
    let insp={};
    try{insp=(await sGet(STOR+'insp'))||{};}catch(e){setPendings(list);return;}
    const left=[];
    for(const p of list){
      if(!p.dk||!p.row){pendDrop(p.pid);continue;}          // 仮予約など（insp対象外）は控えを残さない
      if(inspHasCust(insp,p.dk,p.custId,p.name))pendDrop(p.pid);
      else left.push(p);
    }
    setPendings(left);
  },[]);
  useEffect(()=>{const t=setTimeout(checkPendings,4000);return()=>clearTimeout(t);},[checkPendings]);

  // 未反映の予約を再送（スケジュール＋顧客ファイルの両方）
  const resendPending=useCallback(async(p)=>{
    setResending(p.pid);
    try{
      const ok=await writeVerified(STOR+'insp',
        base=>applyBookingToInsp(base,{customer:{custId:p.custId,name:p.name},dkFormatted:p.dk,row:p.row,inspLimits}).data,
        back=>inspHasCust(back,p.dk,p.custId,p.name));
      if(!ok){alert(`⚠️ ${p.name} の再送もサーバーに届きませんでした。少し待ってからもう一度お試しください。`);return;}
      // 顧客ファイル側（status/entryDate）も入っていなければ入れ直す
      if(p.fileName&&p.cust){
        const f=await loadFileChunked(p.fileName);
        if(f&&Array.isArray(f.customers)){
          const cur=f.customers.find(c=>c.custId===p.custId);
          if(!cur||cur.status!==p.cust.status||cur.entryDate!==p.cust.entryDate){
            const merged=f.customers.map(c=>c.custId===p.custId?{...c,...p.cust}:c);
            await saveFileChunked({name:p.fileName,customers:merged},f.customers);
          }
        }
      }
      pendDrop(p.pid);
      setInspData(await sGet(STOR+'insp')||{});
      setSyncToast({status:'done',name:p.name});
      setTimeout(()=>setSyncToast(s=>(s&&s.name===p.name)?null:s),4000);
    }finally{
      setResending('');
      setPendings(pendLoad());
    }
  },[inspLimits]);

  const handleSyncCheck=useCallback(async()=>{
    setSyncing(true);
    try{
      // GASから全ファイルとinspDataを直接取得（キャッシュ不使用）
      const [latestInsp,fileIndex]=await Promise.all([
        sGet(STOR+'insp').then(v=>v||{}),
        sGet(STOR+'cf-index').then(v=>v||[]),
      ]);
      const allFiles=await Promise.all(fileIndex.map(fi=>loadFileChunked(fi.name).catch(()=>null)));
      const allCusts=allFiles.filter(Boolean).flatMap(f=>f.customers||[]);
      const confirmedWithDate=allCusts.filter(c=>c.status==='confirm'&&c.entryDate);
      const notInInsp=c=>{
        const dk=toDk(c.entryDate);
        if(!dk)return false;
        // cancelledを除いた行で照合。custId一致 or 氏名一致（再インポートでcustIdが変わった場合の対策）
        const activeRows=(latestInsp[dk]||[]).filter(r=>r&&r.bookingStatus!=='cancelled');
        return!activeRows.some(r=>
          (r.custId&&r.custId===c.custId)||
          (r.name&&r.name===c.name)
        );
      };
      const missing=confirmedWithDate.filter(notInInsp);
      // ★顧客ファイルへの保存ごと失敗した予約は、リスト側が'confirm'にならないので上のチェックには
      //   絶対に引っかからない（阪上さんのケース）。予約時の控え(pending)とカレンダー用のcustbkも
      //   突き合わせ、スケジュールに無いものを未反映として拾う。
      const seen=new Set(missing.map(c=>c.custId||c.name));
      const extra=[];
      const pushExtra=c=>{const k=c.custId||c.name;if(seen.has(k))return;seen.add(k);extra.push(c);};
      pendLoad().forEach(p=>{
        if(!p.dk||!p.row)return;
        if(inspHasCust(latestInsp,p.dk,p.custId,p.name))return;
        pushExtra({...(p.cust||{}),custId:p.custId,name:p.name,no:p.no,carType:p.row.carType,
          course:p.row.course,store:p.row.store,staff:p.row.staff,tokuten:p.row.tokuten,note:p.row.note,
          bookingTime:p.row.bookingTime,entryDate:p.cust?.entryDate||p.dk,_src:'この端末の予約控え'});
      });
      let custbk={};
      try{custbk=(await sGet(STOR+'custbk'))||{};}catch(e){}
      Object.values(custbk).forEach(e=>{
        if(!e||e.status!=='confirmed'||!e.dk||!e.formData)return;
        const f=e.formData;
        if(inspHasCust(latestInsp,e.dk,f.custId,f.name))return;
        pushExtra({custId:f.custId,name:f.name,no:f.no,carType:f.carType,course:f.course,store:f.store,
          staff:f.staff,tokuten:f.tokuten,note:f.note,bookingTime:f.time,entryDate:e.dk,_src:'カレンダー仮登録(custbk)'});
      });
      setSyncDialog({missing:[...missing,...extra],total:confirmedWithDate.length+extra.length,latestInsp});
    }catch(e){alert('GASからのデータ取得に失敗しました: '+(e.message||e));}
    finally{setSyncing(false);}
  },[]);

  const handleSyncFix=useCallback(async()=>{
    if(!syncDialog||syncDialog.missing.length===0)return;
    setSyncing(true);
    try{
      let newInspData={...(await sGet(STOR+'insp')||{})};
      const sizeBefore=JSON.stringify(newInspData).length;
      let added=0;
      const toAdd=[];
      for(const c of syncDialog.missing){
        const dk=toDk(c.entryDate);
        if(!dk)continue;
        if(!Array.isArray(newInspData[dk]))newInspData[dk]=[];
        const activeRows=newInspData[dk].filter(r=>r&&r.bookingStatus!=='cancelled');
        if(activeRows.some(r=>
          (r.custId&&r.custId===c.custId)||
          (r.name&&r.name===c.name)
        ))continue;
        const courseNum=Number(c.course)||0;
        const idx=newInspData[dk].length;
        newInspData[dk]=[...newInspData[dk],{
          name:c.name,carType:c.carType||'',
          course:courseNum,
          store:c.store||'honten',staff:c.staff||'',
          tokuten:c.tokuten||'-',note:c.note||'',no:c.no||'',
          bookingStatus:'confirmed',
          custId:c.custId,bookingTime:c.bookingTime||'',time:c.bookingTime||'',
          seq:Date.now()+added, // 予約順は最後尾へ（既存予約の並び・確定を乱さない）
          bookingKey:`insp-${dk}-${idx}`,
        }];
        toAdd.push({c,dk,idx});
        added++;
      }
      // ★承認の再計算（index_dev.htmlと同一ルール）。復元行はseq最後尾なので
      //   既存予約の確定を乱さず、上限超過分だけ承認待ちになる。マッハ2台は追加条件。
      const _fixDays=new Set(toAdd.map(x=>x.dk));
      _fixDays.forEach(dk=>{newInspData[dk]=recomputeInspApproval(newInspData[dk],(inspLimits&&inspLimits[dk])??6);});
      toAdd.forEach(({dk,idx})=>{newInspData[dk]=applyMahPendingRule(newInspData[dk],idx);});
      const sizeAfter=Math.round(JSON.stringify(newInspData).length/1024);
      const sizeBeforeKB=Math.round(sizeBefore/1024);
      await sSet(STOR+'insp',newInspData);

      // sSetはno-corsのため成否不明。3秒後に読み返して確認する
      await new Promise(r=>setTimeout(r,3000));
      const readBack=await sGet(STOR+'insp')||{};
      const verified=toAdd.filter(({c,dk})=>{
        const rows=(readBack[dk]||[]).filter(r=>r&&r.bookingStatus!=='cancelled');
        return rows.some(r=>(r.custId&&r.custId===c.custId)||(r.name&&r.name===c.name));
      }).length;
      const writeOk=toAdd.length>0&&verified===toAdd.length;

      setInspData(writeOk?readBack:newInspData);
      if(writeOk)inspWriteRef.current=Date.now();
      setSyncDialog(prev=>({...prev,fixed:true,addedCount:added,writeOk,verified,
        diagMsg:`データサイズ: ${sizeBeforeKB}KB → ${sizeAfter}KB（追加${added}件・確認${verified}件）`}));
    }catch(e){alert('修復に失敗しました: '+(e.message||e));}
    finally{setSyncing(false);}
  },[syncDialog,inspLimits]);

  // 現在のファイルの顧客リスト
  const currentFile=files[activeIdx];
  const allCustomers=currentFile?.customers||[];

  // 絞り込み
  const filtered=useMemo(()=>{
    let list=allCustomers;
    if(filterStatus!=='all')list=list.filter(c=>c.status===filterStatus);
    if(search){
      const q=search.toLowerCase();
      list=list.filter(c=>
        (c.name||'').toLowerCase().includes(q)||
        String(c.no||'').includes(q)||
        (c.carType||'').toLowerCase().includes(q)||
        (c.staff||'').includes(q)
      );
    }
    return list;
  },[allCustomers,filterStatus,search]);

  // ── UI ──
  const TH={padding:'8px 8px',fontWeight:700,fontSize:11,color:'#374151',whiteSpace:'nowrap',background:'#f8fafc',borderBottom:'2px solid #e5e7eb',textAlign:'left',position:'sticky',top:0,zIndex:2};

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* ── ヘッダー ── */}
      <div style={{flexShrink:0,background:'linear-gradient(135deg,#1e1b4b,#1d4ed8)',padding:'10px 16px',display:'flex',alignItems:'center',gap:10}}>
        <a href="./index.html" onClick={e=>{
            if(IS_EMBED){e.preventDefault();try{window.parent.postMessage({type:'hub-close-customers'},location.origin);}catch(err){}return;}
            try{sessionStorage.setItem(STOR+'fs-restore',(document.fullscreenElement||document.webkitFullscreenElement)?'1':'0');}catch(err){}
          }}
          style={{color:'#fef08a',fontSize:12,textDecoration:'none',fontWeight:800,
          padding:'6px 14px',background:'#16a34a',borderRadius:8,border:'2px solid #15803d',
          boxShadow:'0 2px 6px rgba(22,163,74,0.4)'}}>
          ← スケジュールに戻る
        </a>
        <div style={{color:'white',fontWeight:900,fontSize:15,flex:1,display:'flex',alignItems:'center',gap:8}}>🚗 顧客リスト<span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10,background:'#eff6ff',color:'#1d4ed8',border:'1px solid #bfdbfe'}}>v{APP_VERSION}</span></div>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:gasOk===true?'#4ade80':gasOk===false?'#f87171':'#fbbf24'}}/>
          <span style={{color:'rgba(255,255,255,.6)',fontSize:10}}>{gasOk===true?'GAS接続済':gasOk===false?'GAS接続エラー':'確認中'}</span>
        </div>
        {!IS_EMBED&&<button onClick={toggleFullscreen} title={isFullscreen?'全画面を終了して元のウインドウに戻す':'全画面表示（ブラウザのタブ・お気に入りバーを隠して大きく表示）'}
          style={{display:'flex',alignItems:'center',gap:4,padding:'5px 10px',background:'rgba(255,255,255,0.15)',border:'2px solid rgba(255,255,255,0.5)',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:11,color:'white',whiteSpace:'nowrap'}}
          onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.3)'}
          onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            {isFullscreen
              ?<><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></>
              :<><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M21 16v3a2 2 0 0 1-2 2h-3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/></>}
          </svg>
          {isFullscreen?'元に戻す':'全画面'}
        </button>}
      </div>

      {/* ── ファイルタブ ── */}
      <div style={{flexShrink:0,background:'white',borderBottom:'2px solid #e5e7eb',padding:'0 14px',display:'flex',alignItems:'flex-end',gap:3,overflowX:'auto'}}>
        {[...files].sort((a,b)=>{
            const na=Number((a.name||'').replace(/[^0-9]/g,'')),nb=Number((b.name||'').replace(/[^0-9]/g,''));
            return (isNaN(na)||isNaN(nb))?(a.name>b.name?1:-1):na-nb;
          }).map((f)=>{
            const origIdx=files.findIndex(x=>x.name===f.name);
            const isActive=origIdx===activeIdx;
            return(
          <div key={f.name} style={{display:'flex',alignItems:'center',gap:3,flexShrink:0,padding:'4px 2px'}}>
            <button onClick={()=>setActiveIdx(origIdx)}
              style={{
                display:'flex',alignItems:'center',gap:5,
                padding:'5px 10px',
                border:`2px solid ${isActive?'#16a34a':'#bbf7d0'}`,
                borderRadius:20,
                background:isActive?'#16a34a':'#dcfce7',
                color:isActive?'white':'#15803d',
                fontWeight:700,
                fontSize:11,whiteSpace:'nowrap',
                cursor:'pointer',
                boxShadow:isActive?'0 2px 8px rgba(22,163,74,0.3)':'none',
              }}>
              <span style={{fontSize:12}}>{f.name}</span>
              <span style={{
                background:'transparent',
                color:isActive?'rgba(255,255,255,0.85)':'#166534',
                borderRadius:10,padding:'1px 4px',fontSize:10,fontWeight:600
              }}>{f.customers.length}</span>
            </button>
            <button onClick={()=>handleDeleteFile(origIdx)}
              style={{background:'none',border:'none',color:'#94a3b8',fontSize:11,padding:'2px 4px',cursor:'pointer'}}
              title="このファイルを削除">×</button>
          </div>
          );
        })}
        {/* Excelインポートボタン */}
        <button onClick={()=>fileInputRef.current?.click()} disabled={importing}
          style={{marginLeft:'auto',marginBottom:3,padding:'6px 14px',
            background:'linear-gradient(135deg,#1e1b4b,#1d4ed8)',color:'white',
            border:'none',borderRadius:8,fontWeight:700,fontSize:12,flexShrink:0,
            opacity:importing?0.6:1}}>
          {importing?'読み込み中...':'+ Excelインポート'}
        </button>
        {bgSyncing&&(
          <span style={{display:'inline-flex',alignItems:'center',gap:5,marginLeft:8,marginBottom:3,
            fontSize:11,color:'#64748b',fontWeight:700,flexShrink:0,whiteSpace:'nowrap'}}>
            <span className="spinner-sm"/>同期中…
          </span>
        )}
        <input ref={fileInputRef} type="file" accept=".xlsx,.xls" multiple style={{display:'none'}}
          onChange={handleImport}/>
      </div>

      {/* ファイルがない場合 */}
      {gasLoading&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,color:'#94a3b8'}}>
          <div className="spinner"/>
          <div style={{fontSize:14,fontWeight:600}}>顧客ファイルを読み込んでいます...</div>
        </div>
      )}
      {!gasLoading&&files.length===0&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,color:'#94a3b8'}}>
          <div style={{fontSize:48}}>📂</div>
          <div style={{fontSize:16,fontWeight:600}}>Excelファイルをインポートしてください</div>
          <div style={{fontSize:12}}>対応形式: .xlsx / .xls</div>
          <button onClick={()=>fileInputRef.current?.click()}
            style={{padding:'12px 28px',background:'linear-gradient(135deg,#1e1b4b,#1d4ed8)',color:'white',
              border:'none',borderRadius:10,fontWeight:800,fontSize:14}}>
            + Excelインポート
          </button>
        </div>
      )}

      {currentFile&&(<>
        {/* ── 統計パネル ── */}
        <StatsPanel customers={allCustomers}/>

        {/* ── 検索・フィルター ── */}
        <div style={{flexShrink:0,background:'white',borderBottom:'1px solid #f1f5f9',padding:'8px 14px',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="氏名・ナンバー・車種で検索..."
            style={{padding:'7px 12px',border:'2px solid #e5e7eb',borderRadius:8,fontSize:13,outline:'none',minWidth:220}}/>
          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            {[['all','すべて'],['none','未予約'],['temp','仮予約'],['confirm','本予約'],['cancel','キャンセル'],['new_car','初回']].map(([v,l])=>(
              <button key={v} onClick={()=>setFilterStatus(v)}
                style={{padding:'5px 12px',borderRadius:20,border:`1.5px solid ${filterStatus===v?'#1d4ed8':'#e5e7eb'}`,
                  background:filterStatus===v?'#eff6ff':'white',color:filterStatus===v?'#1d4ed8':'#64748b',
                  fontWeight:filterStatus===v?700:400,fontSize:11}}>
                {l}
              </button>
            ))}
          </div>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
            <button onClick={handleSyncCheck} disabled={syncing||gasLoading}
              style={{padding:'5px 12px',borderRadius:20,border:'1.5px solid #f59e0b',
                background:'#fffbeb',color:'#92400e',fontWeight:700,fontSize:11,cursor:'pointer',
                opacity:(syncing||gasLoading)?0.6:1}}>
              {syncing?'確認中...':'🔧 スケジュール同期チェック'}
            </button>
            <span style={{fontSize:11,color:'#94a3b8'}}>{filtered.length}件表示</span>
          </div>
        </div>

        {/* ── テーブル ── */}
        <div style={{flex:1,overflowX:'auto',overflowY:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{flex:1,overflowY:'auto',minWidth:900}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:900}}>
            <thead>
              <tr>
                {['予約 / 満期日','氏名','No.','車種','投函①','予約①','投函②','予約②','入庫日','特典','コース','店舗','担当','備考'].map(h=>(
                  <th key={h} style={TH}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.length===0?(
                <tr><td colSpan={14} style={{textAlign:'center',padding:32,color:'#94a3b8',fontSize:13}}>
                  {search||filterStatus!=='all'?'条件に一致する顧客がいません':'データがありません'}
                </td></tr>
              ):filtered.map(c=>(
                <CustomerRow key={c.custId} customer={c} onBook={openBookingModal} onRevive={handleRevive}
                  pending={pendingSync[c.custId]||pendingSync[`${c.name}__${c.no}`]||null}
                  flash={!!(recentApplied[c.custId]||recentApplied[`${c.name}__${c.no}`])}/>
              ))}
            </tbody>
          </table>
          </div>
        </div>
      </>)}

      {/* ── スケジュール同期ダイアログ ── */}
      {syncDialog&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'white',borderRadius:16,padding:28,maxWidth:580,width:'100%',maxHeight:'80vh',display:'flex',flexDirection:'column',gap:16,boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
            {syncDialog.fixed?(
              syncDialog.writeOk?(
                <>
                  <div style={{fontWeight:800,fontSize:18,color:'#16a34a'}}>✅ 修復完了・GAS保存確認</div>
                  <div style={{fontSize:14,color:'#374151'}}>{syncDialog.addedCount}件をスケジュールに追加しました。</div>
                  <div style={{fontSize:12,color:'#6b7280'}}>{syncDialog.diagMsg}</div>
                  <div style={{fontSize:12,color:'#6b7280'}}>スケジュール画面を強制リロードすると反映されます。</div>
                  <button onClick={()=>setSyncDialog(null)}
                    style={{alignSelf:'flex-end',padding:'8px 24px',background:'#1d4ed8',color:'white',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer'}}>
                    閉じる
                  </button>
                </>
              ):(
                <>
                  <div style={{fontWeight:800,fontSize:18,color:'#f59e0b'}}>⚠️ GASへの保存が確認できません</div>
                  <div style={{fontSize:13,color:'#374151'}}>{syncDialog.addedCount}件追加を試みましたが、3秒後の読み返しで{syncDialog.verified}件しか確認できませんでした。</div>
                  <div style={{fontSize:12,color:'#6b7280',background:'#fef9c3',padding:'8px 12px',borderRadius:6,border:'1px solid #fde047'}}>
                    <b>診断情報:</b> {syncDialog.diagMsg}<br/>
                    GASスクリプトのエラーログを確認してください。データサイズが大きい場合はGASのプロパティ制限（9KB/件）に達している可能性があります。
                  </div>
                  <button onClick={()=>setSyncDialog(null)}
                    style={{alignSelf:'flex-end',padding:'8px 24px',background:'#6b7280',color:'white',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer'}}>
                    閉じる
                  </button>
                </>
              )
            ):syncDialog.missing.length===0?(
              <>
                <div style={{fontWeight:800,fontSize:18,color:'#16a34a'}}>✅ 問題ありません</div>
                <div style={{fontSize:14,color:'#374151'}}>本予約・入庫日あり {syncDialog.total}件すべてがスケジュールに反映されています。</div>
                <button onClick={()=>setSyncDialog(null)}
                  style={{alignSelf:'flex-end',padding:'8px 24px',background:'#1d4ed8',color:'white',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer'}}>
                  閉じる
                </button>
              </>
            ):(
              <>
                <div style={{fontWeight:800,fontSize:18,color:'#dc2626'}}>⚠️ {syncDialog.missing.length}件の反映漏れを検出</div>
                <div style={{fontSize:13,color:'#6b7280'}}>入庫日あり・本予約ステータスだが、スケジュールへの反映が確認できない顧客です。（全{syncDialog.total}件中）</div>
                <div style={{overflowY:'auto',flex:1,border:'1px solid #e5e7eb',borderRadius:8}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                    <thead>
                      <tr>
                        {['氏名','No.','入庫日','コース','店舗'].map(h=>(
                          <th key={h} style={{padding:'6px 10px',background:'#f8fafc',fontWeight:700,textAlign:'left',borderBottom:'1px solid #e5e7eb',position:'sticky',top:0}}>
                            {h}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {syncDialog.missing.map((c,i)=>(
                        <tr key={c.custId||i} style={{borderBottom:'1px solid #f1f5f9',background:i%2?'#f8fafc':'white'}}>
                          <td style={{padding:'5px 10px',fontWeight:600}}>{c.name}</td>
                          <td style={{padding:'5px 10px',color:'#6b7280'}}>{c.no}</td>
                          <td style={{padding:'5px 10px',fontWeight:700,color:'#1d4ed8'}}>{c.entryDate}</td>
                          <td style={{padding:'5px 10px'}}>{c.course||'—'}</td>
                          <td style={{padding:'5px 10px'}}>{c.store==='sanda'?'三田店':'本店'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{display:'flex',gap:10,justifyContent:'flex-end',flexShrink:0}}>
                  <button onClick={()=>setSyncDialog(null)}
                    style={{padding:'8px 20px',background:'#f1f5f9',color:'#374151',border:'1px solid #e5e7eb',borderRadius:8,fontWeight:700,cursor:'pointer'}}>
                    キャンセル
                  </button>
                  <button onClick={handleSyncFix} disabled={syncing}
                    style={{padding:'8px 24px',background:'#dc2626',color:'white',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer',opacity:syncing?0.6:1}}>
                    {syncing?'修復中...':'スケジュールに追加する'}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* ── 予約モーダル ── */}
      {bookingModal&&(
        <BookingModal
          customer={bookingModal}
          inspData={inspData}
          closedDaysH={closedDaysH}
          closedDaysS={closedDaysS}
          closedDatesH={closedDatesH}
          closedDatesS={closedDatesS}
          overrideOpen={overrideOpen}
          inspLimits={inspLimits}
          loanerResH={loanerResH}
          loanerResS={loanerResS}
          loanerListH={loanerListH}
          loanerListS={loanerListS}
          currentUser={currentUser}
          onSave={handleBookingSave}
          onClose={()=>setBookingModal(null)}
        />
      )}

      {/* ── 未反映の予約バナー（サーバーに届かなかった予約を見失わないための最後の砦） ── */}
      {pendings.length>0&&(
        <div style={{position:'fixed',left:16,right:16,top:64,zIndex:99999,padding:'11px 14px',borderRadius:11,
          background:'#fef2f2',border:'2px solid #fca5a5',color:'#991b1b',boxShadow:'0 8px 24px rgba(0,0,0,.16)'}}>
          <div style={{fontWeight:900,fontSize:13,marginBottom:6}}>⚠️ スケジュールに反映されていない予約が {pendings.length} 件あります</div>
          {pendings.map(p=>(
            <div key={p.pid} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',fontSize:12,fontWeight:700}}>
              <span style={{flex:1}}>{p.name}（{String(p.dk).split('-').slice(1).join('/')} 入庫予定）</span>
              <button onClick={()=>resendPending(p)} disabled={resending===p.pid}
                style={{padding:'5px 12px',background:'#dc2626',color:'white',border:'none',borderRadius:7,fontWeight:800,fontSize:12,cursor:'pointer',opacity:resending===p.pid?0.6:1}}>
                {resending===p.pid?'再送中…':'スケジュールに再送'}
              </button>
              <button onClick={()=>{pendDrop(p.pid);setPendings(pendLoad());}}
                style={{padding:'5px 8px',background:'transparent',border:'none',color:'#991b1b',fontWeight:800,fontSize:14,cursor:'pointer'}}>✕</button>
            </div>
          ))}
        </div>
      )}

      {/* ── スケジュール側からの変更 反映中／完了トースト ── */}
      {(Object.keys(pendingSync).length>0||syncFlash)&&(()=>{
        const pendList=Object.values(pendingSync);
        const isPend=pendList.length>0;
        const theme=isPend?{bg:'#fef3c7',bd:'#fbbf24',fg:'#92400e'}:{bg:'#dbeafe',bd:'#60a5fa',fg:'#1e40af'};
        const label=isPend
          ?`スケジュールの変更を反映中… ${pendList.map(p=>p.name).filter(Boolean).join('・')}`
          :`スケジュールの変更を反映しました：${(syncFlash.items||[]).map(i=>`${i.name}${i.entryDate?`→${i.entryDate.slice(5).replace('-','/')}`:''}`).join('・')}`;
        return (
          <div style={{position:'fixed',right:16,bottom:84,zIndex:99999,maxWidth:360,
            padding:'11px 14px',borderRadius:11,boxShadow:'0 8px 24px rgba(0,0,0,.18)',
            background:theme.bg,border:`2px solid ${theme.bd}`,color:theme.fg,
            display:'flex',alignItems:'center',gap:10,fontSize:13,fontWeight:700}}>
            {isPend
              ?<span className="spinner-sm" style={{flexShrink:0,borderTopColor:'#d97706'}}/>
              :<span style={{fontSize:17,flexShrink:0}}>✅</span>}
            <span style={{flex:1,lineHeight:1.4}}>{label}</span>
            {/* 何かの理由で反映が進まない時に手で閉じられるようにする（消えないポップアップ対策） */}
            <button onClick={()=>{setPendingSync({});setSyncFlash(null);}}
              style={{flexShrink:0,width:22,height:22,borderRadius:'50%',border:'none',background:'rgba(0,0,0,.08)',color:theme.fg,fontSize:12,fontWeight:800,cursor:'pointer'}}>✕</button>
          </div>
        );
      })()}

      {/* ── スケジュール反映 同期トースト ── */}
      {syncToast&&(()=>{
        const st=syncToast.status;
        // 完了=ライトブルー(本予約の色)、保存中=ライトグリーン(仮予約の色)。背景と差が出て見つけやすく直感的。
        const theme=st==='done'?{bg:'#dbeafe',bd:'#60a5fa',fg:'#1e40af',icon:'✅'}
          :st==='error'?{bg:'#fee2e2',bd:'#f87171',fg:'#991b1b',icon:'⚠️'}
          :st==='slow'?{bg:'#fef3c7',bd:'#fbbf24',fg:'#92400e',icon:'⏳'}
          :{bg:'#dcfce7',bd:'#4ade80',fg:'#166534',icon:'🔄'};
        const msg=st==='done'?`${syncToast.name}さんの予約をスケジュールに反映しました`
          :st==='error'?`${syncToast.name}さんの予約の反映に失敗しました`
          :st==='slow'?`反映に時間がかかっています（30秒超）`
          :`${syncToast.name}さんの予約をスケジュールに反映中…`;
        return (
          <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:99999,
            minWidth:300,maxWidth:420,
            padding:'18px 22px',borderRadius:14,boxShadow:'0 12px 40px rgba(0,0,0,.28)',
            background:theme.bg,border:`2px solid ${theme.bd}`,color:theme.fg,
            display:'flex',alignItems:'center',gap:12,fontSize:15,fontWeight:700}}>
            <span style={{fontSize:22,flexShrink:0}}>{theme.icon}</span>
            <span style={{flex:1,lineHeight:1.4}}>{msg}</span>
            {(st==='slow'||st==='error')&&syncToast.retry&&(
              <button onClick={()=>syncToast.retry()}
                style={{flexShrink:0,padding:'5px 12px',background:theme.fg,color:'white',border:'none',
                  borderRadius:7,fontWeight:800,fontSize:12,cursor:'pointer'}}>再試行</button>
            )}
            {st!=='saving'&&(
              <button onClick={()=>setSyncToast(null)}
                style={{flexShrink:0,padding:'2px 7px',background:'transparent',color:theme.fg,
                  border:'none',fontWeight:900,fontSize:15,cursor:'pointer',lineHeight:1}}>✕</button>
            )}
          </div>
        );
      })()}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
