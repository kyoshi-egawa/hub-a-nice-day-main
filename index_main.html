  {id:'trial',   label:'УЕдС╣ЌУ╗і', icon:'­Ъј»', color:'#059669'},
  {id:'other',   label:'сЂЮсЂ«С╗ќ', icon:'­ЪЊІ', color:'#6b7280'},
];

const VehicleView=memo(({vehicleData,setVehicleData})=>{
  const [filterCat,setFilterCat]=useState('all');
  const [filterAlert,setFilterAlert]=useState(false);
  const [selId,setSelId]=useState(null); // жЂИТіъСИГсЂ«У╗іСИАID
  const [showAddVehicle,setShowAddVehicle]=useState(false);
  const [addForm,setAddForm]=useState({name:'',num:'',category:'loaner',regDate:'',inspName:'',inspDays:'',note:''});
  const [showAddInsp,setShowAddInsp]=useState(false);
  const [addInspForm,setAddInspForm]=useState({name:'',days:'',note:''});
  const fileInputRef=useRef(null);
  const list=Array.isArray(vehicleData)?vehicleData:[];

  const today=new Date();today.setHours(0,0,0,0);

  const getInspStatus=(ins)=>{
    if(ins.completed)return{label:'т«їС║є',color:'#9ca3af',bg:'#f3f4f6',level:0};
    if(!ins.scheduledDate)return{label:'ТЌЦС╗ўТюфУеГт«џ',color:'#9ca3af',bg:'#f3f4f6',level:0};
    const d=new Date(ins.scheduledDate);
    const left=Math.ceil((d-today)/(1000*60*60*24));
    if(left<0)return{label:`${Math.abs(left)}ТЌЦУХЁжЂј`,color:'#dc2626',bg:'#fee2e2',level:3};
    if(left===0)return{label:'С╗іТЌЦ№╝Ђ',color:'#dc2626',bg:'#fee2e2',level:3};
    if(left<=7)return{label:`сЂѓсЂе${left}ТЌЦ`,color:'#dc2626',bg:'#fee2e2',level:3};
    if(left<=30)return{label:`сЂѓсЂе${left}ТЌЦ`,color:'#d97706',bg:'#fef3c7',level:2};
    if(left<=ALERT_DAYS_VEHICLE)return{label:`сЂѓсЂе${left}ТЌЦ`,color:'#d97706',bg:'#fffbeb',level:1};
    return{label:`сЂѓсЂе${left}ТЌЦ`,color:'#059669',bg:'#f0fdf4',level:0};
  };

  const getVehicleAlert=(v)=>{
    if(!Array.isArray(v.inspections))return 0;
    return Math.max(0,...v.inspections.map(ins=>getInspStatus(ins).level),0);
  };

  const fmtDate=(ds)=>{
    if(!ds)return'Рђћ';
    const d=new Date(ds);
    return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  };

  // У╗іТцюУе╝сЃЋсѓАсѓцсЃФСИђТІгУфГсЂ┐УЙ╝сЂ┐
  const handleFiles=(files)=>{
    const newVehicles=[];
    Array.from(files).forEach(f=>{
      // сЃЋсѓАсѓцсЃФтљЇсЂІсѓЅУ╗іСИАТЃЁта▒сѓњТјет«џ№╝ѕСЙІ№╝џсђїсЃ»сѓ┤сЃ│R_1234.pdfсђЇРєњ тљЇтЅЇсЃ╗сЃісЃ│сЃљсЃ╝№╝Ѕ
      const base=f.name.replace(/\.[^.]+$/,''); // ТІАт╝хтГљжЎцтј╗
      const parts=base.split(/[_\-\sсЃ╗]/);
      const name=parts[0]||base;
      const num=parts[1]||'';
      // уЎ╗жї▓ТЌЦсЂ»С╗іТЌЦ
      const regDate=today.toISOString().slice(0,10);
      newVehicles.push({
        id:'v_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
        name,num,category:'other',regDate,
        fileName:f.name,fileSize:f.size,
        inspections:[],note:'',
        createdAt:new Date().toISOString(),
      });
    });
    if(newVehicles.length>0){
      setVehicleData(p=>[...(Array.isArray(p)?p:[]),...newVehicles]);
      alert(`${newVehicles.length}тЈ░сЂ«У╗іСИАсѓњуЎ╗жї▓сЂЌсЂЙсЂЌсЂЪсђѓ\nУ╗іСИАтљЇсЃ╗сЃісЃ│сЃљсЃ╝сЃ╗тї║тѕєсЃ╗уѓ╣ТцюТЃЁта▒сѓњуб║УфЇсЃ╗уиежЏєсЂЌсЂдсЂЈсЂасЂЋсЂёсђѓ`);
    }
  };

  // У╗іСИАУ┐йтіа
  const addVehicle=()=>{
    if(!addForm.name.trim())return;
    const newV={
      id:'v_'+Date.now(),
      name:addForm.name.trim(),
      num:addForm.num.trim(),
      category:addForm.category,
      regDate:addForm.regDate,
      note:addForm.note.trim(),
      inspections:addForm.inspName.trim()&&addForm.inspDays?[{
        id:'ins_'+Date.now(),
        name:addForm.inspName.trim(),
        scheduledDate:(()=>{
          if(!addForm.regDate)return'';
          const d=new Date(addForm.regDate);
          d.setDate(d.getDate()+Number(addForm.inspDays));
          return d.toISOString().slice(0,10);
        })(),
        completed:false,completedAt:null,note:'',
      }]:[],
      createdAt:new Date().toISOString(),
    };
    setVehicleData(p=>[...(Array.isArray(p)?p:[]),newV]);
    setAddForm({name:'',num:'',category:'loaner',regDate:'',inspName:'',inspDays:'',note:''});
    setShowAddVehicle(false);
    setSelId(newV.id);
  };

  // уѓ╣ТцюУ┐йтіа
  const addInspection=(vId)=>{
    if(!addInspForm.name.trim()||!addInspForm.days)return;
    const vehicle=list.find(v=>v.id===vId);
    if(!vehicle)return;
    const ins={
      id:'ins_'+Date.now(),
      name:addInspForm.name.trim(),
      scheduledDate:(()=>{
        if(!vehicle.regDate)return addInspForm.customDate||'';
        const d=new Date(vehicle.regDate);
        d.setDate(d.getDate()+Number(addInspForm.days));
        return d.toISOString().slice(0,10);
      })(),
      completed:false,completedAt:null,
      note:addInspForm.note.trim(),
    };
    setVehicleData(p=>p.map(v=>v.id===vId?{...v,inspections:[...(v.inspections||[]),ins]}:v));
    setAddInspForm({name:'',days:'',note:''});
    setShowAddInsp(false);
  };

  // уѓ╣Тцют«їС║єсЃѕсѓ░сЃФ
  const toggleInsp=(vId,insId)=>{
    setVehicleData(p=>p.map(v=>v.id!==vId?v:{
      ...v,inspections:(v.inspections||[]).map(ins=>ins.id!==insId?ins:{
        ...ins,completed:!ins.completed,completedAt:!ins.completed?new Date().toISOString():null
      })
    }));
  };

  // уѓ╣ТцютЅіжЎц
  const deleteInsp=(vId,insId)=>{
    if(!confirm('сЂЊсЂ«уѓ╣ТцюУеўжї▓сѓњтЅіжЎцсЂЌсЂЙсЂЎсЂІ№╝Ъ'))return;
    setVehicleData(p=>p.map(v=>v.id!==vId?v:{...v,inspections:(v.inspections||[]).filter(ins=>ins.id!==insId)}));
  };

  // У╗іСИАтЅіжЎц
  const deleteVehicle=(vId)=>{
    if(!confirm('сЂЊсЂ«У╗іСИАсЂ«тЁесЃЄсЃ╝сѓ┐сѓњтЅіжЎцсЂЌсЂЙсЂЎсЂІ№╝Ъ'))return;
    setVehicleData(p=>p.filter(v=>v.id!==vId));
    if(selId===vId)setSelId(null);
  };

  // У╗іСИАТЃЁта▒уиежЏє
  const [editVehicle,setEditVehicle]=useState(null);
  const saveVehicleEdit=(vId,updates)=>{
    setVehicleData(p=>p.map(v=>v.id===vId?{...v,...updates}:v));
    setEditVehicle(null);
  };

  const filtered=list
    .filter(v=>filterCat==='all'||v.category===filterCat)
    .filter(v=>!filterAlert||getVehicleAlert(v)>0)
    .sort((a,b)=>getVehicleAlert(b)-getVehicleAlert(a));

  const selVehicle=list.find(v=>v.id===selId);
  const alertTotal=list.filter(v=>getVehicleAlert(v)>0).length;

  const INP_S={width:'100%',padding:'7px 10px',border:'2px solid #e5e7eb',borderRadius:7,fontSize:12,outline:'none',fontFamily:'inherit',boxSizing:'border-box'};

  return(
    <div style={{background:'white',borderRadius:13,boxShadow:'0 10px 40px rgba(0,0,0,.18)',borderTop:'4px solid #c2410c',display:'flex',flexDirection:'column',position:'fixed',top:'var(--header-h,90px)',left:'8px',right:'8px',bottom:'8px',overflowY:'auto',zIndex:10,borderRadius:13}}>

      {/* сЃўсЃЃсЃђсЃ╝ */}
      <div style={{padding:'12px 18px',borderBottom:'2px solid #e5e7eb',display:'flex',alignItems:'center',gap:10,flexShrink:0,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:20}}>­Ъћћ</span>
          <span style={{fontWeight:900,fontSize:16,color:'white'}}>У╗іСИАу«Ауљє</span>
          {alertTotal>0&&<span style={{padding:'2px 10px',borderRadius:20,background:'#fee2e2',color:'#dc2626',fontSize:11,fontWeight:700}}>Рџа№ИЈ {alertTotal}тЈ░сѓбсЃЕсЃ╝сЃѕ</span>}
          <span style={{fontSize:11,color:'#9ca3af'}}>{list.length}тЈ░уЎ╗жї▓</span>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center',marginLeft:'auto',flexWrap:'wrap'}}>
          {/* сЃЋсѓЕсЃФсЃђСИђТІгУфГсЂ┐УЙ╝сЂ┐ */}
          <input ref={fileInputRef} type="file" accept=".pdf,image/*" multiple style={{display:'none'}} onChange={e=>handleFiles(e.target.files)}/>
          <button onClick={()=>fileInputRef.current?.click()}
            style={{display:'flex',alignItems:'center',gap:4,padding:'6px 12px',background:'linear-gradient(135deg,#0891b2,#0e7490)',color:'white',border:'none',borderRadius:7,fontWeight:700,fontSize:11,cursor:'pointer'}}>
            ­ЪЊѓ У╗іТцюУе╝сЃЋсѓАсѓцсЃФУфГУЙ╝
          </button>
          <button onClick={()=>{setShowAddVehicle(p=>!p);setSelId(null);}}
            style={{display:'flex',alignItems:'center',gap:4,padding:'6px 12px',background:'#f0fdf4',border:'2px solid #86efac',borderRadius:7,fontWeight:700,fontSize:11,color:'#065f46',cursor:'pointer'}}>
            №╝І ТЅІтІЋУ┐йтіа
          </button>
        </div>
      </div>

      {/* сЃЋсѓБсЃФсѓ┐сЃ╝ */}
      <div style={{padding:'8px 18px',borderBottom:'1px solid #f1f5f9',display:'flex',gap:5,flexWrap:'wrap',flexShrink:0,background:'#fafafa',alignItems:'center'}}>
        <button onClick={()=>setFilterCat('all')} style={{padding:'3px 10px',borderRadius:20,border:`1.5px solid ${filterCat==='all'?'#c2410c':'#e5e7eb'}`,background:filterCat==='all'?'#eef2ff':'white',color:filterCat==='all'?'#c2410c':'#6b7280',fontSize:11,fontWeight:filterCat==='all'?700:400,cursor:'pointer'}}>тЁесЂд</button>
        {VEHICLE_CATS.map(cat=>{
          const cnt=list.filter(v=>v.category===cat.id).length;
          if(cnt===0)return null;
          return <button key={cat.id} onClick={()=>setFilterCat(cat.id)} style={{padding:'3px 10px',borderRadius:20,border:`1.5px solid ${filterCat===cat.id?cat.color:'#e5e7eb'}`,background:filterCat===cat.id?cat.color+'22':'white',color:filterCat===cat.id?cat.color:'#6b7280',fontSize:11,fontWeight:filterCat===cat.id?700:400,cursor:'pointer'}}>{cat.icon}{cat.label}({cnt})</button>;
        })}
        <button onClick={()=>setFilterAlert(p=>!p)} style={{marginLeft:'auto',padding:'3px 10px',borderRadius:20,border:`1.5px solid ${filterAlert?'#dc2626':'#e5e7eb'}`,background:filterAlert?'#fee2e2':'white',color:filterAlert?'#dc2626':'#6b7280',fontSize:11,fontWeight:filterAlert?700:400,cursor:'pointer'}}>Рџа№ИЈ сѓбсЃЕсЃ╝сЃѕсЂ«сЂ┐</button>
      </div>

      <div style={{flex:1,display:'flex',overflow:'hidden',minHeight:0}}>
        {/* тид№╝џУ╗іСИАсЃфсѓ╣сЃѕ */}
        <div style={{width:280,flexShrink:0,borderRight:'2px solid #e5e7eb',overflowY:'auto',display:'flex',flexDirection:'column'}}>

          {/* ТЅІтІЋУ┐йтіасЃЋсѓЕсЃ╝сЃа */}
          {showAddVehicle&&(
            <div style={{padding:'12px 14px',background:'#f0f9ff',borderBottom:'2px solid #7dd3fc'}}>
              <div style={{fontWeight:700,fontSize:12,color:'#0369a1',marginBottom:8}}>№╝І У╗іСИАсѓњУ┐йтіа</div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                <input value={addForm.name} onChange={e=>setAddForm(p=>({...p,name:e.target.value}))} placeholder="У╗іСИАтљЇ *" style={INP_S} onFocus={e=>e.target.style.borderColor='#0891b2'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                <input value={addForm.num} onChange={e=>setAddForm(p=>({...p,num:e.target.value}))} placeholder="сЃісЃ│сЃљсЃ╝" style={INP_S} onFocus={e=>e.target.style.borderColor='#0891b2'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                <select value={addForm.category} onChange={e=>setAddForm(p=>({...p,category:e.target.value}))} style={{...INP_S,background:'white'}}>
                  {VEHICLE_CATS.map(c=><option key={c.id} value={c.id}>{c.icon}{c.label}</option>)}
                </select>
                <input type="date" value={addForm.regDate} onChange={e=>setAddForm(p=>({...p,regDate:e.target.value}))} style={INP_S} onFocus={e=>e.target.style.borderColor='#0891b2'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                <div style={{background:'#ecfdf5',border:'1px solid #a7f3d0',borderRadius:6,padding:'6px 8px'}}>
                  <div style={{fontSize:10,color:'#065f46',fontWeight:700,marginBottom:4}}>ТюђтѕЮсЂ«уѓ╣ТцюсѓњУеГт«џ№╝ѕС╗╗ТёЈ№╝Ѕ</div>
                  <input value={addForm.inspName} onChange={e=>setAddForm(p=>({...p,inspName:e.target.value}))} placeholder="уѓ╣ТцютљЇ№╝ѕСЙІ№╝џ1сЃХТюѕуѓ╣Тцю№╝Ѕ" style={{...INP_S,marginBottom:4}} onFocus={e=>e.target.style.borderColor='#059669'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                  <input type="number" value={addForm.inspDays} onChange={e=>setAddForm(p=>({...p,inspDays:e.target.value}))} placeholder="уЎ╗жї▓ТЌЦсЂІсѓЅСйЋТЌЦтЙї№╝Ъ№╝ѕСЙІ№╝џ30№╝Ѕ" style={INP_S} onFocus={e=>e.target.style.borderColor='#059669'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                </div>
                <div style={{display:'flex',gap:5}}>
                  <button onClick={addVehicle} disabled={!addForm.name.trim()} style={{flex:1,padding:'7px 0',background:addForm.name.trim()?'#c2410c':'#e5e7eb',color:addForm.name.trim()?'white':'#9ca3af',border:'none',borderRadius:7,fontWeight:700,fontSize:12,cursor:addForm.name.trim()?'pointer':'default'}}>У┐йтіа</button>
                  <button onClick={()=>setShowAddVehicle(false)} style={{padding:'7px 12px',background:'#f3f4f6',border:'none',borderRadius:7,fontSize:11,cursor:'pointer'}}>├Ќ</button>
                </div>
              </div>
            </div>
          )}

          {filtered.length===0&&(
            <div style={{padding:24,textAlign:'center',color:'#9ca3af',fontSize:12}}>
              <div style={{fontSize:32,marginBottom:8}}>­ЪџЌ</div>
              {list.length===0?'сђїУ╗іТцюУе╝сЃЋсѓАсѓцсЃФУфГУЙ╝сђЇсЂЙсЂЪсЂ»сђїТЅІтІЋУ┐йтіасђЇсЂДУ╗іСИАсѓњуЎ╗жї▓сЂЌсЂдсЂЈсЂасЂЋсЂё':'УЕ▓тйЊсЂЎсѓІУ╗іСИАсЂїсЂѓсѓісЂЙсЂЏсѓЊ'}
            </div>
          )}

          {filtered.map(v=>{
            const alertLv=getVehicleAlert(v);
            const cat=VEHICLE_CATS.find(c=>c.id===v.category);
            const isSelected=selId===v.id;
            const urgentInsp=(v.inspections||[]).filter(ins=>!ins.completed&&getInspStatus(ins).level>0);
            return(
              <div key={v.id} onClick={()=>setSelId(isSelected?null:v.id)}
                style={{padding:'10px 14px',borderBottom:'1px solid #f1f5f9',background:isSelected?'#eef2ff':alertLv>=3?'#fff5f5':alertLv>=1?'#fffbeb':'white',cursor:'pointer',borderLeft:`3px solid ${isSelected?'#c2410c':alertLv>=3?'#dc2626':alertLv>=1?'#f59e0b':'transparent'}`,transition:'all .1s'}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:16}}>{cat?.icon||'­ЪџЌ'}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:'#1e293b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v.name}</div>
                    <div style={{fontSize:10,color:'#6b7280'}}>{v.num||'Рђћ'} ┬и {cat?.label}</div>
                  </div>
                  {alertLv>=3&&<span style={{fontSize:14}}>­Ъћ┤</span>}
                  {alertLv===2&&<span style={{fontSize:14}}>­ЪЪА</span>}
                  {alertLv===1&&<span style={{fontSize:14}}>­ЪћХ</span>}
                </div>
                {urgentInsp.length>0&&(
                  <div style={{marginTop:4,fontSize:10,color:alertLv>=3?'#dc2626':'#d97706',fontWeight:600}}>
                    {urgentInsp.slice(0,2).map(ins=>`${ins.name}№╝џ${getInspStatus(ins).label}`).join(' / ')}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* тЈ│№╝џУЕ│у┤░сЃЉсЃЇсЃФ */}
        <div style={{flex:1,overflowY:'auto',padding:'16px 20px',minWidth:0}}>
          {!selVehicle?(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:'#9ca3af',gap:8}}>
              <span style={{fontSize:48}}>­ЪЉѕ</span>
              <span style={{fontSize:13}}>тидсЂІсѓЅУ╗іСИАсѓњжЂИТіъсЂЌсЂдсЂЈсЂасЂЋсЂё</span>
            </div>
          ):(()=>{
            const cat=VEHICLE_CATS.find(c=>c.id===selVehicle.category);
            const isEditing=editVehicle?.id===selVehicle.id;
            return(
              <div>
                {/* У╗іСИАсЃўсЃЃсЃђсЃ╝ */}
                <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:16,paddingBottom:14,borderBottom:'2px solid #e5e7eb'}}>
                  <div style={{width:48,height:48,borderRadius:12,background:cat?.color+'22',border:`2px solid ${cat?.color||'#e5e7eb'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>{cat?.icon||'­ЪџЌ'}</div>
                  <div style={{flex:1}}>
                    {isEditing?(
                      <div style={{display:'flex',flexDirection:'column',gap:6}}>
                        <input value={editVehicle.name} onChange={e=>setEditVehicle(p=>({...p,name:e.target.value}))} style={{...INP_S,fontSize:16,fontWeight:700}} onFocus={e=>e.target.style.borderColor='#c2410c'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                        <div style={{display:'flex',gap:6}}>
                          <input value={editVehicle.num} onChange={e=>setEditVehicle(p=>({...p,num:e.target.value}))} placeholder="сЃісЃ│сЃљсЃ╝" style={{...INP_S,flex:1}} onFocus={e=>e.target.style.borderColor='#c2410c'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                          <select value={editVehicle.category} onChange={e=>setEditVehicle(p=>({...p,category:e.target.value}))} style={{...INP_S,flex:1,background:'white'}}>
                            {VEHICLE_CATS.map(c=><option key={c.id} value={c.id}>{c.icon}{c.label}</option>)}
                          </select>
                        </div>
                        <div style={{display:'flex',gap:6,alignItems:'center'}}>
                          <label style={{fontSize:11,color:'#374151',fontWeight:600,whiteSpace:'nowrap'}}>уЎ╗жї▓ТЌЦ</label>
                          <input type="date" value={editVehicle.regDate||''} onChange={e=>setEditVehicle(p=>({...p,regDate:e.target.value}))} style={INP_S} onFocus={e=>e.target.style.borderColor='#c2410c'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                        </div>
                        <textarea value={editVehicle.note||''} onChange={e=>setEditVehicle(p=>({...p,note:e.target.value}))} placeholder="сЃАсЃб" rows={2} style={{...INP_S,resize:'vertical'}} onFocus={e=>e.target.style.borderColor='#c2410c'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>

const LoanerSettingsModal = memo(({isOpen, onClose, listH, listS, onSaveH, onSaveS, rentalList, onSaveRental}) => {
  const [tab, setTab] = useState('honten'); // 'honten' | 'sanda' | 'rental'
  const [items, setItems] = useState([]);
  const [editIdx, setEditIdx] = useState(null);
  const [editName, setEditName] = useState('');
  const [editNum,  setEditNum]  = useState('');
  const [addName,  setAddName]  = useState('');
  const [addNum,   setAddNum]   = useState('');

  // сѓ┐сЃќтцЅТЏ┤ТЎѓсЂФсЃфсѓ╣сЃѕсѓњтљїТюЪ
  useEffect(() => {
    if (!isOpen) return;
    if (tab === 'honten')  setItems(listH.map((c,i)=>({...c,_key:i})));
    else if (tab === 'sanda')   setItems(listS.map((c,i)=>({...c,_key:i})));
    else                        setItems(rentalList.map((c,i)=>({...c,_key:i})));
    setEditIdx(null); setAddName(''); setAddNum('');
  }, [tab, isOpen, listH, listS, rentalList]);

  useEffect(() => { if (isOpen) setTab('honten'); }, [isOpen]);

  if (!isOpen) return null;

  const storeLabel = tab==='honten'?'Тюгт║Ќ':tab==='sanda'?'СИЅућ░т║Ќ':'тЁ▒жђџ';
  const isRental   = tab === 'rental';

  // СИдсЂ│ТЏ┐сЂѕ
  const moveUp   = i => { if(i===0) return; const a=[...items]; [a[i-1],a[i]]=[a[i],a[i-1]]; setItems(a); };
  const moveDown = i => { if(i===items.length-1) return; const a=[...items]; [a[i],a[i+1]]=[a[i+1],a[i]]; setItems(a); };

  // тЅіжЎц
  const remove = i => {
    if (!window.confirm(`сђї${items[i].name}сђЇсѓњтЅіжЎцсЂЌсЂЙсЂЎсЂІ№╝Ъ
Рђ╗ тЅіжЎцсЂЎсѓІсЂеС║ѕу┤ёсЃЄсЃ╝сѓ┐сЂ«сЃфсЃ│сѓ»сЂїтѕЄсѓїсЂЙсЂЎ`)) return;
    setItems(p => p.filter((_,idx)=>idx!==i));
    if (editIdx===i) setEditIdx(null);
  };

  // уиежЏєжќІтДІ
  const startEdit = i => { setEditIdx(i); setEditName(items[i].name); setEditNum(items[i].num||''); };
  // уиежЏєС┐ЮтГў
  const saveEdit = i => {
    if (!editName.trim()) return;
    setItems(p => p.map((c,idx)=>idx===i?{...c,name:editName.trim(),num:editNum.trim()}:c));
    setEditIdx(null);
  };

  // У┐йтіа
  const addCar = () => {
    if (!addName.trim()) return;
    const newId = isRental
      ? 'r' + Date.now()
      : (tab==='honten'?'h':'s') + Date.now();
    const newCar = isRental
      ? {id:newId, name:addName.trim(), num:addNum.trim()}
      : {id:newId, name:addName.trim(), num:addNum.trim(), store:tab};
    setItems(p => [...p, newCar]);
    setAddName(''); setAddNum('');
  };

  // С┐ЮтГўсЂЌсЂджќЅсЂўсѓІ
  const handleSave = () => {
    const clean = items.map(({_key,...c})=>c);
    if (tab==='honten')  onSaveH(clean);
    else if (tab==='sanda')   onSaveS(clean);
    else                      onSaveRental(clean);
    onClose();
  };

  const TAB_S = (active) => ({
    padding:'7px 16px', borderRadius:'7px 7px 0 0', fontWeight:700, fontSize:12, cursor:'pointer',
    border:`2px solid ${active?'#c2410c':'#e5e7eb'}`,
    borderBottom: active?'2px solid white':'2px solid #e5e7eb',
    background: active?'white':'#f8fafc',
    color: active?'#c2410c':'#6b7280',
    marginBottom: active?'-2px':0,
  });

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:4000,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px'}}
      onClick={onClose}>

        style={{background:'white',borderRadius:14,width:'min(520px,96vw)',maxHeight:'90vh',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>

        {/* сЃўсЃЃсЃђсЃ╝ */}

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <h2 style={{margin:0,fontSize:16,fontWeight:800,color:'white'}}>РџЎ№ИЈ С╗БУ╗ісЃ╗сЃгсЃ│сѓ┐сѓФсЃ╝УеГт«џ</h2>
            <button onClick={onClose} style={{background:'#f3f4f6',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'#6b7280'}}>├Ќ</button>
          </div>
          {/* сѓ┐сЃќ */}
          <div style={{display:'flex',gap:4,borderBottom:'2px solid #e5e7eb'}}>
            {[{v:'honten',label:'Тюгт║ЌС╗БУ╗і'},
              {v:'sanda', label:'СИЅућ░т║ЌС╗БУ╗і'},
              {v:'rental',label:'­ЪћЉ сЃгсЃ│сѓ┐сѓФсЃ╝№╝ѕтЁ▒жђџ№╝Ѕ'},
            ].map(t=>(
              <button key={t.v} onClick={()=>setTab(t.v)} style={TAB_S(tab===t.v)}>{t.label}</button>
            ))}
          </div>
        </div>

        {/* сЃфсѓ╣сЃѕ */}
        <div style={{flex:1,overflowY:'auto',padding:'14px 22px'}}>
          <div style={{fontSize:11,color:'#9ca3af',marginBottom:10}}>
            {isRental?'СИАт║ЌУѕЌтЁ▒жђџсЂ«сЃгсЃ│сѓ┐сѓФсЃ╝сЂДсЂЎсђѓ':''}
            тЈ░ТЋ░№╝џ{items.length}тЈ░
          </div>

          {items.length === 0 && (
            <div style={{textAlign:'center',padding:'28px',color:'#9ca3af',fontSize:13}}>У╗іСИАсЂїсЂѓсѓісЂЙсЂЏсѓЊсђѓСИІсЂ«сђїУ┐йтіасђЇсЃюсѓ┐сЃ│сЂДуЎ╗жї▓сЂЌсЂдсЂЈсЂасЂЋсЂёсђѓ</div>

          </div>

// ============================================
//  С╗БУ╗іу«Ауљєсѓ░сЃфсЃЃсЃЅ№╝ѕжќ▓УдДт░ѓуће + сЃбсЃ╝сЃђсЃФуиежЏє№╝Ѕ
// ============================================
const LoanerGrid=memo(({loanerRes,loanerMonth,setLoanerMonth,onAddRes,onDeleteRes,onUndo,selDate,onBack,onPickLoaner,pickMode,locks,currentUser,onLockCar,onUnlockCar,savedModalData,inspData,schedData,onOpenBooking,pinnedRes,setPinnedRes,hoverRes,setHoverRes,storeLoaners,storeInfo,rentalCars,rentalRes,onAddRentalRes,onDeleteRentalRes,onReplaceRentalRes,onPickRental,onOpenSettings,tireData,locationData,onOpenTireEdit,onOpenLocationEdit,pendingDeleteBk=''})=>{
  const LOANERS_LOCAL=storeLoaners||LOANERS;
  const RENTAL_LOCAL=rentalCars||DEFAULT_RENTAL_CARS;
  const rentalResLocal=rentalRes||{};
  const [editModal,setEditModal]=useState(null);
  const [editForm,setEditForm]=useState({user:'',startDate:'',endDate:''});
  const [rentalEditModal,setRentalEditModal]=useState(null);
  const [rentalEditForm,setRentalEditForm]=useState({user:'',startDate:'',endDate:''});
  // pinnedRes/hoverResсЂ»УдфсЂІсѓЅтЈЌсЂЉтЈќсѓІ№╝ѕсѓ░сЃфсЃЃсЃЅсЂ«тєЇсЃгсЃ│сЃђсЃфсЃ│сѓ░сѓњжў▓сЂёсЂДscrollLeftсѓњС┐ЮТїЂ№╝Ѕ
  // pickModeућесЃЅсЃЕсЃЃсѓ░уіХТЁІ
  const [drag,setDrag]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [pickUser,setPickUser]=useState('');
  const isDragging=useRef(false);
  const gridRef=useRef(null);
  const scrollLock=useRef(false);
  const rentalScrollRef=useRef(null); // УЄфтІЋсѓ╣сѓ»сЃГсЃ╝сЃФТИѕсЂ┐сЃЋсЃЕсѓ░

  // УАеуц║у»ётЏ▓№╝џselDateсЂІсѓЅ-2ТЌЦсђю+31ТЌЦ№╝ѕТюѕсѓњсЂЙсЂЪсЂљ№╝Ѕ
  const dateRange=useMemo(()=>{
    // loanerMonthсЂ«ТюѕсѓњСИГт┐ЃсЂФтЅЇТюѕТюФсђюу┐їТюѕжаГсЂЙсЂДУАеуц║№╝ѕжЋиТюЪсЃгсЃ│сѓ┐сЃФт»Йт┐ю№╝Ѕ
    const baseMonth=loanerMonth||new Date();
    const y=baseMonth.getFullYear();
    const m=baseMonth.getMonth();
    // тЅЇТюѕ15ТЌЦсђюу┐їсђЁТюѕ15ТЌЦсЂ«у┤ё90ТЌЦжќЊсѓњУАеуц║
    const startDate=new Date(y,m-1,15);
    const endDate=new Date(y,m+2,15);
    const range=[];
    const current=new Date(startDate);
    while(current<=endDate){
      range.push({
        year:current.getFullYear(),
        month:current.getMonth(),
        day:current.getDate(),
        date:new Date(current)
      });
      current.setDate(current.getDate()+1);
    }
    return range;
  },[loanerMonth]);

  const DOW=['ТЌЦ','Тюѕ','уЂФ','Т░┤','Тюе','жЄЉ','тюЪ'];

  // жЂИТіъТЌЦсЂїтцЅсѓЈсЂБсЂЪсѓЅсѓ╣сѓ»сЃГсЃ╝сЃФсЃГсЃЃсѓ»сѓњсЃфсѓ╗сЃЃсЃѕ
  useEffect(()=>{
    scrollLock.current=false;
  },[selDate]);

  // жЂИТіъТЌЦтѕЌсѓњСИГтц«сЂФсѓ╣сѓ»сЃГсЃ╝сЃФ№╝ѕтѕЮтЏъсЂ«сЂ┐№╝Ѕ
  useEffect(()=>{
    if(!selDate||scrollLock.current)return;
    // DOMсЃгсЃ│сЃђсЃфсЃ│сѓ░тЙїсЂФуб║т«ЪсЂФт«ЪУАї№╝ѕsetTimeout№╝Ѕ
    const timer=setTimeout(()=>{
      if(!gridRef.current)return;
      const thWidth=100,cellWidth=28;
      const targetIndex=dateRange.findIndex(d=>
        d.year===selDate.getFullYear()&&
        d.month===selDate.getMonth()&&
        d.day===selDate.getDate()

      if(targetIndex===-1)return;
      // ТюгТЌЦсЂїтидуФ»сЂІсѓЅ3тѕЌуЏ«сЂФТЮЦсѓІсѓѕсЂєУеГт«џ
      gridRef.current.scrollLeft=targetIndex*cellWidth-cellWidth*2;
      if(rentalScrollRef.current){
        rentalScrollRef.current.scrollLeft=targetIndex*cellWidth-cellWidth*2;
      }
      scrollLock.current=true;
    },100);
    return()=>clearTimeout(timer);
  },[selDate]); // dateRangeсѓњтЅіжЎц№╝ѕselDateсЂІсѓЅУеѕу«ЌсЂЋсѓїсѓІсЂЪсѓЂСИЇУдЂ№╝Ѕ

  const getRes=(cid,y,m,d)=>{const num=toNum(y,m,d);return Object.values(loanerRes[cid]||{}).find(r=>num>=toNum(r.fy,r.fm,r.fd)&&num<=toNum(r.ty,r.tm,r.td));};
  const hasConflict=(cid,sy,sm,sd,ey,em,ed)=>{
    const start=new Date(sy,sm,sd);
    const end=new Date(ey,em,ed);
    const current=new Date(start);
    while(current<=end){
      if(getRes(cid,current.getFullYear(),current.getMonth(),current.getDate()))return true;
      current.setDate(current.getDate()+1);
    }
    return false;
  };

  // -- pickModeсЂ«сЃЅсЃЕсЃЃсѓ░ТЊЇСйю --
  const handleMD=(cid,dateObj,e)=>{
    if(!pickMode)return;

    // startсѓѕсѓітЙїсЂ«ТЌЦС╗ўсЂ«сЂ┐
    if(new Date(dateObj.year,dateObj.month,dateObj.day)>=new Date(drag.start.year,drag.start.month,drag.start.day)){

  const handleMU=()=>{

    if(hasConflict(carId,start.year,start.month,start.day,end.year,end.month,end.day)){setDrag(null);return;}
    setConfirm({carId,start,end});

    if(!confirm)return;

  // жќ▓УдДсЃбсЃ╝сЃЅ№╝џeditModalсЂДуиежЏє
  const openEdit=(car,res)=>{
    if(res._rental){
      // сЃгсЃ│сѓ┐сѓФсЃ╝уиежЏє
      setRentalEditForm({
        user:res.user,
        startDate:`${res.fy}-${String(res.fm+1).padStart(2,'0')}-${String(res.fd).padStart(2,'0')}`,

      setRentalEditModal({carId:car.id,resId:res.id,carName:car.name,color:res.color});
      return;
    }
    setEditForm({
      user:res.user,
      startDate:`${res.fy}-${String(res.fm+1).padStart(2,'0')}-${String(res.fd).padStart(2,'0')}`,
      endDate:`${res.ty}-${String(res.tm+1).padStart(2,'0')}-${String(res.td).padStart(2,'0')}`
    });
    setEditModal({carId:car.id,resId:res.id,carName:car.name});
  };
  const getState=(cid,dateObj)=>{
    if(!dateObj)return null;
    const {year:y,month:m,day:d}=dateObj;
    if(drag&&drag.carId===cid){
      const dragStart=new Date(drag.start.year,drag.start.month,drag.start.day);
      const dragEnd=new Date(drag.end.year,drag.end.month,drag.end.day);
      const current=new Date(y,m,d);
      if(current>=dragStart&&current<=dragEnd)return'drag';
    }
    if(confirm&&confirm.carId===cid){
      const confStart=new Date(confirm.start.year,confirm.start.month,confirm.start.day);
      const confEnd=new Date(confirm.end.year,confirm.end.month,confirm.end.day);
      const current=new Date(y,m,d);
      if(current>=confStart&&current<=confEnd)return'confirm';
    }
    return getRes(cid,y,m,d)||null;
  };

  // С║ѕу┤ёТИѕсЂ┐сѓ╗сЃФсѓ»сЃфсЃЃсѓ»сЂДУЕ▓тйЊС║ѕу┤ёсѓњжќІсЂЈ
  const handleResClick=(res)=>{
    if(pickMode)return;
    const dk=dateKey(res.fy,res.fm,res.fd);

    }

  // уиежЏєС┐ЮтГў№╝џУЄфтѕєС╗ЦтцќсЂ«С║ѕу┤ёсЂежЄЇУцЄсЃЂсѓДсЃЃсѓ»
  const saveEdit=()=>{
    if(!editForm.user.trim()||!editForm.startDate||!editForm.endDate)return;
    const [fy,fm,fd]=editForm.startDate.split('-').map(Number);
    const [ty,tm,td]=editForm.endDate.split('-').map(Number);
    if(toNum(fy,fm-1,fd)>toNum(ty,tm-1,td)){alert('У┐ћтЇ┤ТЌЦсЂ»У▓ИтЄ║ТЌЦС╗ЦжЎЇсЂФсЂЌсЂдсЂЈсЂасЂЋсЂё');return;}
    // УЄфтѕєС╗ЦтцќсЂ«С║ѕу┤ёсЂежЄЇУцЄсЂЌсЂдсЂёсЂфсЂёсЂІсЃЂсѓДсЃЃсѓ»
    const others=Object.values(loanerRes[editModal.carId]||{}).filter(r=>r.id!==editModal.resId);
    const conflict=others.some(r=>{
      const rs=toNum(r.fy,r.fm,r.fd),re=toNum(r.ty,r.tm,r.td);

      return ns<=re&&ne>=rs;

  // сЃгсЃ│сѓ┐сѓФсЃ╝уиежЏєС┐ЮтГў

    // жЄЇУцЄсЃЂсѓДсЃЃсѓ»
    const rentalResLocal=rentalRes||{};
    const others=Object.values(rentalResLocal[rentalEditModal.carId]||{}).filter(r=>r.id!==rentalEditModal.resId);
    const conflict=others.some(r=>{
      const rs=toNum(r.fy,r.fm,r.fd),re=toNum(r.ty,r.tm,r.td);
      const ns=toNum(fy,fm-1,fd),ne=toNum(ty,tm-1,td);
      return ns<=re&&ne>=rs;
    });
    if(conflict){alert('сЂЮсЂ«ТюЪжќЊсЂ»С╗ќсЂ«С║ѕу┤ёсЂежЄЇУцЄсЂЌсЂдсЂёсЂЙсЂЎ');return;}
    // 1тЏъсЂ«atomicТЏ┤Тќ░сЂДТЌбтГўсЃгсѓ│сЃ╝сЃЅсѓњти«сЂЌТЏ┐сЂѕ№╝ѕdelete+addсЂ«уФХтљѕсѓњжў▓сЂљ№╝Ѕ
    onReplaceRentalRes(rentalEditModal.carId,rentalEditModal.resId,{
      fy,fm:fm-1,fd,ty,tm:tm-1,td,
      user:rentalEditForm.user,
      color:rentalEditModal.color||RES_COLORS[0],
    });
    setRentalEditModal(null);
  };

  return (
    <div>
      {/* сЃўсЃЃсЃђсЃ╝ */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:6,flexWrap:'wrap',flexShrink:0}}>
        <button onClick={onBack} style={BACK_S}><ChevronLeft size={16}/>{pickMode?'С║ѕу┤ёсѓФсЃ╝сЃЅсЂФТѕ╗сѓІ':'сѓФсЃгсЃ│сЃђсЃ╝сЂИ'}</button>
        <h2 style={{fontSize:18,fontWeight:800,color:'#7c2d12',margin:0}}>
          ­ЪџЌ С╗БУ╗іу«Ауљє
          {!pickMode&&<span style={{fontSize:12,color:'#6b7280',marginLeft:8,fontWeight:500}}>№╝ѕжќ▓УдДт░ѓуће№╝Ѕ</span>}
        </h2>
        {!pickMode&&<div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
          <button onClick={onUndo} style={{padding:'6px 13px',background:'#f59e0b',color:'white',border:'none',borderRadius:6,fontWeight:700,cursor:'pointer',fontSize:12}}>РєХ Тѕ╗сЂЎ</button>
          <button onClick={onOpenTireEdit} title="сѓ┐сѓцсЃцуе«тѕЦ СИђТІгУеГт«џ"
            style={{padding:'6px 10px',background:'#fef3c7',border:'2px solid #fbbf24',borderRadius:6,cursor:'pointer',display:'flex',alignItems:'center',gap:4,fontSize:11,fontWeight:700,color:'#d97706'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#f59e0b';e.currentTarget.style.background='#fef08a';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#fbbf24';e.currentTarget.style.background='#fef3c7';}}>
            РўђРЮё сѓ┐сѓцсЃц
          </button>
          <button onClick={onOpenLocationEdit} title="сЃгсЃ│сѓ┐сѓФсЃ╝ТЅђтюетю░ СИђТІгУеГт«џ"

            onMouseEnter={e=>{e.currentTarget.style.borderColor='#10b981';e.currentTarget.style.background='#a7f3d0';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#6ee7b7';e.currentTarget.style.background='#d1fae5';}}>
            ­ЪЊЇ ТЅђтюетю░

          <button onClick={onOpenSettings} title="С╗БУ╗ісЃ╗сЃгсЃ│сѓ┐сѓФсЃ╝УеГт«џ"
            style={{padding:'6px 10px',background:'#f3f4f6',border:'2px solid #d1d5db',borderRadius:6,cursor:'pointer',display:'flex',alignItems:'center',gap:4,fontSize:11,fontWeight:700,color:'#374151'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#c2410c';e.currentTarget.style.color='#c2410c';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#d1d5db';e.currentTarget.style.color='#374151';}}>
            <Settings size={13}/>УеГт«џ
          </button>
        </div>}
      </div>

      {/* ТюѕсЃісЃЊсѓ▓сЃ╝сѓисЃДсЃ│ */}
      {!pickMode&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:8,flexShrink:0}}>
        <button onClick={()=>setLoanerMonth(new Date(loanerMonth.getFullYear(),loanerMonth.getMonth()-1,1))}
          style={{padding:'5px 14px',background:'#c2410c',color:'white',border:'none',borderRadius:6,cursor:'pointer',fontWeight:700,fontSize:13}}>
          РЌђ тЅЇТюѕ
        </button>
        <span style={{fontWeight:800,fontSize:15,color:'#1f2937',minWidth:100,textAlign:'center',background:'white',padding:'3px 10px',borderRadius:6}}>
          {loanerMonth.getFullYear()}т╣┤{loanerMonth.getMonth()+1}Тюѕ
        </span>
        <button onClick={()=>setLoanerMonth(new Date(loanerMonth.getFullYear(),loanerMonth.getMonth()+1,1))}

        </button>
        <button onClick={()=>setLoanerMonth(new Date(nowDate.getFullYear(),nowDate.getMonth(),1))}

        </button>

      {/* сѓ░сЃфсЃЃсЃЅ№╝џoverflow:hiddenсЂДсѓ║сЃгжў▓ТГб */}
      <div ref={gridRef}

          <thead>

              {dateRange.map((dateObj,i)=>{
                if(!dateObj)return null;
                const {year,month,day}=dateObj;

                const h2=selDate&&year===selDate.getFullYear()&&month===selDate.getMonth()&&day===selDate.getDate();

                // ТюѕсЂїтцЅсѓЈсѓІсѓ┐сѓцсЃЪсЃ│сѓ░
                const isMonthStart=i===0||(dateRange[i-1]&&dateRange[i-1].month!==month);
                return <th key={i} style={{width:44,minWidth:44,maxWidth:44,textAlign:'center',padding:'3px 0',border:'1px solid #e5e7eb',fontSize:9,background:h2?'#fef08a':isMonthStart?'#ddd6fe':'#fff7ed',color:dow===0||isHol?'#dc2626':dow===6?'#1d4ed8':'#374151',fontWeight:h2?800:600,boxSizing:'border-box'}}>
                  {isMonthStart&&<div style={{fontSize:7,fontWeight:800,color:'#c2410c'}}>{month+1}Тюѕ</div>}
                  <div>{day}</div><div style={{fontSize:7}}>{DOW[dow]}</div>
                </th>;
              })}
            </tr>
          </thead>
          <tbody>
            {LOANERS_LOCAL.map(car=>{
              return (
                <tr key={car.id}>
                  <td style={{background:'#f9fafb',border:'1px solid #e5e7eb',padding:'5px 9px',fontWeight:600,fontSize:11,whiteSpace:'nowrap',position:'sticky',left:0,zIndex:5,transform:'translateZ(0)',backfaceVisibility:'hidden',height:40,boxSizing:'border-box'}}>
                    {(()=>{
                      const tireId=tireData&&tireData[String(car.id)];
                      const tireInfo=TIRE_TYPES.find(x=>x.id===tireId);
                      return(
                        <div style={{display:'flex',alignItems:'center',gap:5}}>
                          {tireInfo&&<span title={tireInfo.label} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:22,height:18,borderRadius:4,background:tireInfo.bg,color:tireInfo.color,fontSize:9,fontWeight:900,flexShrink:0,letterSpacing:'-0.5px'}}>{tireInfo.icon}</span>}
                          <div>
                            <div style={{fontWeight:700,color:'#7c2d12'}}>{car.name}</div>
                            <div style={{color:'#9ca3af',fontSize:9}}>{car.num}</div>
                          </div>
                        </div>
                      );
                    })()}
                  </td>
                  {dateRange.map((dateObj,i)=>{
                    if(!dateObj)return null;
                    const {year,month,day}=dateObj;
                    const st=getState(car.id,dateObj);
                    const isObj=st&&typeof st==='object';
                    const isDrag=st==='drag';
                    const isConf=st==='confirm';
                    const h2=selDate&&year===selDate.getFullYear()&&month===selDate.getMonth()&&day===selDate.getDate();
                    const isStart=isObj&&st.fd===day&&st.fm===month&&st.fy===year;
                    const isEnd=isObj&&st.td===day&&st.tm===month&&st.ty===year;
                    const bg=isDrag?'#bef264':isConf?'#93c5fd':isObj?(st.color||RES_COLORS[0]):h2?'#fef08a':'white';
                    const isFree=pickMode&&!isObj&&!isDrag&&!isConf;
                    const isBlocked=pickMode&&isObj;
                    return (
                      <td key={i}
                        onMouseDown={e=>{
                          e.preventDefault();
                          if(!isBlocked)handleMD(car.id,dateObj,e);
                        }}
                        onMouseEnter={()=>{
                          if(!isBlocked)handleME(car.id,dateObj);
                          if(!pickMode&&isObj)setHoverRes({car,res:st});
                        }}
                        onMouseLeave={()=>{
                          if(!pickMode&&isObj)setHoverRes(null);
                        }}
                        onClick={(e)=>{
                          if(!pickMode&&isObj){
                            e.preventDefault();
                            e.stopPropagation();
                            setPinnedRes({car,res:st});
                            setHoverRes(null);
                          }
                        }}
                        style={{
                          width:44,minWidth:44,maxWidth:44,height:40,
                          border:'1px solid #e5e7eb',
                          boxShadow:isDrag?'inset 0 0 0 2px #65a30d':isConf?'inset 0 0 0 2px #2563eb':'none',
                          background:bg,
                          cursor:isBlocked?'not-allowed':isFree?'crosshair':!pickMode&&isObj?'pointer':'default',
                          padding:0,
                          overflow:'hidden',
                          position:'relative',
                          boxSizing:'border-box'
                        }}>
                        {/* сЃдсЃ╝сѓХсЃ╝тљЇсѓњтИИТЎѓУАеуц║ */}
                        {isObj&&isStart&&(
                          <div style={{position:'absolute',left:2,top:'50%',transform:'translateY(-50%)',fontSize:8,color:'white',fontWeight:700,whiteSpace:'nowrap',textShadow:'0 1px 2px rgba(0,0,0,.5)',zIndex:2,pointerEvents:'none'}}>
                            {st.user.length>6?st.user.slice(0,6)+'Рђд':st.user}
                          </div>
                        )}
                        {/* ТюѕсѓњсЂЙсЂЪсЂљта┤тљѕсђЂсЂЙсЂЪсЂ»тЅЇсЂ«сѓ╗сЃФсЂїжЂЋсЂєС║ѕу┤ёсЂ«та┤тљѕсѓѓУАеуц║ */}
                        {isObj&&!isStart&&i>0&&(()=>{
                          const prevDate=dateRange[i-1];
                          if(!prevDate)return false;
                          const prevSt=getState(car.id,prevDate);
                          // тЅЇсЂ«сѓ╗сЃФсЂїуЕ║ or жЂЋсЂєС║ѕу┤ё or ТюѕсЂїтцЅсѓЈсЂБсЂЪта┤тљѕсЂФУАеуц║
                          const isDifferent=!prevSt||(prevSt&&typeof prevSt==='object'&&prevSt.id!==st.id);
                          const isMonthBoundary=prevDate.month!==dateObj.month;
                          return isDifferent||isMonthBoundary;
                        })()&&(
                          <div style={{position:'absolute',left:2,top:'50%',transform:'translateY(-50%)',fontSize:8,color:'white',fontWeight:700,whiteSpace:'nowrap',textShadow:'0 1px 2px rgba(0,0,0,.5)',zIndex:2,pointerEvents:'none'}}>
                            {st.user.length>6?st.user.slice(0,6)+'Рђд':st.user}
                          </div>
                        )}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* сЃЏсЃљсЃ╝сЃЌсЃгсЃЊсЃЦсЃ╝№╝ѕУ╗йжЄЈсЃ╗ТХѕсЂѕсѓёсЂЎсЂё№╝Ѕ */}
      {!pickMode&&hoverRes&&!pinnedRes&&(
        <div style={{position:'fixed',bottom:24,right:24,zIndex:1900,background:'rgba(30,27,74,0.92)',color:'white',borderRadius:8,padding:'8px 14px',fontSize:12,pointerEvents:'none',boxShadow:'0 4px 16px rgba(0,0,0,0.3)'}}>
          ­ЪџЎ {hoverRes.car.name}сђђ{hoverRes.res.fm+1}/{hoverRes.res.fd}сђю{hoverRes.res.tm+1}/{hoverRes.res.td}сђђ{hoverRes.res.user}
          <div style={{fontSize:10,opacity:0.7,marginTop:2}}>сѓ»сЃфсЃЃсѓ»сЂДуиежЏєсЃ╗тЅіжЎц</div>
        </div>
      )}

      {/* тЏ║т«џуиежЏєсЃЉсЃЇсЃФ№╝ѕС║ѕу┤ёТИѕсЂ┐сЃљсЃ╝сѓњсѓ»сЃфсЃЃсѓ»сЂДжќІсЂЈ№╝Ѕ */}
      {!pickMode&&pinnedRes&&pinnedRes.res&&(
        <div style={{position:'fixed',bottom:24,right:24,zIndex:2000,background:'white',border:`2px solid ${pinnedRes.res._rental?'#059669':'#c2410c'}`,borderRadius:12,padding:'16px 18px',boxShadow:'0 8px 40px rgba(0,0,0,0.25)',minWidth:260}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:800,color:pinnedRes.res._rental?'#065f46':'#7c2d12'}}>
              {pinnedRes.res._rental?'­ЪћЉ':'­ЪџЎ'} {pinnedRes.car.name}
            </div>
            <button onClick={()=>setPinnedRes(null)}
              style={{background:'#f3f4f6',border:'none',borderRadius:'50%',width:24,height:24,cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',color:'#6b7280'}}>├Ќ</button>
          </div>
          <div style={{fontSize:12,color:'#374151',marginBottom:4}}>
            ­ЪЊЁ {pinnedRes.res.fm+1}/{pinnedRes.res.fd}сђю{pinnedRes.res.tm+1}/{pinnedRes.res.td}
          </div>
          <div style={{fontSize:12,color:'#6b7280',marginBottom:12}}>­ЪЉц {pinnedRes.res.user}</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>{openEdit(pinnedRes.car,pinnedRes.res);setPinnedRes(null);}}
              style={{flex:1,padding:'8px 0',background:'#c2410c',color:'white',border:'none',borderRadius:7,fontWeight:700,fontSize:12,cursor:'pointer'}}>Рюј уиежЏє</button>
            <button onClick={()=>{
              if(window.confirm(`сђї${pinnedRes.car.name}сђЇсЂ«С║ѕу┤ё№╝ѕ${pinnedRes.res.fm+1}/${pinnedRes.res.fd}сђю${pinnedRes.res.tm+1}/${pinnedRes.res.td} ${pinnedRes.res.user}№╝ЅсѓњтЅіжЎцсЂЌсЂЙсЂЎсЂІ№╝Ъ`)){
                if(pinnedRes.res._rental){
                  onDeleteRentalRes(pinnedRes.car.id,pinnedRes.res.id);
                }else{
                  onDeleteRes(pinnedRes.car.id,pinnedRes.res.id);
                }
                setPinnedRes(null);
              }
            }}
              style={{flex:1,padding:'8px 0',background:'#ef4444',color:'white',border:'none',borderRadius:7,fontWeight:700,fontSize:12,cursor:'pointer'}}>­ЪЌЉ тЅіжЎц</button>
          </div>
        </div>
      )}


      {/* -- ућ╗жЮбСИІжЃеfixedтЏ║т«џсЃЉсЃЇсЃФуЙц -- */}

      {/* сЃЅсЃЕсЃЃсѓ░СИГсЃљсЃісЃ╝№╝џbottom center */}
      {pickMode&&drag&&(()=>{
        const {start,end}=drag;
        const days=Math.floor((new Date(end.year,end.month,end.day)-new Date(start.year,start.month,start.day))/(1000*60*60*24))+1;
        return(
          <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:1800,background:'rgba(146,64,14,0.95)',color:'white',borderRadius:10,padding:'10px 20px',fontSize:13,fontWeight:700,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',pointerEvents:'none',whiteSpace:'nowrap'}}>
            ­ЪџЎ {LOANERS_LOCAL.find(c=>String(c.id)===String(drag.carId))?.name}сђђ{start.month+1}/{start.day}сђю{end.month+1}/{end.day}№╝ѕ{days}ТЌЦжќЊ№╝ЅсђђРєљ жЏбсЂЌсЂдуб║т«џ
          </div>
        );
      })()}

      {/* уб║т«џсЃЉсЃЇсЃФ№╝џbottom center№╝ѕтцД№╝Ѕ */}
      {pickMode&&confirm&&(()=>{
        const {start,end}=confirm;
        const days=Math.floor((new Date(end.year,end.month,end.day)-new Date(start.year,start.month,start.day))/(1000*60*60*24))+1;
        return(
          <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:1900,background:'white',border:'2px solid #3b82f6',borderRadius:14,padding:'16px 24px',boxShadow:'0 8px 40px rgba(0,0,0,0.25)',minWidth:340,maxWidth:'90vw'}}>
            <div style={{fontWeight:800,color:'#1d4ed8',fontSize:14,marginBottom:12,textAlign:'center'}}>
              ­ЪџЎ {LOANERS_LOCAL.find(c=>String(c.id)===String(confirm.carId))?.name}сђђ{start.month+1}/{start.day}сђю{end.month+1}/{end.day}№╝ѕ{days}ТЌЦжќЊ№╝Ѕ
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input value={pickUser} onChange={e=>setPickUser(e.target.value)}
                placeholder="тѕЕућеУђЁтљЇсѓњтЁЦтіЏ" autoFocus
                style={{flex:1,padding:'9px 12px',border:'2px solid #93c5fd',borderRadius:8,fontSize:13,outline:'none',fontFamily:'inherit'}}
                onKeyDown={e=>{if(e.key==='Enter')handlePickConfirm();}}/>
              <button onClick={handlePickConfirm}
                style={{padding:'9px 20px',background:'#2563eb',color:'white',border:'none',borderRadius:8,fontWeight:800,cursor:'pointer',fontSize:13,whiteSpace:'nowrap'}}>РюЊ уб║т«џ</button>
              <button onClick={()=>{setConfirm(null);setPickUser('');}}
                style={{padding:'9px 14px',background:'#f3f4f6',border:'none',borderRadius:8,cursor:'pointer',fontSize:13}}>тЈќТХѕ</button>
            </div>
          </div>
        );
      })()}

      {/* Сй┐сЂёТќ╣сЃњсЃ│сЃѕ№╝џсЃўсЃЃсЃђсЃ╝уЏ┤СИІсѓцсЃ│сЃЕсѓцсЃ│ */}
      {pickMode&&!confirm&&!drag&&(
        <div style={{background:'rgba(240,253,244,0.97)',border:'1px solid #86efac',borderRadius:8,padding:'6px 12px',fontSize:11,color:'#166534',marginBottom:8,display:'inline-flex',alignItems:'center',gap:4}}>
          ­ЪњА уЕ║сЂЇсѓ╗сЃФсѓњсѓ»сЃфсЃЃсѓ»РєњтЈ│сЂФсѓ╣сЃЕсѓцсЃЅРєњжЏбсЂЌсЂдТЌЦТЋ░уб║т«џ
        </div>
      )}
      {!pickMode&&(
        <div style={{fontSize:11,color:'#9ca3af',marginBottom:4}}>
          С║ѕу┤ёсЃљсЃ╝сѓњсѓ»сЃфсЃЃсѓ»сЂДуиежЏєсЃ╗тЅіжЎц
        </div>
      )}

      {/* == сЃгсЃ│сѓ┐сѓФсЃ╝сѓ╗сѓ»сѓисЃДсЃ│ == */}
      {RENTAL_LOCAL.length > 0 && (()=>{
        // сЃгсЃ│сѓ┐сѓФсЃ╝т░ѓућесЃЅсЃЕсЃЃсѓ░уіХТЁІ
        const [rDrag,setRDrag]=React.useState(null);
        const [rConfirm,setRConfirm]=React.useState(null);
        const [rPickUser,setRPickUser]=React.useState('');
        const rDragging=React.useRef(false);

        const getRState=(carId,dateObj)=>{
          const {year,month,day}=dateObj;
          const dn=toNum(year,month,day);
          // rresсЂ»сѓфсЃќсѓИсѓДсѓ»сЃѕТДІжђа{key:С║ѕу┤ё}сЂїТГБ№╝ѕТЌДсЃЄсЃ╝сѓ┐сЂ»жЁЇтѕЌ№╝ЅсђѓСИАт»Йт┐юсЂДжЁЇтѕЌтїќсЂЌсЂдсЂІсѓЅУх░ТЪ╗
          // №╝ѕТюгуЋфсЃЄсЃ╝сѓ┐сЂДсђїresList is not iterableсђЇсѓ»сЃЕсЃЃсѓисЃЦсЂїтЄ║сЂЪу«ЄТЅђсђѓжЁЇтѕЌтЅЇТЈљсЂФсЂЌсЂфсЂёсЂЊсЂе№╝Ѕ
          const raw=rentalResLocal[carId]||[];
          const resList=Array.isArray(raw)?raw:Object.values(raw||{});
          for(const r of resList){
            if(r&&dn>=toNum(r.fy,r.fm,r.fd)&&dn<=toNum(r.ty,r.tm,r.td))return r;
          }
          return null;
        };

        const getRDragState=(carId,dateObj)=>{
          if(!pickMode)return getRState(carId,dateObj);
          const {year,month,day}=dateObj;
          const dn=toNum(year,month,day);
          if(rDrag&&rDrag.carId===carId){
            const s=toNum(rDrag.start.year,rDrag.start.month,rDrag.start.day);
            const e=toNum(rDrag.end.year,rDrag.end.month,rDrag.end.day);
            if(dn>=s&&dn<=e)return'drag';
          }
          if(rConfirm&&rConfirm.carId===carId){
            const s=toNum(rConfirm.start.year,rConfirm.start.month,rConfirm.start.day);
            const e=toNum(rConfirm.end.year,rConfirm.end.month,rConfirm.end.day);
            if(dn>=s&&dn<=e)return'confirm';
          }
          return getRState(carId,dateObj);
        };

        const rHandleMD=(carId,dateObj)=>{
          if(!pickMode)return;
          if(getRState(carId,dateObj))return;
          rDragging.current=true;
          setRDrag({carId,start:dateObj,end:dateObj});
        };
        const rHandleME=(carId,dateObj)=>{
          if(!pickMode||!rDragging.current||!rDrag||rDrag.carId!==carId)return;
          const s=toNum(rDrag.start.year,rDrag.start.month,rDrag.start.day);
          const e=toNum(dateObj.year,dateObj.month,dateObj.day);
          if(e>=s)setRDrag(p=>({...p,end:dateObj}));
        };
        const rHandleMU=()=>{
          if(!rDragging.current||!rDrag)return;
          rDragging.current=false;
          setRConfirm({...rDrag});
          setRDrag(null);
          setRPickUser(savedModalData?.name||'');
        };
        const rHandleConfirm=()=>{
          if(!rPickUser.trim()||!rConfirm)return;
          const {carId,start,end}=rConfirm;
          const id='rr'+Date.now();
          const rec={id,carId,user:rPickUser.trim(),
            fy:start.year,fm:start.month,fd:start.day,
            ty:end.year,tm:end.month,td:end.day,
            color:RES_COLORS[Object.keys(rentalResLocal).length%RES_COLORS.length]};
          onAddRentalRes(carId,rec);
          setRConfirm(null);setRPickUser('');
          // pickModeсЂфсѓЅсЃбсЃ╝сЃђсЃФсЂФТѕ╗сѓІ№╝ѕonPickRentalсЂїсЂѓсѓїсЂ░тЉ╝сЂХ№╝Ѕ
          if(pickMode&&onPickRental){
            onPickRental(carId,rec);
          }
        };

        return(
          <div style={{marginTop:22}}
            onMouseUp={rHandleMU}
            onMouseLeave={()=>{if(rDragging.current){rDragging.current=false;setRDrag(null);}}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <h3 style={{margin:0,fontSize:14,fontWeight:800,color:'#059669'}}>­ЪћЉ сЃгсЃ│сѓ┐сѓФсЃ╝№╝ѕСИАт║ЌтЁ▒жђџ№╝Ѕ</h3>
              <span style={{padding:'2px 8px',borderRadius:12,background:'#d1fae5',color:'#065f46',fontSize:10,fontWeight:700}}>{RENTAL_LOCAL.length}тЈ░</span>
              {pickMode&&<span style={{fontSize:11,color:'#059669',fontWeight:600}}></span>}
            </div>
            <div ref={rentalScrollRef} style={{overflowX:'auto',overflowY:'visible',userSelect:'none',WebkitUserSelect:'none'}}>
              <table style={{borderCollapse:'collapse',fontSize:12,tableLayout:'fixed',width:'max-content'}}>
                <thead>
                  <tr>
                    <th style={{width:120,minWidth:120,maxWidth:120,background:'#d1fae5',padding:'7px 9px',textAlign:'left',fontWeight:700,border:'1px solid #a7f3d0',position:'sticky',left:0,top:0,zIndex:20,fontSize:11,boxSizing:'border-box'}}>сЃгсЃ│сѓ┐сѓФсЃ╝</th>
                    {dateRange.map((dateObj,i)=>{
                      if(!dateObj)return null;
                      const {year,month,day}=dateObj;
                      const dow=new Date(year,month,day).getDay();
                      const h2=selDate&&year===selDate.getFullYear()&&month===selDate.getMonth()&&day===selDate.getDate();
                      const isHol=isHoliday(year,month,day);
                      const isMonthStart=i===0||(dateRange[i-1]&&dateRange[i-1].month!==month);
                      return <th key={i} style={{width:44,minWidth:44,maxWidth:44,textAlign:'center',padding:'3px 0',border:'1px solid #a7f3d0',fontSize:9,background:h2?'#fef08a':isMonthStart?'#d1fae5':'#ecfdf5',color:dow===0||isHol?'#dc2626':dow===6?'#1d4ed8':'#374151',fontWeight:h2?800:600,boxSizing:'border-box'}}>
                        {isMonthStart&&<div style={{fontSize:7,fontWeight:800,color:'#059669'}}>{month+1}Тюѕ</div>}
                        <div>{day}</div><div style={{fontSize:7}}>{DOW[dow]}</div>
                      </th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {RENTAL_LOCAL.map(car=>{
                    const tireId=tireData?tireData[String(car.id)]:null;
                    const tireInfo=TIRE_TYPES.find(x=>x.id===tireId);
                    const locId=locationData?locationData[String(car.id)]:null;
                    return (
                      <tr key={car.id}>
                        <td style={{background:'#f0fdf4',border:'1px solid #a7f3d0',padding:'5px 9px',fontWeight:600,fontSize:11,whiteSpace:'nowrap',position:'sticky',left:0,zIndex:5,height:40,boxSizing:'border-box'}}>
                          <div style={{display:'flex',alignItems:'center',gap:4,flexWrap:'nowrap',overflow:'hidden'}}>
                            {tireInfo&&<span title={tireInfo.label} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:22,height:16,borderRadius:3,background:tireInfo.bg,color:tireInfo.color,fontSize:9,fontWeight:900,flexShrink:0}}>{tireInfo.icon}</span>}
                            <div style={{minWidth:0,overflow:'hidden'}}>
                              <div style={{fontWeight:700,color:'#065f46',overflow:'hidden',textOverflow:'ellipsis'}}>{car.name}</div>
                              <div style={{color:'#9ca3af',fontSize:9}}>{car.num}</div>
                            </div>
                            {locId==='honten'&&<span title="Тюгт║Ќ" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:18,height:18,borderRadius:3,background:'#2563eb',color:'white',fontSize:10,fontWeight:900,flexShrink:0,lineHeight:1}}>Тюг</span>}
                            {locId==='sanda' &&<span title="СИЅућ░т║Ќ" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:18,height:18,borderRadius:3,background:'#dc2626',color:'white',fontSize:10,fontWeight:900,flexShrink:0,lineHeight:1}}>СИЅ</span>}
                            {locId==='out'   &&<span title="У▓ИтЄ║СИГ" style={{padding:'1px 4px',borderRadius:3,background:'#6b7280',color:'white',fontSize:9,fontWeight:700,flexShrink:0}}>­ЪћЉ</span>}
                          </div>
                        </td>
                        {dateRange.map((dateObj,i)=>{
                          if(!dateObj)return null;
                          const {year,month,day}=dateObj;
                          const st=getRDragState(car.id,dateObj);
                          const isObj=st&&typeof st==='object';
                          const isDrag=st==='drag';
                          const isConf=st==='confirm';
                          const h2=selDate&&year===selDate.getFullYear()&&month===selDate.getMonth()&&day===selDate.getDate();
                          const isStart=isObj&&st.fd===day&&st.fm===month&&st.fy===year;
                          const bg=isDrag?'#bef264':isConf?'#93c5fd':isObj?(st.color||'#86efac'):h2?'#fef08a':'white';
                          const isFree=pickMode&&!isObj&&!isDrag&&!isConf;
                          const isBlocked=pickMode&&isObj;
                          return (
                            <td key={i}
                              onMouseDown={e=>{e.preventDefault();if(!isBlocked)rHandleMD(car.id,dateObj);}}
                              onMouseEnter={()=>{rHandleME(car.id,dateObj);if(!pickMode&&isObj)setHoverRes({car,res:{...st,_rental:true}});}}
                              onMouseLeave={()=>{if(!pickMode&&isObj)setHoverRes(null);}}
                              onClick={e=>{
                                if(!pickMode&&isObj){e.preventDefault();e.stopPropagation();setPinnedRes({car,res:{...st,_rental:true}});}

                                border:'1px solid #a7f3d0',

                                  {st.user.length>6?st.user.slice(0,6)+'Рђд':st.user}
                                </div>
                              )}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}

                <div><label style={LBL}>У┐ћтЇ┤ТЌЦ</label><input type="date" value={rentalEditForm.endDate} onChange={e=>setRentalEditForm(p=>({...p,endDate:e.target.value}))} style={INP}/></div>

              <div style={{background:'#f0fdf4',borderRadius:6,padding:'8px 10px',fontSize:11,color:'#6b7280'}}>
                <strong style={{color:'#065f46'}}>­ЪЊЁ {rentalEditModal.carName} сЂ«ТЌбтГўС║ѕу┤ё№╝џ</strong>
                {Object.values((rentalRes||{})[rentalEditModal.carId]||{}).filter(r=>r.id!==rentalEditModal.resId).length===0
                  ?<span style={{marginLeft:6}}>сЂфсЂЌ</span>
                  :Object.values((rentalRes||{})[rentalEditModal.carId]||{}).filter(r=>r.id!==rentalEditModal.resId).map(r=>(
                    <div key={r.id} style={{marginTop:3,color:'#dc2626'}}>
                      ­ЪџФ {r.user}№╝џ{r.fm+1}/{r.fd}сђю{r.tm+1}/{r.td}
                    </div>
                  ))
                }
              </div>
            </div>
            <div style={{display:'flex',gap:8,marginTop:18}}>
              <button onClick={saveEditRental} style={{flex:1,padding:'11px 0',background:'linear-gradient(135deg,#059669,#047857)',color:'white',border:'none',borderRadius:9,fontWeight:700,cursor:'pointer'}}>РюЊ ТЏ┤Тќ░</button>
              <button onClick={()=>{onDeleteRentalRes(rentalEditModal.carId,rentalEditModal.resId);setRentalEditModal(null);}} style={{padding:'11px 14px',background:'#fee2e2',color:'#dc2626',border:'2px solid #fca5a5',borderRadius:9,fontWeight:700,cursor:'pointer'}}>­ЪЌЉ</button>
              <button onClick={()=>setRentalEditModal(null)} style={{padding:'11px 14px',background:'#f3f4f6',border:'none',borderRadius:9,fontWeight:600,cursor:'pointer'}}>Тѕ╗сѓІ</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );

// РЋЉ  BLOCK-E: сЃАсѓцсЃ│сѓбсЃЌсЃфсЃ╗ућ╗жЮбсЃгсѓцсѓбсѓдсЃѕ                          РЋЉ

// РЋЉ  - сѓФсЃгсЃ│сЃђсЃ╝сЃЊсЃЦсЃ╝сЃ╗сѓ╣сѓ▒сѓИсЃЦсЃ╝сЃФсЃЊсЃЦсЃ╝                         РЋЉ
// РЋЉ  - сЃўсЃЃсЃђсЃ╝тЏ║т«џсЃ╗сѓ╣сѓ»сЃГсЃ╝сЃФтѕХтЙА                                 РЋЉ
// РЋЉ  Рџа№ИЈ  жФўсЂЋУеѕу«Ќ№╝ѕheight/paddingTop№╝ЅсЂ«тцЅТЏ┤сЂ»тЇЂтѕєТ│еТёЈсЂЎсѓІсЂЊсЂе      РЋЉ

function AppInner() {
  const nowDate = new Date();
  // -- сЃГсѓ░сѓцсЃ│тЙїсЂ»С╗іТЌЦсЂ«сѓ╣сѓ▒сѓИсЃЦсЃ╝сЃФсЂІсѓЅсѓ╣сѓ┐сЃ╝сЃѕ --
  // РўЁС┐«ТГБ4: sessionStorageсЂДсЃГсѓ░сѓцсЃ│уіХТЁІсѓњС┐ЮТїЂ№╝ѕсЃфсЃГсЃ╝сЃЅтЙїсѓѓуХГТїЂ№╝Ѕ
  const [currentUser,setCurrentUser]=useState(()=>{
    try{
      // sessionStorage№╝џсЃќсЃЕсѓдсѓХ№╝ѕсѓ┐сЃќ№╝ЅсѓњжќЅсЂўсЂЪсѓЅсЃГсѓ░сѓбсѓдсЃѕ
      const saved=sessionStorage.getItem('hub_currentUser');
      return saved?JSON.parse(saved):null;
    }catch{return null;}
  });
  const setCurrentUserPersist=useCallback((user)=>{
    setCurrentUser(user);
    try{
      if(user) sessionStorage.setItem('hub_currentUser',JSON.stringify(user));
      else sessionStorage.removeItem('hub_currentUser');
    }catch{}
  },[]);

  // РћђРћђ тЁ▒ТюЅPC№╝џ10тѕєуёАТЊЇСйюсЂДсѓ╣сѓ┐сЃЃсЃЋжЂИТіъућ╗жЮбсЂФТѕ╗сѓІ РћђРћђ
  const _idleTimer = useRef(null);
  const _idleDesktop = useRef(null); // сѓ┐сѓцсЃасѓбсѓдсЃѕТЎѓсЂФТѕ╗сѓІтЁ▒ТюЅPCТЃЁта▒

  const resetIdleTimer = useCallback(() => {
    if(!_idleDesktop.current) return;
    clearTimeout(_idleTimer.current);
    _idleTimer.current = setTimeout(() => {
      // сѓ╣сѓ┐сЃЃсЃЋсЂ«сЂ┐сЃГсѓ░сѓбсѓдсЃѕ№╝ѕтЁ▒ТюЅPCТЃЁта▒сЂ»С┐ЮТїЂ№╝Ѕ
      setCurrentUser(null);
      try{ sessionStorage.removeItem('hub_currentUser'); }catch{}
    }, 10 * 60 * 1000); // 10тѕє
  }, []);

  // тЁ▒ТюЅPCсЃГсѓ░сѓцсЃ│ТЎѓсЂФсѓ┐сѓцсЃъсЃ╝жќІтДІсђЂтђІС║║PCсЂ»сѓ┐сѓцсЃъсЃ╝СИЇУдЂ
  useEffect(() => {
    if(currentUser?.desktopName) {
      // тЁ▒ТюЅPCсЃГсѓ░сѓцсЃ│№╝џсЃЄсѓ╣сѓ»сЃѕсЃЃсЃЌТЃЁта▒сѓњУеўТєХсЂЌсЂдсѓ┐сѓцсЃъсЃ╝жќІтДІ
      _idleDesktop.current = {
        name: currentUser.desktopName,
        store: currentUser.store?.id || currentUser.store,
      };
      // ТЊЇСйюсѓцсЃЎсЃ│сЃѕсЂДсѓ┐сѓцсЃъсЃ╝сЃфсѓ╗сЃЃсЃѕ
      const events = ['mousedown','mousemove','keydown','touchstart','scroll','click'];
      events.forEach(e => window.addEventListener(e, resetIdleTimer, {passive:true}));
      resetIdleTimer();
      return () => {
        events.forEach(e => window.removeEventListener(e, resetIdleTimer));
        clearTimeout(_idleTimer.current);
      };
    } else {
      // тђІС║║PCсЂЙсЂЪсЂ»сЃГсѓ░сѓбсѓдсЃѕ№╝џсѓ┐сѓцсЃъсЃ╝СИЇУдЂ
      _idleDesktop.current = null;
      clearTimeout(_idleTimer.current);
    }
  }, [currentUser?.desktopName, resetIdleTimer]);
  const [curMonth,setCurMonth]=useState(new Date(nowDate.getFullYear(),nowDate.getMonth(),1));
  const [loanerMonth,setLoanerMonth]=useState(new Date(nowDate.getFullYear(),nowDate.getMonth(),1));
  const [selDate,setSelDate]=useState(new Date(nowDate.getFullYear(),nowDate.getMonth(),nowDate.getDate()));
  const [view,setView]=useState('schedule');
  // viewсЂїтцЅсѓЈсѓІсЂЪсЂ│сЂФbodyсЂ«сѓ╣сѓ»сЃГсЃ╝сЃФсѓњтѕХтЙА
  React.useEffect(()=>{
    // С╗БУ╗іу«АуљєсЂ«сЂ┐bodyсѓ╣сѓ»сЃГсЃ╝сЃФУе▒тЈ»№╝ѕсѓФсЃ╝сЃЅтєЁсѓ╣сѓ»сЃГсЃ╝сЃФ№╝Ѕ
    // сЂЮсѓїС╗ЦтцќсЂ»bodyсѓ╣сѓ»сЃГсЃ╝сЃФудЂТГб№╝ѕСйЎуЎйсЃ╗сѓ║сЃгжў▓ТГб№╝Ѕ
    document.body.style.overflow = 'hidden';
    document.documentElement.style.overflow = 'hidden';
    // сѓ»сЃфсЃ╝сЃ│сѓбсЃЃсЃЌ
    return () => {
      document.body.style.overflow = '';
      document.documentElement.style.overflow = '';
    };
  }, [view]);

  // сѓФсЃгсЃ│сЃђсЃ╝УАеуц║ТЎѓсѓ╣сѓ»сЃГсЃ╝сЃФ№╝џтйЊТюѕсЂ»тйЊТЌЦУАїсђЂС╗ќТюѕсЂ»ТюѕтѕЮсѓњУАеуц║

  useEffect(()=>{

        const SAFE=n=>n.replace(/[^a-zA-Z0-9\u3000-\u9fff\u30a0-\u30ff\u3040-\u309f]/g,'_').slice(0,30);

          const customers=chunks.filter(Boolean).flat();

          // cust-updatesсѓГсЃЦсЃ╝сЂ«ТЃЁта▒сЂДСИіТЏИсЂЇ№╝ѕсѓГсЃБсЃ│сѓ╗сЃФТИѕсЂ┐сѓњС┐ЮУГи№╝Ѕ
          try{
            const pendingUpdates=await sGet(STOR+'cust-updates')||[];
            const mergedCustomers=customers.map(c=>{
              const pending=pendingUpdates.find(u=>
                (u.custId&&u.custId===c.custId)||

              );
              if(pending){return{...c,status:pending.status,...(pending.entryDate!==undefined?{entryDate:pending.entryDate}:{})};}
              return c;
            });
            localStorage.setItem('hub-cf-'+sn,JSON.stringify({name:fi.name,customers:mergedCustomers}));
          }catch(e){
            localStorage.setItem('hub-cf-'+sn,JSON.stringify({name:fi.name,customers}));
          }
        }
      }catch(e){/* сЃЌсЃфсЃГсЃ╝сЃЅтц▒ТЋЌсЂ»уёАУдќ */}
    };
    // УхитІЋ3уДњтЙїсЂФсЃљсЃЃсѓ»сѓ░сЃЕсѓдсЃ│сЃЅсЂДжќІтДІ№╝ѕсЃАсѓцсЃ│тЄдуљєсѓњтдесЂњсЂфсЂё№╝Ѕ

    const w = window.open('','_blank','width=1200,height=800');

  // сЃГсЃЃсѓ»TTLсѓ»сЃфсЃ╝сЃісЃ╝№╝џsetLocksсЂ«updateухїућ▒сЂДsSetсЂїУЄфтІЋт«ЪУАїсЂЋсѓїсѓІ
  useEffect(()=>{
    if(!currentUser)return;
    const t=setInterval(()=>{
      const now=Date.now();
      setLocks(prev=>{
        const cleaned={};let changed=false;
        Object.entries(prev).forEach(([k,v])=>{
          if(now-v.lockedAt>LOCK_TTL){changed=true;}
          else{cleaned[k]=v;}
        });
        return changed?cleaned:prev;
      });
    },10000);
    return()=>clearInterval(t);
  },[currentUser,setLocks]);

  useEffect(()=>{
    const h=()=>{
      if(curLockKey){
        releaseLock(curLockKey);
        // sendBeaconсЂДGASсЂФсЃГсЃЃсѓ»УДБТћЙсѓњтЇ│ТЎѓжђЂС┐А№╝ѕжЮътљїТюЪС┐ЮтГўсЂїт«їС║єсЂЌсЂфсЂётЋЈжАїсѓњтЏъжЂ┐№╝Ѕ
        try{
          // т░ѓућесЂ«сђїсЃГсЃЃсѓ»УДБТћЙсѓГсЃ╝сђЇсѓњGASсЂФжђЂС┐А№╝ѕuseSharedсЂесЂ»тѕЦсѓГсЃ╝сЂДу«Ауљє№╝Ѕ
          const releasePayload=JSON.stringify({key:STOR+'lock-release',value:JSON.stringify({key:curLockKey,ts:Date.now()}),apiKey:GAS_API_KEY});
          navigator.sendBeacon&&navigator.sendBeacon(GAS_URL,new Blob([releasePayload],{type:'text/plain;charset=utf-8'}));
        }catch(e){}
      }
    };
    window.addEventListener('beforeunload',h);
    return()=>window.removeEventListener('beforeunload',h);
  },[curLockKey,releaseLock]);
  // сЃўсЃЃсЃђсЃ╝жФўсЂЋсѓњCSSтцЅТЋ░сЂФУеГт«џ№╝ѕstickyсЂ«тЪ║Т║ќуѓ╣сЂФСй┐уће№╝Ѕ
  useEffect(()=>{
    const updateH=()=>{
      const hdr=document.querySelector('header');
      if(hdr){document.documentElement.style.setProperty('--header-h',hdr.offsetHeight+'px');}
    };
    updateH();
    window.addEventListener('resize',updateH);
    return()=>window.removeEventListener('resize',updateH);
  },[]);
  useEffect(()=>{const h=()=>{setShowStaffRegister(true);};document.addEventListener('openRegister',h);const hs=()=>{setShowStaffSettings(true);};document.addEventListener('openStaffSettings',hs);return()=>{document.removeEventListener('openRegister',h);document.removeEventListener('openStaffSettings',hs);};},[]);

  const isClosed=useCallback((date)=>{
    if(!date||!(date instanceof Date)||isNaN(date.getTime()))return false;
    const cDays=Array.isArray(closedDays)?closedDays:[];
    const cDates=Array.isArray(closedDates)?closedDates:[];
    const ovOpen=Array.isArray(overrideOpenDates)?overrideOpenDates:[];
    if(cDays.includes(date.getDay()))return true;
    const ds=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    if(cDates.includes(ds))return true;
    // угг2уЂФТЏюТЌЦ№╝ѕСИАт║ЌтЁ▒жђџ№╝Ѕ
    if(isSecondTuesdayHoliday(date.getFullYear(),date.getMonth(),date.getDate(),ovOpen))return true;
    return false;
  },[closedDays,closedDates,overrideOpenDates]);

  const getInsps   =useCallback(dk=>Array.from({length:8},(_,i)=>((inspData[dk]||[])[i]||null)||blankInsp()),[inspData]);
  const getSchedRow=useCallback((dk,slot)=>schedData[dk]?.[slot]||blankSched(),[schedData]);
  // ТїЄт«џbaseSlotсЂ«тЁесѓхсЃќсѓГсЃ╝тЈќтЙЌ
  const getSchedSubKeys=useCallback((dk,base)=>{
    const day=schedData[dk]||{};
    const keys=[...(day[base]?[base]:[]),...Object.keys(day).filter(k=>k.startsWith(base+'__')).sort()];
    return keys;
  },[schedData]);

  // сЃбсЃ╝сЃђсЃФсѓњжќІсЂЈ№╝ѕтЇ│ТЎѓсЃ╗жЮътљїТюЪсЂфсЂЌ№╝Ѕ
  const handleOpenModal=useCallback((type,dk,idx,slot,isNew=false)=>{
    if(!currentUser)return;
    // тЅіжЎцсЃбсЃ╝сЃЅ
    if(isNew==='delete'){
      // РўЁ setInspDataтЅЇсЂФУАїсЃЄсЃ╝сѓ┐сѓњтЈќтЙЌ№╝ѕsetInspDataтЙїсЂ»тЈѓуЁДсЂДсЂЇсЂфсЂё№╝Ѕ
      const delRow=(inspData[dk]||[])[idx];
      const delCustId=delRow?.custId;
      const delName=delRow?.name;
      const delNo=delRow?.no;
      setInspData(prev=>{
        const rows=[...(prev[dk]||[])].map(r=>r||blankInsp());
        rows.splice(idx,1); // УАїсѓњт«їтЁетЅіжЎц
        // С║ѕу┤ёжає(seq)сЂДТЅ┐УфЇуіХТЁІсѓњтєЇУеѕу«Ќ№╝ѕуЕ║сЂёсЂЪТъасЂ«тѕєсЂасЂЉТЅ┐УфЇтЙЁсЂАсѓњУЄфтІЋТЅ┐УфЇ№╝Ѕ
        const newRows=recomputeInspApproval(rows,inspLimits[dk]??6);
        return{...prev,[dk]:newRows.length>0?newRows:[]};
      });
      // entryDateсЃ╗linkedInspDateсѓѓсѓ»сЃфсѓбсђЂmatchName/matchNoсѓѓТИАсЂЌсЂдcustIdСИЇтюеТЎѓсѓѓт»Йт┐ю
      if(delCustId||delName) syncCustStatus(delCustId,'cancel',{entryDate:'',linkedInspDate:''},delName,delNo);
      return;
    }
    if(dk&&isNew){
      // Тќ░УдЈУ┐йтіа№╝ѕуЕ║Тгёсѓ»сЃфсЃЃсѓ»№╝ЅсЂ«сЂ┐жќЅт║ЌТЌЦсѓњсЃќсЃГсЃЃсѓ»сђѓТЌбтГўС║ѕу┤ёсЂ«уиежЏєсЂ»жќЅт║ЌТЌЦсЂДсѓѓжќІсЂЈ
      const parts=dk.split('-').map(Number);
      if(isClosed(new Date(parts[0],parts[1]-1,parts[2])))return;
    }
    const key=lockKey(type,dk,idx,slot);
    // сЃГсЃЃсѓ»уб║УфЇ№╝ѕсЃАсЃбсЃфтєЁсЂ«locksсЂДтЇ│сЃЂсѓДсЃЃсѓ»№╝Ѕ
    const lk=locks[key];
    if(lk&&Date.now()-lk.lockedAt<LOCK_TTL&&lk.lockedBy!==currentUser.name)return;
    acquireLock(key,currentUser.name);setCurLockKey(key);
    setModalType(type);setModalDk(dk);setModalIdx(idx||0);setModalSlot(slot||'');originalModalDkRef.current=dk;originalModalDkRef.current=dk;originalModalDkRef.current=dk;originalModalDkRef.current=dk;originalModalDkRef.current=dk;originalModalDkRef.current=dk;
    setModalIsNew(isNew);
    const data=isNew
      ?(type==='insp'?{...blankInsp(),_idx:idx||0}:{...blankSched(),_slot:slot||''})
      :(type==='insp'?{...((inspData[dk]||[])[idx]||blankInsp()),_idx:idx||0}:{...( schedData[dk]?.[slot]||blankSched()),_slot:slot||''});
    setModalData(data);
    // ТЌбтГўсЃЄсЃ╝сѓ┐сЂФсЃгсЃ│сѓ┐сѓФсЃ╝ТЃЁта▒сЂїсЂѓсѓїсЂ░тЙЕтЁЃ№╝ѕуиежЏєТЎѓсЂ«тєЇУАеуц║уће№╝Ѕ
    const savedRentalId=data.rentalCarId??null;
    const savedRentalRec=savedRentalId?{id:'restored',carId:savedRentalId}:null;
    setPendingLoanerId(null);
    setPendingRentalId(savedRentalId);
    setPendingRentalRec(savedRentalRec);
    setPickMode(false);setModalOpen(true);
  },[currentUser,inspData,schedData,locks,isClosed,acquireLock,inspLimits,syncCustStatus]);

  // С╗БУ╗іу«АуљєсЂІсѓЅС║ѕу┤ёуиежЏєсѓњжќІсЂЈ
  const handleOpenBooking=useCallback((type,dk,idx,slot,bookingData)=>{
    if(!currentUser)return;
    const key=lockKey(type,dk,idx,slot);
    const lk=locks[key];
    if(lk&&Date.now()-lk.lockedAt<LOCK_TTL&&lk.lockedBy!==currentUser.name){
      alert(`${lk.lockedBy}сЂЋсѓЊсЂїуиежЏєСИГсЂДсЂЎ`);
      return;
    }
    acquireLock(key,currentUser.name);setCurLockKey(key);
    setModalType(type);setModalDk(dk);setModalIdx(idx||0);setModalSlot(slot||'');
    setModalIsNew(false);
    setModalData(bookingData);
    setPendingLoanerId(null);setPendingRentalId(null);setPendingRentalRec(null);setPickMode(false);
    setView('schedule');
    setSelDate(new Date(dk.split('-').map(Number)[0],dk.split('-').map(Number)[1]-1,dk.split('-').map(Number)[2]));
    setModalOpen(true);

  // жАДт«бсЃфсѓ╣сЃѕсЂІсѓЅжќІсЂёсЂЪсЃбсЃ╝сЃђсЃФу«Ауљє
  const [fromCustList,  setFromCustList] =useState(false);
  const [custModalMeta, setCustModalMeta]=useState(null); // {bkKey, custMonth, custRowIdx, mailing2}

  const handleCustBooking=useCallback((arrivalDateStr, idx, prefilledData)=>{
    if(!currentUser||!arrivalDateStr)return;
    const parts=arrivalDateStr.split('-').map(Number);
    if(parts.length<3||isNaN(parts[0]))return;
    const [y,m,d]=parts;
    const dk=`${y}-${m}-${d}`;
    // С╗«С║ѕу┤ёсЂ»inspDataсЂФТЏИсЂІсЂфсЂёсЂ«сЂДlockсЂ»ТюгС║ѕу┤ёуб║т«џТЎѓсЂ«сЂ┐тЈќтЙЌ
    setModalType('insp');setModalDk(dk);setModalIdx(idx||0);setModalSlot('');
    setModalIsNew(true);
    setModalData({...prefilledData,_idx:idx||0,bookingStatus:'provisional'});

    setSelDate(new Date(y,m-1,d));

    const bkKey=`${(prefilledData?.name||'').trim()}::${dk}`;

    setModalOpen(true);

  // жАДт«бсЃфсѓ╣сЃѕсЂІсѓЅсѓ╣сЃєсЃ╝сѓ┐сѓ╣тцЅТЏ┤№╝ѕуб║т«џ/сѓГсЃБсЃ│сѓ╗сЃФ/С╗«С║ѕу┤ёсЂФТѕ╗сЂЎ№╝Ѕ
  const handleUpdateCustStatus=useCallback((arrivalDateStr,rowIdx,newStatus)=>{
    const parts=arrivalDateStr.split('-').map(Number);
    if(parts.length<3||isNaN(parts[0]))return;
    const [y,m,d]=parts;
    const dk=`${y}-${m}-${d}`;
    setInspData(prev=>{
      let rows=[...(prev[dk]||[])].map(r=>r||blankInsp());
      if(rows[rowIdx]) rows[rowIdx]={...rows[rowIdx],bookingStatus:newStatus};
      // сѓ╣сЃєсЃ╝сѓ┐сѓ╣тцЅТЏ┤№╝ѕсѓГсЃБсЃ│сѓ╗сЃФуГЅ№╝ЅсЂДуЕ║сЂёсЂЪТъасѓњС║ѕу┤ёжає(seq)сЂДтєЇУеѕу«ЌсЂЌсЂду╣░сѓіСИісЂњ
      rows=recomputeInspApproval(rows,inspLimits[dk]??6);
      return {...prev,[dk]:rows};
    });
  },[setInspData,inspLimits]);

  // жАДт«бсЃфсѓ╣сЃѕт░ѓућесЃбсЃ╝сЃђсЃФС┐ЮтГў№╝ѕС╗«С║ѕу┤ё / ТюгС║ѕу┤ё / сѓГсЃБсЃ│сѓ╗сЃФ№╝Ѕ

  useEffect(()=>{

        const fixed={};
        for(const dk of Object.keys(latestInsp)){
          const rows=latestInsp[dk]||[];
          if(!Array.isArray(rows)||rows.length===0)continue;
          if(!rows.some(r=>r?.name&&r?.pendingApproval&&r?.bookingStatus!=='cancelled'))continue;
          const lim=limitsMap[dk]??6;

          const rc=recomputeInspApproval(rows,lim);
          let changed=false;
          const newRows=rows.map((r,i)=>{
            if(!r)return r;
            const wasPending=!!r.pendingApproval;
            const nowPending=!!(rc[i]&&rc[i].pendingApproval);
            if(wasPending&&!nowPending){changed=true;const{pendingApproval:_,...rest}=r;return rest;}
            return r;
          });
          if(changed)fixed[dk]=newRows;
        }
        if(Object.keys(fixed).length===0)return;

      // сЃгсЃ│сѓ┐сѓФсЃ╝сЂ«та┤тљѕ: pendingRentalRecсЂ«idсЂДУЕ▓тйЊС║ѕу┤ёсѓњтЅіжЎц
      setPendingRentalId(null);
      setPendingRentalRec(prev=>{
        if(prev)deleteRentalRes(loanerId,prev.id);
        return null;
      });
      return;
    }
    // С╗БУ╗ісЂ«та┤тљѕ№╝џbookingKeyсЂДУЕ▓тйЊсЂЎсѓІС╗БУ╗іС║ѕу┤ёсѓњтЅіжЎц
    const bk=modalType==='insp'?`insp-${modalDk}-${modalIdx}`:`sched-${modalDk}-${modalSlot}`;
    setLoanerRes(prev=>{
      const updated={...prev};
      if(updated[loanerId]){
        const days={...updated[loanerId]};
        // сЂЙсЂџbookingKeyсЂДт«їтЁеСИђУЄ┤сѓњУЕдсЂ┐сѓІ
        // СИђУЄ┤сЂЌсЂфсЂёта┤тљѕ№╝ѕcustomers.htmlухїућ▒сЂфсЂЕсЂДidxсЂїсѓ║сЃгсЂЪта┤тљѕ№╝ЅсЂ»userNameсЂДуЁДтљѕ
        const hasExact=Object.values(days).some(r=>r?.bookingKey===bk);
        Object.keys(days).forEach(d=>{
          if(hasExact?days[d]?.bookingKey===bk:userName&&days[d]?.user===userName)
            delete days[d];
        });
        updated[loanerId]=days;
      }
      return updated;
    });
    setPendingLoanerId(null);
  },[modalType,modalDk,modalIdx,modalSlot,setLoanerRes,deleteRentalRes]);

  const addLoanerRes=useCallback((cid,res)=>setLoanerRes(prev=>(()=>{const daysA={...(prev[cid]||{})};daysA[String(res.fd)]={...res};return{...prev,[cid]:daysA};})()),[setLoanerRes]);
  const deleteLoanerRes=useCallback((cid,rid)=>{
    setLoanerUndo(u=>[...u,{prevState:loanerRes}]);
    // loanerResсЂІсѓЅтЅіжЎц
    const deletedRes=Object.values(loanerRes[cid]||{}).find(r=>r.id===rid);
    setLoanerRes(prev=>{const daysD={...(prev[cid]||{})};Object.keys(daysD).forEach(d=>{if(daysD[d]?.id===rid)delete daysD[d];});return{...prev,[cid]:daysD};});
    // inspDataсЂ«УЕ▓тйЊУАїсЂ«loaner/loanerId/rentalLabel/rentalCarIdсѓѓсѓ»сЃфсѓб
    if(deletedRes?.bookingKey){
      const bk=deletedRes.bookingKey;
      // bookingKeyтйбт╝Ј: "insp-2026-5-18-2"
      const m=bk.match(/^insp-(.+)-(\d+)$/);
      if(m){
        const dk=m[1], idx=Number(m[2]);
        setInspData(prev=>{
          const rows=[...(prev[dk]||[])];

            rows[idx]={...rows[idx],loaner:'',loanerId:null};
            return{...prev,[dk]:rows};

          return prev;
        });
      }

  },[setLoanerRes,setInspData]);
  const undoLoanerRes=useCallback(()=>{if(!loanerUndo.length){return;}setLoanerRes(loanerUndo[loanerUndo.length-1].prevState);setLoanerUndo(u=>u.slice(0,-1));},[loanerUndo,setLoanerRes]);

    setShowStaffRegister(false);

  // selDateсѓњтИИсЂФDateтъІсЂесЂЌсЂдТЅ▒сЂє№╝ѕstringТиитЁЦжў▓ТГб№╝Ѕ
  const _selDate = selDate instanceof Date ? selDate

  const dk=_selDate?dateKey(_selDate.getFullYear(),_selDate.getMonth(),_selDate.getDate()):null;
  const dateLabel=_selDate?`${_selDate.getMonth()+1}Тюѕ${_selDate.getDate()}ТЌЦ№╝ѕ${['ТЌЦ','Тюѕ','уЂФ','Т░┤','Тюе','жЄЉ','тюЪ'][_selDate.getDay()]}№╝Ѕ`:'';
  const moveDate=(days)=>{
    if(!_selDate)return;
    const d=new Date(_selDate.getFullYear(),_selDate.getMonth(),_selDate.getDate()+days);
    setSelDate(d);
