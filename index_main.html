  const dayMemos=dk?memoData[dk]||[]:[];

  // сѓ┐сѓцсЃасѓ╣сѓ▒сѓИсЃЦсЃ╝сЃФсѓњуЈЙтюеТЎѓтѕ╗сЂФУЄфтІЋУ┐йтЙЊсѓ╣сѓ»сЃГсЃ╝сЃФ№╝ѕС╗іТЌЦсѓњУАеуц║СИГсЂ«сЂ┐№╝Ѕсђѓ
  // тИИсЂФсђїуЈЙтюеТЎѓтѕ╗сЂ«1Тъа№╝ѕ30тѕє№╝ЅтЅЇсђЇсЂ«УАїсЂїтЁѕжаГсЂФТЮЦсѓІсѓѕсЂєсЂФсЂЎсѓІсђѓ
  // СЙІ: 10:00сЂФсЂфсЂБсЂЪсѓЅ9:30сЂ«ТъасЂїтЁѕжаГсђЂ10:30сЂФсЂфсЂБсЂЪсѓЅ10:00сЂ«ТъасЂїтЁѕжаГсђѓ
  // ТЅІтІЋсЂДСИісЂФсѓ╣сѓ»сЃГсЃ╝сЃФсЂЎсѓїсЂ░жЂјтј╗сЂ«С║ѕт«џсѓѓУдІсѓЅсѓїсѓІ№╝ѕТгАсЂ«30тѕєтбЃуЋїсЂДтєЇсЂ│У┐йтЙЊсЂЎсѓІ№╝Ѕсђѓ
  const lastAutoSlotRef=useRef(null);
  useEffect(()=>{
    lastAutoSlotRef.current=null;
    if(view!=='schedule'||!dk)return;
    const n0=new Date();
    // С╗іТЌЦС╗ЦтцќсЂ»ТЎѓжќЊжђБтІЋсЂЌсЂфсЂёсђѓтЅЇсЂ«ТЌЦсЂДСИІТќ╣тљЉсЂФсѓ╣сѓ»сЃГсЃ╝сЃФсЂЌсЂЪСйЇуй«сЂїТ«ІсѓЅсЂфсЂёсѓѕсЂє
    // тЁѕжаГ№╝ѕ09:00№╝ЅсЂИТѕ╗сЂЎсђѓсЃгсѓцсѓбсѓдсЃѕуб║т«џсѓњтЙЁсЂБсЂдТЋ░тЏъсЃфсѓ╗сЃЃсЃѕсЂЎсѓІсђѓ
    if(dk!==dateKey(n0.getFullYear(),n0.getMonth(),n0.getDate())){
      const resetTop=()=>{const c=document.getElementById(SEC_SCHED);if(c)c.scrollTop=0;};
      const rts=[0,150,400,900].map(ms=>setTimeout(resetTop,ms));
      return()=>rts.forEach(clearTimeout);
    }
    const targetSlot=()=>{
      const n=new Date();
      let m=Math.floor((n.getHours()*60+n.getMinutes())/30)*30-30; // уЈЙтюеТъасЂ«1ТъатЅЇ
      m=Math.max(9*60,Math.min(18*60,m)); // 09:00сђю18:00сЂФсѓ»сЃЕсЃ│сЃЌ
      return `${String(Math.floor(m/60)).padStart(2,'0')}:${m%60===0?'00':'30'}`;
    };
    const apply=(force)=>{
      const slot=targetSlot();
      if(!force&&lastAutoSlotRef.current===slot)return; // жђџтИИсЂ»тбЃуЋїсѓњУХісЂѕсЂЪТЎѓсЂасЂЉтІЋсЂІсЂЎ
      const cont=document.getElementById(SEC_SCHED);
      if(!cont)return;
      // сЃгсѓцсѓбсѓдсЃѕТюфуб║т«џсЂДсѓ╣сѓ»сЃГсЃ╝сЃФСйЎтю░сЂїсЂфсЂёжќЊсЂ»жЂЕућесЂЌсЂфсЂё№╝ѕтЙїсЂ«тєЇУЕдУАїсЂФС╗╗сЂЏсѓІсђѓ
      // сЂЊсЂЊсЂДсѓ╣сѓ»сЃГсЃ╝сЃФсЂЎсѓІсЂе0сЂФсѓ»сЃЕсЃ│сЃЌсЂЋсѓїсЂЪсЂЙсЂЙсђїжЂЕућеТИѕсЂ┐сђЇсЂФсЂфсЂБсЂдсЂЌсЂЙсЂє№╝Ѕ
      if(cont.scrollHeight-cont.clientHeight<40)return;
      // т»ЙУ▒АТъасЂ«УАїсѓњТјбсЂЎ№╝ѕуЋ│сЂ┐УАеуц║сЂДУАїсЂїуёАсЂЉсѓїсЂ░тЙїуХџсЂ«ТъасЂФсЃЋсѓЕсЃ╝сЃФсЃљсЃЃсѓ»№╝Ѕ
      let row=null;
      const idx=Math.max(0,TIME_SLOTS.indexOf(slot));
      for(let i=idx;i<TIME_SLOTS.length&&!row;i++){
        row=document.getElementById('sched-slot-'+TIME_SLOTS[i].replace(':',''));
      }
      if(!row)return;
      lastAutoSlotRef.current=slot;
      const rowTop=row.getBoundingClientRect().top-cont.getBoundingClientRect().top+cont.scrollTop;
      const head=cont.querySelector('thead');
      const headH=head?head.getBoundingClientRect().height:0; // stickyсЃўсЃЃсЃђсЃ╝сЂ«уЏ┤СИІсЂФТъасЂїТЮЦсѓІсѓѕсЂєсЂФ
      // жЮъУАеуц║сѓ┐сЃќсЂДсЂ»smoothсѓбсЃІсЃАсЃ╝сѓисЃДсЃ│сЂїтІЋсЂІсЂџуЕ║Тї»сѓісЂЎсѓІсЂЪсѓЂсђЂУдІсЂѕсЂдсЂёсѓІТЎѓсЂасЂЉsmooth
      cont.scrollTo({top:Math.max(0,rowTop-headH),behavior:document.visibilityState==='visible'?'smooth':'auto'});
    };
    // сѓ┐сЃќсЂїУАесЂФТѕ╗сЂБсЂЪТЎѓсѓѓтЇ│У┐йтЙЊ№╝ѕжЮъУАеуц║СИГсЂ»intervalсЂїжќЊт╝ЋсЂІсѓїсѓІсЂЪсѓЂ№╝Ѕ
    const onVis=()=>{if(document.visibilityState==='visible')apply(true);};
    document.addEventListener('visibilitychange',onVis);
    // УхитІЋуЏ┤тЙїсЂ»тѕЮТюЪсЃЄсЃ╝сѓ┐УфГсЂ┐УЙ╝сЂ┐сЂДсЃгсѓцсѓбсѓдсЃѕсЂїтІЋсЂЇсѓ╣сѓ»сЃГсЃ╝сЃФсЂїт«џуЮђсЂЌсЂфсЂёсЂЪсѓЂсђЂ
    // т«ЪжџЏсЂФсѓ╣сѓ»сЃГсЃ╝сЃФсЂїС╗ўсЂЈсЂЙсЂД1.5уДњжќЊжџћсЂДтєЇжЂЕућесЂЎсѓІ№╝ѕТюђтцД30уДњсЂДТЅЊсЂАтѕЄсѓі№╝Ѕ
    let attempts=0;
    const initIv=setInterval(()=>{
      attempts++;
      const cont=document.getElementById(SEC_SCHED);
      const stuck=cont&&cont.scrollTop>10; // т«џуЮђТИѕсЂ┐№╝ѕтЁѕжаГТъа=09:00сЂ«сЂЙсЂЙсЂїТГБУДБсЂ«ТюЮсЂ»С╗ўсЂІсЂфсЂёсЂїт«Ът«│сЂфсЂЌ№╝Ѕ
      if(stuck||attempts>20){clearInterval(initIv);return;}
      lastAutoSlotRef.current=null; // Тюфт«џуЮђсЂ«жќЊсЂ»сђїТюфжЂЕућесђЇТЅ▒сЂёсЂДТ»јтЏът«ЪУАї
      apply(false);
    },1500);
    const iv=setInterval(()=>apply(false),30000); // С╗ЦтЙїсЂ»30уДњсЂћсЂесЂФ30тѕєтбЃуЋїсѓњуб║УфЇ
    return()=>{clearInterval(initIv);clearInterval(iv);document.removeEventListener('visibilitychange',onVis);};
  },[view,dk,schedCollapsed]);

  return (
    <div style={{height:'100vh',overflow:'hidden',background:'linear-gradient(140deg,#1e3a8a,#1d4ed8,#2563eb)',fontFamily:'system-ui,-apple-system,sans-serif'}}>
      <style>{GCSS}</style>

      {/* -- сЃўсЃЃсЃђсЃ╝ -- */}
      <header ref={headerRef} style={{background:'linear-gradient(135deg,#1e3a8a,#1d4ed8)',borderBottom:`3px solid ${vsStore.color}`,padding:'9px 18px',position:'fixed',top:0,left:0,right:0,zIndex:500,boxShadow:'0 4px 20px rgba(0,0,0,0.15)'}}>
        {(()=>{
          const userStore=STORES.find(s=>s.id===(currentUser?.store?.id||'honten'))||STORES[0];
          return(
          <div style={{maxWidth:1700,margin:'0 auto',display:'flex',flexDirection:'column',gap:4}}>
            {/* 1УАїуЏ«№╝џсЃГсѓ┤тид №╝І сѓ╣сѓ┐сЃЃсЃЋтЈ│ */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:7,fontSize:16,fontWeight:800,color:'white'}}>
                <Car size={22}/> Hub a Nice day
                <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10,background:'#eff6ff',color:'#1d4ed8',border:'1px solid #bfdbfe',cursor:'default'}}>v{APP_VERSION}</span>
                {/* GASТјЦуХџсѓ╣сЃєсЃ╝сѓ┐сѓ╣сЃљсЃЃсѓИ */}
                {gasStatus==='unconfigured'&&(
                  <span title="GASТюфУеГт«џ№╝џсЃЄсЃ╝сѓ┐сЂ»сЂЊсЂ«сЃќсЃЕсѓдсѓХсЂФсЂ«сЂ┐С┐ЮтГўсЂЋсѓїсЂЙсЂЎ" style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10,background:'#fef3c7',color:'#d97706',border:'1px solid #fbbf24',cursor:'default'}}>Рџа GASТюфУеГт«џ</span>
                )}
                {gasStatus==='connecting'&&(
                  <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10,background:'#f3f4f6',color:'#6b7280',border:'1px solid #e5e7eb'}}>РЪ│ ТјЦуХџСИГ...</span>
                )}
                {gasStatus==='ok'&&(
                  <span title="Googleсѓ╣сЃЌсЃгсЃЃсЃЅсѓисЃ╝сЃѕсЂФТјЦуХџСИГ№╝џсЃЄсЃ╝сѓ┐сЂ»тЁетЊАсЂДтЁ▒ТюЅсЂЋсѓїсЂдсЂёсЂЙсЂЎ" style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10,background:'#d1fae5',color:'#059669',border:'1px solid #6ee7b7',cursor:'default'}}>РЌЈ GASТјЦуХџТИѕ</span>
                )}
                {gasStatus==='error'&&(
                  <span title="GASТјЦуХџсѓесЃЕсЃ╝№╝џURLсѓњуб║УфЇсЂЌсЂдсЂЈсЂасЂЋсЂё" style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10,background:'#fef2f2',color:'#dc2626',border:'1px solid #fca5a5',cursor:'default'}}>РюЋ ТјЦуХџсѓесЃЕсЃ╝</span>

                          borderLeft:'1px solid #e5e7eb',cursor:storeHoliday?'default':'pointer',flexWrap:'wrap',justifyContent:'flex-end',minWidth:'fit-content',maxWidth:'45%'}}>
                        {dayoff.length>0
                          ? dayoff.map(s=>(
                              <span key={s.id} style={{padding:'2px 9px',borderRadius:20,background:'#9ca3af',color:'white',fontWeight:700,fontSize:11,whiteSpace:'nowrap'}}>
                                {s.name}
                              </span>
                            ))
                          : <span style={{fontSize:11,color:'#9ca3af',fontStyle:'italic',whiteSpace:'nowrap'}}>С╝ЉТЌЦсЂфсЂЌ</span>
                        }
                        <span style={{fontSize:11,color:'#9ca3af',flexShrink:0}}>­ЪЈќ</span>
                      </div>
                    </div>
                  );
                })()}
              </div>

              <div style={{padding:'8px 18px 4px 18px',flex:1,minHeight:0,display:'flex',flexDirection:'column',overflowY:'auto'}}>
              {/* уиежЏєСИГсЃГсЃЃсѓ»УАеуц║ */}
              {(()=>{
                const al=Object.entries(locks).filter(([k,v])=>k.includes(dk)&&v.lockedBy!==currentUser.name);
                if(!al.length)return null;
                return <div style={{marginBottom:12,padding:'7px 12px',background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:7,display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}}>
                  <span style={{fontSize:12,fontWeight:700,color:'#92400e'}}>­Ъћњ уиежЏєСИГ№╝џ</span>
                  {al.map(([k,v])=><span key={k} style={{fontSize:11,background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:12,padding:'2px 8px',color:'#dc2626',fontWeight:600}}>{v.lockedBy}</span>)}
                </div>;
              })()}

              {/* -- т»Йт┐ютЈ»УЃйсЃЂсѓДсЃЃсѓ»сЃ╗сѓбсЃЕсЃ╝сЃѕ№╝ѕТЎѓжќЊТъатѕЦсЃ╗УЄфт║ЌУѕЌсЂ«сЂ┐№╝Ѕ -- */}
              {(()=>{
                const storeHolidayChk=isClosed(new Date(...dk.split('-').map((v,i)=>i===1?Number(v)-1:Number(v))));
                const offs=storeHolidayChk?currentStaffList.map(s=>s.name):(dayOffData[dk]||[]);
                const workingStaff=storeHolidayChk?[]:currentStaffList.filter(s=>!offs.includes(s.name));
                if(workingStaff.length===0)return null;
                // т»Йт┐юсѓ╣сѓ┐сЃЃсЃЋ№╝ЮтЄ║тІцУђЁсЂ«сЂєсЂАт»Йт┐ютЈ»УЃйТЦГтІЎсЂДУ╗іТцю/ТЋ┤тѓЎсЂёсЂџсѓїсЂІсЂ«сЃЋсЃГсЃ│сЃѕт»Йт┐юсЂФсЃЂсѓДсЃЃсѓ»сЂїсЂѓсѓІС║║сЂ«сЂ┐
                const capOf=s=>s.capabilities||getDefaultCapabilities(s.badge||'mechanic');
                const frontCount=workingStaff.filter(s=>{const c=capOf(s);return c.insp_front||c.sched_front;}).length;

                // тЁЦт║ФТЎѓжќЊсѓњтѕєтЇўСйЇсЂФтцЅТЈЏсЂЎсѓІсЃўсЃФсЃЉсЃ╝
                const toMin=t=>{
                  if(!t)return null;
                  const m=t.match(/(\d+):(\d+)/);
                  if(!m)return null;
                  return parseInt(m[1])*60+parseInt(m[2]);
                };

                // УЄфт║ЌУѕЌсЂ«У╗іТцюсѓњТъатѕЦсЂФсѓФсѓдсЃ│сЃѕ№╝ѕТЅ┐УфЇТИѕсЂ┐сЂ«сЂ┐№╝Ѕ№╝ѕ9:00сђю9:29 Рєњ 9ТЎѓТъасђЂ9:30сђю9:59 Рєњ 9:30Тъа№╝Ѕ
                const myInsps=(inspData[dk]||[]).filter(r=>r?.name&&!r.pendingApproval&&(r.store===vsId||(r.store==null&&vsId==='honten')));
                const insp900=myInsps.filter(r=>{const m=toMin(r.time);return m!=null&&m>=9*60&&m<9*60+30;}).length;
                const insp930=myInsps.filter(r=>{const m=toMin(r.time);return m!=null&&m>=9*60+30&&m<10*60;}).length;

                // сѓ╣сѓ▒сѓИсЃЦсЃ╝сЃФсЂ«09:00сЃ╗09:30сѓ╣сЃГсЃЃсЃѕС╗ХТЋ░№╝ѕУцЄТЋ░УАїт»Йт┐ю№╝Ѕ
                const countSchedSlot=(base)=>{
                  const day=schedData[dk]||{};
                  const keys=[base,...Object.keys(day).filter(k=>k.startsWith(base+'__'))];
                  return keys.filter(k=>day[k]?.name).length;
                };
                const sched900=countSchedSlot('09:00');
                const sched930=countSchedSlot('09:30');

                // ТъасЂћсЂесЂ«тљѕУеѕ
                const total900=insp900+sched900;
                const total930=insp930+sched930;

                const alerts=[];
                [
                  {label:'9:00Тъа',total:total900,insp:insp900,sched:sched900},
                  {label:'9:30Тъа',total:total930,insp:insp930,sched:sched930},
                ].forEach(({label,total,insp,sched})=>{
                  if(total===0)return;
                  const isOver=total>frontCount;
                  const isEqual=total===frontCount;
                  if(!isOver&&!isEqual)return;
                  alerts.push({label,total,insp,sched,isOver,isEqual});
                });

                if(alerts.length===0)return null;
                return(
                  <div style={{marginBottom:12,display:'flex',flexDirection:'column',gap:6}}>
                    {alerts.map(({label,total,insp,sched,isOver})=>(
                      <div key={label} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',background:isOver?'#fff1f2':'#fffbeb',border:`2px solid ${isOver?'#fca5a5':'#fcd34d'}`,borderRadius:9}}>
                        <span style={{fontSize:18,flexShrink:0}}>{isOver?'Рџа№ИЈ':'РџА'}</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:800,color:isOver?'#dc2626':'#d97706',fontSize:13}}>
                            сђљ{label}сђЉтЁЦт║ФтЈ░ТЋ░сЂїт»Йт┐юсѓ╣сѓ┐сЃЃсЃЋТЋ░{isOver?'сѓњУХЁсЂѕсЂдсЂёсЂЙсЂЎ':'сЂФжЂћсЂЌсЂдсЂёсЂЙсЂЎ'}
                          </div>
                          <div style={{fontSize:11,color:isOver?'#9f1239':'#92400e',marginTop:2,display:'flex',gap:10,flexWrap:'wrap'}}>
                            <span>­ЪџЌ У╗іТцю <strong>{insp}тЈ░</strong></span>
                            <span>РЈ░ ТЋ┤тѓЎ <strong>{sched}С╗Х</strong></span>
                            <span>№╝Ю тљѕУеѕ <strong>{total}С╗Х</strong></span>
                            <span title="т»Йт┐ютЈ»УЃйТЦГтІЎсЂДУ╗іТцю/ТЋ┤тѓЎсЃЋсЃГсЃ│сЃѕт»Йт┐юсЂФсЃЂсѓДсЃЃсѓ»сЂ«сЂѓсѓІтЄ║тІцсѓ╣сѓ┐сЃЃсЃЋ">­ЪЉц сЃЋсЃГсЃ│сЃѕт»Йт┐ю <strong>{frontCount}тљЇ</strong>{frontCount!==workingStaff.length&&<span style={{fontWeight:400}}>№╝ѕтЄ║тІц{workingStaff.length}тљЇ№╝Ѕ</span>}</span>
                            {isOver&&<span style={{color:'#dc2626',fontWeight:800}}>Рєњ {total-frontCount}С╗ХсѓфсЃ╝сЃљсЃ╝</span>}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })()}

              {/* == сѓ╣сЃЌсЃфсЃЃсЃѕсЃЉсЃЇсЃФ№╝џтид№╝ЮУ╗іТцю№╝ІтѓЎУђЃ №╝Ј тЈ│№╝Юсѓ┐сѓцсЃасѓ╣сѓ▒сѓИсЃЦсЃ╝сЃФ == */}
              {/* сЃЅсЃЕсЃЃсѓ░сЂДтидтЈ│Т»ћујЄсѓњтцЅТЏ┤сђЂсЃфсѓ╗сЃЃсЃѕсЂД50:50сЂФТѕ╗сЂЎ */}
              <div ref={splitContainerRef}
                style={{display:'flex',gap:0,flex:1,overflow:'hidden',position:'relative',userSelect:isDraggingRef.current?'none':'auto'}}
                onMouseMove={e=>{
                  if(!isDraggingRef.current||!splitContainerRef.current)return;
                  const rect=splitContainerRef.current.getBoundingClientRect();
                  const pct=((e.clientX-rect.left)/rect.width)*100;
                  setSplitRatio(Math.min(93,Math.max(7,pct)));
                }}
                onMouseUp={()=>{isDraggingRef.current=false;document.body.style.cursor='';document.body.style.userSelect='';}}
                onMouseLeave={()=>{if(isDraggingRef.current){isDraggingRef.current=false;document.body.style.cursor='';document.body.style.userSelect='';}}}
              >

                {/* --- тидсѓФсЃЕсЃа --- */}
                <div style={{width:`${splitRatio}%`,minWidth:0,flexShrink:0,display:'flex',flexDirection:'column',gap:18,overflowY:'auto',height:'100%',paddingBottom:40}}>
              {/* -- У╗іТцюсѓ╗сѓ»сѓисЃДсЃ│№╝ѕтЈ░ТЋ░жЏєУеѕсЂфсЂЌ№╝Ѕ -- */}
              <div id={SEC_INSP} style={{marginBottom:26,scrollMarginTop:'var(--header-h,60px)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <h3 style={SEC_TITLE('#9a3412')}>­ЪџЌ У╗іТцю</h3>
                  {/* тЈ░ТЋ░тѕХжЎљсЃљсЃЃсѓИ№╝ѕУеГт«џСИГсЂ«ТЌЦсЂ«сЂ┐УАеуц║№╝Ѕ */}
                  {inspLimits[dk]!=null&&(
                    <div style={{display:'flex',alignItems:'center',gap:4,padding:'3px 8px',background:'#fee2e2',border:'2px solid #ef4444',borderRadius:6}}>
                      <span style={{fontSize:14}}>­ЪџЌ</span>
                      <span style={{fontWeight:700,color:'#dc2626',fontSize:11}}>тЈ░ТЋ░тѕХжЎљ ТюђтцД{inspLimits[dk]}тЈ░</span>
                    </div>
                  )}
                  {/* ТЅ┐УфЇтЙЁсЂАУГдтЉісѓбсѓцсѓ│сЃ│ */}
                  {(()=>{
                    const pendingCount=(inspData[dk]||[]).filter(r=>r?.name&&r.pendingApproval).length;
                    if(pendingCount===0)return null;
                    return <div style={{display:'flex',alignItems:'center',gap:4,padding:'3px 8px',background:'#fef3c7',border:'2px solid #f59e0b',borderRadius:6}}>
                      <span style={{fontSize:16}}>Рџа№ИЈ</span>
                      <span style={{fontWeight:700,color:'#d97706',fontSize:11}}>ТЅ┐УфЇтЙЁсЂА {pendingCount}С╗Х</span>
                    </div>;
                  })()}
                  {/* +/- ТъасЃюсѓ┐сЃ│№╝џтидУЕ░сѓЂ */}
                  {inspSlots>1&&<button onClick={()=>setInspSlots(s=>Math.max(1,s-1))} title="ТъасѓњтЅіжЎц" style={{display:'flex',alignItems:'center',gap:2,padding:'4px 9px',background:'#fef2f2',border:'2px solid #fca5a5',borderRadius:5,cursor:'pointer',fontWeight:700,fontSize:10,color:'#dc2626'}}><MinusSquare size={13}/></button>}

                </div>
                <div style={{overflowX:'auto'}}>
                  <table style={TBL}>
                    <thead><tr style={{background:'linear-gradient(90deg,#9a3412,#ea580c)',color:'white'}}>
                      {['No','Т░ЈтљЇ','У╗іуе«','сѓ│сЃ╝сѓ╣','С╗БУ╗і','уЅ╣тЁИ','тЁЦт║Ф','тѓЎУђЃ'].map(h=><th key={h} style={{padding:'7px 8px',textAlign:'left',fontSize:12,fontWeight:600,whiteSpace:'nowrap'}}>{h}</th>)}
                    </tr></thead>
                    <tbody>
                      {(()=>{
                        const allRows=(inspData[dk]||[]);
                        // уЈЙтюесЂ«т║ЌУѕЌсѓњСИіСйЇсЂФУАеуц║№╝ѕТюгт║ЌсЃГсѓ░сѓцсЃ│РєњТюгт║ЌСИісђЂСИЅућ░т║ЌсЃГсѓ░сѓцсЃ│РєњСИЅућ░т║ЌСИі№╝Ѕ
                        const normSt=s=>{if(!s)return'';if(s==='honten'||s==='Тюгт║Ќ')return'honten';if(s==='sanda'||s==='СИЅућ░т║Ќ')return'sanda';return s;};
                        const storeOrder=r=>{const st=normSt(r?.store);if(st===vsId)return 0;if(st)return 1;return 2;};
                        const timeToMin=t=>{if(!t||typeof t!=='string')return 9999;const m=t.match(/(\d+):(\d+)/);return m?parseInt(m[1])*60+parseInt(m[2]):9999;};
                        const sortFn=(a,b)=>{
                          const so=storeOrder(a)-storeOrder(b);
                          if(so!==0)return so;
                          return timeToMin(a.time)-timeToMin(b.time);
                        };
                        // тЈ░ТЋ░тѕХжЎљтЈќтЙЌ№╝ѕУеГт«џсЂфсЂЉсѓїсЂ░6№╝Ѕ
                        const dayInspLimit=inspLimits[dk]??6;
                        // С║ѕу┤ёжає(seq)сЂДТЅ┐УфЇуіХТЁІсѓњсЂЮсЂ«та┤сЂДтєЇУеѕу«ЌсЂЌсђЂсЂЊсѓїсѓњУАеуц║сЂ«уюЪт«ЪсЂесЂЎсѓІсђѓ
                        // Рєњ С┐ЮтГўсЃЋсЃЕсѓ░сЂ«сЃЕсѓ░сЃ╗ухїУи»ти«сЃ╗сЃЮсЃ╝сЃфсЃ│сѓ░уФХтљѕсЂФСЙЮтГўсЂЏсЂџсђЂТЅ┐УфЇтЙЁсЂАсЃљсЃЃсѓИсѓњтИИсЂФТГБсЂЌсЂЈУАеуц║сђѓ
                        //   №╝ѕу╣░сѓіСИісЂїсѓісЂДуб║т«џсЂЌсЂЪУАїсЂ»сЃљсЃЃсѓИсЂїТХѕсЂѕсђЂсЃгсѓ«сЃЦсЃЕсЃ╝3тЈ░УХЁжЂјсЂ»ТЅ┐УфЇтЙЁсЂАсЂ«сЂЙсЂЙ№╝Ѕ
                        const recomputed=recomputeInspApproval(allRows.map(r=>(r&&r.name?r:blankInsp())),dayInspLimit);
                        const allMapped=recomputed.map((r,i)=>({...(r&&r.name?r:blankInsp()),_origIdx:i}));
                        // сѓГсЃБсЃ│сѓ╗сЃФжЎцтцќсЃ╗тљЇтЅЇсЂѓсѓіУАїсѓњС║ѕу┤ёжає(seq)сЂДСИдсЂ╣сѓІ
                        // №╝ѕтЁѕуЮђ6тЈ░/7тЈ░уЏ«сЂ«тѕцт«џсЂ»С║ѕу┤ёжаєсђѓseqуёАсЂЌТЌДсЃЄсЃ╝сѓ┐сЂ»тЁЦтіЏжаєсЂФсЃЋсѓЕсЃ╝сЃФсЃљсЃЃсѓ»№╝Ѕ
                        const validRows=allMapped
                          .filter(r=>!!(r.name)&&r.bookingStatus!=='cancelled')
                          .sort((a,b)=>{const sa=(a.seq!=null)?a.seq:a._origIdx;const sb=(b.seq!=null)?b.seq:b._origIdx;return sa-sb;});

                        // СИіТ«х6тЈ░№╝џтЁЦтіЏжаєсЂДтЁѕуЮђdayInspLimitтЈ░сѓњуб║т«џ№╝ѕт║ЌУѕЌсЃ╗ТЅ┐УфЇуіХТЁІсЂФжќбсѓЈсѓЅсЂџ№╝Ѕ
                        // сЂЪсЂасЂЌУАеуц║жаєсЂ»сЃГсѓ░сѓцсЃ│т║ЌУѕЌтёфтЁѕсЃ╗ТЎѓтѕ╗жає№╝ѕsortFn№╝ЅсЂДСИдсЂ╣сѓІ
                        const normalRows=validRows.slice(0,dayInspLimit).slice().sort(sortFn);

                        // СИІТ«х7тЈ░уЏ«С╗ЦжЎЇ№╝џтЁЦтіЏжаєсЂД7тЈ░уЏ«С╗ЦжЎЇсѓњТЎѓтѕ╗жаєсЂДСИдсЂ╣сѓІ
                        const waitingRows=validRows
                          .slice(dayInspLimit)
                          .sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));

                        // У┐йтіаУАїсЂ«сѓцсЃ│сЃЄсЃЃсѓ»сѓ╣
                        const usedIdxs=new Set(validRows.map(r=>r._origIdx));
                        const recycledIdx=allRows.findIndex((r,i)=>!usedIdxs.has(i)&&(!r||!r.name||r.bookingStatus==='cancelled'));
                        const addIdx=recycledIdx>=0?recycledIdx:allRows.length;

                        const rows=[];
                        // РЉа СИіТ«х№╝џтЁѕуЮђ6тЈ░№╝ѕт║ЌУѕЌсЃ╗ТЅ┐УфЇуіХТЁІсЂФжќбсѓЈсѓЅсЂџтЁЦтіЏжаєтЏ║т«џ№╝Ѕ
                        normalRows.forEach((row,dispIdx)=>{
                          const origIdx=row._origIdx??dispIdx;
                          const {_origIdx,...cleanRow}=row;
                          rows.push(
                            <InspRow key={`${origIdx}-${dispIdx}`} row={cleanRow} idx={origIdx} dispNo={dispIdx+1} dk={dk} onOpenModal={handleOpenModal} lockInfo={getInspLock(dk,origIdx)} loanerRes={loanerRes} loanerResH={loanerResH} loanerResS={loanerResS} vsId={vsId} onApprove={handleApprove} isOverLimit={false} setItems={setItems}/>
                          );
                        });
                        // РЉА тЈ░ТЋ░тѕХжЎљУХЁжЂјсЃљсЃісЃ╝№╝ѕ7тЈ░уЏ«С╗ЦжЎЇсЂїсЂѓсѓІта┤тљѕ№╝Ѕ
                        if(waitingRows.length>0){
                          rows.push(
                            <tr key="limit-alert">
                              <td colSpan={8} style={{padding:'7px 14px',background:'linear-gradient(90deg,#fee2e2,#fff1f2)',border:'2px solid #fca5a5',textAlign:'center',fontSize:12,fontWeight:800,color:'#dc2626'}}>
                                Рџа№ИЈ тЈ░ТЋ░тѕХжЎљ№╝ѕ{dayInspLimit}тЈ░№╝ЅУХЁжЂј Рђћ С╗ЦСИІсЂ»ТЅ┐УфЇтЙЁсЂАсЂФсЂфсѓісЂЙсЂЎ
                              </td>
                            </tr>
                          );
                        }
                        // РЉб СИІТ«х№╝џ7тЈ░уЏ«С╗ЦжЎЇ№╝ѕтЁЦтіЏжаєсЃ╗ТЅ┐УфЇТИѕсЂ┐сЂДсѓѓСйЇуй«сЂ»тцЅсѓЈсѓЅсЂфсЂё№╝Ѕ
                        waitingRows.forEach((row,pi)=>{
                          const origIdx=row._origIdx??pi;
                          const {_origIdx,...cleanRow}=row;
                          // ТЅ┐УфЇТИѕсЂ┐УАїсЂ»сЂЮсЂ«сЂЙсЂЙ№╝ѕТЅ┐УфЇТИѕсЂ┐сЃљсЃЃсѓИ№╝ЅсђЂТюфТЅ┐УфЇУАїсЂ»ТЅ┐УфЇтЙЁсЂАсЃЋсЃЕсѓ░С╗ўСИј
                          const displayRow=cleanRow.approved
                            ?{...cleanRow,pendingApproval:false}  // ТЅ┐УфЇТИѕсЂ┐№╝џТЅ┐УфЇтЙЁсЂАсЃљсЃЃсѓИТХѕсЂЎ
                            :{...cleanRow,pendingApproval:true};  // ТюфТЅ┐УфЇ№╝џТЅ┐УфЇтЙЁсЂАсЃљсЃЃсѓИУАеуц║
                          rows.push(
                            <InspRow key={`waiting-${origIdx}-${pi}`} row={displayRow} idx={origIdx} dispNo={normalRows.length+pi+1} dk={dk} onOpenModal={handleOpenModal} lockInfo={getInspLock(dk,origIdx)} loanerRes={loanerRes} loanerResH={loanerResH} loanerResS={loanerResS} vsId={vsId} onApprove={handleApprove} isOverLimit={false} setItems={setItems}/>
                          );
                        });
                        // РЉБ У┐йтіаУАї№╝ѕisNew=trueсЂДжќІсЂЈ№╝Ѕ

        modalIdx={modalIdx} onOpenLoanerPicker={handleOpenLoanerPicker} pendingLoanerId={pendingLoanerId}
        pendingRentalId={pendingRentalId} pendingRentalRec={pendingRentalRec}
        rentalCarsData={dynRentalCars}
        loanerRes={loanerRes} modalDk={modalDk}
        onDeleteLoaner={handleDeleteLoaner}
        currentUser={currentUser}
        setItems={setItems}
        onOpenSetItemEdit={()=>setShowSetItemEdit(true)}
        allCars={currentLoaners}
        fromCustList={fromCustList}
        inspData={inspData}
        closedDays={closedDays}
        closedDates={closedDates}
        overrideOpenDates={Array.isArray(overrideOpenDates)?overrideOpenDates:[]}
        inspLimits={inspLimits}/>

      {/* -- С╝ЉТЦГТЌЦУеГт«џ -- */}
      <HolidayModal isOpen={showHoliday} onClose={()=>setShowHoliday(false)}
        closedDays={closedDays} setClosedDays={setClosedDays}
        closedDates={closedDates} setClosedDates={setClosedDates}
        overrideOpenDates={Array.isArray(overrideOpenDates)?overrideOpenDates:[]}
        setOverrideOpenDates={setOverrideOpenDates}
        vsStore={vsStore}/>

      {/* -- С╝ЉТЌЦсѓ╣сѓ┐сЃЃсЃЋсЃбсЃ╝сЃђсЃФ -- */}
      <DayOffModal
        isOpen={showDayOff}
        onClose={()=>setShowDayOff(false)}
        dateLabel={dateLabel}
        staffList={(currentStaffList.length>0?currentStaffList:DEFAULT_STAFF_HONTEN).filter(s=>s.badge!=='president'&&s.myNumber!==0)}
        selected={dayOffData[dk]||[]}
        onSave={names=>{
          setDayOffData(prev=>({...prev,[dk]:names}));
          setShowDayOff(false);
        }}/>

      {/* -- уЕ║сЂЇТъаТцюу┤б -- */}
      <SearchModal isOpen={showSearch} onClose={()=>setShowSearch(false)}
        inspData={inspData} schedData={schedData}
        closedDays={closedDays} closedDates={closedDates}
        overrideOpenDates={Array.isArray(overrideOpenDates)?overrideOpenDates:[]}
        inspLimits={inspLimits}
        onNavigate={handleSearchNavigate}/>

      {/* -- сѓ╗сЃЃсЃѕсѓбсѓцсЃєсЃауиежЏє№╝ѕсѓ╣сѓ▒сѓИсЃЦсЃ╝сЃФтєЁт«╣Тгёуће№╝Ѕ -- */}
      <SetItemEditModal
        isOpen={showSetItemEdit}
        onClose={()=>setShowSetItemEdit(false)}
        title="сѓ╣сѓ▒сѓИсЃЦсЃ╝сЃФтєЁт«╣Тгё сѓ»сѓцсЃЃсѓ»уиежЏє"
        items={Array.isArray(quickItemsRaw)&&quickItemsRaw.length>0?quickItemsRaw.map(si=>({...si,text:si.text??si.content??si.label??''})):DEFAULT_SET_ITEMS}
        onSave={v=>setSetItems(v)}/>
      {/* -- сѓ╗сЃЃсЃѕсѓбсѓцсЃєсЃауиежЏє№╝ѕтѓЎУђЃсЃ╗сЃАсЃбуће№╝Ѕ -- */}
      <SetItemEditModal
        isOpen={showMemoItemEdit}
        onClose={()=>setShowMemoItemEdit(false)}
        title="тѓЎУђЃсЃ╗сЃАсЃб сѓ»сѓцсЃЃсѓ»уиежЏє"
        items={Array.isArray(memoItemsRaw)?memoItemsRaw.map(si=>({...si,text:si.text??si.content??si.label??''})):DEFAULT_MEMO_ITEMS}
        onSave={v=>setMemoItems(v)}/>

      {/* -- сѓ╣сѓ┐сЃЃсЃЋТќ░УдЈуЎ╗жї▓ -- */}
      <StaffRegisterModal
        isOpen={showStaffRegister}
        onClose={()=>setShowStaffRegister(false)}
        staffListH={dynStaffH} staffListS={dynStaffS}
        onSave={handleRegisterStaff}/>

      {/* -- сѓ╣сѓ┐сЃЃсЃЋУеГт«џ№╝ѕуиежЏєсЃ╗тЅіжЎцсЃ╗т║ЌУѕЌтцЅТЏ┤№╝Ѕ -- */}
      <StaffSettingsModal
        isOpen={showStaffSettings}
        onClose={()=>setShowStaffSettings(false)}
        staffListH={dynStaffH} staffListS={dynStaffS}
        onUpdate={handleUpdateStaff}
        onDelete={handleDeleteStaff}
        desktopListH={desktopListH} desktopListS={desktopListS}
        onDesktopSave={handleDesktopSave}
        onDesktopDelete={handleDesktopDelete}/>
    </div>
  );
}

function App(){return <ErrorBoundary><AppInner/></ErrorBoundary>;}

const NAV_S    ={background:'#c2410c',color:'white',border:'none',borderRadius:7,padding:7,cursor:'pointer',display:'flex',alignItems:'center'};
const BACK_S   ={display:'flex',alignItems:'center',gap:4,padding:'5px 11px',background:'#16a34a',border:'none',borderRadius:6,cursor:'pointer',fontWeight:700,fontSize:12,color:'white'};

const TD       ={padding:'7px 9px',borderBottom:'1px solid #f3f4f6',borderRight:'1px solid #f3f4f6'};
const LBL      ={display:'block',fontSize:13,fontWeight:700,color:'#374151',marginBottom:5};
const INP      ={width:'100%',padding:'9px 12px',border:'2px solid #e5e7eb',borderRadius:8,fontSize:14,outline:'none',transition:'border .15s',boxSizing:'border-box'};
const SEC_TITLE=(color)=>({fontSize:15,fontWeight:800,marginBottom:0,paddingBottom:5,borderBottom:`3px solid ${color}`,color:'white',margin:0});
const JUMP_BTN =(color)=>({display:'flex',alignItems:'center',gap:3,padding:'5px 10px',borderRadius:6,border:`2px solid ${color}`,background:'white',color,fontWeight:700,fontSize:12,cursor:'pointer'});


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
