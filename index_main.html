class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error)return(
      <div style={{padding:32,background:'#fef2f2',minHeight:'100vh',fontFamily:'monospace'}}>
        <h2 style={{color:'#dc2626'}}>сЃгсЃ│сЃђсЃфсЃ│сѓ░сѓесЃЕсЃ╝№╝ѕжќІуЎ║ућеУАеуц║№╝Ѕ</h2>
        <pre style={{color:'#991b1b',fontSize:12,whiteSpace:'pre-wrap'}}>{this.state.error?.message}\n{this.state.error?.stack}</pre>
        <button onClick={()=>this.setState({error:null})} style={{marginTop:16,padding:'8px 16px',background:'#c2410c',color:'white',border:'none',borderRadius:8,cursor:'pointer'}}>сЃфсѓ╗сЃЃсЃѕ</button>
      </div>
    );
    return this.props.children;
  }
}

// Excelсѓ╗сЃФARGBРєњCSS hex№╝ѕУЃїТЎ»УЅ▓тЈќтЙЌ№╝Ѕ
const cellArgbToHex = (ws, col, row) => {
  try {
    const addr = XLSX.utils.encode_cell({r:row, c:col});
    const cell = ws[addr];
    if(!cell||!cell.s) return null;
    const fg = cell.s.fgColor || cell.s.patternFgColor || cell.s.bgColor;
    if(!fg) return null;
    const argb = fg.argb || fg.rgb || '';
    if(!argb || argb==='00000000' || argb==='FFFFFFFF' || argb.toLowerCase()==='ffffff' || argb==='FF000000') return null;
    const rgb = argb.length===8 ? argb.slice(2) : argb;
    return '#'+rgb;
  } catch(e){ return null; }
};

const parseCustExcel = (wb) => {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const allRows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:false});
  if(!allRows||!allRows.length) return [];

  const norm = s => String(s||'').replace(/[сђђ\s]/g,'').toLowerCase();

  // сЃўсЃЃсЃђсЃ╝УАїсѓњтЁѕжаГ10УАїсЂДУЄфтІЋТцютЄ║
  let headerIdx = -1, colMap = {};
  for(let ri=0; ri<Math.min(10,allRows.length); ri++){
    const row = allRows[ri]; if(!row) continue;
    let hits=0; const cand={};
    for(let ci=0; ci<row.length; ci++){
      const cell = norm(row[ci]); if(!cell) continue;
      for(const [fld,kws] of Object.entries(COL_KEYWORDS)){
        if(!cand[fld] && kws.some(kw=>cell.includes(kw)||kw.includes(cell))){
          cand[fld]=ci; hits++;
        }
      }
    }
    if(hits>=2 && (cand.name!=null||cand.inspDate!=null)){ headerIdx=ri; colMap=cand; break; }
  }
  // сЃЋсѓЕсЃ╝сЃФсЃљсЃЃсѓ»№╝џсѓ╣сѓ»сЃфсЃ╝сЃ│сѓисЃДсЃЃсЃѕТ║ќТІа№╝ѕуѓ╣ТцюТ║ђС║єТЌЦ=0тѕЌуЏ«№╝Ѕ
  if(headerIdx<0){
    colMap={inspDate:0,name:1,no:2,carModel:3,
      mailing1:4,reserve1:5,mailing2:6,reserve2:7,
      arrivalDate:8,tokuten:9,course:10,store:11,staff:12,note:13};
    headerIdx=0;
  }

  const toDate = v => {
    if(!v||v==='') return '';
    if(v instanceof Date) return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;
    if(typeof v==='number'){
      const d=new Date(Math.round((v-25569)*86400*1000));
      d.setMinutes(d.getMinutes()+d.getTimezoneOffset());
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    const s=String(v);
    const m=s.match(/(\d{4})[\/\-т╣┤](\d{1,2})[\/\-Тюѕ](\d{1,2})/);
    if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
    // M/D/YY тйбт╝Ј (СЙІ: 6/1/26 Рєњ 2026-06-01)
    const m2=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
    if(m2) return `20${m2[3]}-${m2[1].padStart(2,'0')}-${m2[2].padStart(2,'0')}`;
    return s;
  };

  const g = (row,fld) => row[colMap[fld]??-1] ?? null;

  const result = [];
  for(let ri=headerIdx+1; ri<allRows.length; ri++){
    const r = allRows[ri]; if(!r) continue;
    const nameVal = g(r,'name');
    if(!nameVal||String(nameVal).trim()==='') continue;
    // тљЇтЅЇтѕЌсЂ«сѓ╗сЃФУЃїТЎ»УЅ▓сѓњУАїС╗БУАеУЅ▓сЂесЂЌсЂдтЈќтЙЌ
    const cellBg = cellArgbToHex(ws, colMap.name??4, ri);
    result.push({
      inspDate:   toDate(g(r,'inspDate')),
      name:       String(nameVal).replace(/сђђ/g,' ').trim(),
      no:         g(r,'no')??'',
      carModel:   String(g(r,'carModel')||'').trim(),
      phoneHome:  String(g(r,'phoneHome')||'').trim(),
      phoneMobile:String(g(r,'phoneMobile')||'').trim(),
      mailing1:   toDate(g(r,'mailing1')),
      reserve1:   toDate(g(r,'reserve1')),
      mailing2:   toDate(g(r,'mailing2')),
      reserve2:   toDate(g(r,'reserve2')),
      arrivalDate:toDate(g(r,'arrivalDate')),
      tokuten:    g(r,'tokuten')??'',
      course:     String(g(r,'course')||'').trim(),
      store:      normalizeStore(g(r,'store')),
      staff:      String(g(r,'staff')||'').trim(),
      note:       String(g(r,'note')||'').trim(),
      cellBg:     cellBg||null,
      _idx: ri,
    });
  }
  return result;
};

};

const CustomerListView = memo(({custFiles, setCustFiles, currentUser}) => {
  const [selMonth, setSelMonth] = useState(null);
  const [filter, setFilter]     = useState('');
  const [storeFilter, setStoreFilter] = useState('all');
  const [importing, setImporting] = useState(false);
  const [importOk, setImportOk]   = useState(null);
  const [archivedFiles, setArchivedFiles] = useState(()=>{
    try{const v=localStorage.getItem('hub_cust_archived');return v?JSON.parse(v):{}}catch{return{};}
  });
  const [showArchive, setShowArchive] = useState(false);

  const saveAndSet = useCallback((updater)=>{
    setCustFiles(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      try{localStorage.setItem('hub_cust_files',JSON.stringify(next));}catch{}
      return next;
    });
  },[setCustFiles]);

  const saveArchivedFiles = (data)=>{
    setArchivedFiles(data);
    try{localStorage.setItem('hub_cust_archived',JSON.stringify(data));}catch{}
  };

  const months = useMemo(()=>Object.keys(custFiles).sort(),[custFiles]);

  useEffect(()=>{
    if(months.length===0){setSelMonth(null);return;}
    if(!selMonth||!months.includes(selMonth)) setSelMonth(months[months.length-1]);
  },[months]);

  // ТюѕУЄфтІЋТцютЄ║
  const detectMonthFromRows = (rows) => {
    const counts={};
    ['inspDate','mailing1','mailing2','arrivalDate'].forEach(fld=>{
      rows.forEach(r=>{const m=(r[fld]||'').slice(0,7);if(m.match(/^\d{4}-\d{2}$/))counts[m]=(counts[m]||0)+1;});
    });
    const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    return sorted.length>0?sorted[0][0]:null;
  };

  // сЃЋсѓАсѓцсЃФУфГсЂ┐УЙ╝сЂ┐
  const processFiles = async(files)=>{
    if(!files||files.length===0)return;
    setImporting(true);
    for(const file of Array.from(files)){
      if(!file.name.match(/\.(xlsx|xls)$/i)){alert(`сђї${file.name}сђЇсЂ».xlsxсЂЙсЂЪсЂ».xlsсЃЋсѓАсѓцсЃФсЂДсЂ»сЂѓсѓісЂЙсЂЏсѓЊ`);continue;}
      try{
        const buf=await file.arrayBuffer();
        const wb=XLSX.read(buf,{type:'array',cellDates:true});
        const rows=parseCustExcel(wb);
        let mk=detectMonthFromRows(rows);
        if(!mk){
          const nm=file.name.replace(/\.[^.]+$/,'');
          const m1=nm.match(/(\d{4})[_\-]?(\d{2})/);
          if(m1) mk=`${m1[1]}-${m1[2]}`;
        }
        if(!mk){
          const now=new Date();
          const def=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
          const input=prompt(`сђї${file.name}сђЇсЂ«ТюѕсѓњтЁЦтіЏсЂЌсЂдсЂЈсЂасЂЋсЂё№╝ѕСЙІ: 2026-06№╝Ѕ`,def);
          if(!input||!input.match(/^\d{4}-\d{2}$/)){alert('сѓ╣сѓГсЃЃсЃЌсЂЌсЂЙсЂЌсЂЪ');continue;}
          mk=input;
        }
        saveAndSet(prev=>({...prev,[mk]:rows}));
        setImportOk(mk);
        setSelMonth(mk);
        setTimeout(()=>setImportOk(null),3000);
      }catch(e){alert(`сђї${file.name}сђЇУфГсЂ┐УЙ╝сЂ┐сѓесЃЕсЃ╝: `+e.message);}
    }
    setImporting(false);
  };

  const handleDeleteMonth=(mk,e)=>{
    e&&e.stopPropagation();
    if(!confirm(mk+'сЂ«сЃЄсЃ╝сѓ┐сѓњтЅіжЎцсЂЌсЂЙсЂЎсЂІ№╝Ъ'))return;
    saveAndSet(prev=>{const u={...prev};delete u[mk];return u;});
    if(selMonth===mk)setSelMonth(null);
  };

  const handleArchiveMonth=(mk,e)=>{
    e&&e.stopPropagation();
    if(!confirm(`сђї${mk}сђЇсѓњсѓбсЃ╝сѓФсѓцсЃќсЂЌсЂЙсЂЎсЂІ№╝Ъ`))return;
    saveAndSet(prev=>{
      const rows=prev[mk]||[];
      saveArchivedFiles({...archivedFiles,[mk]:{rows,archivedAt:new Date().toISOString()}});
      const u={...prev};delete u[mk];return u;
    });

  };

  const selRows = useMemo(()=>(custFiles[selMonth]||[]).map((r,i)=>({...r,_month:selMonth,_idx:i})),[custFiles,selMonth]);

  const displayRows = useMemo(()=>selRows.filter(c=>{

    return true;

  const now=new Date();

  const getTokuten=(inspDate, mailing2)=>{
    if(!inspDate) return '';
    const insp=new Date(inspDate);
    const oneMonthBefore=new Date(insp); oneMonthBefore.setMonth(oneMonthBefore.getMonth()-1);
    const twoMonthBefore=new Date(insp); twoMonthBefore.setMonth(twoMonthBefore.getMonth()-2);
    const today=new Date();
    if(mailing2){
      const m2=new Date(mailing2);

    if(today>=oneMonthBefore) return 'РЉа';
    return '';

          <h3 style={{margin:0,fontSize:13,fontWeight:900,color:'#1e293b'}}>­ЪЊІ жАДт«бсЃфсѓ╣сЃѕ</h3>

            padding:'6px 14px',background:importing?'#64748b':(importOk?'#16a34a':'#f59e0b'),
            color:'white',borderRadius:7,fontWeight:800,fontSize:12,boxShadow:'0 2px 6px rgba(0,0,0,.15)'}}>
            ­ЪЊѓ {importing?'УфГУЙ╝СИГ...':(importOk?'УфГУЙ╝т«їС║є':'ExcelсЃЋсѓАсѓцсЃФсѓњжЂИТіъ')}
            <input type="file" accept=".xlsx,.xls" multiple style={{display:'none'}}
              onChange={e=>{if(e.target.files.length)processFiles(e.target.files);e.target.value='';}}/>
          </label>
          <button onClick={()=>setShowArchive(v=>!v)}
            style={{width:28,height:28,borderRadius:'50%',background:showArchive?'#7c3aed':'#ede9fe',
              color:showArchive?'white':'#7c3aed',border:`2px solid ${showArchive?'#7c3aed':'#c4b5fd'}`,
              fontWeight:800,fontSize:11,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>
            ­ЪЊд

        {/* Тюѕсѓ┐сЃќ */}
        <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'flex-start'}}>
          {months.length===0&&<span style={{color:'#9ca3af',fontSize:12,padding:'4px 0'}}>сђї­ЪЊѓ ExcelсЃЋсѓАсѓцсЃФсѓњжЂИТіъсђЇсЂДExcelсѓњУфГсЂ┐УЙ╝сѓђсЂеТюѕсѓ┐сЃќсЂїУЄфтІЋСйюТѕљсЂЋсѓїсЂЙсЂЎ</span>}
          {months.map(m=>{
            const rows=custFiles[m]||[];
            const isOld=m<oldThreshold;
            const isSel=selMonth===m;
            return(

                <div style={{display:'flex',gap:2,flexWrap:'wrap',marginBottom:5}}>
                  <span style={{background:'#e2e8f0',color:'#475569',borderRadius:3,padding:'0 4px',fontSize:9,fontWeight:700}}>{rows.length}С╗Х</span>

                <div onClick={e=>e.stopPropagation()} style={{display:'flex',gap:2,alignItems:'center'}}>
                  <label style={{cursor:'pointer',padding:'2px 6px',background:importOk===m?'#16a34a':importing?'#64748b':'#f59e0b',

                  <button onClick={(e)=>handleDeleteMonth(m,e)}

                </div>
              </div>

        {/* сѓбсЃ╝сѓФсѓцсЃќ */}

              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {Object.keys(archivedFiles).sort().map(m=>{
                  const arc=archivedFiles[m];
                  return(
                    <div key={m} style={{border:'2px solid #a78bfa',borderRadius:7,padding:'7px 10px',background:'white',minWidth:120}}>
                      <div style={{fontWeight:800,fontSize:11,color:'#5b21b6',marginBottom:4}}>­Ъћњ {m} ({arc.rows?.length||0}С╗Х)</div>
                      <div style={{display:'flex',gap:3}}>
                        <button onClick={()=>{if(!confirm(`сђї${m}сђЇсѓњТѕ╗сЂЌсЂЙсЂЎсЂІ№╝Ъ`))return;const rows=arc.rows||[];saveAndSet(prev=>({...prev,[m]:rows}));const na={...archivedFiles};delete na[m];saveArchivedFiles(na);}}

                style={{border:'none',background:'transparent',fontSize:11,outline:'none',width:110}}/>
            </div>
            <select value={storeFilter} onChange={e=>setStoreFilter(e.target.value)}

//   ТъатцќсЂДсѓѓТюгт║ЌсЂїТЅІтІЋТЅ┐УфЇ(approved)сЂЌсЂЪУАїсЂасЂЉсЂ»уб║т«џуХГТїЂ№╝ѕТЅ┐УфЇТИѕсЂ┐сЃљсЃЃсѓИ№╝Ѕсђѓ
// seq сЂ«уёАсЂёТЌДсЃЄсЃ╝сѓ┐сЂ»жЁЇтѕЌсѓцсЃ│сЃЄсЃЃсѓ»сѓ╣жає№╝ѕ№╝ЮтЙЊТЮЦсЂ«СИдсЂ│№╝ЅсЂФсЃЋсѓЕсЃ╝сЃФсЃљсЃЃсѓ»сЂЎсѓІсЂ«сЂДсђЂ
// ТЌбтГўС║ѕу┤ёсЂ«СИдсЂ│сЃ╗уб║т«џуіХТЁІсЂ»тцЅсѓЈсѓЅсЂфсЂёсђѓУАеуц║жає(т║ЌУѕЌтёфтЁѕсЃ╗тЁЦт║ФТЎѓжќЊ)сЂесЂ»уІгуФІсђѓ
const recomputeInspApproval = (rows, limit) => {
  const lim = (limit!=null) ? limit : 6;
  const out = rows.map(r => (r ? {...r} : r));
  const active = out
    .map((r, i) => ({ r, i }))
    .filter(x => x.r && x.r.name && x.r.course && x.r.bookingStatus !== 'cancelled');
  active.sort((a, b) => {
    const sa = (a.r.seq != null) ? a.r.seq : a.i;
    const sb = (b.r.seq != null) ? b.r.seq : b.i;
    return sa - sb;
  });
  let conf = 0, reg = 0;
  for (const { r } of active) {
    const isReg = Number(r.course) === 3;
    // seqжаєсЂДтЁѕуЮђТъа№╝ѕжђџтИИlimтЈ░сЃ╗сЃгсѓ«сЃЦсЃЕсЃ╝3тЈ░№╝ЅсЂФтЁЦсѓїсѓІсЂІсѓњу┤ћу▓ІсЂФСйЇуй«сЂДтѕцт«џ
    const eligible = (conf < lim) && (!isReg || reg < 3);
    if (eligible) {
      delete r.pendingApproval;       // тЁѕуЮђТъатєЁ Рєњ уб║т«џ
      delete r.approved;              // ТъатєЁсЂФу╣░сѓіСИісЂїсЂБсЂЪ Рєњ ТЅІтІЋТЅ┐УфЇсѓѓУДБжЎц№╝ѕТЅ┐УфЇсЃљсЃЃсѓИсѓњТХѕсЂЎ№╝Ѕ
      conf++; if (isReg) reg++;
    } else if (r.approved) {
      delete r.pendingApproval;       // ТъатцќсЂасЂїТЅІтІЋТЅ┐УфЇТИѕсЂ┐ Рєњ уб║т«џуХГТїЂ№╝ѕТъасѓњТХѕУ▓╗№╝Ѕ
      conf++; if (isReg) reg++;
    } else {
      r.pendingApproval = true;       // ТъатцќсЃ╗ТюфТЅ┐УфЇ Рєњ ТЅ┐УфЇтЙЁсЂА
    }
  }
  return out;
};

const GAS_URL = 'https://script.google.com/macros/s/AKfycbxyWvIxIyC1EwJUfm4Fy8g6dpBytp7J9wTuT6Dujz-X7V-WzkGkN-bHw2l6rY_B1ST3/exec';
const GAS_API_KEY = 'hub2026SandaHonten!9xKy';

const GAS_READY = GAS_URL !== 'YOUR_GAS_URL_HERE' && GAS_URL !== '';

// GASсЂІсѓЅсЃЄсЃ╝сѓ┐сѓњУфГсЂ┐УЙ╝сѓђ
const sGet = async(k, retries=3) => {
  if (!GAS_READY) return null;
  for(let i=0;i<retries;i++){
    try {
      const r = await fetch(`${GAS_URL}?key=${encodeURIComponent(k)}&apiKey=${encodeURIComponent(GAS_API_KEY)}`, {cache:'no-store'});
      if(r.status===503){
        if(i<retries-1){await new Promise(r=>setTimeout(r,2000*(i+1)));continue;}
        return null;
      }
      const t = await r.text();
      if (!t || t === 'null' || t.startsWith('error:')) return null;
      const parsed = JSON.parse(t);
      // GASсЂ«тљїТЎѓтЉ╝сЂ│тЄ║сЂЌсѓесЃЕсЃ╝сЂїТиитЁЦсЂЌсЂЪсЃЄсЃ╝сѓ┐сѓњжЎцтцќ
      if (parsed && typeof parsed === 'object' && parsed.error) return null;
      return parsed;
    } catch { if(i===retries-1) return null; }
  }
  return null;
};

// GASсЂФсЃЄсЃ╝сѓ┐сѓњТЏИсЂЇУЙ╝сѓђ
const sSet = async(k, v, retries=3) => {
  if (!GAS_READY) return;
  for(let i=0;i<retries;i++){
    try {
      // no-cors: GASсЂ«сЃфсЃђсѓцсЃгсѓ»сЃѕтЋЈжАїсѓњтЏъжЂ┐сђѓсЃгсѓ╣сЃЮсЃ│сѓ╣сЂ»УфГсѓЂсЂфсЂёсЂїТЏИсЂЇУЙ╝сЂ┐сЂ»ТѕљтіЪсЂЎсѓІ
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type': 'text/plain;charset=utf-8'},
        body: JSON.stringify({key: k, value: JSON.stringify(v), apiKey: GAS_API_KEY}),
      });
      return; // ТѕљтіЪ
    } catch {
      if(i<retries-1) await new Promise(r=>setTimeout(r,1500*(i+1)));
    }
  }
};

  const inFlight     = useRef(false); // сЃЮсЃ╝сЃфсЃ│сѓ░сЂ«тцџжЄЇуЎ║т░ёжў▓ТГб

  // РўЁтйбсЃЂсѓДсЃЃсѓ»: defсЂетљїуе«№╝ѕжЁЇтѕЌ/сѓфсЃќсѓИсѓДсѓ»сЃѕ№╝ЅсЂДсЂфсЂёт┐юуГћсЂ»тЈЇТўасЂЏсЂџУеўжї▓сЂЌсЂдуёАУдќсЂЎсѓІсђѓ
  //   GASсЂ«тљїТЎѓсѓбсѓ»сѓ╗сѓ╣ТииуиџсЂДуЋ░тйбсЂ«JSONсЂїУ┐ћсѓІсЂесѓ┐сѓцсЃасѓ╣сѓ▒сѓИсЃЦсЃ╝сЃФуГЅсЂ«УАеуц║сЂїСИИсЂћсЂеТХѕсЂѕсѓІсЂЪсѓЂ
  //   №╝ѕ2026-07-02 УАеуц║ТХѕтц▒сѓцсЃ│сѓисЃЄсЃ│сЃѕт»ЙуГќсђѓKyoshiТЅ┐УфЇсЂ«BLOCK-BтцЅТЏ┤№╝Ѕ
  const isPlainObj = x => x!==null && typeof x==='object' && !Array.isArray(x);
  const shapeOk = v => Array.isArray(def) ? Array.isArray(v) : (isPlainObj(def) ? isPlainObj(v) : true);
  const logShapeAnomaly = v => {
    try{
      const lk=STOR+'poll-anomaly';
      const arr=JSON.parse(localStorage.getItem(lk)||'[]');
      arr.push({ts:new Date().toLocaleString('ja-JP'),key,got:Array.isArray(v)?'array':typeof v,sample:JSON.stringify(v).slice(0,300)});
      localStorage.setItem(lk,JSON.stringify(arr.slice(-20)));
    }catch{}
    console.warn('[useShared] ТюЪтЙЁсЂеуЋ░сЂфсѓІтйбсЂ«т┐юуГћсѓњуёАУдќсЂЌсЂЙсЂЌсЂЪ:',key,v);
  };

  useEffect(() => {
    mounted.current = true;
    sGet(key).then(v => {
      if (!mounted.current) return;
      if (v !== null) {
        if (shapeOk(v)) { localRef.current = v; setVal(v); } // тѕЮТюЪсЃГсЃ╝сЃЅсЂ»тйбсЂїТГБсЂЌсЂЉсѓїсЂ░тЈЇТўа
        else logShapeAnomaly(v); // уЋ░тйбсЂ»defсЂ«сЂЙсЂЙУхитІЋсЂЌТгАсЂ«сЃЮсЃ╝сЃфсЃ│сѓ░сЂДУ┐йсЂёсЂцсЂЈ
      }
      initialized.current = true;
    }).catch(() => { initialized.current = true; });
    return () => {
      mounted.current = false;
      if (pollTimer.current)  clearInterval(pollTimer.current);
    };
  }, [key]);

  useEffect(() => {
    if (!GAS_READY) return;
    pollTimer.current = setInterval(() => {
      if (!mounted.current || !initialized.current) return; // writeCountсЃЂсѓДсЃЃсѓ»тЅіжЎцТИѕсЂ┐
      // РўЁжЮъУАеуц║сѓ┐сЃќсЂ»сЃЮсЃ╝сЃфсЃ│сѓ░тЂюТГб№╝ѕGASтљїТЎѓт«ЪУАїТЋ░сЂ«У▓аУЇиУ╗йТИЏсђѓ2026-06-13 KyoshiТЅ┐УфЇсЂ«BLOCK-BтцЅТЏ┤№╝Ѕ
      //   ућ╗жЮбтЙЕтИ░ТЎѓсЂ»visibilitychangeсЃЈсЃ│сЃЅсЃЕсЂїinspсѓњтЇ│ТЎѓтєЇтЈќтЙЌсЂЌсђЂС╗ќсѓГсЃ╝сѓѓТгАсЂ«сЃЮсЃ╝сЃфсЃ│сѓ░сЂДУ┐йсЂёсЂцсЂЈ
      if (document.visibilityState === 'hidden') return;
      // РўЁтЅЇтЏъсЂ«тЈќтЙЌсЂїТюфт«їС║єсЂфсѓЅС╗ітЏъсЂ»сѓ╣сѓГсЃЃсЃЌсђѓGASсЂїжЂЁсЂёТЎѓсЂФсЃфсѓ»сѓесѓ╣сЃѕсЂїуЕЇсЂ┐СИісЂїсЂБсЂд
      //   тљїТЎѓт«ЪУАїТЋ░сЂїжЏфсЂасѓІсЂЙт╝ЈсЂФУєесѓЅсѓђсЂ«сѓњжў▓сЂљ№╝ѕ2026-07-03 KyoshiТЅ┐УфЇсЂ«BLOCK-BтцЅТЏ┤№╝Ѕ
      if (inFlight.current) return;
      inFlight.current = true;
      sGet(key).then(v => {
        if (!mounted.current || v === null || writeCount.current > 0) return;
        if (!shapeOk(v)) { logShapeAnomaly(v); return; } // уЋ░тйбсЂ«т┐юуГћсЂ»УАеуц║сЂФтЈЇТўасЂЌсЂфсЂё
        const cur  = JSON.stringify(localRef.current);
        const next = JSON.stringify(v);
        if (cur !== next) {
          // idсЃЎсЃ╝сѓ╣сЃъсЃ╝сѓИ: сЃГсЃ╝сѓФсЃФсЂ«Тќ╣сЂїТќ░сЂЌсЂёсѓесЃ│сЃѕсЃфсЂ»С┐ЮТїЂ
          // РўЁ сЂЪсЂасЂЌтђцсЂїжЁЇтѕЌсЂ«сѓесЃ│сЃѕсЃф№╝ѕinspDataсЂ«ТЌЦС╗ўРєњУАїжЁЇтѕЌсЂфсЂЕ№╝ЅсЂ»сЃъсЃ╝сѓИсЂЌсЂфсЂё
          //    жЁЇтѕЌсѓњ{...arr}сЂДт▒ЋжќІсЂЎсѓІсЂесѓфсЃќсѓИсѓДсѓ»сЃѕсЂФсЂфсѓіfilter/mapсЂїтБісѓїсѓІсЂЪсѓЂ
          const local = localRef.current;
          if (local && typeof local==='object' && !Array.isArray(local) &&
              v   && typeof v   ==='object' && !Array.isArray(v)) {
            const mg = {...v};
            for (const cid of Object.keys(local)) {
              const lCar = local[cid]||{};
              const gCar = mg[cid]||{};
              // тђцсЂїжЁЇтѕЌсЂ«та┤тљѕсЂ»GASуЅѕсѓњсЂЮсЂ«сЂЙсЂЙСй┐сЂє№╝ѕсЃъсЃ╝сѓИсЂЌсЂфсЂё№╝Ѕ
              if(Array.isArray(lCar)||Array.isArray(gCar)){continue;}
              let merged = {...gCar};
              for (const day of Object.keys(lCar)) {
                if (!(day in gCar) || (lCar[day]?.id||0) > (gCar[day]?.id||0)) {
                  merged[day] = lCar[day];
                }
              }
              mg[cid] = merged;
            }
            localRef.current = mg; setVal(mg);
          } else {
            localRef.current = v; setVal(v);
          }
        }
      }).catch(() => {}).finally(() => { inFlight.current = false; });
    }, pollMs);
    return () => { if (pollTimer.current) clearInterval(pollTimer.current); };
  }, [key, pollMs]);

  const update = useCallback((fn) => {
    const next = typeof fn === 'function' ? fn(localRef.current) : fn;
    localRef.current = next;
    setVal(next);
    writeCount.current += 1;
    // РўЁС┐ЮтГўсЂћсЂесЂФуІгуФІсЂЌсЂЪсѓ┐сѓцсЃъсЃ╝сЂДТИЏу«ЌсЂЎсѓІсђѓС╗ЦтЅЇсЂ»уЏ┤тЅЇсЂ«сѓ┐сѓцсЃъсЃ╝сѓњclearсЂЌсЂдсЂёсЂЪсЂЪсѓЂсђЂ
    //   70уДњС╗ЦтєЁсЂФ2тЏъС╗ЦСИіС┐ЮтГўсЂЎсѓІсЂе writeCount сЂїТИЏсѓісЂЇсѓЅсЂџсђЂсЂЮсЂ«сѓГсЃ╝сЂ«сЃЮсЃ╝сЃфсЃ│сѓ░тЈЇТўасЂї
    //   сЃфсЃГсЃ╝сЃЅсЂЙсЂДтЂюТГбсЂЌсЂдсЂёсЂЪ№╝ѕ2026-07-02 KyoshiТЅ┐УфЇсЂ«BLOCK-BтцЅТЏ┤№╝Ѕ
    sSet(key, next).then(() => {
      setTimeout(() => { writeCount.current = Math.max(0, writeCount.current - 1); }, 70000);
    }).catch(() => {
      setTimeout(() => sSet(key, localRef.current).catch(() => {}), 1500);
      setTimeout(() => { writeCount.current = Math.max(0, writeCount.current - 1); }, 72000);
    });
  }, [key]);

  // GASТЏИсЂЇТѕ╗сЂЌсЂфсЂЌсЃ╗writeCountТЊЇСйюсЂфсЂЌсЂ«сЃГсЃ╝сѓФсЃФУАеуц║ТЏ┤Тќ░т░ѓуће
  // visibilitychangeсЂфсЂЕсђїУфГсЂ┐УЙ╝сѓЊсЂДУАеуц║сЂасЂЉТЏ┤Тќ░сЂЌсЂЪсЂёсђЇта┤жЮбсЂДСй┐уће
  const updateLocal = useCallback((v) => {
    const next = typeof v === 'function' ? v(localRef.current) : v;
    localRef.current = next;
    setVal(next);
  }, []);

  return [val, update, updateLocal];
}

  @keyframes modalIn{from{opacity:0;transform:scale(0.92) translateY(-16px)}to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

const SEC_INSP='sec-insp', SEC_SCHED='sec-sched', SEC_NOTES='sec-notes';
const scrollTo=(id)=>{
  if(id==='sec-top'){window.scrollTo({top:0,behavior:'smooth'});return;}
  const el=document.getElementById(id);
  if(!el)return;
  // sticky headerсЂ«жФўсЂЋтѕєсѓфсЃЋсѓ╗сЃЃсЃѕ
  const headerH=document.querySelector('header')?.offsetHeight||0;
  const top=el.getBoundingClientRect().top+window.scrollY-headerH-8;
  window.scrollTo({top,behavior:'smooth'});
};

// ============================================
//  угг2уЂФТЏюТЌЦсЃдсЃ╝сЃєсѓБсЃфсЃєсѓБ
// ============================================
// Т»јТюѕугг2уЂФТЏюТЌЦсѓњУ┐ћсЂЎ№╝ѕ1Тюѕ=0,5Тюѕ=4,8Тюѕ=7 сЂ»жЎцтцќ Рєњ null№╝Ѕ
const getSecondTuesdayExemptMonths = new Set([0,4,7]); // 1ТюѕсЃ╗5ТюѕсЃ╗8Тюѕ№╝ѕ0-indexed№╝Ѕ
const getSecondTuesday = (year, month) => {
  // month: 0-indexed
  if(getSecondTuesdayExemptMonths.has(month)) return null;
  let count=0;
  for(let d=1;d<=31;d++){
    const dt=new Date(year,month,d);
    if(dt.getMonth()!==month)break;
    if(dt.getDay()===2){count++;if(count===2)return d;}
  }
  return null;
};
const isSecondTuesdayHoliday = (year, month, day, overrideOpen) => {
  // угг2уЂФТЏюТЌЦсЂІсЂцжЎцтцќТюѕсЂДсЂфсЂЈсђЂсЂІсЂцтђІтѕЦсЂДсђїжђџтИИтќХТЦГсђЇСИіТЏИсЂЇсЂЋсѓїсЂдсЂёсЂфсЂё
  const d2 = getSecondTuesday(year, month);
  if(d2===null||d2!==day) return false;
  const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  if(overrideOpen && overrideOpen.includes(ds)) return false;
  return true;
};
const fmt = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

// ============================================
//  С╝ЉТЦГТЌЦУеГт«џсЃбсЃ╝сЃђсЃФ№╝ѕсѓФсЃгсЃ│сЃђсЃ╝жЂИТіът╝Ј№╝Ѕ
// ============================================
const HolidayModal=memo(({isOpen,onClose,closedDays,setClosedDays,closedDates,setClosedDates,overrideOpenDates,setOverrideOpenDates,vsStore})=>{
  const DOW_NAMES=['ТЌЦ','Тюѕ','уЂФ','Т░┤','Тюе','жЄЉ','тюЪ'];
  const today=new Date();
  const [viewYear,setViewYear]=useState(today.getFullYear());
  const [viewMonth,setViewMonth]=useState(today.getMonth());
  const [dragStart,setDragStart]=useState(null);
  const [dragEnd,setDragEnd]=useState(null);
  const [isDragging,setIsDragging]=useState(false);

  if(!isOpen) return null;

  const toggle=d=>setClosedDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]);

  // ТЌЦС╗ўТЊЇСйюсЃўсЃФсЃЉсЃ╝
  const addDate=(ds)=>{
    if(!closedDates.includes(ds)) setClosedDates(p=>[...p,ds].sort());
    // сѓѓсЂЌжђџтИИтќХТЦГСИіТЏИсЂЇСИГсЂфсѓЅУДБжЎц
    if(overrideOpenDates&&overrideOpenDates.includes(ds)) setOverrideOpenDates(p=>p.filter(x=>x!==ds));
  };
  const removeDate=(ds)=>setClosedDates(p=>p.filter(x=>x!==ds));
  const toggleOverrideOpen=(ds)=>{
    // угг2уЂФТЏюТЌЦсѓњсђїсЂЊсЂ«ТЌЦсЂасЂЉжђџтИИтќХТЦГсђЇсЂФсЂЎсѓІ№╝ЈТѕ╗сЂЎ
    setOverrideOpenDates(p=>p.includes(ds)?p.filter(x=>x!==ds):[...p,ds].sort());
    // С╗╗ТёЈС╝ЉТЦГсЂФтЁЦсЂБсЂдсЂёсѓїсЂ░тЅіжЎц
    if(closedDates.includes(ds)) setClosedDates(p=>p.filter(x=>x!==ds));
  };

  // сЃЅсЃЕсЃЃсѓ░у»ётЏ▓сЂ«тЁеТЌЦС╗ўсѓњтЈќтЙЌ
  const getDragDates=()=>{
    if(!dragStart||!dragEnd) return [];
    const s=new Date(dragStart);const e=new Date(dragEnd);
    const [from,to]=s<=e?[s,e]:[e,s];
    const res=[];let cur=new Date(from);
    while(cur<=to){res.push(fmt(cur.getFullYear(),cur.getMonth(),cur.getDate()));cur=new Date(cur);cur.setDate(cur.getDate()+1);}
    return res;
  };
  const applyDragDates=()=>{
    const dates=getDragDates();
    dates.forEach(ds=>{
      if(!closedDates.includes(ds)) setClosedDates(p=>[...p,ds].sort());
      if(overrideOpenDates&&overrideOpenDates.includes(ds)) setOverrideOpenDates(p=>p.filter(x=>x!==ds));
    });
  };

  // сѓФсЃгсЃ│сЃђсЃ╝ТЈЈућ╗
  const cy=viewYear,cm=viewMonth;
  const first=new Date(cy,cm,1).getDay();
  const daysInMonth=new Date(cy,cm+1,0).getDate();
  const weeks=[];let wk=Array(7).fill(null);
  for(let d=1;d<=daysInMonth;d++){

const SearchModal=memo(({isOpen,onClose,inspData,schedData,closedDays,closedDates,overrideOpenDates,onNavigate,inspLimits})=>{
  const [sType,setSType]=useState('insp');
  const [dows,setDows]=useState([]);
  const [fh,setFh]=useState('09');
  const [th,setTh]=useState('18');
  const [results,setResults]=useState([]);
  const [searched,setSearched]=useState(false);
  const DOW=['ТЌЦ','Тюѕ','уЂФ','Т░┤','Тюе','жЄЉ','тюЪ'];

  const doSearch=()=>{
    const found=[];
    const now=new Date();
    const end=new Date(now.getFullYear(),now.getMonth()+3,now.getDate());
    for(let cur=new Date(now);cur<=end&&found.length<30;cur.setDate(cur.getDate()+1)){
      const y=cur.getFullYear(),m=cur.getMonth(),d=cur.getDate(),dow=cur.getDay();
      if(closedDays.includes(dow)) continue;
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if(closedDates.includes(ds)) continue;
      if(isSecondTuesdayHoliday(y,m,d,Array.isArray(overrideOpenDates)?overrideOpenDates:[])) continue;
      if(dows.length>0&&!dows.includes(dow)) continue;
      const dk=dateKey(y,m,d);
      if(sType==='insp'){
        const _limit=(inspLimits&&inspLimits[dk]!=null)?inspLimits[dk]:6;
        const rows=Array.from({length:_limit},(_,i)=>(inspData[dk]||[])[i]||null);
        const emptyIdx=rows.findIndex(r=>!r?.name);
        const empCnt=rows.filter(r=>!r?.name).length;
        if(emptyIdx>=0) found.push({y,m,d,dk,dow,label:`${m+1}/${d}№╝ѕ${DOW[dow]}№╝Ѕ`,detail:`уЕ║сЂЇ${empCnt}тЈ░`,type:'insp',slot:null,emptyIdx});
      } else {
        for(const slot of TIME_SLOTS){
          if(found.length>=30) break;
          const [h]=slot.split(':').map(Number);
          if(h<parseInt(fh)||h>parseInt(th)) continue;
          if(!(schedData[dk]?.[slot]?.name)) found.push({y,m,d,dk,dow,label:`${m+1}/${d}№╝ѕ${DOW[dow]}№╝Ѕ`,detail:slot,type:'sched',slot});
        }
      }
    }
    setResults(found);setSearched(true);
  };

  if(!isOpen) return null;
  const HO=Array.from({length:10},(_,i)=>String(9+i).padStart(2,'0'));
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:2500,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="modal-box" style={{background:'white',borderRadius:16,padding:'26px 26px',width:'min(600px,95vw)',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <h2 style={{fontSize:17,fontWeight:800,color:'white',margin:0}}>­ЪћЇ уЕ║сЂЇТъаТцюу┤б</h2>
          <button onClick={onClose} style={{background:'#f3f4f6',border:'none',borderRadius:'50%',width:32,height:32,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><X size={16}/></button>
        </div>
        <div style={{display:'flex',gap:9,marginBottom:14}}>
          {[{v:'insp',l:'­ЪџЌ У╗іТцю'},{v:'sched',l:'РЈ░ сѓ╣сѓ▒сѓИсЃЦсЃ╝сЃФ'}].map(t=>(
            <button key={t.v} onClick={()=>{setSType(t.v);setSearched(false);}} style={{flex:1,padding:'9px',borderRadius:7,border:`2px solid ${sType===t.v?'#c2410c':'#e5e7eb'}`,background:sType===t.v?'#eef2ff':'white',color:sType===t.v?'#c2410c':'#374151',fontWeight:700,cursor:'pointer'}}>{t.l}</button>
          ))}
        </div>
        <p style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:7}}>тИїТюЏТЏюТЌЦ№╝ѕТюфжЂИТіъ=тЁеТЌЦ№╝Ѕ</p>
        <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:13}}>
          {DOW.map((n,i)=><button key={i} onClick={()=>setDows(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i])} style={{padding:'6px 11px',borderRadius:6,border:`2px solid ${dows.includes(i)?'#c2410c':'#e5e7eb'}`,background:dows.includes(i)?'#eef2ff':'white',color:dows.includes(i)?'#c2410c':'#374151',fontWeight:700,cursor:'pointer',fontSize:12}}>{n}</button>)}
        </div>
        {sType==='sched'&&(
          <div style={{marginBottom:13}}>
            <p style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:7}}>тИїТюЏТЎѓжќЊтИ»</p>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <select value={fh} onChange={e=>setFh(e.target.value)} style={{padding:'7px',border:'2px solid #e5e7eb',borderRadius:6,fontSize:13,outline:'none'}}>
                {HO.map(h=><option key={h} value={h}>{h}:00</option>)}
              </select>
              <span style={{fontWeight:700}}>сђю</span>
              <select value={th} onChange={e=>setTh(e.target.value)} style={{padding:'7px',border:'2px solid #e5e7eb',borderRadius:6,fontSize:13,outline:'none'}}>
                {HO.map(h=><option key={h} value={h}>{h}:00</option>)}
              </select>
            </div>
          </div>
        )}
        <button onClick={doSearch} style={{width:'100%',padding:'11px 0',background:'linear-gradient(135deg,#c2410c,#ea580c)',color:'white',border:'none',borderRadius:9,fontWeight:700,cursor:'pointer',marginBottom:14}}>
          ­ЪћЇ Тцюу┤б№╝ѕ3сЃХТюѕтЁѕсЃ╗ТюђтцД30С╗Х№╝Ѕ
        </button>
        {searched&&(
          <div className="fade-in">
            {results.length===0
              ?<div style={{textAlign:'center',padding:'20px',color:'#6b7280'}}>уЕ║сЂЇТъасЂїУдІсЂцсЂІсѓісЂЙсЂЏсѓЊсЂДсЂЌсЂЪ</div>
              :<>
                <p style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:7}}>Тцюу┤бухљТъю {results.length}С╗Х</p>
                <div style={{maxHeight:280,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
                  {results.map((r,i)=>(
                    <button key={i} onClick={()=>{onNavigate(r);onClose();}}
                      style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 13px',background:'#f8fafc',border:'2px solid #e2e8f0',borderRadius:8,cursor:'pointer',textAlign:'left'}}
                      onMouseEnter={e=>{e.currentTarget.style.background='#eef2ff';e.currentTarget.style.borderColor='#c2410c';}}
                      onMouseLeave={e=>{e.currentTarget.style.background='#f8fafc';e.currentTarget.style.borderColor='#e2e8f0';}}>
                      <div><span style={{fontWeight:700,color:'white',marginRight:9}}>{r.label}</span><span style={{fontSize:12,color:'#6b7280'}}>{r.detail}</span></div>
                      <span style={{fontSize:12,color:'#c2410c',fontWeight:700}}>Рєњ уД╗тІЋ</span>
                    </button>

              </>
            }
          </div>
        )}
      </div>
    </div>
  );
});

//  сѓ╣сѓ┐сЃЃсЃЋС╝ЉТЌЦсЃ╗ТюЅухдсѓФсЃгсЃ│сЃђсЃ╝сЃбсЃ╝сЃђсЃФ

const StaffCalendarModal=memo(({isOpen,onClose,initMonth,currentUser,
  dynStaffH,dynStaffS,
  dayOffDataH,setDayOffDataH,dayOffDataS,setDayOffDataS,
  paidLeaveDataH,setPaidLeaveDataH,paidLeaveDataS,setPaidLeaveDataS,
  closedDaysH,closedDaysS,closedDatesH,closedDatesS,overrideOpenDates})=>{
  const [calStore,setCalStore]=useState('honten');
  const [selStaff,setSelStaff]=useState(null);
  const [selType,setSelType]=useState('dayoff');
  const [calMonth,setCalMonth]=useState(null);

  useEffect(()=>{
    if(isOpen){
      // сЃГсѓ░сѓцсЃ│сЃдсЃ╝сѓХсЃ╝сЂ«т║ЌУѕЌсѓњтѕЮТюЪжЂИТіъ
      const userStoreId=currentUser?.store?.id||'honten';
      setCalStore(userStoreId);
      setCalMonth(initMonth||new Date());
      // сЃГсѓ░сѓцсЃ│сЃдсЃ╝сѓХсЃ╝сѓњтѕЮТюЪжЂИТіъ№╝ѕУЄфтѕєсЂ«С╝ЉТЌЦсѓњсЂЎсЂљуиежЏєсЂДсЂЇсѓІсѓѕсЂєсЂФ№╝Ѕ

      setSelType('dayoff');

  if(!isOpen||!calMonth)return null;

  const cy=calMonth.getFullYear(),cm=calMonth.getMonth();
  const staffList=(calStore==='honten'?(dynStaffH&&dynStaffH.length>0?dynStaffH:DEFAULT_STAFF_HONTEN):(dynStaffS&&dynStaffS.length>0?dynStaffS:DEFAULT_STAFF_SANDA))
    .filter(s=>s.badge!=='president'&&s.myNumber!==0);
  const storeObj=STORES.find(s=>s.id===calStore);
  const _rawDayOff =calStore==='honten'?dayOffDataH  :dayOffDataS;
  const _rawPleave =calStore==='honten'?paidLeaveDataH  :paidLeaveDataS;
  // тљёТЌЦС╗ўсЂ«тђцсЂїжЁЇтѕЌсЂДсЂфсЂЉсѓїсЂ░[]сЂФТГБУдЈтїќ
  const dayOffData = Object.fromEntries(Object.entries(_rawDayOff||{}).map(([k,v])=>[k,Array.isArray(v)?v:[]]));
  const setDayOffData=calStore==='honten'?setDayOffDataH:setDayOffDataS;
  const pleaveData = Object.fromEntries(Object.entries(_rawPleave||{}).map(([k,v])=>[k,Array.isArray(v)?v:[]]));
  const setPleaveData=calStore==='honten'?setPaidLeaveDataH:setPaidLeaveDataS;

  // т║ЌУѕЌС╝ЉТЦГТЌЦтѕцт«џ№╝ѕт║ЌУѕЌтѕЦclosedDays + СИАт║ЌтЁ▒жђџclosedDates + угг2уЂФТЏю№╝Ѕ
  const storeCDays = Array.isArray(calStore==='honten'?closedDaysH:closedDaysS)
    ? (calStore==='honten'?closedDaysH:closedDaysS) : [];
  const storeCDates = Array.isArray(calStore==='honten'?closedDatesH:closedDatesS)
    ? (calStore==='honten'?closedDatesH:closedDatesS) : [];
  const ovOpen = Array.isArray(overrideOpenDates)?overrideOpenDates:[];
  const isStoreClosed=(year,month,day)=>{
    const dt=new Date(year,month,day);
    if(storeCDays.includes(dt.getDay()))return true;
    const ds=fmt(year,month,day);
    if(storeCDates.includes(ds))return true;
    if(isSecondTuesdayHoliday(year,month,day,ovOpen))return true;
    return false;
  };

  const handleDayClick=(dkk,year,month,day)=>{
    if(!selStaff)return;
    if(isStoreClosed(year,month,day))return; // т║ЌС╝ЉТЌЦсЂ»ТЊЇСйюСИЇтЈ»
    if(selType==='dayoff'){
      const cur=dayOffData[dkk]||[];
      if(cur.includes(selStaff)){
        setDayOffData(p=>({...p,[dkk]:(p[dkk]||[]).filter(n=>n!==selStaff)}));
      }else{
        setPleaveData(p=>({...p,[dkk]:(p[dkk]||[]).filter(n=>n!==selStaff)}));
        setDayOffData(p=>({...p,[dkk]:[...(p[dkk]||[]),selStaff]}));
      }
    }else{
      const cur=pleaveData[dkk]||[];
      if(cur.includes(selStaff)){
        setPleaveData(p=>({...p,[dkk]:(p[dkk]||[]).filter(n=>n!==selStaff)}));
      }else{
        setDayOffData(p=>({...p,[dkk]:(p[dkk]||[]).filter(n=>n!==selStaff)}));
        setPleaveData(p=>({...p,[dkk]:[...(p[dkk]||[]),selStaff]}));
      }
    }
  };

  const daysInMonth=new Date(cy,cm+1,0).getDate();

  for(let d=1;d<=daysInMonth;d++){
    const dow=(first+d-1)%7;wk[dow]=d;
    if(dow===6){weeks.push([...wk]);wk=Array(7).fill(null);}
  }
  if(wk.some(x=>x!==null))weeks.push([...wk]);
  const DOW2=['ТЌЦ','Тюѕ','уЂФ','Т░┤','Тюе','жЄЉ','тюЪ'];

  // ТюѕТгАжЏєУеѕ№╝ѕт║ЌУѕЌС╝ЉТЦГТЌЦсЂ»сѓ╣сѓ┐сЃЃсЃЋС╝ЉТЌЦсЂФсѓФсѓдсЃ│сЃѕ№╝Ѕ
  const monthlySummary=staffList.map(s=>{
    let offs=0,leaves=0;

      const dkk=`${cy}-${cm+1}-${d}`;
      if(isStoreClosed(cy,cm,d)){offs++;continue;} // т║ЌС╝ЉТЌЦсЂ»сѓ╣сѓ┐сЃЃсЃЋС╝ЉТЌЦсЂесЂЌсЂдсѓФсѓдсЃ│сЃѕ
      if((dayOffData[dkk]||[]).includes(s.name))offs++;
      if((pleaveData[dkk]||[]).includes(s.name))leaves++;
    }
    return{name:s.name,offs,leaves};
  }).filter(s=>s.offs>0||s.leaves>0);

  const today=new Date();

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:2500,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="modal-box"
        style={{background:'white',borderRadius:16,width:'min(900px,97vw)',maxHeight:'94vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 24px 80px rgba(0,0,0,0.4)'}}>

        {/* сЃўсЃЃсЃђсЃ╝ */}
        <div style={{padding:'14px 20px',background:`linear-gradient(135deg,${storeObj.color},${storeObj.accent})`,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div style={{color:'white',fontWeight:800,fontSize:15}}>­ЪЈќ сѓ╣сѓ┐сЃЃсЃЋС╝ЉТЌЦсЃ╗ТюЅухдсѓФсЃгсЃ│сЃђсЃ╝</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {STORES.map(s=>(
              <button key={s.id} onClick={()=>{setCalStore(s.id);// т║ЌУѕЌтѕЄсѓіТЏ┐сЂѕТЎѓ№╝џУЄфтѕєсЂ«т║ЌУѕЌсЂфсѓЅУЄфтѕєсѓњтєЇжЂИТіъсђЂС╗ќт║ЌУѕЌсЂфсѓЅтЁетЊАУАеуц║
                const nextStaff=(s.id===currentUser?.store?.id)?currentUser?.name||null:null;
                setSelStaff(nextStaff);}}
                style={{padding:'5px 13px',borderRadius:6,border:'2px solid rgba(255,255,255,0.5)',
                  background:calStore===s.id?'rgba(255,255,255,0.3)':'transparent',
                  color:'white',fontWeight:calStore===s.id?800:500,fontSize:12,cursor:'pointer'}}>
                {s.name}
              </button>
            ))}
            <button onClick={onClose} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',color:'white',display:'flex',alignItems:'center',justifyContent:'center'}}><X size={14}/></button>
          </div>
        </div>

        {/* сѓ╣сѓ┐сЃЃсЃЋжЂИТіъ + уе«жАъ */}
        <div style={{padding:'11px 20px',background:'#f8fafc',borderBottom:'1px solid #e5e7eb',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:selStaff?8:0}}>
            <span style={{fontSize:11,fontWeight:700,color:'#374151',flexShrink:0}}>сѓ╣сѓ┐сЃЃсЃЋ№╝џ</span>

// ============================================
//  У╗іТцютЈ░ТЋ░тѕХжЎљсЃбсЃ╝сЃђсЃФ
// ============================================
const InspLimitModal=memo(({isOpen,onClose,curMonth,inspLimits,onSave})=>{
  const today=new Date();
  const defDate=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const [selDate,setSelDate]=useState(defDate);
  const [limitCount,setLimitCount]=useState(3);

  useEffect(()=>{
    if(isOpen){
      setSelDate(defDate);
      setLimitCount(3);
    }
  },[isOpen]);

  if(!isOpen)return null;

  // inspLimitsсЂ«тЁесѓесЃ│сЃѕсЃфсѓњТЌЦС╗ўжаєсЂФсѓйсЃ╝сЃѕсЂЌсЂдУАеуц║№╝ѕС╗іТЌЦС╗ЦжЎЇсЂ«сЂ┐№╝Ѕ
  const todayNum=(()=>{const t=new Date();return t.getFullYear()*10000+(t.getMonth()+1)*100+t.getDate();})();
  const allLimits=Object.entries(inspLimits)
    .map(([dk,limit])=>{
      const parts=dk.split('-').map(Number);
      const [y,m,d]=[parts[0],parts[1],parts[2]];
      const num=y*10000+m*100+d;
      return{dk,y,m,d,num,limit};
    })
    .filter(({num})=>num>=todayNum)
    .sort((a,b)=>a.num-b.num);

  // ТЌЦС╗ўТќЄтГЌтѕЌРєњdkтцЅТЈЏ
  const dateToDk=(dateStr)=>{
    if(!dateStr)return null;
    const [y,m,d]=dateStr.split('-').map(Number);
    return `${y}-${m}-${d}`;
  };

  const handleSave=()=>{
    const dk=dateToDk(selDate);
    if(!dk){alert('ТЌЦС╗ўсѓњжЂИТіъсЂЌсЂдсЂЈсЂасЂЋсЂё');return;}
    onSave(dk,limitCount);
  };
  const handleRemove=()=>{
    const dk=dateToDk(selDate);
    if(!dk)return;
    onSave(dk,null); // nullсЂДтѕХжЎљУДБжЎц
  };
  const selectedDk=dateToDk(selDate);
  const currentLimit=selectedDk?inspLimits[selectedDk]:undefined;

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="modal-box"
        style={{background:'white',borderRadius:16,padding:'24px 28px',width:'min(480px,94vw)',boxShadow:'0 20px 60px rgba(0,0,0,0.3)',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div>
            <div style={{fontWeight:800,fontSize:16,color:'white'}}>­ЪџЌ У╗іТцютЈ░ТЋ░тѕХжЎљУеГт«џ</div>
            <div style={{fontSize:12,color:'#6b7280',marginTop:2}}>жђџтИИсЂ»6тЈ░/ТЌЦсђѓсѓ╣сѓ┐сЃЃсЃЋТЋ░сЂїт░ЉсЂфсЂёТЌЦсЂФтѕХжЎљсѓњУеГт«џсЂДсЂЇсЂЙсЂЎ</div>
          </div>
          <button onClick={onClose} style={{background:'#f3f4f6',border:'none',borderRadius:'50%',width:32,height:32,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><X size={16}/></button>
        </div>

        {/* тѕХжЎљсЂЎсѓІТЌЦС╗ў */}
        <div style={{marginBottom:18}}>
          <label style={{display:'block',fontWeight:700,fontSize:13,color:'#374151',marginBottom:7}}>­ЪЊЁ тѕХжЎљсЂЎсѓІТЌЦС╗ў</label>
          <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)}
            style={{width:'100%',padding:'9px 12px',border:'2px solid #d1d5db',borderRadius:8,fontSize:14,outline:'none',boxSizing:'border-box'}}/>
          {currentLimit!=null&&(
            <div style={{marginTop:5,padding:'5px 10px',background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:6,fontSize:11,color:'#dc2626',fontWeight:700}}>
              сЂЊсЂ«ТЌЦсЂ»уЈЙтюе ТюђтцД{currentLimit}тЈ░ сЂФтѕХжЎљсЂЋсѓїсЂдсЂёсЂЙсЂЎ
            </div>
          )}
        </div>

        {/* ТюђтцДтЈ░ТЋ░сѓ╗сЃгсѓ»сѓ┐сЃ╝ */}
        <div style={{marginBottom:20}}>
          <label style={{display:'block',fontWeight:700,fontSize:13,color:'#374151',marginBottom:7}}>­ЪџЌ ТюђтцДтЈ░ТЋ░№╝ѕ0сђю6тЈ░№╝Ѕ</label>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {[0,1,2,3,4,5,6].map(n=>{
              const isZero=n===0;
              const isSix=n===6;
              const active=limitCount===n;
              return(
                <button key={n} onClick={()=>setLimitCount(n)}
                  style={{flex:'1 1 0',minWidth:40,padding:'11px 0',borderRadius:9,
                    border:`2px solid ${active?(isZero?'#7c3aed':isSix?'#059669':'#dc2626'):'#d1d5db'}`,
                    background:active?(isZero?'#ede9fe':isSix?'#d1fae5':'#fee2e2'):'white',
                    color:active?(isZero?'#7c3aed':isSix?'#059669':'#dc2626'):'#6b7280',
                    fontWeight:active?900:600,fontSize:16,cursor:'pointer',transition:'all 0.12s',position:'relative'}}>
                  {n}
                  {isZero&&<div style={{fontSize:8,color:active?'#7c3aed':'#9ca3af',fontWeight:700,lineHeight:1.1}}>тЁеудЂТГб</div>}
                  {isSix&&<div style={{fontSize:8,color:active?'#059669':'#9ca3af',fontWeight:700,lineHeight:1.1}}>жђџтИИ</div>}
                </button>
              );
            })}
          </div>
          <div style={{marginTop:7,fontSize:11,color:'#6b7280',textAlign:'center'}}>
            0 = У╗іТцюСИЇтЈ»№╝ѕтЁеудЂТГб№╝Ѕсђђ6 = жђџтИИжђџсѓі№╝ѕтѕХжЎљсЂфсЂЌТЅ▒сЂё№╝ЅсђђтѕХжЎљУДБжЎцсЂ»сђїтѕХжЎљУДБжЎцсђЇсЃюсѓ┐сЃ│
          </div>
        </div>

        {/* сЃюсѓ┐сЃ│ */}
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          <button onClick={handleSave}
            style={{flex:1,padding:'11px 0',background:'linear-gradient(135deg,#ef4444,#dc2626)',color:'white',border:'none',borderRadius:9,fontWeight:800,fontSize:14,cursor:'pointer'}}>
            РюЊ тЈ░ТЋ░тѕХжЎљсѓњУеГт«џ
          </button>
          {currentLimit!=null&&(
            <button onClick={handleRemove}
              style={{padding:'11px 14px',background:'#f3f4f6',border:'none',borderRadius:9,fontWeight:600,cursor:'pointer',fontSize:12,color:'#6b7280'}}>
              тѕХжЎљУДБжЎц
            </button>
          )}
          <button onClick={onClose}
            style={{padding:'11px 14px',background:'#f3f4f6',border:'none',borderRadius:9,fontWeight:600,cursor:'pointer',fontSize:12}}>
            Тѕ╗сѓІ
          </button>
        </div>

        {/* УеГт«џТИѕсЂ┐тЈ░ТЋ░тѕХжЎљСИђУдД№╝ѕС╗іТЌЦС╗ЦжЎЇ№╝Ѕ */}
        {allLimits.length>0&&(
          <div style={{borderTop:'1px solid #e5e7eb',paddingTop:14}}>
            <div style={{fontWeight:700,fontSize:12,color:'#374151',marginBottom:8}}>­ЪЊІ тЈ░ТЋ░тѕХжЎљУеГт«џСИђУдД№╝ѕС╗іТЌЦС╗ЦжЎЇ№╝Ѕ</div>
            <div style={{display:'flex',flexDirection:'column',gap:5,maxHeight:200,overflowY:'auto'}}>
              {allLimits.map(({dk,y,m,d,limit})=>(
                <div key={dk} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 10px',background:'#fff1f2',border:'1px solid #fecaca',borderRadius:7}}>
                  <span style={{fontSize:12,fontWeight:700,color:'#374151'}}>{y}т╣┤{m}Тюѕ{d}ТЌЦ</span>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{padding:'2px 10px',background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:20,fontSize:11,fontWeight:700,color:'#dc2626'}}>ТюђтцД{limit}тЈ░</span>
                    <button onClick={()=>onSave(dk,null)}
                      style={{fontSize:10,color:'#9ca3af',background:'none',border:'none',cursor:'pointer',padding:'2px 4px',fontWeight:600}}>
                      УДБжЎц├Ќ
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
});

// ============================================
//  С║ѕу┤ётЁЦтіЏсЃбсЃ╝сЃђсЃФ№╝ѕтидсѓ╣сЃЕсѓцсЃЅсЃЉсЃЇсЃФ№╝Ѕ
//  isNew=true Рєњ уЕ║ТгёсЃЋсѓЕсЃ╝сЃат╝итѕХсЃ╗тЅіжЎцсЃюсѓ┐сЃ│жЮъУАеуц║
//  isNew=false Рєњ ТЌбтГўсЃЄсЃ╝сѓ┐УфГсЂ┐УЙ╝сЂ┐сЃ╗тЅіжЎцсЃюсѓ┐сЃ│УАеуц║
// ============================================
// ============================================
//  сѓ»сѓцсЃЃсѓ»сѓбсѓцсЃєсЃауиежЏєсЃбсЃ╝сЃђсЃФ
// ============================================
const SetItemEditModal=memo(({isOpen,onClose,items,onSave,title})=>{
  const [list,setList]=useState([]);
  const [editIdx,setEditIdx]=useState(null);
  const [editLabel,setEditLabel]=useState('');
  const [editText,setEditText]=useState('');
  const [newLabel,setNewLabel]=useState('');
  const [newText,setNewText]=useState('');

  useEffect(()=>{if(isOpen){setList([...items]);setEditIdx(null);setNewLabel('');setNewText('');}  },[isOpen,items]);
  if(!isOpen)return null;

  const startEdit=(idx)=>{setEditIdx(idx);setEditLabel(list[idx].label);setEditText(list[idx].text||'');};
  const confirmEdit=()=>{if(!editLabel.trim())return;setList(p=>{const n=[...p];n[editIdx]={...n[editIdx],label:editLabel.trim(),text:editText};return n;});setEditIdx(null);};
  const moveUp=(i)=>{if(i===0)return;setList(p=>{const n=[...p];[n[i-1],n[i]]=[n[i],n[i-1]];return n;});};
  const moveDown=(i)=>{setList(p=>{if(i>=p.length-1)return p;const n=[...p];[n[i],n[i+1]]=[n[i+1],n[i]];return n;});};
  const deleteItem=(i)=>{setList(p=>p.filter((_,j)=>j!==i));};
  const addItem=()=>{
    if(!newLabel.trim())return;
    setList(p=>[...p,{id:`si_${Date.now()}`,label:newLabel.trim(),text:newText}]);
    setNewLabel('');setNewText('');
  };

  return(

// РћђРћђ У╗іТцюсѓФсЃгсЃ│сЃђсЃ╝сЃћсЃЃсѓФсЃ╝№╝ѕжАДт«бсЃфсѓ╣сЃѕсЃбсЃ╝сЃђсЃФуће№╝ЅРћђРћђ
const InspCalendarPicker=memo(({form,setForm,bmInspData,bmClosedDays,bmClosedDates,bmOverrideOpen,bmInspLimits})=>{
  const [calMonth,setCalMonth]=useState(()=>{
    if(form._bookingDate){const p=form._bookingDate.split('-');return new Date(Number(p[0]),Number(p[1])-1,1);}
    return new Date();
  });
  const cy=calMonth.getFullYear(),cm=calMonth.getMonth();
  const daysInMonth=new Date(cy,cm+1,0).getDate();
  const first=new Date(cy,cm,1).getDay();
  const weeks=[];let wk=Array(7).fill(null);
  for(let d=1;d<=daysInMonth;d++){
    const dow=(first+d-1)%7;wk[dow]=d;
    if(dow===6){weeks.push([...wk]);wk=Array(7).fill(null);}
  }
  if(wk.some(x=>x!==null))weeks.push([...wk]);
  const getDk=d=>`${cy}-${cm+1}-${d}`;
  const getCount=d=>{
    const rows=(bmInspData&&bmInspData[getDk(d)])||[];
    return rows.filter(r=>r&&r.name&&!r.pendingApproval&&r.bookingStatus!=='cancelled').length;
  };
  const getLimit=d=>(bmInspLimits&&bmInspLimits[getDk(d)])||6;
  const isClosed=d=>{
    const date=new Date(cy,cm,d);
    const days=Array.isArray(bmClosedDays)?bmClosedDays:[];
    const dates=Array.isArray(bmClosedDates)?bmClosedDates:[];
    const ov=Array.isArray(bmOverrideOpen)?bmOverrideOpen:[];
    if(days.includes(date.getDay()))return true;
    const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(dates.includes(ds))return true;
    return false;
  };
  const DOW_CAL=['ТЌЦ','Тюѕ','уЂФ','Т░┤','Тюе','жЄЉ','тюЪ'];
  const today=new Date();
  return(
    <div style={{border:'2px solid #e5e7eb',borderRadius:9,overflow:'hidden',fontSize:11}}>
      {/* сЃісЃЊ */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'#f8fafc',borderBottom:'1px solid #e5e7eb'}}>
        <button onClick={()=>setCalMonth(new Date(cy,cm-1,1))}
          style={{padding:'3px 10px',border:'1px solid #d1d5db',borderRadius:6,background:'white',cursor:'pointer',fontSize:13}}>Рђ╣</button>
        <span style={{fontWeight:800,color:'white',fontSize:13}}>{cy}т╣┤{cm+1}Тюѕ</span>
        <button onClick={()=>setCalMonth(new Date(cy,cm+1,1))}
          style={{padding:'3px 10px',border:'1px solid #d1d5db',borderRadius:6,background:'white',cursor:'pointer',fontSize:13}}>Рђ║</button>
      </div>
      {/* ТЏюТЌЦсЃўсЃЃсЃђсЃ╝ */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',background:'#eef2ff',borderBottom:'1px solid #e5e7eb'}}>
        {DOW_CAL.map((d,i)=>(
          <div key={d} style={{textAlign:'center',padding:'5px 0',fontWeight:700,fontSize:11,
            color:i===0?'#dc2626':i===6?'#2563eb':'#374151'}}>{d}</div>
        ))}
      </div>
      {/* жђ▒сѓ░сЃфсЃЃсЃЅ */}
      {weeks.map((wk,wi)=>(
        <div key={wi} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
          {wk.map((d,di)=>{
            if(!d)return<div key={di} style={{minHeight:52,borderTop:'1px solid #f3f4f6',borderLeft:di>0?'1px solid #f3f4f6':'none',background:'#f9fafb'}}/>;
            const cnt=getCount(d);
            const lmt=getLimit(d);
            const closed=isClosed(d);
            const isToday=d===today.getDate()&&cm===today.getMonth()&&cy===today.getFullYear();
            const dateStr=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isSel=form._bookingDate===dateStr;
            const isFull=cnt>=lmt;
            const numColor=di===0?'#dc2626':di===6?'#2563eb':'#111';
            let bg='white';
            if(isSel)bg='#dbeafe';
            else if(closed)bg='repeating-linear-gradient(45deg,#f9fafb,#f9fafb 3px,#f3f4f6 3px,#f3f4f6 6px)';
            else if(isFull)bg='#fef2f2';
            return(
              <div key={di}
                onClick={()=>{if(!closed)setForm({...form,_bookingDate:dateStr});}}
                style={{minHeight:52,padding:'4px 3px',cursor:closed?'not-allowed':'pointer',
                  borderTop:'1px solid #f3f4f6',borderLeft:di>0?'1px solid #f3f4f6':'none',
                  background:bg,
                  outline:isSel?'2px solid #2563eb':isToday?'2px solid #93c5fd':'none',
                  position:'relative'}}>
                <div style={{textAlign:'center',fontWeight:isToday?900:700,fontSize:12,
                  color:isSel?'#1d4ed8':closed?'#9ca3af':numColor}}>{d}</div>
                {!closed&&(
                  <div style={{textAlign:'center',marginTop:2}}>
                    <span style={{fontSize:10,fontWeight:700,
                      color:isFull?'#dc2626':cnt>=lmt-1?'#d97706':'#059669'}}>
                      {cnt}/{lmt}тЈ░
                    </span>
                  </div>
                )}
                {closed&&<div style={{textAlign:'center',fontSize:9,color:'#9ca3af'}}>С╝Љ</div>}
                {isSel&&<div style={{position:'absolute',top:2,right:2,width:6,height:6,borderRadius:'50%',background:'#2563eb'}}/>}
              </div>
            );
          })}
        </div>
      ))}
      {/* тЄАСЙІ */}
      <div style={{display:'flex',gap:10,padding:'6px 10px',background:'#f8fafc',borderTop:'1px solid #e5e7eb',flexWrap:'wrap'}}>
        <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:'#059669'}}>РЌЈуЕ║сЂЇ</span>
        <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:'#d97706'}}>РЌЈТ«Іт░Љ</span>
        <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:'#dc2626'}}>РЌЈТ║ђ</span>
        <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:'#9ca3af'}}>С╝ЉС╝ЉТЦГТЌЦ</span>
      </div>
    </div>
  );
});

const BookingModal=memo(({isOpen,onClose,type,initialData,isNew,dateLabel,timeSlot,onSave,onDelete,onDateChange,onOpenLoanerPicker,pendingLoanerId,pendingRentalId,pendingRentalRec,rentalCarsData,loanerRes,modalDk,modalIdx:modalIdxProp,onDeleteLoaner,currentUser,setItems,onOpenSetItemEdit,allCars,fromCustList,savedModalData,inspData:bmInspData,closedDays:bmClosedDays,closedDates:bmClosedDates,overrideOpenDates:bmOverrideOpen,inspLimits:bmInspLimits})=>{
  const [form,setForm]=useState(initialData);
  const [staffInput,setStaffInput]=useState('');
  const [showStaff,setShowStaff]=useState(false);
  const nameRef=useRef(null);
  const staffRef=useRef(null);
  const carRef=useRef(null);
  const workRef=useRef(null);      // СйюТЦГтєЁт«╣№╝ѕТЋ┤тѓЎ№╝Ѕ
  const tokutenRef=useRef(null);   // уЅ╣тЁИ№╝ѕУ╗іТцю№╝Ѕ
  const shimiRef=useRef(null);     // ТїЄсЃ╗УдІ№╝ѕТЋ┤тѓЎ№╝Ѕ
  const timeRef=useRef(null);
  const noteRef=useRef(null);
  const contRef=useRef(null);

  // сѓГсЃ╝сЃюсЃ╝сЃЅТЊЇСйюућеstate№╝ѕт┐ЁсЂџreturnсѓѕсѓітЅЇсЂФт«џуЙЕ№╝Ѕ
  const [kbField,setKbField]=useState('');
  const [showTmPk,setShowTmPk]=useState(false);
  const [showWkPk,setShowWkPk]=useState(false);
  const [showShPk,setShowShPk]=useState(false);
  const [showDatePicker,setShowDatePicker]=useState(false);
  // сЃбсЃ╝сЃђсЃФсѓфсЃ╝сЃЌсЃ│ТЎѓсЂФтЁЃсЂ«dkсѓњС┐ЮТїЂ
  useEffect(()=>{ if(isOpen){ originalDkRef.current=''; localTargetDkRef.current=''; } },[isOpen]);
  const [pickerMonth,setPickerMonth]=useState(null);
  const localTargetDkRef=useRef('');
  const originalDkRef=useRef('');

  // тљїсЂўС║ѕу┤ёсЂІсЂЕсЂєсЂІсѓњсѓГсЃ╝сЂДтѕцт«џ№╝ѕС╗БУ╗ісЃћсЃЃсѓФсЃ╝тЙђтЙЕсЂфсЂЕсЂДсЃфсѓ╗сЃЃсЃѕсЂЌсЂфсЂёсЂЪсѓЂ№╝Ѕ
  const makeKey=(d)=>d?`${d._idx??'none'}|${d._slot??'none'}|${d.name??''}`:'';
  const prevKeyRef=useRef('');
  const prevOpenRef=useRef(false);

  useEffect(()=>{
    if(!isOpen){prevOpenRef.current=false;return;}
    const justOpened=!prevOpenRef.current;
    const curKey=makeKey(initialData);
    const sameBooking=curKey===prevKeyRef.current;
    prevOpenRef.current=true;
    prevKeyRef.current=curKey;

    // тљїсЂўС║ѕу┤ёсЂ«тєЇopen№╝ѕС╗БУ╗ісЃћсЃЃсѓФсЃ╝сЂІсѓЅТѕ╗сѓІсЂфсЂЕ№╝ЅРєњ formсѓњсЃфсѓ╗сЃЃсЃѕсЂЌсЂфсЂё
    // сЂЪсЂасЂЌisNew=trueсЂ«Тќ░УдЈтЁЦтіЏсЂ»т┐ЁсЂџсЃфсѓ╗сЃЃсЃѕ
    if(sameBooking && !isNew) return;

    const loginName = currentUser?.name || '';
    const defaultStaff = initialData.staff || (isNew ? loginName : loginName);
    const formData = {...initialData, staff: defaultStaff, bookingStatus: initialData.bookingStatus||'new'};
    setForm(formData);
    setStaffInput(defaultStaff);
    setShowStaff(false);
    if(justOpened) setTimeout(()=>{setKbField('name');nameRef.current?.focus();},120);
  },[isOpen,initialData,isNew,currentUser]);

  useEffect(()=>{
    if(pendingLoanerId!=null){
      const car=(allCars&&allCars.length?allCars:LOANERS).find(c=>String(c.id)===String(pendingLoanerId));
      if(car)setForm(p=>({...p,loaner:`${car.name} (${car.num})`,loanerId:car.id}));
    }
  },[pendingLoanerId]);

  if(!isOpen) return null;
  const isInsp=type==='insp';
  const canDelete=!!onDelete;

  // РћђРћђ сѓГсЃ╝сЃюсЃ╝сЃЅТЊЇСйю РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
  const INSP_ORDER=['name','staff','car','course','tokuten','time','note'];
  const SCHED_ORDER=['name','staff','car','work','shimi','note'];
  const ORDER=isInsp?INSP_ORDER:SCHED_ORDER;
  // сЃЋсѓЕсЃ╝сѓФсѓ╣сЃфсЃ│сѓ░
  const KB=(key)=>kbField===key
    ?{outline:`3px solid ${isInsp?'#c2410c':'#0891b2'}`,outlineOffset:'2px',boxShadow:`0 0 0 4px rgba(${isInsp?'67,56,202':'8,145,178'},0.15)`}
    :{};
  // ТгА/тЅЇсЂ«сЃЋсѓБсЃ╝сЃФсЃЅсЂИ
  const TIME_VALS=Array.from({length:19},(_,i)=>{const h=Math.floor(i/2)+9,m=i%2===0?'00':'30';return`${String(h).padStart(2,'0')}:${m}`;});
  const goNext=(from)=>{
    const i=ORDER.indexOf(from); if(i<0||i>=ORDER.length-1)return;
    const next=ORDER[i+1]; setKbField(next);
    if(next==='name')nameRef.current?.focus();
    else if(next==='staff')staffRef.current?.focus();
    else if(next==='car')carRef.current?.focus();
    else if(next==='time')timeRef.current?.focus();
    else if(next==='note')noteRef.current?.focus();
    else if(next==='cont')contRef.current?.focus();
    else{// course/tokuten/work/shimi: сЃбсЃ╝сЃђсЃФтєЁсЂ«div[tabIndex=0]сѓњжаєуЋфсЂФТјбсЂЎ
      const divs=Array.from(document.querySelectorAll('.booking-modal-inner div[tabIndex="0"]'));
      const target=divs.find(d=>d.dataset.kbkey===next);
      if(target)setTimeout(()=>target.focus(),20);
    }
  };
  const goPrev=(from)=>{
    const i=ORDER.indexOf(from); if(i<=0)return;
    const prev=ORDER[i-1]; setKbField(prev);
    if(prev==='name')nameRef.current?.focus();
    else if(prev==='staff')staffRef.current?.focus();
    else if(prev==='car')carRef.current?.focus();
    else if(prev==='time')timeRef.current?.focus();
    else if(prev==='note')noteRef.current?.focus();
    else if(prev==='cont')contRef.current?.focus();
    else{
      const divs=Array.from(document.querySelectorAll('.booking-modal-inner div[tabIndex="0"]'));
      const target=divs.find(d=>d.dataset.kbkey===prev);
      if(target)setTimeout(()=>target.focus(),20);
    }
  };
  // тљёсЃЋсѓБсЃ╝сЃФсЃЅсЂ«сѓГсЃ╝сЃЈсЃ│сЃЅсЃЕ
  const onKbNav=(e,field)=>{
    if(e.key==='ArrowDown'||e.key==='Enter'){e.preventDefault();goNext(field);}
    else if(e.key==='ArrowUp'){e.preventDefault();goPrev(field);}
  };
  const onCourseKb=(e)=>{
    const ids=COURSES.map(c=>c.id),cur=ids.indexOf(form.course);
    if(e.key==='ArrowLeft'&&cur>0){e.preventDefault();setForm(p=>({...p,course:ids[cur-1]}));}
    else if(e.key==='ArrowRight'&&cur<ids.length-1){e.preventDefault();setForm(p=>({...p,course:ids[cur+1]}));}
    else if(e.key==='ArrowDown'||e.key==='Enter'){e.preventDefault();goNext('course');}
    else if(e.key==='ArrowUp'){e.preventDefault();goPrev('course');}
  };
  const TIDS=TOKUENS.map(t=>t.id);
  const onTokKb=(e)=>{
    const cur=TIDS.indexOf(form.tokuten);
    if(e.key==='ArrowLeft'&&cur>0){e.preventDefault();setForm(p=>({...p,tokuten:TIDS[cur-1]}));}
    else if(e.key==='ArrowRight'&&cur<TIDS.length-1){e.preventDefault();setForm(p=>({...p,tokuten:TIDS[cur+1]}));}
    else if(e.key==='ArrowDown'||e.key==='Enter'){e.preventDefault();goNext('tokuten');}
    else if(e.key==='ArrowUp'){e.preventDefault();goPrev('tokuten');}

// РЋЉ  - 7тЈ░уЏ«ТЅ┐УфЇтЙЁсЂАсЃГсѓИсЃЃсѓ»№╝ѕwaitingRows / normalRows№╝Ѕ            РЋЉ
// РЋЉ  - т║ЌУѕЌтѕцт«џсЃГсѓИсЃЃсѓ»№╝ѕotherStore / canApprove№╝Ѕ                  РЋЉ
// РЋЉ  Рџа№ИЈ  тцЅТЏ┤сЂїт┐ЁУдЂсЂфта┤тљѕсЂ»т┐ЁсЂџdevуњ░тбЃсЂДтЇЂтѕєсЃєсѓ╣сЃѕсЂЎсѓІсЂЊсЂе          РЋЉ

const InspRow=memo(({row,idx,dispNo,dk,onOpenModal,lockInfo,loanerRes,loanerResH,loanerResS,vsId,onApprove,isOverLimit,setItems})=>{
  const cObj=row.course?COURSES.find(c=>c.id===row.course):null;
  const isEmpty=!row.name&&!row.staff&&!row.carType&&!row.course;
  const locked=lockInfo?.lockedBy;
  const bookingKey=`insp-${dk}-${idx}`;
  // row.storeсЂФтЪ║сЂЦсЂёсЂдloanerResсѓњжЂИТіъ№╝ѕт║ЌУѕЌтѕЄсѓіТЏ┐сЂѕсЂДС╗БУ╗ісЂїтцЅсѓЈсѓЅсЂфсЂёсѓѕсЂєсЂФсЂЎсѓІ№╝Ѕ
  const normRowStore=s=>{if(!s)return vsId;if(s==='honten'||s==='Тюгт║Ќ')return'honten';if(s==='sanda'||s==='СИЅућ░т║Ќ')return'sanda';return vsId;};
  const rowLoanerRes=(loanerResH&&loanerResS)
    ?(normRowStore(row.store)==='honten'?loanerResH:loanerResS)
    :loanerRes;
  const loanerLabel=getLoanerLabel(rowLoanerRes,dk,row.name,bookingKey);
  // storeТГБУдЈтїќ: 'honten'/'Тюгт║Ќ' Рєњ 'honten'сђЂ'sanda'/'СИЅућ░т║Ќ' Рєњ 'sanda'
  const normStore=s=>{if(!s)return'';if(s==='honten'||s==='Тюгт║Ќ')return'honten';if(s==='sanda'||s==='СИЅућ░т║Ќ')return'sanda';return s;};
  const rowStore=normStore(row.store);
  // С╗ќт║ЌУѕЌсЃЄсЃ╝сѓ┐: т║ЌУѕЌсЂїУеГт«џсЂЋсѓїсЂдсЂёсЂдсЂІсЂцуЈЙтюесЂ«т║ЌУѕЌсЂеуЋ░сЂфсѓІта┤тљѕ
  const otherStore=row.name&&rowStore&&rowStore!==vsId;
  const pending=row.pendingApproval;
  const approved=row.approved;
  const canApprove=pending&&vsId==='honten';
  // ТЅ┐УфЇтЙЁсЂАУАїсЂ»Тюгт║ЌсЃдсЃ╝сѓХсЃ╝сЂїТЅ┐УфЇсЃ╗уиежЏєсЂДсЂЇсѓІт┐ЁУдЂсЂїсЂѓсѓІсЂЪсѓЂ otherStore сЂДсЃќсЃГсЃЃсѓ»сЂЌсЂфсЂё
  const blocked=(!isEmpty&&isOverLimit)||locked||(otherStore&&!canApprove);
  const isCancelled=row.bookingStatus==='cancelled';

  const noteQItems=setItems||[];

  // УАїУЃїТЎ»№╝џтёфтЁѕт║д isOverLimit > pending > locked > bookingStatus stripe
  const rowBg = isOverLimit ? '#fef2f2'
    : isCancelled ? BOOKING_STATUS_STRIPE.cancelled
    : pending ? BOOKING_STATUS_STRIPE.provisional
    : approved ? BOOKING_STATUS_STRIPE.confirmed
    : locked ? '#fff7ed'
    : isEmpty ? (idx%2===0?'white':'#f8f7ff')
    : (row.bookingStatus&&BOOKING_STATUS_STRIPE[row.bookingStatus]) || (idx%2===0?'white':'#f8f7ff');

  return (
    <tr style={{background:rowBg,opacity:isCancelled?0.75:1}}>
      <td style={{...TD,borderLeft:`3px solid ${isOverLimit?'#fca5a5':isCancelled?'#dc2626':pending?'#f59e0b':row.store==='honten'?'#2563eb':row.store==='sanda'?'#dc2626':'#e5e7eb'}`}}><span style={{fontWeight:700,color:isOverLimit?'#dc2626':isCancelled?'#dc2626':pending?'#f59e0b':row.store==='honten'?'#2563eb':row.store==='sanda'?'#dc2626':'#6366f1',padding:'0 4px'}}>{dispNo!=null?dispNo:idx+1}</span></td>
      <td style={{...TD,cursor:blocked||isCancelled?'not-allowed':'pointer'}} onClick={()=>{if(!blocked&&!isCancelled)onOpenModal('insp',dk,idx,null,false);}}>

// ============================================
const SchedRow=memo(({row,slot,baseSlot,isFirstSub,dk,onOpenModal,lockInfo,loanerRes,vsId,restriction,setItems})=>{
  const isEmpty=!row.name&&!row.staff&&!row.carType&&!row.work;
  const locked=lockInfo?.lockedBy;
  const isHour=(baseSlot||slot).endsWith(':00');
  const isSub=slot!==baseSlot;
  const _normStore3=s=>{if(!s)return'';if(s==='honten'||s==='Тюгт║Ќ')return'honten';if(s==='sanda'||s==='СИЅућ░т║Ќ')return'sanda';return s;};
  const otherStore=row.name&&_normStore3(row.store)&&_normStore3(row.store)!==vsId;
  const bookingKey=`sched-${dk}-${slot}`;
  const loanerLabel=getLoanerLabel(loanerRes,dk,row.name,bookingKey);

  const isRestricted=!!(()=>{
    try{
      if(!restriction||!restriction.startTime||!restriction.endTime)return false;
      const toMin=(t)=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
      const slotMin=toMin(baseSlot||slot);
      return slotMin>=toMin(restriction.startTime)&&slotMin<toMin(restriction.endTime);
    }catch(e){return false;}
  })();

  const contentQItems=setItems||[];

  return (
    <tr id={isFirstSub?'sched-slot-'+(baseSlot||slot).replace(':',''):undefined}
      style={{background:isRestricted?'#fee2e2':locked?'#fff7ed':row.store==='sanda'?'#fff0f0':row.store==='honten'?'#eff6ff':isHour?'white':'#f0feff',cursor:locked||otherStore?'not-allowed':'pointer'}}
      onClick={()=>{if(!locked&&!otherStore){const _e=!row.name;onOpenModal('sched',dk,null,slot,_e);}}}>
      <td style={{...TD,fontWeight:isFirstSub&&isHour?800:500,color:isFirstSub&&isHour?'#0891b2':'#7dd3fc',whiteSpace:'nowrap',paddingLeft:10,fontSize:isFirstSub&&isHour?13:11,borderLeft:isSub?'3px solid #7dd3fc':''}}>
        {isFirstSub?slot:<span style={{fontSize:9,color:'#a5f3fc'}}>Рє│</span>}
      </td>
      <td style={TD}>
        {locked?<div style={{padding:'3px 5px'}}><div style={{fontWeight:600}}>{row.name||'Рђћ'}</div><LockBadge lockedBy={lockInfo.lockedBy}/></div>
         :isEmpty?<div style={{color:'#9ca3af',fontSize:11,padding:'5px 7px',fontStyle:'italic',display:'flex',alignItems:'center',gap:4}}><span style={{width:18,height:18,border:'2px dashed #d1d5db',borderRadius:3,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11}}>+</span>сѓ»сЃфсЃЃсѓ»сЂЌсЂдУ┐йтіа</div>
         :<div style={{padding:'3px 5px'}}>
              <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'nowrap'}}>
                <span style={{fontWeight:600,color:'#1e293b',whiteSpace:'nowrap'}}>{row.name}</span>
                {row.store&&<span style={{padding:'1px 6px',borderRadius:20,fontSize:10,fontWeight:800,background:row.store==='honten'?'#2563eb':'#dc2626',color:'white',flexShrink:0,whiteSpace:'nowrap'}}>
                  {row.store==='honten'?'Тюгт║Ќ':'СИЅућ░т║Ќ'}
                </span>}
              </div>
              {row.staff&&<div style={{fontSize:12,color:'#374151'}}>{row.staff}</div>}
            </div>}
      </td>
      <td style={TD}><span style={{color:'#374151',fontSize:13}}>{row.carType||'Рђћ'}</span></td>
      <td style={TD}><span style={{fontSize:13,color:'#374151'}}>{row.work||'Рђћ'}</span></td>
      <td style={TD}><span style={{fontSize:13,color:row.rentalLabel?'#065f46':'#374151',fontWeight:(row.rentalLabel||loanerLabel||row.loaner)?700:400}}>{row.rentalLabel||loanerLabel||row.loaner||'Рђћ'}</span></td>
      <td style={TD}><span style={{fontSize:13,color:'#374151'}}>{row.shimi||'Рђћ'}</span></td>
      <td style={TD}>{row.content
        ?<div style={{display:'flex',flexWrap:'wrap',gap:3,alignItems:'center'}}>
           {row.content.split('\n').map((line,i)=>{
             const m=contentQItems.find(si=>si.text&&si.text===line);
             return m
               ?<span key={i} style={{display:'inline-flex',alignItems:'center',padding:'1px 7px',background:'#ecfdf5',border:'1.5px solid #6ee7b7',borderRadius:20,fontSize:10,fontWeight:700,color:'#065f46',whiteSpace:'nowrap'}}>{m.label}</span>
               :<span key={i} style={{fontSize:13,color:'#374151'}}>{line}</span>;
           })}
         </div>
        :<span style={{color:'#9ca3af'}}>Рђћ</span>}</td>
    </tr>
  );
});
