class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error)return(
      <div style={{padding:32,background:'#fef2f2',minHeight:'100vh',fontFamily:'monospace'}}>
        <h2 style={{color:'#dc2626'}}>レンダリングエラー（開発用表示）</h2>
        <pre style={{color:'#991b1b',fontSize:12,whiteSpace:'pre-wrap'}}>{this.state.error?.message}\n{this.state.error?.stack}</pre>
        <button onClick={()=>this.setState({error:null})} style={{marginTop:16,padding:'8px 16px',background:'#4338ca',color:'white',border:'none',borderRadius:8,cursor:'pointer'}}>リセット</button>
      </div>
    );
    return this.props.children;
  }
}

  const m = key.match(/^(.+)__(\d+)$/);
  return m ? {base: m[1], sub: parseInt(m[2])} : {base: key, sub: 0};
};
const makeSlotKey = (base, sub) => sub === 0 ? base : `${base}__${sub}`;
const getBaseSlot = (key) => parseSlotKey(key).base;
// 指定日・指定baseSlotの全サブキーを取得（存在するもののみ）
const getSlotSubKeys = (dayData, base) => {
  if(!dayData) return [base];
  const keys = [base, ...Object.keys(dayData).filter(k => k.startsWith(base+'__')).sort()];
  return keys;
};

const excelDateToStr = (v) => {
  if(!v) return '';
  if(v instanceof Date) return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;
  if(typeof v === 'number') {
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    d.setMinutes(d.getMinutes() + d.getTimezoneOffset());
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  return String(v);
};
const dateStrToLabel = (s) => {
  if(!s) return '';
  const str = String(s).trim();
  // YYYY-MM-DD / YYYY/MM/DD / YYYY年M月D日
  const mt = str.match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
  if(mt) return `${mt[2].padStart(2,'0')}/${mt[3].padStart(2,'0')}`;
  // すでに MM/DD 形式
  const mt2 = str.match(/^(\d{1,2})\/(\d{1,2})$/);
  if(mt2) return `${mt2[1].padStart(2,'0')}/${mt2[2].padStart(2,'0')}`;
  return '';
};

  staff:      ['担当','担当者','担当スタッフ'],
  note:       ['備考','メモ','note'],
};

// 店舗名の表記ゆれを正規化
const normalizeStore = (s) => {
  const t = String(s||'').trim();
  if(!t) return '';
  if(/^(honten|本店|H|h)$/.test(t)) return '本店';
  if(/^(sanda|三田|三田店|S|s)$/.test(t)) return '三田店';
  return t;
};

// ExcelセルARGB→CSS hex（背景色取得）
const cellArgbToHex = (ws, col, row) => {
  try {
    const addr = XLSX.utils.encode_cell({r:row, c:col});
    const cell = ws[addr];
    if(!cell||!cell.s) return null;
    const fg = cell.s.fgColor || cell.s.patternFgColor || cell.s.bgColor;
    if(!fg) return null;
    const argb = fg.argb || fg.rgb || '';
    if(!argb || argb==='00000000' || argb==='FFFFFFFF' || argb.toLowerCase()==='ffffff' || argb==='FF000000') return null;
    const rgb = argb.length===8 ? argb.slice(2) : argb;
    return '#'+rgb;
  } catch(e){ return null; }
};

const parseCustExcel = (wb) => {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const allRows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:false});
  if(!allRows||!allRows.length) return [];

  const norm = s => String(s||'').replace(/[　\s]/g,'').toLowerCase();

  // ヘッダー行を先頭10行で自動検出
  let headerIdx = -1, colMap = {};
  for(let ri=0; ri<Math.min(10,allRows.length); ri++){
    const row = allRows[ri]; if(!row) continue;
    let hits=0; const cand={};
    for(let ci=0; ci<row.length; ci++){
      const cell = norm(row[ci]); if(!cell) continue;
      for(const [fld,kws] of Object.entries(COL_KEYWORDS)){
        if(!cand[fld] && kws.some(kw=>cell.includes(kw)||kw.includes(cell))){
          cand[fld]=ci; hits++;
        }
      }
    }
    if(hits>=3 && cand.name!=null){ headerIdx=ri; colMap=cand; break; }
  }
  // フォールバック：固定列（CUST_COLS定義と同じ、0始まり）
  if(headerIdx<0){
    colMap={inspDate:3,name:4,no:5,carModel:6,phoneHome:7,phoneMobile:8,
      mailing1:9,reserve1:10,mailing2:11,reserve2:12,
      arrivalDate:13,tokuten:14,course:15,store:16,staff:17,note:18};
    headerIdx=0;
  }

  const toDate = v => {
    if(!v||v==='') return '';
    if(v instanceof Date) return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;
    if(typeof v==='number'){
      const d=new Date(Math.round((v-25569)*86400*1000));
      d.setMinutes(d.getMinutes()+d.getTimezoneOffset());
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    const s=String(v);
    const m=s.match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
    if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
    return s;
  };

  const g = (row,fld) => row[colMap[fld]??-1] ?? null;

  const result = [];
  for(let ri=headerIdx+1; ri<allRows.length; ri++){
    const r = allRows[ri]; if(!r) continue;
    const nameVal = g(r,'name');
    if(!nameVal||String(nameVal).trim()==='') continue;
    // 名前列のセル背景色を行代表色として取得
    const cellBg = cellArgbToHex(ws, colMap.name??4, ri);
    result.push({
      inspDate:   toDate(g(r,'inspDate')),
      name:       String(nameVal).replace(/　/g,' ').trim(),
      no:         g(r,'no')??'',
      carModel:   String(g(r,'carModel')||'').trim(),
      phoneHome:  String(g(r,'phoneHome')||'').trim(),
      phoneMobile:String(g(r,'phoneMobile')||'').trim(),
      mailing1:   toDate(g(r,'mailing1')),
      reserve1:   toDate(g(r,'reserve1')),
      mailing2:   toDate(g(r,'mailing2')),
      reserve2:   toDate(g(r,'reserve2')),
      arrivalDate:toDate(g(r,'arrivalDate')),
      tokuten:    g(r,'tokuten')??'',
      course:     String(g(r,'course')||'').trim(),
      store:      normalizeStore(g(r,'store')),
      staff:      String(g(r,'staff')||'').trim(),
      note:       String(g(r,'note')||'').trim(),
      cellBg:     cellBg||null,
      _idx: ri,
    });
  }
  return result;
};

const MONTH_LABELS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

const CustomerListView = memo(({custFiles, setCustFiles, onOpenBooking, onCustBooking, onCustEditBooking, selDate, setSelDate, setView, currentUser, inspData, onUpdateCustStatus}) => {
  // ── 状態 ──────────────────────────────────────────────────────
  const [selMonth, setSelMonth]           = useState(null);
  const [filter, setFilter]               = useState('');
  const [storeFilter, setStoreFilter]     = useState('all');
  const [statusFilter, setStatusFilter]   = useState('all');
  const [importing, setImporting]         = useState(false);
  const [importOk, setImportOk]           = useState(null);
  const [archivedFiles, setArchivedFiles] = useState(()=>{
    try{const v=localStorage.getItem('hub_cust_archived');return v?JSON.parse(v):{}}catch{return{};}
  });
  const [showArchive, setShowArchive] = useState(false);

  // ── localStorage 保存 ─────────────────────────────────────────
  const saveAndSet = useCallback((updater)=>{
    setCustFiles(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      try{localStorage.setItem('hub_cust_files',JSON.stringify(next));}catch{}
      return next;
    });
  },[setCustFiles]);

  const saveArchivedFiles = (data)=>{
    setArchivedFiles(data);
    try{localStorage.setItem('hub_cust_archived',JSON.stringify(data));}catch{}
  };

  // ── 月リスト ─────────────────────────────────────────────────
  const months = useMemo(()=>Object.keys(custFiles).sort(),[custFiles]);

  useEffect(()=>{
    if(months.length===0){setSelMonth(null);return;}
    if(!selMonth||!months.includes(selMonth)) setSelMonth(months[months.length-1]);
  },[months]);

  // ── Excel 自動月検出 ──────────────────────────────────────────
  const detectMonthFromRows = (rows) => {
    const counts = {};
    rows.forEach(r=>{
      // inspDate (点検満了日) からメインの月を検出
      const m = r.inspDate?.slice(0,7);
      if(m&&m.match(/^\d{4}-\d{2}$/)) counts[m]=(counts[m]||0)+1;
    });
    if(Object.keys(counts).length===0){
      // arrivalDate にフォールバック
      rows.forEach(r=>{
        const m = r.arrivalDate?.slice(0,7);
        if(m&&m.match(/^\d{4}-\d{2}$/)) counts[m]=(counts[m]||0)+1;
      });
    }
    const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    return sorted.length>0?sorted[0][0]:null;
  };

  // ── ファイル読み込み（複数可・月自動検出） ────────────────────
  const processFiles = async(files)=>{
    if(!files||files.length===0)return;
    setImporting(true);
    let lastMonth=null;
    for(const file of Array.from(files)){
      if(!file.name.match(/\.(xlsx|xls)$/i)){alert(`「${file.name}」は.xlsxまたは.xlsファイルではありません`);continue;}
      try{
        const buf=await file.arrayBuffer();
        const wb=XLSX.read(buf,{type:'array',cellDates:true});
        const rows=parseCustExcel(wb);
        // 月を自動検出、検出できない場合はファイル名から、それでもなければ手動入力
        let mk=detectMonthFromRows(rows);
        if(!mk){
          // ファイル名から年月を抽出試行 (例: 2026-06.xlsx, 202606.xlsx)
          const nm=file.name.replace(/\.[^.]+$/,'');
          const m1=nm.match(/(\d{4})[_\-]?(\d{2})/);
          if(m1) mk=`${m1[1]}-${m1[2]}`;
        }
        if(!mk){
          const now=new Date();
          const def=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
          const input=prompt(`「${file.name}」の月を入力してください（例: 2026-06）`,def);
          if(!input||!input.match(/^\d{4}-\d{2}$/)){alert('スキップしました');continue;}
          mk=input;
        }
        saveAndSet(prev=>({...prev,[mk]:rows}));
        setImportOk(mk);
        setSelMonth(mk);
        lastMonth=mk;
        setTimeout(()=>setImportOk(null),3000);
      }catch(e){alert(`「${file.name}」読み込みエラー: `+e.message);}
    }
    setImporting(false);
  };

  // ── 月管理 ───────────────────────────────────────────────────
  const handleDeleteMonth = (mk,e)=>{
    e&&e.stopPropagation();
    if(!confirm(mk+'のデータを削除しますか？'))return;
    saveAndSet(prev=>{const u={...prev};delete u[mk];return u;});
    if(selMonth===mk)setSelMonth(null);
  };

  const handleArchiveMonth = (mk,e)=>{
    e&&e.stopPropagation();
    if(!confirm(`「${mk}」をアーカイブしますか？`))return;
    saveAndSet(prev=>{
      const rows=prev[mk]||[];
      saveArchivedFiles({...archivedFiles,[mk]:{rows,archivedAt:new Date().toISOString()}});
      const u={...prev};delete u[mk];return u;
    });
    if(selMonth===mk)setSelMonth(null);
  };

  // ── 車検連携ヘルパー ──────────────────────────────────────────
  const courseTextToId=(text)=>{
    const t=String(text||'').trim();
    if(t.includes('マッハ')||t==='1')return 1;
    if(t.includes('クイック')||t==='2')return 2;
    if(t.includes('レギュラー')||t==='3')return 3;
    return 1;
  };
  const getDk=(ds)=>{
    if(!ds)return null;
    const[y,m,d]=ds.split('-').map(Number);
    return`${y}-${m}-${d}`;
  };
  // inspDataから同名の予約を探す（キャンセル済みは除く）
  const normN = n => String(n||'').replace(/[\s　]/g,'').toLowerCase();
  const findActiveBooking=(cust)=>{
    if(!cust.arrivalDate)return null;
    const dk=getDk(cust.arrivalDate);
    const rows=inspData[dk]||[];
    const nn=normN(cust.name);
    let idx=rows.findIndex(r=>r&&r.name===cust.name&&r.bookingStatus!=='cancelled');
    if(idx<0) idx=rows.findIndex(r=>r&&normN(r.name)===nn&&r.bookingStatus!=='cancelled');
    return idx>=0?{dk,idx,row:rows[idx]}:null;
  };
  const findCancelledBooking=(cust)=>{
    if(!cust.arrivalDate)return null;
    const dk=getDk(cust.arrivalDate);
    const rows=inspData[dk]||[];
    const nn=normN(cust.name);
    let idx=rows.findIndex(r=>r&&r.name===cust.name&&r.bookingStatus==='cancelled');
    if(idx<0) idx=rows.findIndex(r=>r&&normN(r.name)===nn&&r.bookingStatus==='cancelled');
    return idx>=0?{dk,idx,row:rows[idx]}:null;
  };
  const getEmptyIdx=(dk)=>{
    const rows=inspData[dk]||[];
    // キャンセル済みスロットも空きとして再利用
    const i=rows.findIndex(r=>!r||!r.name||(r.bookingStatus==='cancelled'));
    return i>=0?i:rows.length;
  };

  // ── 新規車検登録 ──────────────────────────────────────────────
  const handleNewBooking=(cust,e)=>{
    e&&e.stopPropagation();
    if(!cust.arrivalDate){alert('入庫日が設定されていません');return;}
    const active=findActiveBooking(cust);
    if(active&&!confirm(`${cust.name}さんは${cust.arrivalDate}にすでに登録があります。重複追加しますか？`))return;
    const dk=getDk(cust.arrivalDate);
    const idx=getEmptyIdx(dk);
    onCustBooking(cust.arrivalDate,idx,{
      name:cust.name||'',staff:cust.staff||'',carType:cust.carModel||'',
      course:courseTextToId(cust.course),tokuten:cust.tokuten||'-',
      loaner:'',loanerId:null,rentalLabel:'',rentalCarId:null,time:'',note:cust.note||'',
      bookingStatus:'new',_idx:idx,
    });
  };

  // ── 登録済み予約を編集（リスト画面のままモーダル） ──────────
  const handleEditBooking=(cust,e)=>{
    e&&e.stopPropagation();
    const booking=findActiveBooking(cust);
    if(!booking){
      // inspDataに見つからない場合は新規登録にフォールバック
      if(cust.arrivalDate) handleNewBooking(cust,e);
      return;
    }
    const fn = onCustEditBooking||onOpenBooking;
    fn('insp',booking.dk,booking.idx,null,booking.row);
  };

  // ── スケジュールへ移動 ────────────────────────────────────────
  const handleGoDate=(cust,e)=>{
    e&&e.stopPropagation();
    if(!cust.arrivalDate)return;
    const[y,m,d]=cust.arrivalDate.split('-').map(Number);
    setSelDate(new Date(y,m-1,d));setView('schedule');
  };

  // ── フィルタ ──────────────────────────────────────────────────
  const selRows = useMemo(()=>(custFiles[selMonth]||[]).map((r,i)=>({...r,_month:selMonth,_idx:i})),[custFiles,selMonth]);
  const displayRows = useMemo(()=>selRows.filter(c=>{
    const active=findActiveBooking(c);
    const cancelled=findCancelledBooking(c);
    if(storeFilter!=='all'&&c.store!==storeFilter)return false;
    if(statusFilter==='booked'&&!c.arrivalDate)return false;
    if(statusFilter==='unbooked'&&c.arrivalDate)return false;
    if(statusFilter==='scheduled'&&!active)return false;
    if(statusFilter==='unscheduled'&&(!c.arrivalDate||active))return false;
    if(statusFilter==='cancelled'&&!cancelled)return false;
    const q=filter.toLowerCase();
    if(q&&![c.name,c.carModel,String(c.no),c.staff,c.note,c.course].some(v=>v&&v.toLowerCase().includes(q)))return false;
    return true;
  }),[selRows,filter,storeFilter,statusFilter,inspData]);

  // ── 統計 ─────────────────────────────────────────────────────
  const stats = useMemo(()=>{
    let booked=0,cancelled=0,arrival=0;
    selRows.forEach(c=>{
      if(c.arrivalDate) arrival++;
      if(findActiveBooking(c)) booked++;
      if(findCancelledBooking(c)) cancelled++;
    });
    return{total:selRows.length,arrival,booked,cancelled,unreg:arrival-booked};
  },[selRows,inspData]);

  const now=new Date();
  const oldThreshold=`${now.getFullYear()}-${String(now.getMonth()-2<1?now.getMonth()+10:now.getMonth()-2).padStart(2,'0')}`;
  const arcCount=Object.keys(archivedFiles).length;

  // ── コース色 ─────────────────────────────────────────────────
  const getCourseStyle=(text)=>{
    const id=courseTextToId(text);
    const c=COURSES.find(x=>x.id===id);
    return c||{color:'#374151',bg:'#f3f4f6',initial:'?',name:text||''};
  };

  // ── スタイル定数 ─────────────────────────────────────────────
  const TH_BASE={padding:'7px 8px',fontWeight:800,fontSize:11,whiteSpace:'nowrap',
    borderBottom:'2px solid #475569',borderRight:'1px solid #64748b',textAlign:'left',
    position:'sticky',top:0,zIndex:2};
  const TD={padding:'6px 8px',fontSize:11,borderBottom:'1px solid #e2e8f0',
    borderRight:'1px solid #e5e7eb',verticalAlign:'middle',whiteSpace:'nowrap'};

  // ── 行背景（bookingStatus優先、次にExcel元色、最後にゼブラ） ─
  const getRowBg=(c,i)=>{
    const active=findActiveBooking(c);
    const cancelled=findCancelledBooking(c);
    if(cancelled) return BOOKING_STATUS_STRIPE.cancelled;
    if(active) return BOOKING_STATUS_STRIPE[active.row?.bookingStatus||'new']||BOOKING_STATUS_STRIPE.new;
    if(c.cellBg) return c.cellBg+'55'; // Excelの元の背景色を薄く表示（透過度55=33%）
    return i%2===0?'white':'#f8fafc';
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 120px)',minHeight:400}}>

      {/* ── ① ヘッダー：月タブ + ファイル読み込み（固定） ── */}
      <div style={{flexShrink:0,background:'white',borderRadius:13,padding:'10px 14px',marginBottom:8,boxShadow:'0 2px 10px rgba(0,0,0,.1)'}}>

        {/* タイトル行 */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
          <h3 style={{margin:0,fontSize:13,fontWeight:900,color:'#1e293b'}}>📋 顧客リスト</h3>

          {/* ★ 大きなExcel読み込みボタン（メイン操作） */}
          <label style={{
            cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,
            padding:'7px 16px',background:importing?'#64748b':(importOk?'#16a34a':'#2563eb'),
            color:'white',borderRadius:8,fontWeight:800,fontSize:12,
            boxShadow:'0 2px 8px rgba(37,99,235,.35)',transition:'background .15s',
          }}>
            {importing?'⏳ 読込中...':(importOk?`✅ 読込完了`:'📂 Excelファイルを選択')}
            <input type="file" accept=".xlsx,.xls" multiple style={{display:'none'}}
              onChange={e=>{if(e.target.files.length)processFiles(e.target.files);e.target.value='';}}/>
          </label>

          <button onClick={()=>setShowArchive(v=>!v)}
            style={{padding:'5px 10px',background:showArchive?'#7c3aed':'#ede9fe',color:showArchive?'white':'#7c3aed',
              border:'2px solid #c4b5fd',borderRadius:6,fontWeight:800,fontSize:11,cursor:'pointer'}}>
            📦{arcCount>0?` (${arcCount})`:''}
          </button>

          {/* 凡例 */}
          <div style={{marginLeft:'auto',display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
            {[
              {key:'new',       label:'新規',     bg:BOOKING_STATUS_STRIPE.new,        bd:BOOKING_STATUS_BORDER.new,        c:BOOKING_STATUS_COLOR.new},
              {key:'provisional',label:'仮予約',  bg:BOOKING_STATUS_STRIPE.provisional, bd:BOOKING_STATUS_BORDER.provisional, c:BOOKING_STATUS_COLOR.provisional},
              {key:'confirmed', label:'本予約',   bg:BOOKING_STATUS_STRIPE.confirmed,   bd:BOOKING_STATUS_BORDER.confirmed,   c:BOOKING_STATUS_COLOR.confirmed},
              {key:'cancelled', label:'キャンセル',bg:BOOKING_STATUS_STRIPE.cancelled,  bd:BOOKING_STATUS_BORDER.cancelled,   c:BOOKING_STATUS_COLOR.cancelled},
            ].map(({key,label,bg,bd,c})=>(
              <span key={key} style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:10,fontWeight:700,color:c}}>
                <span style={{width:14,height:14,background:bg,borderRadius:2,flexShrink:0,border:`2px solid ${bd}`}}/>
                {label}
              </span>
            ))}
          </div>
        </div>

        {/* 月タブ */}
        <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'flex-start'}}>
          {months.length===0&&<span style={{color:'#9ca3af',fontSize:12,padding:'4px 0'}}>「📂 Excelファイルを選択」でExcelを読み込むと月タブが自動作成されます</span>}
          {months.map(m=>{
            const rows=custFiles[m]||[];
            const isOld=m<oldThreshold;
            const isSel=selMonth===m;
            const bc=rows.filter(c=>findActiveBooking(c)).length;
            const cc=rows.filter(c=>findCancelledBooking(c)).length;
            const ac=rows.filter(c=>c.arrivalDate).length;
            return(
              <div key={m} onClick={()=>setSelMonth(m)}
                style={{cursor:'pointer',border:`2px solid ${isSel?'#2563eb':isOld?'#f59e0b':'#cbd5e1'}`,
                  borderRadius:9,padding:'6px 10px',background:isSel?'#eff6ff':isOld?'#fffbeb':'#f8fafc',
                  minWidth:110,transition:'all .12s'}}>
                <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3}}>
                  <span style={{fontWeight:900,fontSize:12,color:isSel?'#1d4ed8':'#1e293b'}}>{m}</span>
                  {isOld&&<span style={{fontSize:9,color:'#d97706',fontWeight:800}}>⚠古</span>}
                </div>
                <div style={{display:'flex',gap:2,flexWrap:'wrap',marginBottom:5}}>
                  <span style={{background:'#e2e8f0',color:'#475569',borderRadius:3,padding:'0 4px',fontSize:9,fontWeight:700}}>{rows.length}件</span>
                  {bc>0&&<span style={{background:'#dbeafe',color:'#1d4ed8',borderRadius:3,padding:'0 4px',fontSize:9,fontWeight:700}}>✅{bc}</span>}
                  {ac-bc-cc>0&&<span style={{background:'#fef9c3',color:'#92400e',borderRadius:3,padding:'0 4px',fontSize:9,fontWeight:700}}>未{ac-bc-cc}</span>}
                  {cc>0&&<span style={{background:'#fee2e2',color:'#dc2626',borderRadius:3,padding:'0 4px',fontSize:9,fontWeight:700}}>✗{cc}</span>}
                </div>
                <div onClick={e=>e.stopPropagation()} style={{display:'flex',gap:2}}>
                  <label style={{cursor:'pointer',padding:'2px 6px',background:importOk===m?'#16a34a':importing?'#64748b':'#0369a1',
                    color:'white',borderRadius:4,fontSize:9,fontWeight:800,display:'inline-flex',alignItems:'center',gap:2}}>
                    {importing?' ⏳':(importOk===m?' ✅':' 📂')} 更新
                    <input type="file" accept=".xlsx,.xls" style={{display:'none'}}
                      onChange={e=>{if(e.target.files[0])processFiles([e.target.files[0]]);e.target.value='';}}/>
                  </label>
                  <button onClick={(e)=>handleArchiveMonth(m,e)}
                    style={{padding:'2px 5px',fontSize:9,color:'#7c3aed',background:'#ede9fe',border:'1px solid #c4b5fd',borderRadius:4,cursor:'pointer',fontWeight:700}}>📦</button>
                  <button onClick={(e)=>handleDeleteMonth(m,e)}
                    style={{padding:'2px 5px',fontSize:9,color:'#dc2626',background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:4,cursor:'pointer',fontWeight:700}}>✕</button>
                </div>
              </div>
            );
          })}
        </div>

// loanerResからbookingKeyで代車を動的に取得
// bookingKey = "insp-dk-idx" または "sched-dk-slot"
// 名前一致ではなくキー一致で確実に紐付け
const getLoanerByKey = (loanerRes, bookingKey) => {
  if(!bookingKey) return null;
  for(const cid of Object.keys(loanerRes)){
    for(const r of (loanerRes[cid]||[])){
      if(r.bookingKey===bookingKey){
        if(r.carName) return {label:`${r.carName}${r.carNum?` (${r.carNum})`:''}`,id:cid};
        const car=LOANERS.find(c=>c.id===Number(cid));
        return car?{label:`${car.name} (${car.num})`,id:Number(cid)}:null;
      }
    }
  }
  return null;
};
// 旧データ互換：bookingKeyなし(旧版保存データ)は名前マッチにフォールバック
const getLoanerLabel = (loanerRes, dk, rowName, bookingKey) => {
  if(!dk)return'';
  // まずbookingKeyで検索
  if(bookingKey){
    const found=getLoanerByKey(loanerRes,bookingKey);
    if(found)return found.label;
  }
  // フォールバック：名前一致（旧データ互換）
  if(!rowName)return'';
  const parts=dk.split('-').map(Number);
  const [y,m,d]=[parts[0],parts[1]-1,parts[2]];
  const dateNum=toNum(y,m,d);
  for(const cid of Object.keys(loanerRes)){
    for(const r of (loanerRes[cid]||[])){
      if(dateNum>=toNum(r.fy,r.fm,r.fd)&&dateNum<=toNum(r.ty,r.tm,r.td)&&r.user===rowName){
        if(r.carName) return `${r.carName}${r.carNum?` (${r.carNum})`:''}`;
        const car=LOANERS.find(c=>c.id===Number(cid));
        return car?`${car.name} (${car.num})`:'';
      }
    }
  }
  return'';
};
const getLoanerIdForRow = (loanerRes, dk, rowName, bookingKey) => {
  if(!dk)return null;
  if(bookingKey){
    const found=getLoanerByKey(loanerRes,bookingKey);
    if(found)return found.id;
  }
  if(!rowName)return null;
  const parts=dk.split('-').map(Number);
  const [y,m,d]=[parts[0],parts[1]-1,parts[2]];
  const dateNum=toNum(y,m,d);
  for(const cid of Object.keys(loanerRes)){
    for(const r of (loanerRes[cid]||[])){
      if(dateNum>=toNum(r.fy,r.fm,r.fd)&&dateNum<=toNum(r.ty,r.tm,r.td)&&r.user===rowName){
        return Number(cid);
      }
    }
  }
  return null;
};

const formatTime = (raw) => {
  const d=raw.replace(/\D/g,'');
  if(!d) return raw;
  if(d.length===3) return `${d[0]}:${d.slice(1)}`;
  if(d.length===4) return `${d.slice(0,2)}:${d.slice(2)}`;
  return raw;
};
// resolveStaff: マイナンバー(0-99)→名前変換。動的staffListを受け取る版
const resolveStaff = (val, dynStaff) => {
  const t=String(val||'').trim();
  const n=parseInt(t,10);
  const list=dynStaff||STAFF;
  if(!isNaN(n)&&String(n)===t){
    const f=list.find(s=>s.myNumber===n||s.id===n);
    if(f)return f.name;
  }
  return t;
};

// ===========================================================
//  GAS接続設定
//  STEP 5: 下記URLをGASデプロイ後のウェブアプリURLに書き換える
// ===========================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxyWvIxIyC1EwJUfm4Fy8g6dpBytp7J9wTuT6Dujz-X7V-WzkGkN-bHw2l6rY_B1ST3/exec';

const GAS_READY = GAS_URL !== 'YOUR_GAS_URL_HERE' && GAS_URL !== '';

// GASからデータを読み込む
const sGet = async(k) => {
  if (!GAS_READY) return null;
  try {
    const r = await fetch(`${GAS_URL}?key=${encodeURIComponent(k)}`, {cache:'no-store'});
    const t = await r.text();
    if (!t || t === 'null' || t.startsWith('error:')) return null;
    const parsed = JSON.parse(t);
    // GASの同時呼び出しエラーが混入したデータを除外
    if (parsed && typeof parsed === 'object' && parsed.error) return null;
    return parsed;
  } catch { return null; }
};

// GASにデータを書き込む
const sSet = async(k, v) => {
  if (!GAS_READY) return;
  try {
    // no-cors: GASのリダイレクト問題を回避。レスポンスは読めないが書き込みは成功する
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: JSON.stringify({key: k, value: JSON.stringify(v)}),
    });
  } catch {}
};

//  useShared v30 - GAS対応・リアルタイム同期版
//
//  設計方針：
//  - 初回マウント時にGASから読み込み
//  - ポーリング（pollMs間隔）で他ユーザーの変更を受信
//  - 書き込み直後2秒はポーリングをスキップ（自分の変更を上書きしない）
// ===========================================================
function useShared(key, def, pollMs=6000) {
  const [val, setVal] = useState(def);
  const mounted      = useRef(true);
  const localRef     = useRef(def);
  const initialized  = useRef(false);
  const writeCount   = useRef(0);
  const writeTimer   = useRef(null);
  const pollTimer    = useRef(null);

  useEffect(() => {
    mounted.current = true;
    sGet(key).then(v => {
      if (!mounted.current) return;
      if (v !== null && writeCount.current === 0) { localRef.current = v; setVal(v); }
      initialized.current = true;
    }).catch(() => { initialized.current = true; });
    return () => {
      mounted.current = false;
      if (pollTimer.current)  clearInterval(pollTimer.current);
      if (writeTimer.current) clearTimeout(writeTimer.current);
    };
  }, [key]);

  useEffect(() => {
    if (!GAS_READY) return;
    pollTimer.current = setInterval(() => {
      if (!mounted.current || !initialized.current || writeCount.current > 0) return;
      sGet(key).then(v => {
        if (!mounted.current || v === null || writeCount.current > 0) return;
        const cur  = JSON.stringify(localRef.current);
        const next = JSON.stringify(v);
        if (cur !== next) { localRef.current = v; setVal(v); }
      }).catch(() => {});
    }, pollMs);
    return () => { if (pollTimer.current) clearInterval(pollTimer.current); };
  }, [key, pollMs]);

  const update = useCallback((fn) => {
    const next = typeof fn === 'function' ? fn(localRef.current) : fn;
    localRef.current = next;
    setVal(next);
    writeCount.current += 1;
    if (writeTimer.current) clearTimeout(writeTimer.current);
    sSet(key, next).then(() => {
      writeTimer.current = setTimeout(() => { writeCount.current = Math.max(0, writeCount.current - 1); }, 4000);
    }).catch(() => {
      setTimeout(() => sSet(key, localRef.current).catch(() => {}), 1500);
      writeTimer.current = setTimeout(() => { writeCount.current = Math.max(0, writeCount.current - 1); }, 6000);
    });
  }, [key]);

  return [val, update];
}


const GCSS=`
  @keyframes modalIn{from{opacity:0;transform:scale(0.92) translateY(-16px)}to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .modal-box{animation:modalIn 0.26s cubic-bezier(0.34,1.56,0.64,1) both;}
  .slide-in{animation:slideIn 0.2s ease both;}
  .fade-in{animation:fadeIn 0.18s ease both;}
  *{box-sizing:border-box;} input,select,textarea,button{font-family:inherit;}
  ::-webkit-scrollbar{width:6px;height:6px} ::-webkit-scrollbar-track{background:#f1f5f9} ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
`;

const SEC_INSP='sec-insp', SEC_SCHED='sec-sched', SEC_NOTES='sec-notes';
const scrollTo=(id)=>{
  if(id==='sec-top'){window.scrollTo({top:0,behavior:'smooth'});return;}
  const el=document.getElementById(id);
  if(!el)return;
  // sticky headerの高さ分オフセット
  const headerH=document.querySelector('header')?.offsetHeight||0;
  const top=el.getBoundingClientRect().top+window.scrollY-headerH-8;
  window.scrollTo({top,behavior:'smooth'});
};

//  スタッフ新規登録モーダル
// ============================================
const STAFFREG_LOCK_KEY = 'hub-v8-staffreg-lock';
const STAFFREG_LOCK_TTL = 3*60*1000;

const StaffRegisterModal=memo(({isOpen,onClose,staffListH,staffListS,onSave})=>{
  const [name,setName]=useState('');
  const [badge,setBadge]=useState('mechanic');
  const [myNumber,setMyNumber]=useState(null);
  const [store,setStore]=useState('honten');
  const [lockedBy,setLockedBy]=useState(null);
  const [checking,setChecking]=useState(true);
  const lockPollRef=useRef(null);

  useEffect(()=>{
    if(!isOpen)return;
    setName('');setBadge('mechanic');setMyNumber(null);setStore('honten');setChecking(true);
    // ロック確認
    (async()=>{
      try{
        const v=await sGet(STAFFREG_LOCK_KEY);
        if(v&&v.user&&(Date.now()-v.ts)<STAFFREG_LOCK_TTL){setLockedBy(v.user);}
        else{await sSet(STAFFREG_LOCK_KEY,{user:'新規登録',ts:Date.now()});setLockedBy(null);}
      }catch{setLockedBy(null);}
      setChecking(false);
    })();
    lockPollRef.current=setInterval(async()=>{
      try{await sSet(STAFFREG_LOCK_KEY,{user:'新規登録',ts:Date.now()});}catch{}
    },30000);
    return()=>{
      clearInterval(lockPollRef.current);
      sGet(STAFFREG_LOCK_KEY).then(v=>{if(v&&v.user==='新規登録')sSet(STAFFREG_LOCK_KEY,null);}).catch(()=>{});
    };
  },[isOpen]);

  if(!isOpen)return null;

  const allStaff=[...(staffListH||[]),...(staffListS||[])];
  const currentList=store==='honten'?staffListH:staffListS;
  const usedNumbers=allStaff.map(s=>s.myNumber);
  const isNumUsed=n=>usedNumbers.includes(n);
  const storeObj=STORES.find(s=>s.id===store);

  const handleSave=()=>{
    if(!name.trim()){alert('名前を入力してください');return;}
    if(myNumber===null){alert('マイナンバーを選択してください');return;}
    if(isNumUsed(myNumber)){alert('そのマイナンバーはすでに使用されています');return;}
    const uid=`${store[0]}${Date.now()}`;
    onSave({uid,name:name.trim(),badge,myNumber,store});
    onClose();
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="modal-box"
        style={{background:'white',borderRadius:18,width:'min(520px,96vw)',maxHeight:'94vh',overflowY:'auto',boxShadow:'0 32px 80px rgba(0,0,0,0.45)'}}>

        {/* ヘッダー */}
        <div style={{padding:'16px 22px',background:'linear-gradient(135deg,#1e1b4b,#4338ca)',display:'flex',justifyContent:'space-between',alignItems:'center',borderRadius:'18px 18px 0 0'}}>
          <div style={{color:'white',fontWeight:800,fontSize:16}}>👤 新規スタッフ登録</div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.15)',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',color:'white',display:'flex',alignItems:'center',justifyContent:'center'}}><X size={14}/></button>
        </div>

        {checking?(
          <div style={{padding:40,textAlign:'center',color:'#6b7280'}}>確認中...</div>
        ):lockedBy?(
          <div style={{padding:32,textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:12}}>🔒</div>
            <div style={{fontWeight:800,fontSize:16,color:'#1e1b4b',marginBottom:8}}>現在登録できません</div>
            <div style={{padding:'8px 16px',background:'#fef2f2',border:'2px solid #fca5a5',borderRadius:20,display:'inline-flex',alignItems:'center',gap:6,color:'#dc2626',fontWeight:800,marginBottom:12}}>
              🔴 {lockedBy} が操作中
            </div>
            <div style={{fontSize:13,color:'#6b7280',marginBottom:20}}>完了するまでお待ちください</div>
            <button onClick={onClose} style={{padding:'10px 28px',background:'#f3f4f6',border:'none',borderRadius:9,fontWeight:700,cursor:'pointer'}}>閉じる</button>
          </div>
        ):(
          <div style={{padding:'20px 22px',display:'flex',flexDirection:'column',gap:18}}>
            {/* 店舗選択 */}
            <div>
              <div style={{fontWeight:700,fontSize:13,color:'#374151',marginBottom:8}}>🏪 所属店舗</div>
              <div style={{display:'flex',gap:8}}>
                {STORES.map(s=>(
                  <button key={s.id} onClick={()=>setStore(s.id)}
                    style={{flex:1,padding:'10px 0',borderRadius:9,border:`2px solid ${store===s.id?s.color:'#e5e7eb'}`,background:store===s.id?s.bg:'white',color:store===s.id?s.color:'#6b7280',fontWeight:store===s.id?800:500,fontSize:14,cursor:'pointer',transition:'all 0.12s'}}>
                    {s.name}
                  </button>
                ))}
              </div>
            </div>

            {/* 名前 */}
            <div>
              <div style={{fontWeight:700,fontSize:13,color:'#374151',marginBottom:8}}>📝 名前</div>
              <input value={name} onChange={e=>setName(e.target.value)}
                placeholder="例：山田次郎"
                style={{width:'100%',padding:'10px 12px',border:'2px solid #e5e7eb',borderRadius:8,fontSize:15,outline:'none',boxSizing:'border-box'}}
                onFocus={e=>e.target.style.borderColor='#4338ca'}
                onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
            </div>

            {/* バッジ選択 */}
            <div>
              <div style={{fontWeight:700,fontSize:13,color:'#374151',marginBottom:8}}>🏅 業務バッジ</div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {BADGES.map(b=>(
                  <button key={b.id} onClick={()=>setBadge(b.id)}
                    style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:10,border:`2px solid ${badge===b.id?b.color:'#e5e7eb'}`,background:badge===b.id?b.bg:'white',cursor:'pointer',textAlign:'left',transition:'all 0.1s'}}>
                    <BadgeIcon badge={b.id} size={28}/>
                    <div>
                      <div style={{fontWeight:badge===b.id?800:600,color:badge===b.id?b.color:'#374151',fontSize:14}}>{b.label}</div>
                      <div style={{fontSize:11,color:'#9ca3af',marginTop:1}}>{b.desc}</div>
                    </div>
                    {badge===b.id&&<span style={{marginLeft:'auto',width:20,height:20,borderRadius:'50%',background:b.color,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,flexShrink:0}}>✓</span>}
                  </button>
                ))}
              </div>
            </div>

            {/* マイナンバー選択 */}
            <div>
              <div style={{fontWeight:700,fontSize:13,color:'#374151',marginBottom:4}}>🔢 マイナンバー（0〜99）</div>
              <div style={{fontSize:11,color:'#9ca3af',marginBottom:8}}>担当者入力時に使う個人識別番号。スポーツのゼッケンのようなもの。</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(10,1fr)',gap:4,maxHeight:160,overflowY:'auto',padding:2}}>
                {Array.from({length:100},(_,i)=>{
                  const used=isNumUsed(i);
                  const sel=myNumber===i;
                  return(
                    <button key={i} onClick={()=>!used&&setMyNumber(i)}
                      disabled={used}
                      style={{padding:'5px 0',borderRadius:6,border:`2px solid ${sel?storeObj.color:used?'#f3f4f6':'#e5e7eb'}`,background:sel?storeObj.color:used?'#f9fafb':'white',color:sel?'white':used?'#d1d5db':'#374151',fontWeight:sel?800:500,fontSize:12,cursor:used?'not-allowed':'pointer',opacity:used?0.5:1,transition:'all 0.08s'}}>
                      {i}
                    </button>
                  );
                })}
              </div>
              {myNumber!==null&&<div style={{marginTop:6,padding:'5px 10px',background:storeObj.bg,border:`1px solid ${storeObj.color}44`,borderRadius:6,fontSize:12,color:storeObj.color,fontWeight:700,display:'inline-flex',alignItems:'center',gap:5}}>
                選択中：<span style={{fontSize:16,fontWeight:900}}>#{myNumber}</span>
              </div>}
            </div>

            {/* 保存ボタン */}
            <div style={{display:'flex',gap:8,paddingBottom:8}}>
              <button onClick={handleSave}
                disabled={!name.trim()||myNumber===null}
                style={{flex:1,padding:'13px 0',background:name.trim()&&myNumber!==null?`linear-gradient(135deg,${storeObj.color},${storeObj.accent})`:'#e5e7eb',color:name.trim()&&myNumber!==null?'white':'#9ca3af',border:'none',borderRadius:10,fontWeight:800,fontSize:15,cursor:name.trim()&&myNumber!==null?'pointer':'default',transition:'all 0.15s'}}>
                ✓ 登録する
              </button>
              <button onClick={onClose} style={{padding:'13px 18px',background:'#f3f4f6',border:'none',borderRadius:10,fontWeight:600,cursor:'pointer',color:'#374151'}}>キャンセル</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
});

const StaffSettingsModal=memo(({isOpen,onClose,staffListH,staffListS,onUpdate,onDelete})=>{
  const [selUid,setSelUid]=useState(null);
  const [editName,setEditName]=useState('');
  const [editBadge,setEditBadge]=useState('mechanic');
  const [editNumber,setEditNumber]=useState(null);
  const [editCaps,setEditCaps]=useState({}); // capabilities
  const [confirmDel,setConfirmDel]=useState(false);
  const [tab,setTab]=useState('honten');
  const [lockedBy,setLockedBy]=useState(null);
  const [checking,setChecking]=useState(true);
  const lockPollRef=useRef(null);

  useEffect(()=>{
    if(!isOpen)return;
    setSelUid(null);setTab('honten');setConfirmDel(false);setChecking(true);
    (async()=>{
      try{
        const v=await sGet(STAFFREG_LOCK_KEY);
        if(v&&v.user&&v.user!=='設定画面'&&(Date.now()-v.ts)<STAFFREG_LOCK_TTL){setLockedBy(v.user);}
        else{await sSet(STAFFREG_LOCK_KEY,{user:'設定画面',ts:Date.now()});setLockedBy(null);}
      }catch{setLockedBy(null);}
      setChecking(false);
    })();
    lockPollRef.current=setInterval(async()=>{
      try{await sSet(STAFFREG_LOCK_KEY,{user:'設定画面',ts:Date.now()});}catch{}
    },30000);
    return()=>{
      clearInterval(lockPollRef.current);
      sGet(STAFFREG_LOCK_KEY).then(v=>{if(v&&v.user==='設定画面')sSet(STAFFREG_LOCK_KEY,null);}).catch(()=>{});
    };
  },[isOpen]);

  if(!isOpen)return null;

  const allStaff=[...(staffListH||[]),...(staffListS||[])];
  const currentList=tab==='honten'?staffListH:staffListS;
  const storeObj=STORES.find(s=>s.id===tab);

  const selectStaff=(s)=>{
    setSelUid(s.uid);setEditName(s.name);setEditBadge(s.badge||'mechanic');setEditNumber(s.myNumber);setConfirmDel(false);
    setEditCaps(s.capabilities||getDefaultCapabilities(s.badge||'mechanic'));
  };

  const handleUpdate=()=>{
    if(!editName.trim())return;
    const target=allStaff.find(s=>s.uid===selUid);
    if(!target)return;
    // 番号重複チェック（自分以外）
    if(allStaff.some(s=>s.uid!==selUid&&s.myNumber===editNumber)){alert('そのマイナンバーはすでに使用されています');return;}
    onUpdate({...target,name:editName.trim(),badge:editBadge,myNumber:editNumber,capabilities:editCaps});
    setSelUid(null);
  };

  const handleDelete=()=>{
    const target=allStaff.find(s=>s.uid===selUid);
    if(!target)return;
    onDelete(target);
    setSelUid(null);setConfirmDel(false);
  };

  const usedNumbers=allStaff.filter(s=>s.uid!==selUid).map(s=>s.myNumber);
  const selectedStaff=allStaff.find(s=>s.uid===selUid);

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="modal-box"
        style={{background:'white',borderRadius:18,width:'min(620px,97vw)',maxHeight:'94vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 32px 80px rgba(0,0,0,0.45)'}}>

        <div style={{padding:'16px 22px',background:'linear-gradient(135deg,#374151,#1e1b4b)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div style={{color:'white',fontWeight:800,fontSize:16}}>⚙️ スタッフ設定</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={()=>{onClose();setTimeout(()=>document.dispatchEvent(new CustomEvent('openRegister')),100);}}
              style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.3)',borderRadius:7,padding:'5px 10px',cursor:'pointer',color:'white',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',gap:4}}>
              ➕ 新規登録
            </button>
            <button onClick={onClose} style={{background:'rgba(255,255,255,0.15)',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',color:'white',display:'flex',alignItems:'center',justifyContent:'center'}}><X size={14}/></button>
          </div>
        </div>

        {checking?(
          <div style={{padding:40,textAlign:'center',color:'#6b7280'}}>確認中...</div>
        ):lockedBy?(
          <div style={{padding:32,textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:12}}>🔒</div>
            <div style={{fontWeight:800,fontSize:16,color:'#1e1b4b',marginBottom:8}}>現在操作できません</div>
            <div style={{padding:'8px 16px',background:'#fef2f2',border:'2px solid #fca5a5',borderRadius:20,display:'inline-flex',alignItems:'center',gap:6,color:'#dc2626',fontWeight:800,marginBottom:20}}>
              🔴 {lockedBy} が操作中
            </div>
            <br/>
            <button onClick={onClose} style={{padding:'10px 28px',background:'#f3f4f6',border:'none',borderRadius:9,fontWeight:700,cursor:'pointer'}}>閉じる</button>

                      <span style={{width:24,height:24,borderRadius:'50%',background:selUid===s.uid?storeObj.color:'#e5e7eb',color:selUid===s.uid?'white':'#6b7280',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:11,flexShrink:0}}>

// ============================================
//  第2火曜日ユーティリティ
// ============================================
// 毎月第2火曜日を返す（1月=0,5月=4,8月=7 は除外 → null）
const getSecondTuesdayExemptMonths = new Set([0,4,7]); // 1月・5月・8月（0-indexed）
const getSecondTuesday = (year, month) => {
  // month: 0-indexed
  if(getSecondTuesdayExemptMonths.has(month)) return null;
  let count=0;
  for(let d=1;d<=31;d++){
    const dt=new Date(year,month,d);
    if(dt.getMonth()!==month)break;
    if(dt.getDay()===2){count++;if(count===2)return d;}
  }
  return null;
};
const isSecondTuesdayHoliday = (year, month, day, overrideOpen) => {
  // 第2火曜日かつ除外月でなく、かつ個別で「通常営業」上書きされていない
  const d2 = getSecondTuesday(year, month);
  if(d2===null||d2!==day) return false;
  const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  if(overrideOpen && overrideOpen.includes(ds)) return false;
  return true;
};
const fmt = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

const HolidayModal=memo(({isOpen,onClose,closedDays,setClosedDays,closedDates,setClosedDates,overrideOpenDates,setOverrideOpenDates})=>{
  const DOW_NAMES=['日','月','火','水','木','金','土'];
  const today=new Date();
  const [viewYear,setViewYear]=useState(today.getFullYear());
  const [viewMonth,setViewMonth]=useState(today.getMonth());
  const [dragStart,setDragStart]=useState(null);
  const [dragEnd,setDragEnd]=useState(null);
  const [isDragging,setIsDragging]=useState(false);

  if(!isOpen) return null;

  const toggle=d=>setClosedDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]);

  // 日付操作ヘルパー
  const addDate=(ds)=>{
    if(!closedDates.includes(ds)) setClosedDates(p=>[...p,ds].sort());
    // もし通常営業上書き中なら解除
    if(overrideOpenDates&&overrideOpenDates.includes(ds)) setOverrideOpenDates(p=>p.filter(x=>x!==ds));
  };
  const removeDate=(ds)=>setClosedDates(p=>p.filter(x=>x!==ds));
  const toggleOverrideOpen=(ds)=>{
    // 第2火曜日を「この日だけ通常営業」にする／戻す
    setOverrideOpenDates(p=>p.includes(ds)?p.filter(x=>x!==ds):[...p,ds].sort());
    // 任意休業に入っていれば削除
    if(closedDates.includes(ds)) setClosedDates(p=>p.filter(x=>x!==ds));
  };

  // ドラッグ範囲の全日付を取得
  const getDragDates=()=>{
    if(!dragStart||!dragEnd) return [];
    const s=new Date(dragStart);const e=new Date(dragEnd);
    const [from,to]=s<=e?[s,e]:[e,s];
    const res=[];let cur=new Date(from);
    while(cur<=to){res.push(fmt(cur.getFullYear(),cur.getMonth(),cur.getDate()));cur=new Date(cur);cur.setDate(cur.getDate()+1);}
    return res;
  };
  const applyDragDates=()=>{
    const dates=getDragDates();
    dates.forEach(ds=>{
      if(!closedDates.includes(ds)) setClosedDates(p=>[...p,ds].sort());
      if(overrideOpenDates&&overrideOpenDates.includes(ds)) setOverrideOpenDates(p=>p.filter(x=>x!==ds));
    });
  };

  // カレンダー描画
  const cy=viewYear,cm=viewMonth;
  const first=new Date(cy,cm,1).getDay();
  const daysInMonth=new Date(cy,cm+1,0).getDate();
  const weeks=[];let wk=Array(7).fill(null);
  for(let d=1;d<=daysInMonth;d++){
    const dow=(first+d-1)%7;wk[dow]=d;
    if(dow===6){weeks.push([...wk]);wk=Array(7).fill(null);}
  }
  if(wk.some(x=>x!==null))weeks.push([...wk]);

  const dragDates=isDragging?getDragDates():[];

    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:12}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="modal-box"
        style={{background:'white',borderRadius:16,width:'min(560px,98vw)',maxHeight:'92vh',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
        {/* ヘッダー */}
        <div style={{padding:'16px 22px 12px',background:'linear-gradient(135deg,#2563eb,#1d4ed8)',borderRadius:'16px 16px 0 0',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div>
            <div style={{color:'white',fontWeight:800,fontSize:16}}>🏖 休業日設定</div>
            <div style={{color:'rgba(255,255,255,0.8)',fontSize:11,marginTop:2}}>カレンダーをドラッグして連休も選択できます</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',color:'white',display:'flex',alignItems:'center',justifyContent:'center'}}><X size={14}/></button>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'14px 18px'}}>
          {/* 毎週定休 */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:800,color:'#374151',marginBottom:8}}>📅 毎週の定休曜日</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {DOW_NAMES.map((n,i)=>(
                <button key={i} onClick={()=>toggle(i)}
                  style={{padding:'8px 13px',borderRadius:8,border:`2px solid ${closedDays.includes(i)?'#dc2626':'#e5e7eb'}`,
                    background:closedDays.includes(i)?'#fee2e2':'white',color:closedDays.includes(i)?'#dc2626':'#374151',
                    fontWeight:700,cursor:'pointer',fontSize:13}}>{n}</button>
              ))}
            </div>
          </div>

          {/* 第2火曜日ルール説明 */}
          <div style={{background:'#fef9c3',border:'2px solid #fde047',borderRadius:9,padding:'9px 14px',marginBottom:16,fontSize:11,color:'#92400e'}}>
            <div style={{fontWeight:800,marginBottom:3}}>🗓 毎月第2火曜日（両店共通定休） ※自動設定</div>
            <div>1月・5月・8月の第2火曜日は通常営業です。カレンダーで「通常営業に戻す」ボタンで個別変更できます。</div>
          </div>

          {/* カレンダー */}
          <div style={{marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:800,color:'#374151',flex:1}}>📆 日付指定（ドラッグで連休選択）</div>
              <button onClick={()=>{const d=new Date(cy,cm-1,1);setViewYear(d.getFullYear());setViewMonth(d.getMonth());}} style={{width:26,height:26,borderRadius:6,border:'1px solid #e5e7eb',background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><ChevronLeft size={14}/></button>

            </div>

            {/* 曜日ヘッダー */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:2}}>
              {DOW_NAMES.map((d,i)=>(

            <div style={{border:'1px solid #e5e7eb',borderRadius:8,overflow:'hidden',userSelect:'none',WebkitUserSelect:'none'}}

              onMouseUp={()=>{if(isDragging){setIsDragging(false);applyDragDates();setDragStart(null);setDragEnd(null);}}}

              {weeks.map((week,wi)=>(

                    if(!day) return <div key={di} style={{minHeight:36,borderTop:wi>0?'1px solid #f3f4f6':'none',borderLeft:di>0?'1px solid #f3f4f6':'none',background:'#f9fafb'}}/>;
                    const ds=fmt(cy,cm,day);
                    const dow=new Date(cy,cm,day).getDay();
                    const isHol=HOLIDAYS_2026.has(`${cy}-${cm+1}-${day}`);
                    const isWeeklyClosed=closedDays.includes(dow);
                    const isManualClosed=closedDates.includes(ds);
                    const isSecTue=isSecondTuesdayHoliday(cy,cm,day,overrideOpenDates||[]);
                    const isOverrideOpen=(overrideOpenDates||[]).includes(ds);
                    const inDrag=dragDates.includes(ds);
                    const isClosed=isManualClosed||isSecTue||isWeeklyClosed;
                    const isToday=day===today.getDate()&&cm===today.getMonth()&&cy===today.getFullYear();

                    let bg='white';
                    if(inDrag) bg='#bfdbfe';
                    else if(isManualClosed) bg='#fee2e2';
                    else if(isSecTue) bg='#fef3c7';
                    else if(isWeeklyClosed) bg='#f3f4f6';

                    return (
                      <div key={di}

    for(let cur=new Date(now);cur<=end&&found.length<30;cur.setDate(cur.getDate()+1)){
      const y=cur.getFullYear(),m=cur.getMonth(),d=cur.getDate(),dow=cur.getDay();
      if(closedDays.includes(dow)) continue;
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if(closedDates.includes(ds)) continue;
      if(isSecondTuesdayHoliday(y,m,d,Array.isArray(overrideOpenDates)?overrideOpenDates:[])) continue;
      if(dows.length>0&&!dows.includes(dow)) continue;
      const dk=dateKey(y,m,d);
      if(sType==='insp'){
        const rows=Array.from({length:8},(_,i)=>(inspData[dk]||[])[i]||null);
        const emptyIdx=rows.findIndex(r=>!r?.name);
        const empCnt=rows.filter(r=>!r?.name).length;
        if(emptyIdx>=0) found.push({y,m,d,dk,dow,label:`${m+1}/${d}（${DOW[dow]}）`,detail:`空き${empCnt}台`,type:'insp',slot:null,emptyIdx});

        for(const slot of TIME_SLOTS){
          if(found.length>=30) break;
          const [h]=slot.split(':').map(Number);
          if(h<parseInt(fh)||h>parseInt(th)) continue;
          if(!(schedData[dk]?.[slot]?.name)) found.push({y,m,d,dk,dow,label:`${m+1}/${d}（${DOW[dow]}）`,detail:slot,type:'sched',slot});
        }
      }
    }
    setResults(found);setSearched(true);
  };

  if(!isOpen) return null;
  const HO=Array.from({length:10},(_,i)=>String(9+i).padStart(2,'0'));
  return (

      <div onClick={e=>e.stopPropagation()} className="modal-box" style={{background:'white',borderRadius:16,padding:'26px 26px',width:'min(600px,95vw)',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>

          <h2 style={{fontSize:17,fontWeight:800,color:'#1e1b4b',margin:0}}>🔍 空き枠検索</h2>
          <button onClick={onClose} style={{background:'#f3f4f6',border:'none',borderRadius:'50%',width:32,height:32,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><X size={16}/></button>
        </div>
        <div style={{display:'flex',gap:9,marginBottom:14}}>
          {[{v:'insp',l:'🚗 車検'},{v:'sched',l:'⏰ スケジュール'}].map(t=>(
            <button key={t.v} onClick={()=>{setSType(t.v);setSearched(false);}} style={{flex:1,padding:'9px',borderRadius:7,border:`2px solid ${sType===t.v?'#4338ca':'#e5e7eb'}`,background:sType===t.v?'#eef2ff':'white',color:sType===t.v?'#4338ca':'#374151',fontWeight:700,cursor:'pointer'}}>{t.l}</button>

        <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:13}}>

const StaffCalendarModal=memo(({isOpen,onClose,initMonth,currentUser,
  dynStaffH,dynStaffS,
  dayOffDataH,setDayOffDataH,dayOffDataS,setDayOffDataS,
  paidLeaveDataH,setPaidLeaveDataH,paidLeaveDataS,setPaidLeaveDataS,
  closedDaysH,closedDaysS,closedDatesH,closedDatesS,overrideOpenDates})=>{
  const [calStore,setCalStore]=useState('honten');
  const [selStaff,setSelStaff]=useState(null);
  const [selType,setSelType]=useState('dayoff');
  const [calMonth,setCalMonth]=useState(null);

  useEffect(()=>{
    if(isOpen){
      // ログインユーザーの店舗を初期選択
      const userStoreId=currentUser?.store?.id||'honten';
      setCalStore(userStoreId);
      setCalMonth(initMonth||new Date());
      // ログインユーザーを初期選択（自分の休日をすぐ編集できるように）
      setSelStaff(currentUser?.name||null);
      setSelType('dayoff');
    }
  },[isOpen,initMonth,currentUser]);

  if(!isOpen||!calMonth)return null;

  const cy=calMonth.getFullYear(),cm=calMonth.getMonth();
  const staffList=calStore==='honten'?(dynStaffH&&dynStaffH.length>0?dynStaffH:DEFAULT_STAFF_HONTEN):(dynStaffS&&dynStaffS.length>0?dynStaffS:DEFAULT_STAFF_SANDA);
  const storeObj=STORES.find(s=>s.id===calStore);
  const _rawDayOff =calStore==='honten'?dayOffDataH  :dayOffDataS;
  const _rawPleave =calStore==='honten'?paidLeaveDataH  :paidLeaveDataS;
  // 各日付の値が配列でなければ[]に正規化
  const dayOffData = Object.fromEntries(Object.entries(_rawDayOff||{}).map(([k,v])=>[k,Array.isArray(v)?v:[]]));
  const setDayOffData=calStore==='honten'?setDayOffDataH:setDayOffDataS;
  const pleaveData = Object.fromEntries(Object.entries(_rawPleave||{}).map(([k,v])=>[k,Array.isArray(v)?v:[]]));
  const setPleaveData=calStore==='honten'?setPaidLeaveDataH:setPaidLeaveDataS;

  // 店舗休業日判定（店舗別closedDays + 両店共通closedDates + 第2火曜）
  const storeCDays = Array.isArray(calStore==='honten'?closedDaysH:closedDaysS)
    ? (calStore==='honten'?closedDaysH:closedDaysS) : [];
  const storeCDates = Array.isArray(calStore==='honten'?closedDatesH:closedDatesS)
    ? (calStore==='honten'?closedDatesH:closedDatesS) : [];
  const ovOpen = Array.isArray(overrideOpenDates)?overrideOpenDates:[];
  const isStoreClosed=(year,month,day)=>{
    const dt=new Date(year,month,day);
    if(storeCDays.includes(dt.getDay()))return true;
    const ds=fmt(year,month,day);
    if(storeCDates.includes(ds))return true;
    if(isSecondTuesdayHoliday(year,month,day,ovOpen))return true;
    return false;
  };

  const handleDayClick=(dkk,year,month,day)=>{
    if(!selStaff)return;
    if(isStoreClosed(year,month,day))return; // 店休日は操作不可
    if(selType==='dayoff'){
      const cur=dayOffData[dkk]||[];
      if(cur.includes(selStaff)){
        setDayOffData(p=>({...p,[dkk]:(p[dkk]||[]).filter(n=>n!==selStaff)}));
      }else{
        setPleaveData(p=>({...p,[dkk]:(p[dkk]||[]).filter(n=>n!==selStaff)}));
        setDayOffData(p=>({...p,[dkk]:[...(p[dkk]||[]),selStaff]}));
      }
    }else{
      const cur=pleaveData[dkk]||[];
      if(cur.includes(selStaff)){
        setPleaveData(p=>({...p,[dkk]:(p[dkk]||[]).filter(n=>n!==selStaff)}));
      }else{
        setDayOffData(p=>({...p,[dkk]:(p[dkk]||[]).filter(n=>n!==selStaff)}));
        setPleaveData(p=>({...p,[dkk]:[...(p[dkk]||[]),selStaff]}));
      }
    }
  };

  const daysInMonth=new Date(cy,cm+1,0).getDate();
  const first=new Date(cy,cm,1).getDay();
  const weeks=[];let wk=Array(7).fill(null);
  for(let d=1;d<=daysInMonth;d++){
    const dow=(first+d-1)%7;wk[dow]=d;
    if(dow===6){weeks.push([...wk]);wk=Array(7).fill(null);}
  }
  if(wk.some(x=>x!==null))weeks.push([...wk]);
  const DOW2=['日','月','火','水','木','金','土'];

  // 月次集計（店舗休業日はスタッフ休日にカウント）
  const monthlySummary=staffList.map(s=>{
    let offs=0,leaves=0;
    for(let d=1;d<=daysInMonth;d++){
      const dkk=`${cy}-${cm+1}-${d}`;
      if(isStoreClosed(cy,cm,d)){offs++;continue;} // 店休日はスタッフ休日としてカウント
      if((dayOffData[dkk]||[]).includes(s.name))offs++;
      if((pleaveData[dkk]||[]).includes(s.name))leaves++;
    }
    return{name:s.name,offs,leaves};
  }).filter(s=>s.offs>0||s.leaves>0);

  const today=new Date();

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:2500,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="modal-box"
        style={{background:'white',borderRadius:16,width:'min(900px,97vw)',maxHeight:'94vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 24px 80px rgba(0,0,0,0.4)'}}>
