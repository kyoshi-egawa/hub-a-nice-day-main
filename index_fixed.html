                style={{flex:1,padding:'9px 12px',border:'2px solid #93c5fd',borderRadius:8,fontSize:13,outline:'none',fontFamily:'inherit'}}
                onKeyDown={e=>{if(e.key==='Enter')handlePickConfirm();}}/>
              <button onClick={handlePickConfirm}
                style={{padding:'9px 20px',background:'#2563eb',color:'white',border:'none',borderRadius:8,fontWeight:800,cursor:'pointer',fontSize:13,whiteSpace:'nowrap'}}>✓ 確定</button>
              <button onClick={()=>{setConfirm(null);setPickUser('');}}
                style={{padding:'9px 14px',background:'#f3f4f6',border:'none',borderRadius:8,cursor:'pointer',fontSize:13}}>取消</button>
            </div>
          </div>
        );
      })()}

      {/* 使い方ヒント：bottom left */}
      {pickMode&&!confirm&&!drag&&(
        <div style={{position:'fixed',bottom:24,left:24,zIndex:1700,background:'rgba(240,253,244,0.97)',border:'1px solid #86efac',borderRadius:10,padding:'9px 14px',fontSize:12,color:'#166534',boxShadow:'0 4px 16px rgba(0,0,0,0.12)',pointerEvents:'none'}}>
          💡 空きセルをクリック→右にスライド→離して日数確定
        </div>
      )}
      {!pickMode&&(
        <div style={{position:'fixed',bottom:24,left:24,zIndex:1700,fontSize:11,color:'#9ca3af',pointerEvents:'none'}}>
          予約バーをクリックで編集・削除
        </div>
      )}

      {/* == レンタカーセクション == */}
      {RENTAL_LOCAL.length > 0 && (()=>{
        // レンタカー専用ドラッグ状態
        const [rDrag,setRDrag]=React.useState(null);
        const [rConfirm,setRConfirm]=React.useState(null);
        const [rPickUser,setRPickUser]=React.useState('');
        const rDragging=React.useRef(false);

        const getRState=(carId,dateObj)=>{
          const {year,month,day}=dateObj;
          const dn=toNum(year,month,day);
          const resList=rentalResLocal[carId]||[];
          for(const r of resList){
            if(dn>=toNum(r.fy,r.fm,r.fd)&&dn<=toNum(r.ty,r.tm,r.td))return r;
          }
          return null;
        };

        const getRDragState=(carId,dateObj)=>{
          if(!pickMode)return getRState(carId,dateObj);
          const {year,month,day}=dateObj;
          const dn=toNum(year,month,day);
          if(rDrag&&rDrag.carId===carId){
            const s=toNum(rDrag.start.year,rDrag.start.month,rDrag.start.day);
            const e=toNum(rDrag.end.year,rDrag.end.month,rDrag.end.day);
            if(dn>=s&&dn<=e)return'drag';
          }
          if(rConfirm&&rConfirm.carId===carId){
            const s=toNum(rConfirm.start.year,rConfirm.start.month,rConfirm.start.day);
            const e=toNum(rConfirm.end.year,rConfirm.end.month,rConfirm.end.day);
            if(dn>=s&&dn<=e)return'confirm';
          }
          return getRState(carId,dateObj);
        };

        const rHandleMD=(carId,dateObj)=>{
          if(!pickMode)return;
          if(getRState(carId,dateObj))return;
          rDragging.current=true;
          setRDrag({carId,start:dateObj,end:dateObj});
        };
        const rHandleME=(carId,dateObj)=>{
          if(!pickMode||!rDragging.current||!rDrag||rDrag.carId!==carId)return;
          const s=toNum(rDrag.start.year,rDrag.start.month,rDrag.start.day);
          const e=toNum(dateObj.year,dateObj.month,dateObj.day);
          if(e>=s)setRDrag(p=>({...p,end:dateObj}));
        };
        const rHandleMU=()=>{
          if(!rDragging.current||!rDrag)return;
          rDragging.current=false;
          setRConfirm({...rDrag});
          setRDrag(null);
          setRPickUser(savedModalData?.name||'');
        };
        const rHandleConfirm=()=>{
          if(!rPickUser.trim()||!rConfirm)return;
          const {carId,start,end}=rConfirm;
          const id='rr'+Date.now();
          const rec={id,carId,user:rPickUser.trim(),
            fy:start.year,fm:start.month,fd:start.day,
            ty:end.year,tm:end.month,td:end.day,
            color:RES_COLORS[Object.keys(rentalResLocal).length%RES_COLORS.length]};
          onAddRentalRes(carId,rec);
          setRConfirm(null);setRPickUser('');
          // pickModeならモーダルに戻る（onPickRentalがあれば呼ぶ）
          if(pickMode&&onPickRental){
            onPickRental(carId,rec);
          }
        };

        return(
          <div style={{marginTop:22}}
            onMouseUp={rHandleMU}
            onMouseLeave={()=>{if(rDragging.current){rDragging.current=false;setRDrag(null);}}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <h3 style={{margin:0,fontSize:14,fontWeight:800,color:'#059669'}}>🔑 レンタカー（両店共通）</h3>
              <span style={{padding:'2px 8px',borderRadius:12,background:'#d1fae5',color:'#065f46',fontSize:10,fontWeight:700}}>{RENTAL_LOCAL.length}台</span>
              {pickMode&&<span style={{fontSize:11,color:'#059669',fontWeight:600}}>▶ 空きセルをドラッグで貸出設定</span>}
            </div>
            <div style={{overflowX:'auto',userSelect:'none',WebkitUserSelect:'none'}}>
              <table style={{borderCollapse:'collapse',fontSize:12,tableLayout:'fixed',width:'max-content'}}>
                <thead>
                  <tr>
                    <th style={{width:120,minWidth:120,maxWidth:120,background:'#d1fae5',padding:'7px 9px',textAlign:'left',fontWeight:700,border:'1px solid #a7f3d0',position:'sticky',left:0,zIndex:10,fontSize:11,boxSizing:'border-box'}}>レンタカー</th>
                    {dateRange.map((dateObj,i)=>{
                      if(!dateObj)return null;
                      const {year,month,day}=dateObj;
                      const dow=new Date(year,month,day).getDay();
                      const h2=selDate&&year===selDate.getFullYear()&&month===selDate.getMonth()&&day===selDate.getDate();
                      const isHol=isHoliday(year,month,day);
                      const isMonthStart=i===0||(dateRange[i-1]&&dateRange[i-1].month!==month);
                      return <th key={i} style={{width:28,minWidth:28,maxWidth:28,textAlign:'center',padding:'3px 0',border:'1px solid #a7f3d0',fontSize:9,background:h2?'#fef08a':isMonthStart?'#d1fae5':'#ecfdf5',color:dow===0||isHol?'#dc2626':dow===6?'#1d4ed8':'#374151',fontWeight:h2?800:600,boxSizing:'border-box'}}>
                        {isMonthStart&&<div style={{fontSize:7,fontWeight:800,color:'#059669'}}>{month+1}月</div>}
                        <div>{day}</div><div style={{fontSize:7}}>{DOW[dow]}</div>
                      </th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {RENTAL_LOCAL.map(car=>{
                    const tireId=tireData?tireData[String(car.id)]:null;
                    const tireInfo=TIRE_TYPES.find(x=>x.id===tireId);
                    const locId=locationData?locationData[String(car.id)]:null;
                    return (
                      <tr key={car.id}>
                        <td style={{background:'#f0fdf4',border:'1px solid #a7f3d0',padding:'5px 9px',fontWeight:600,fontSize:11,whiteSpace:'nowrap',position:'sticky',left:0,zIndex:5}}>
                          <div style={{display:'flex',alignItems:'center',gap:4,flexWrap:'wrap'}}>
                            {tireInfo&&<span title={tireInfo.label} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:22,height:16,borderRadius:3,background:tireInfo.bg,color:tireInfo.color,fontSize:9,fontWeight:900,flexShrink:0}}>{tireInfo.icon}</span>}
                            <div>
                              <div style={{fontWeight:700,color:'#065f46'}}>{car.name}</div>
                              <div style={{color:'#9ca3af',fontSize:9}}>{car.num}</div>
                            </div>
                            {locId==='honten'&&<span title="本店" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:18,height:18,borderRadius:3,background:'#2563eb',color:'white',fontSize:10,fontWeight:900,flexShrink:0,lineHeight:1}}>本</span>}
                            {locId==='sanda' &&<span title="三田店" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:18,height:18,borderRadius:3,background:'#dc2626',color:'white',fontSize:10,fontWeight:900,flexShrink:0,lineHeight:1}}>三</span>}
                            {locId==='out'   &&<span title="貸出中" style={{padding:'1px 4px',borderRadius:3,background:'#6b7280',color:'white',fontSize:9,fontWeight:700,flexShrink:0}}>🔑</span>}
                          </div>
                        </td>
                        {dateRange.map((dateObj,i)=>{
                          if(!dateObj)return null;
                          const {year,month,day}=dateObj;
                          const st=getRDragState(car.id,dateObj);
                          const isObj=st&&typeof st==='object';
                          const isDrag=st==='drag';
                          const isConf=st==='confirm';
                          const h2=selDate&&year===selDate.getFullYear()&&month===selDate.getMonth()&&day===selDate.getDate();
                          const isStart=isObj&&st.fd===day&&st.fm===month&&st.fy===year;
                          const bg=isDrag?'#bef264':isConf?'#93c5fd':isObj?(st.color||'#86efac'):h2?'#fef08a':'white';
                          const isFree=pickMode&&!isObj&&!isDrag&&!isConf;
                          const isBlocked=pickMode&&isObj;
                          return (
                            <td key={i}
                              onMouseDown={e=>{e.preventDefault();if(!isBlocked)rHandleMD(car.id,dateObj);}}
                              onMouseEnter={()=>{rHandleME(car.id,dateObj);if(!pickMode&&isObj)setHoverRes({car,res:{...st,_rental:true}});}}
                              onMouseLeave={()=>{if(!pickMode&&isObj)setHoverRes(null);}}
                              onClick={e=>{
                                if(!pickMode&&isObj){e.preventDefault();e.stopPropagation();setPinnedRes({car,res:{...st,_rental:true}});}
                              }}
                              style={{
                                width:28,minWidth:28,maxWidth:28,height:34,
                                border:'1px solid #a7f3d0',
                                boxShadow:isDrag?'inset 0 0 0 2px #65a30d':isConf?'inset 0 0 0 2px #2563eb':'none',
                                background:bg,
                                cursor:isBlocked?'not-allowed':isFree?'crosshair':!pickMode&&isObj?'pointer':'default',
                                padding:0,overflow:'hidden',position:'relative',boxSizing:'border-box'}}>
                              {isObj&&isStart&&(
                                <div style={{position:'absolute',left:2,top:'50%',transform:'translateY(-50%)',fontSize:8,color:'white',fontWeight:700,whiteSpace:'nowrap',textShadow:'0 1px 2px rgba(0,0,0,.5)',zIndex:2,pointerEvents:'none'}}>
                                  {st.user.length>6?st.user.slice(0,6)+'…':st.user}
                                </div>
                              )}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* レンタカー確定パネル */}
            {pickMode&&rConfirm&&(()=>{
              const {start,end}=rConfirm;
              const days=Math.floor((new Date(end.year,end.month,end.day)-new Date(start.year,start.month,start.day))/(1000*60*60*24))+1;
              return(
                <div style={{position:'fixed',bottom:80,left:'50%',transform:'translateX(-50%)',zIndex:1950,background:'white',border:'2px solid #059669',borderRadius:14,padding:'16px 24px',boxShadow:'0 8px 40px rgba(0,0,0,0.25)',minWidth:340,maxWidth:'90vw'}}>
                  <div style={{fontWeight:800,color:'#065f46',fontSize:14,marginBottom:12,textAlign:'center'}}>
                    🔑 {RENTAL_LOCAL.find(c=>c.id===rConfirm.carId)?.name}　{start.month+1}/{start.day}〜{end.month+1}/{end.day}（{days}日間）
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <input value={rPickUser} onChange={e=>setRPickUser(e.target.value)}
                      placeholder="利用者名を入力" autoFocus
                      style={{flex:1,padding:'9px 12px',border:'2px solid #6ee7b7',borderRadius:8,fontSize:13,outline:'none',fontFamily:'inherit'}}
                      onKeyDown={e=>{if(e.key==='Enter')rHandleConfirm();}}/>
                    <button onClick={rHandleConfirm}
                      style={{padding:'9px 20px',background:'#059669',color:'white',border:'none',borderRadius:8,fontWeight:800,cursor:'pointer',fontSize:13,whiteSpace:'nowrap'}}>✓ 確定</button>
                    <button onClick={()=>{setRConfirm(null);setRPickUser('');}}
                      style={{padding:'9px 14px',background:'#f3f4f6',border:'none',borderRadius:8,cursor:'pointer',fontSize:13}}>取消</button>
                  </div>
                </div>
              );
            })()}

            {/* レンタカードラッグ中バナー */}
            {pickMode&&rDrag&&(()=>{
              const {start,end}=rDrag;
              const days=Math.floor((new Date(end.year,end.month,end.day)-new Date(start.year,start.month,start.day))/(1000*60*60*24))+1;
              return(
                <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:1800,background:'rgba(5,150,105,0.95)',color:'white',borderRadius:10,padding:'10px 20px',fontSize:13,fontWeight:700,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',pointerEvents:'none',whiteSpace:'nowrap'}}>
                  🔑 {RENTAL_LOCAL.find(c=>c.id===rDrag.carId)?.name}　{start.month+1}/{start.day}〜{end.month+1}/{end.day}（{days}日間）　← 離して確定
                </div>
              );
            })()}
          </div>
        );
      })()}

      {/* 編集モーダル */}
      {editModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setEditModal(null)}>
          <div onClick={e=>e.stopPropagation()} className="modal-box" style={{background:'white',borderRadius:15,padding:'24px 28px',width:'min(420px,92vw)',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <h2 style={{fontSize:16,fontWeight:800,color:'#1e1b4b',margin:0}}>✎ 代車予約の編集 - {editModal.carName}</h2>
              <button onClick={()=>setEditModal(null)} style={{background:'#f3f4f6',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><X size={14}/></button>
            </div>
            <div style={{display:'grid',gap:12}}>
              <div><label style={LBL}>利用者名</label><input value={editForm.user} onChange={e=>setEditForm(p=>({...p,user:e.target.value}))} style={INP} autoFocus/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><label style={LBL}>貸出日</label><input type="date" value={editForm.startDate} onChange={e=>setEditForm(p=>({...p,startDate:e.target.value}))} style={INP}/></div>
                <div><label style={LBL}>返却日</label><input type="date" value={editForm.endDate} onChange={e=>setEditForm(p=>({...p,endDate:e.target.value}))} style={INP}/></div>
              </div>
              {/* 他の予約状況ミニプレビュー */}
              <div style={{background:'#f8fafc',borderRadius:6,padding:'8px 10px',fontSize:11,color:'#6b7280'}}>
                <strong style={{color:'#374151'}}>📅 {editModal.carName} の既存予約：</strong>
                {(loanerRes[editModal.carId]||[]).filter(r=>r.id!==editModal.resId).length===0
                  ?<span style={{marginLeft:6}}>なし</span>
                  :(loanerRes[editModal.carId]||[]).filter(r=>r.id!==editModal.resId).map(r=>(
                    <div key={r.id} style={{marginTop:3,color:'#dc2626'}}>
                      🚫 {r.user}：{r.fm+1}/{r.fd}〜{r.tm+1}/{r.td}
                    </div>
                  ))
                }
              </div>
            </div>
            <div style={{display:'flex',gap:8,marginTop:18}}>

      const finalUser=cleanData.name||user;
      setLoanerRes(prev=>{
        const cleaned={};

          cleaned[cid]=(prev[cid]||[]).filter(r=>r.bookingKey!==bookingKey);
        }
        return{...cleaned,[carId]:[...(cleaned[carId]||[]),{

      cleanData.loaner='';cleanData.loanerId=null;

      cleanData.rentalLabel='';
      cleanData.rentalCarId=null;

    setModalOpen(false);
    if(modalType==='insp'){
      const cleanWithStore={...cleanData,store:vsId};
      setInspData(prev=>{
        // nullをblankInspに正規化してからコピー
        const prev_rows=(prev[modalDk]||[]).map(r=>r||blankInsp());
        const rows=[...prev_rows];
        while(rows.length<=modalIdx)rows.push(blankInsp());
        
        // 1日の車検台数をカウント（承認済みの予約のみ）
        const approvedCount=rows.filter((r,i)=>i!==modalIdx&&r.name&&r.course&&!r.pendingApproval).length;
        // 台数制限（inspLimitsに設定があればそれを使用、なければ6台）
        const dayLimit=inspLimits[modalDk]??6;
        
        // 制限台数を超える場合は承認待ちフラグを立てる
        if(approvedCount>=dayLimit){
          cleanWithStore.pendingApproval=true;
          alert(`⚠️ 1日の車検台数が制限台数（${dayLimit}台）を超えました。\n本店での承認が必要です。`);
        }
        
        rows[modalIdx]=cleanWithStore;
        return{...prev,[modalDk]:rows};
      });
    }else{
      // 整備予約：入庫制限チェック
      const newSlot=formData._slot||modalSlot;
      const restriction=schedRestrictions[modalDk];
      
      if(restriction){
        // 制限時間帯かどうかをチェック
        const toMin=(t)=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
        const slotMin=toMin(newSlot);
        const startMin=toMin(restriction.startTime);
        const endMin=toMin(restriction.endTime);
        const isRestricted=slotMin>=startMin&&slotMin<endMin;
        
        // 制限時間帯の場合、制限解除項目に含まれていないかチェック
        if(isRestricted){
          const workId=cleanData.work;
          const isExempt=restriction.exemptWorks&&restriction.exemptWorks.includes(workId);
          
          if(!isExempt){
            alert(`🚫 この時間帯（${restriction.startTime}〜${restriction.endTime}）は入庫制限中です。\n制限解除されている作業内容のみ予約可能です。`);
            setModalOpen(true); // モーダルを再度開く
            return;
          }
        }
      }
      
      // フォーム内の_slotが変更された場合は新スロットに移動
      setSchedData(prev=>{
        const day={...(prev[modalDk]||{})};
        const baseModalSlot=getBaseSlot(modalSlot);
        const baseNewSlot=getBaseSlot(newSlot);
        if(newSlot!==modalSlot) delete day[modalSlot]; // 旧スロット削除
        day[newSlot]=cleanData;
        return{...prev,[modalDk]:day};
      });
      // bookingKeyも新スロットに更新
      if(newSlot!==modalSlot){
        const oldBk=`sched-${modalDk}-${modalSlot}`;
        const newBk=`sched-${modalDk}-${newSlot}`;
        setLoanerRes(prev=>{
          const next={};

            next[cid]=(prev[cid]||[]).map(r=>r.bookingKey===oldBk?{...r,bookingKey:newBk}:r);
          }
          return next;
        });
      }
    }
    const keyToRelease=curLockKey;
    setCurLockKey(null);
    setTimeout(()=>releaseLock(keyToRelease),200);
  },[modalType,modalDk,modalIdx,modalSlot,vsId,curLockKey,releaseLock,setInspData,setSchedData,setLoanerRes,schedRestrictions,setModalOpen,inspLimits,pendingRentalId,pendingRentalRec,pendingLoanerId,pendingLoanerData,dynRentalCars]);

                        onClick={()=>document.getElementById('sec-notes')?.scrollIntoView({behavior:'smooth'})}>

                  <div style={{position:'absolute',right:0,display:'flex',alignItems:'center',gap:6}}>
                    <button onClick={()=>setScale(s=>Math.max(70,s-10))} style={{...NAV_S,padding:'4px 7px'}}><ZoomOut size={13}/></button>
                    <span style={{fontSize:11,fontWeight:700,color:'#374151',minWidth:34,textAlign:'center'}}>{scale}%</span>
                    <button onClick={()=>setScale(s=>Math.min(150,s+10))} style={{...NAV_S,padding:'4px 7px'}}><ZoomIn size={13}/></button>
                    <button onClick={()=>setScale(100)} style={{padding:'4px 8px',background:'#f3f4f6',border:'none',borderRadius:5,cursor:'pointer',fontSize:10,color:'#374151'}}>100%</button>
                  </div>
                </div>
                {/* 2行目：スタッフバー（固定） */}
                {(()=>{
                  // 店舗休日の場合はスタッフ全員を休み扱い
                  const storeHoliday=isClosed(new Date(...dk.split('-').map((v,i)=>i===1?Number(v)-1:Number(v))));
                  const manualOffs=dayOffData[dk]||[];
                  const offs=storeHoliday?currentStaffList.map(s=>s.name):manualOffs;
                  const working=storeHoliday?[]:currentStaffList.filter(s=>!manualOffs.includes(s.name));
                  const dayoff=storeHoliday?currentStaffList:currentStaffList.filter(s=>manualOffs.includes(s.name));
                  return(
                    <div style={{display:'flex',alignItems:'stretch',border:'1px solid #e5e7eb',borderRadius:8,overflow:'hidden',marginBottom:6}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 12px',background:storeHoliday?'#f3f4f6':vsStore.bg,flex:1,flexWrap:'wrap',minWidth:0}}>
                        <span style={{fontSize:12}}>👤</span>
                        <span style={{fontWeight:700,fontSize:11,color:'#374151',whiteSpace:'nowrap'}}>本日</span>
                        {storeHoliday
                          ? <span style={{fontSize:11,color:'#9ca3af',fontStyle:'italic'}}>店休日（全員休み）</span>
                          : working.length>0
                            ? working.map(s=>(
                                <span key={s.id} style={{padding:'2px 9px',borderRadius:20,background:vsStore.bg,color:vsStore.accent,fontWeight:700,fontSize:11,border:`1px solid ${vsStore.color}55`,whiteSpace:'nowrap'}}>
                                  {s.name}
                                </span>
                              ))
                            : <span style={{fontSize:11,color:'#9ca3af',fontStyle:'italic'}}>—</span>
                        }
                      </div>
                      <div onClick={storeHoliday?undefined:()=>setShowDayOff(true)} title={storeHoliday?'店休日のため全員休み':'クリックして休日スタッフを編集'}

                          background:'repeating-linear-gradient(45deg,#f5f5f5,#f5f5f5 3px,#ebebeb 3px,#ebebeb 6px)',

                        {dayoff.length>0

                      </div>

                })()}
              </div>

              <div style={{padding:'14px 18px 0 18px',flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minHeight:0}}>
              {/* 編集中ロック表示 */}
              {(()=>{
                const al=Object.entries(locks).filter(([k,v])=>k.includes(dk)&&v.lockedBy!==currentUser.name);
                if(!al.length)return null;
                return <div style={{marginBottom:12,padding:'7px 12px',background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:7,display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}}>
                  <span style={{fontSize:12,fontWeight:700,color:'#92400e'}}>🔒 編集中：</span>
                  {al.map(([k,v])=><span key={k} style={{fontSize:11,background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:12,padding:'2px 8px',color:'#dc2626',fontWeight:600}}>{v.lockedBy}</span>)}
                </div>;
              })()}

              {/* -- 対応可能チェック・アラート（時間枠別・自店舗のみ） -- */}
              {(()=>{
                const storeHolidayChk=isClosed(new Date(...dk.split('-').map((v,i)=>i===1?Number(v)-1:Number(v))));
                const offs=storeHolidayChk?currentStaffList.map(s=>s.name):(dayOffData[dk]||[]);
                const workingCount=storeHolidayChk?0:currentStaffList.filter(s=>!offs.includes(s.name)).length;
                if(workingCount===0)return null;

                // 入庫時間を分単位に変換するヘルパー
                const toMin=t=>{
                  if(!t)return null;
                  const m=t.match(/(\d+):(\d+)/);
                  if(!m)return null;
                  return parseInt(m[1])*60+parseInt(m[2]);
                };

                // 自店舗の車検を枠別にカウント（承認済みのみ）（9:00〜9:29 → 9時枠、9:30〜9:59 → 9:30枠）
                const myInsps=(inspData[dk]||[]).filter(r=>r?.name&&!r.pendingApproval&&(r.store===vsId||(r.store==null&&vsId==='honten')));
                const insp900=myInsps.filter(r=>{const m=toMin(r.time);return m!=null&&m>=9*60&&m<9*60+30;}).length;
                const insp930=myInsps.filter(r=>{const m=toMin(r.time);return m!=null&&m>=9*60+30&&m<10*60;}).length;

                // スケジュールの09:00・09:30スロット件数（複数行対応）
                const countSchedSlot=(base)=>{
                  const day=schedData[dk]||{};
                  const keys=[base,...Object.keys(day).filter(k=>k.startsWith(base+'__'))];
                  return keys.filter(k=>day[k]?.name).length;
                };
                const sched900=countSchedSlot('09:00');
                const sched930=countSchedSlot('09:30');

                // 枠ごとの合計
                const total900=insp900+sched900;
                const total930=insp930+sched930;

                const alerts=[];
                [
                  {label:'9:00枠',total:total900,insp:insp900,sched:sched900},
                  {label:'9:30枠',total:total930,insp:insp930,sched:sched930},
                ].forEach(({label,total,insp,sched})=>{
                  if(total===0)return;
                  const isOver=total>workingCount;
                  const isEqual=total===workingCount;
                  if(!isOver&&!isEqual)return;
                  alerts.push({label,total,insp,sched,isOver,isEqual});
                });

                if(alerts.length===0)return null;
                return(
                  <div style={{marginBottom:12,fontSize:`${scale}%`,display:'flex',flexDirection:'column',gap:6}}>
                    {alerts.map(({label,total,insp,sched,isOver})=>(
                      <div key={label} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',background:isOver?'#fff1f2':'#fffbeb',border:`2px solid ${isOver?'#fca5a5':'#fcd34d'}`,borderRadius:9}}>
                        <span style={{fontSize:18,flexShrink:0}}>{isOver?'⚠️':'⚡'}</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:800,color:isOver?'#dc2626':'#d97706',fontSize:13}}>
                            【{label}】入庫台数が対応スタッフ数{isOver?'を超えています':'に達しています'}
                          </div>
                          <div style={{fontSize:11,color:isOver?'#9f1239':'#92400e',marginTop:2,display:'flex',gap:10,flexWrap:'wrap'}}>
                            <span>🚗 車検 <strong>{insp}台</strong></span>
                            <span>⏰ 整備 <strong>{sched}件</strong></span>
                            <span>＝ 合計 <strong>{total}件</strong></span>
                            <span>👤 スタッフ <strong>{workingCount}名</strong></span>
                            {isOver&&<span style={{color:'#dc2626',fontWeight:800}}>→ {total-workingCount}件オーバー</span>}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })()}

              {/* == スプリットパネル：左＝車検＋備考 ／ 右＝タイムスケジュール == */}
              {/* ドラッグで左右比率を変更、リセットで50:50に戻す */}
              <div ref={splitContainerRef}
                style={{display:'flex',gap:0,flex:1,overflow:'hidden',position:'relative',userSelect:isDraggingRef.current?'none':'auto'}}
                onMouseMove={e=>{
                  if(!isDraggingRef.current||!splitContainerRef.current)return;
                  const rect=splitContainerRef.current.getBoundingClientRect();
                  const pct=((e.clientX-rect.left)/rect.width)*100;
                  setSplitRatio(Math.min(93,Math.max(7,pct)));
                }}
                onMouseUp={()=>{isDraggingRef.current=false;document.body.style.cursor='';document.body.style.userSelect='';}}
                onMouseLeave={()=>{if(isDraggingRef.current){isDraggingRef.current=false;document.body.style.cursor='';document.body.style.userSelect='';}}}
              >

                {/* --- 左カラム --- */}
                <div style={{width:`${splitRatio}%`,minWidth:0,flexShrink:0,display:'flex',flexDirection:'column',gap:18,overflowY:'auto',height:'100%',paddingBottom:40}}>
              {/* -- 車検セクション（台数集計なし） -- */}
              <div id={SEC_INSP} style={{marginBottom:26,fontSize:`${scale}%`,scrollMarginTop:'var(--header-h,60px)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <h3 style={SEC_TITLE('#3730a3')}>🚗 車検</h3>
                  {/* 台数制限バッジ（設定中の日のみ表示） */}
                  {inspLimits[dk]!=null&&(
                    <div style={{display:'flex',alignItems:'center',gap:4,padding:'3px 8px',background:'#fee2e2',border:'2px solid #ef4444',borderRadius:6}}>
                      <span style={{fontSize:14}}>🚗</span>
                      <span style={{fontWeight:700,color:'#dc2626',fontSize:11}}>台数制限 最大{inspLimits[dk]}台</span>
                    </div>
                  )}
                  {/* 承認待ち警告アイコン */}
                  {(()=>{
                    const pendingCount=(inspData[dk]||[]).filter(r=>r?.name&&r.pendingApproval).length;
                    if(pendingCount===0)return null;
                    return <div style={{display:'flex',alignItems:'center',gap:4,padding:'3px 8px',background:'#fef3c7',border:'2px solid #f59e0b',borderRadius:6}}>
                      <span style={{fontSize:16}}>⚠️</span>
                      <span style={{fontWeight:700,color:'#d97706',fontSize:11}}>承認待ち {pendingCount}件</span>
                    </div>;
                  })()}
                  {/* +/- 枠ボタン：左詰め */}
                  {inspSlots>1&&<button onClick={()=>setInspSlots(s=>Math.max(1,s-1))} title="枠を削除" style={{display:'flex',alignItems:'center',gap:2,padding:'4px 9px',background:'#fef2f2',border:'2px solid #fca5a5',borderRadius:5,cursor:'pointer',fontWeight:700,fontSize:10,color:'#dc2626'}}><MinusSquare size={13}/></button>}

                </div>
                <div style={{overflowX:'auto'}}>
                  <table style={TBL}>
                    <thead><tr style={{background:'linear-gradient(90deg,#3730a3,#6d28d9)',color:'white'}}>

                    </tr></thead>
                    <tbody>
                      {(()=>{
                        const allRows=(inspData[dk]||[]);
                        const storeOrder=r=>r?.store==='honten'?0:r?.store==='sanda'?1:2;
                        const timeToMin=t=>{if(!t||typeof t!=='string')return 9999;const m=t.match(/(\d+):(\d+)/);return m?parseInt(m[1])*60+parseInt(m[2]):9999;};
                        const confirmed=allRows
                          .map((r,i)=>({...(r&&r.name?r:blankInsp()),_origIdx:i}))
                          .filter(r=>!!(r.name))
                          .sort((a,b)=>{
                            const so=storeOrder(a)-storeOrder(b);
                            if(so!==0)return so;
                            return timeToMin(a.time)-timeToMin(b.time);
                          });
                        const display=[...confirmed,{...blankInsp(),_origIdx:confirmed.length}];
                        // 台数制限取得（設定なければ6）
                        const dayInspLimit=inspLimits[dk]??6;
                        
                        const rows=[];
                        let alertShown=false;
                        display.forEach((row,dispIdx)=>{
                          const origIdx=row._origIdx??dispIdx;
                          const {_origIdx,...cleanRow}=row;
                          const isOverLimit=dispIdx>=dayInspLimit;
                          const isBlankAdd=!row.name&&dispIdx===display.length-1;
                          
                          // 制限超過の場合、空の追加行はスキップ
                          if(isOverLimit&&isBlankAdd)return;
                          
                          // 初めての制限超過行の前にアラートバナーを挿入
                          if(isOverLimit&&!alertShown){
                            alertShown=true;
                            rows.push(
                              <tr key="limit-alert">
                                <td colSpan={8} style={{padding:'7px 14px',background:'linear-gradient(90deg,#fee2e2,#fff1f2)',border:'2px solid #fca5a5',textAlign:'center',fontSize:12,fontWeight:800,color:'#dc2626'}}>
                                  🚫 台数制限 — この日の車検は最大 {dayInspLimit}台 です。これ以上の予約はできません。
                                </td>
                              </tr>
                            );
                          }
                          rows.push(
                            <InspRow key={`${origIdx}-${dispIdx}`} row={cleanRow} idx={origIdx} dispNo={dispIdx+1} dk={dk} onOpenModal={handleOpenModal} lockInfo={getInspLock(dk,origIdx)} loanerRes={loanerRes} vsId={vsId} onApprove={handleApprove} isOverLimit={isOverLimit} setItems={setItems}/>
                          );
                        });
                        return rows;
                      })()}
                    </tbody>
                  </table>
                </div>
              </div>

                      alert(`${lk.lockedBy}さんが編集中です`);return;
                    }
                    acquireLock(mk,currentUser?.name);setCurLockKey(mk);
                    setMemoModal(true);
                  }} title="備考を追加" style={{display:'flex',alignItems:'center',gap:3,padding:'4px 10px',background:'#fef3c7',border:'2px solid #fbbf24',borderRadius:5,cursor:'pointer',fontWeight:700,fontSize:11,color:'#d97706'}}><PlusSquare size={12}/>追加</button>

                </div>
                {dayMemos.length===0
                  ?<div style={{padding:'18px',textAlign:'center',color:'#9ca3af',fontSize:12,background:'#fffbeb',borderRadius:8,border:'1px dashed #fcd34d'}}>「追加」ボタンで備考を入力できます</div>
                  :<div style={{display:'grid',gap:8}}>
                    {dayMemos.map((memo,i)=>(
                      <div key={i} onClick={()=>{
                        const mk=`lock-memo-${dk}`;
                        const lk=locks[mk];
                        if(lk&&Date.now()-lk.lockedAt<LOCK_TTL&&lk.lockedBy!==currentUser?.name){
                          alert(`${lk.lockedBy}さんが編集中です`);return;
                        }
                        acquireLock(mk,currentUser?.name);setCurLockKey(mk);
                        setMemoModal(i);
                      }} style={{background:'#fffbeb',border:'2px solid #fcd34d',borderRadius:8,padding:'10px 14px',position:'relative',cursor:'pointer'}}
                        onMouseEnter={e=>e.currentTarget.style.borderColor='#f59e0b'}
                        onMouseLeave={e=>e.currentTarget.style.borderColor='#fcd34d'}>
                        <div style={{fontSize:13,color:'#78350f',whiteSpace:'pre-wrap',paddingRight:24,minHeight:20}}>{memo.content||<span style={{color:'#d97706',fontStyle:'italic'}}>（空の備考）</span>}</div>
                        <div style={{position:'absolute',top:7,right:7,fontSize:9,color:'#a16207'}}>✏️ 編集</div>
                      </div>
                    ))}
                  </div>
                }
              </div>
                </div>{/* /左カラム */}

                {/* --- ドラッグ境界線 --- */}
                <div
                  onMouseDown={e=>{
                    e.preventDefault();
                    isDraggingRef.current=true;
                    document.body.style.cursor='col-resize';
                    document.body.style.userSelect='none';
                  }}
                  style={{
                    width:10,flexShrink:0,cursor:'col-resize',
                    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                    position:'relative',zIndex:10,alignSelf:'stretch',minHeight:200,
                    background:'transparent',
                  }}
                  title="ドラッグして左右幅を調整"
                >
                  {/* 視覚的な線 */}
                  <div style={{
                    position:'absolute',top:0,bottom:0,left:'50%',transform:'translateX(-50%)',
                    width:3,background:'linear-gradient(180deg,#c7d2fe,#6366f1,#c7d2fe)',
                    borderRadius:4,opacity:0.7,
                    transition:'opacity 0.15s,width 0.15s',
                  }}
                    onMouseEnter={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.width='5px';}}
                    onMouseLeave={e=>{e.currentTarget.style.opacity='0.7';e.currentTarget.style.width='3px';}}
                  />
                  {/* グリップドット */}
                  <div style={{
                    position:'relative',zIndex:1,display:'flex',flexDirection:'column',gap:4,
                    padding:'8px 0',
                  }}>
                    {[0,1,2].map(i=>(
                      <div key={i} style={{width:5,height:5,borderRadius:'50%',background:'#6366f1',opacity:0.8}}/>
                    ))}
                  </div>
                </div>

                {/* --- 右カラム --- */}
                <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
              {/* -- スケジュールヘッダー（完全固定・絶対に動かない） -- */}
              <div style={{flexShrink:0,display:'flex',alignItems:'center',gap:8,background:'white',zIndex:300,paddingTop:6,paddingBottom:6,borderBottom:'2px solid #e0f2fe',paddingLeft:4,paddingRight:4}}>
                  {/* リセットボタン：タイムスケジュールの左隣 */}
                  {splitRatio!==50&&(
                    <button
                      onClick={()=>setSplitRatio(50)}
                      title="左右を均等に戻す"
                      style={{display:'flex',alignItems:'center',gap:3,padding:'4px 9px',
                        background:'#eef2ff',border:'2px solid #6366f1',borderRadius:5,
                        cursor:'pointer',fontWeight:700,fontSize:10,color:'#4338ca',
                        flexShrink:0,whiteSpace:'nowrap'}}>
                      ⇔ リセット
                    </button>
                  )}
                  <h3 style={SEC_TITLE('#0891b2')}>⏰ タイムスケジュール</h3>
                  {/* 入庫制限の警告アイコン */}
                  {schedRestrictions[dk]&&(()=>{
                    const r=schedRestrictions[dk];
                    return <div style={{display:'flex',alignItems:'center',gap:4,padding:'3px 8px',background:'#fee2e2',border:'2px solid #ef4444',borderRadius:6}}>
                      <span style={{fontSize:16}}>🚫</span>
                      <span style={{fontWeight:700,color:'#dc2626',fontSize:11}}>入庫制限 {r.startTime}〜{r.endTime}</span>
                    </div>;
                  })()}
                  <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                    <button onClick={()=>setSchedCollapsed(p=>!p)}
                      style={{display:'flex',alignItems:'center',gap:3,padding:'4px 10px',background:schedCollapsed?'#eff6ff':'#f0fdf4',border:`2px solid ${schedCollapsed?'#93c5fd':'#86efac'}`,borderRadius:5,cursor:'pointer',fontSize:10,color:schedCollapsed?'#1d4ed8':'#16a34a',fontWeight:700}}>
                      {schedCollapsed?'▼ 開く':'▲ 畳む'}
                    </button>
                    <button onClick={()=>setRestrictionModal(true)} title="入庫制限設定" style={{display:'flex',alignItems:'center',gap:3,padding:'4px 10px',background:'#fef2f2',border:'2px solid #fca5a5',borderRadius:5,cursor:'pointer',fontSize:10,color:'#dc2626',fontWeight:700}}>
                      🚫 入庫制限
                    </button>
                  </div>

                </div>
              <div id={SEC_SCHED} style={{flex:1,overflow:'auto',fontSize:`${scale}%`}}>
                <div style={{minWidth:'max-content'}}>
                  <table style={{...TBL,width:'100%'}}>
                    <thead><tr style={{background:'linear-gradient(90deg,#0e7490,#0891b2)',color:'white',position:'sticky',top:0,zIndex:5}}>
                      {['時間','氏名','車種','作業','代車・レンタカー','指・見','内容'].map(h=><th key={h} style={{padding:'7px 8px',textAlign:'left',fontSize:12,fontWeight:600,whiteSpace:'nowrap'}}>{h}</th>)}
                    </tr></thead>
                    <tbody>
                      {TIME_SLOTS.map(slot=>{
                        // baseSlotの全サブキーを取得（既存行 + 空の基本行）
                        const subKeys=getSchedSubKeys(dk,slot);
                        // 最後の行が空（name未入力）でない場合は+ボタン行を追加
                        const lastKey=subKeys[subKeys.length-1];
                        const lastRow=schedData[dk]?.[lastKey];
                        const lastHasData=lastRow&&lastRow.name;
                        // 次のサブキーを計算
                        const nextSub=subKeys.length; // 0-base→sub=1,2,3...
                        const nextKey=makeSlotKey(slot,nextSub);
                        const isHour=slot.endsWith(':00');
                        // 畳んでいる時：この時間帯に予約がある行のみ表示
                        const hasBookingInSlot=subKeys.some(k=>(schedData[dk]?.[k]?.name));
                        if(schedCollapsed&&!hasBookingInSlot) return null;
                        // 入庫制限チェック（同時刻追加ボタン用・nullガード付き）
                        const _slotRestr=schedRestrictions[dk];
                        const isSlotRestricted=!!(()=>{
                          try{
                            if(!_slotRestr||!_slotRestr.startTime||!_slotRestr.endTime)return false;
                            const _tm=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
                            return _tm(slot)>=_tm(_slotRestr.startTime)&&_tm(slot)<_tm(_slotRestr.endTime);
                          }catch(e){return false;}
                        })();
                        return(
                          <React.Fragment key={slot}>
                            {subKeys.map((subKey,si)=>{
                              // 畳んでいる時：予約のない行はスキップ
                              const rowData=getSchedRow(dk,subKey);
                              if(schedCollapsed&&!rowData?.name) return null;
                              return(
                              <SchedRow key={subKey}
                                row={rowData}
                                slot={subKey}
                                baseSlot={slot}
                                isFirstSub={si===0}
                                dk={dk}
                                onOpenModal={handleOpenModal}
                                lockInfo={getSchedLock(dk,subKey)}
                                loanerRes={loanerRes}
                                vsId={vsId}
                                restriction={schedRestrictions[dk]}
                                setItems={setItems}/>
                              );
                            })}
                            {/* +ボタン行：畳んでいない時のみ表示・入庫制限時間帯は非表示 */}
                            {!schedCollapsed&&lastHasData&&!isSlotRestricted&&(
                              <tr style={{background:'#f0feff'}}>
                                <td style={{...TD,paddingLeft:10,borderLeft:'3px solid #7dd3fc'}}>
                                  <span style={{fontSize:10,color:'#7dd3fc',fontWeight:500}}>{slot}</span>
                                </td>
                                <td colSpan={6} style={TD}>
                                  <button
                                    onClick={()=>handleOpenModal('sched',dk,null,nextKey,true)}
                                    style={{display:'flex',alignItems:'center',gap:4,padding:'3px 10px',background:'#e0f2fe',border:'2px dashed #7dd3fc',borderRadius:6,cursor:'pointer',fontSize:11,fontWeight:700,color:'#0369a1'}}>
                                    <span style={{width:16,height:16,border:'2px solid #0891b2',borderRadius:3,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:900,color:'#0891b2'}}>+</span>
                                    同時刻に追加
                                  </button>
                                </td>
                              </tr>
                            )}
                          </React.Fragment>
                        );
                      }).filter(Boolean)}
                    </tbody>
                  </table>
                </div>
              </div>


                </div>{/* /右カラム */}

              </div>{/* /スプリットパネル */}
              </div>{/* /padding div */}
            </div>
          );
        })()}

        {/* -- 顧客リスト -- */}
        {view==='customers'&&(
          <CustomerListView
            custFiles={custFiles}
            setCustFiles={setCustFiles}
            onOpenBooking={handleOpenBooking}
            onCustBooking={handleCustBooking}
            onCustEditBooking={handleCustEditBooking}
            selDate={selDate}
            setSelDate={setSelDate}
            setView={setView}
            currentUser={currentUser}
            inspData={inspData}
            loanerRes={loanerRes}
            onUpdateCustStatus={handleUpdateCustStatus}
          />
        )}

        {/* -- 代車管理 -- */}
        {view==='loaner'&&(
          <div style={{background:'white',borderRadius:13,padding:18,boxShadow:'0 10px 40px rgba(0,0,0,.18)',borderTop:`4px solid ${vsStore.color}`}}>
            <LoanerGrid
              loanerRes={loanerRes} loanerMonth={loanerMonth} setLoanerMonth={setLoanerMonth}
              onAddRes={addLoanerRes} onDeleteRes={deleteLoanerRes} onUndo={undoLoanerRes}
              selDate={selDate} onBack={handleLoanerBack} onPickLoaner={handlePickLoaner}
              pickMode={pickMode} locks={locks} currentUser={currentUser}
              onLockCar={handleLockCar} onUnlockCar={handleUnlockCar}
              savedModalData={savedModalData}
              inspData={inspData} schedData={schedData}
              onOpenBooking={handleOpenBooking}
              pinnedRes={loanerPinnedRes} setPinnedRes={stablePinnedSetter}
              hoverRes={loanerHoverRes}   setHoverRes={stableHoverSetter}
              storeLoaners={currentLoaners} storeInfo={STORES.find(s=>s.id===vsId)}
              rentalCars={dynRentalCars} rentalRes={rentalResData}
              onAddRentalRes={addRentalRes} onDeleteRentalRes={deleteRentalRes}
              onPickRental={handlePickRental}
              onOpenSettings={()=>setShowLoanerSettings(true)}
              tireData={carTireData}
              locationData={rentalLocData}
              onOpenTireEdit={()=>setShowTireEdit(true)}
              onOpenLocationEdit={()=>setShowLocationEdit(true)}/>
          </div>
        )}
      </main>

      {/* -- 代車設定モーダル -- */}
      <LoanerSettingsModal
        isOpen={showLoanerSettings}
        onClose={()=>setShowLoanerSettings(false)}
        listH={dynLoanerListH}
        listS={dynLoanerListS}
        onSaveH={v=>setLoanerListH(v)}
        onSaveS={v=>setLoanerListS(v)}
        rentalList={dynRentalCars}
        onSaveRental={v=>setRentalCars(v)}/>

      {/* -- タイヤ種別編集モーダル -- */}
      <TireEditModal
        isOpen={showTireEdit}
        onClose={()=>setShowTireEdit(false)}
        allCarsH={dynLoanerListH}
        allCarsS={dynLoanerListS}
        rentalCars={dynRentalCars}
        tireData={carTireData}
        onSave={v=>setCarTireData(v)}/>

      {/* -- レンタカー所在地編集モーダル -- */}
      <RentalLocationModal
        isOpen={showLocationEdit}
        onClose={()=>setShowLocationEdit(false)}
        rentalCars={dynRentalCars}
        locationData={rentalLocData}
        onSave={v=>setRentalLocData(v)}/>

      {/* -- 備考モーダル -- */}
      {memoModal!==false&&(()=>{
        const isNew=memoModal===true;
        const idx=isNew?null:memoModal;
        const initContent=isNew?'':(dayMemos[idx]?.content||'');
        return <MemoModal
          isNew={isNew}
          initContent={initContent}
          dateLabel={dateLabel}
          onSave={(content)=>{
            if(isNew){
              setMemoData(p=>({...p,[dk]:[...(p[dk]||[]),{content}]}));
            } else {
              setMemoData(p=>{const u=[...(p[dk]||[])];u[idx]={content};return{...p,[dk]:u};});
            }
            releaseLock(curLockKey);setCurLockKey(null);
            setMemoModal(false);
          }}
          onDelete={isNew?null:()=>{
            setMemoData(p=>({...p,[dk]:(p[dk]||[]).filter((_,j)=>j!==idx)}));
            releaseLock(curLockKey);setCurLockKey(null);
            setMemoModal(false);
          }}
          onClose={()=>{releaseLock(curLockKey);setCurLockKey(null);setMemoModal(false);}}
        />;
      })()}

      {/* -- 入庫制限モーダル -- */}
      <RestrictionModal
        isOpen={restrictionModal}
        onClose={()=>setRestrictionModal(false)}
        dateLabel={dateLabel}
        dk={dk}
        restriction={schedRestrictions[dk]}
        onSave={(data)=>{
          if(data===null){
            // 制限解除
            setSchedRestrictions(prev=>{
              const updated={...prev};
              delete updated[dk];
              return updated;
            });
          }else{
            // 制限設定
            setSchedRestrictions(prev=>({...prev,[dk]:data}));
          }
        }}
      />

      {/* -- 車検台数制限モーダル -- */}
      <InspLimitModal
        isOpen={showInspLimitModal}
        onClose={()=>setShowInspLimitModal(false)}
        curMonth={curMonth}
        inspLimits={inspLimits}
        onSave={(dk,count)=>{
          if(count===null){
            setInspLimits(prev=>{const u={...prev};delete u[dk];return u;});
          }else{
            setInspLimits(prev=>({...prev,[dk]:count}));
          }
        }}
      />

      {/* -- スタッフ休日・有給カレンダーモーダル -- */}
      <StaffCalendarModal
        isOpen={showStaffCal}
        onClose={()=>setShowStaffCal(false)}
        initMonth={curMonth}
        currentUser={currentUser}
        dynStaffH={dynStaffH} dynStaffS={dynStaffS}
        dayOffDataH={dayOffDataH}   setDayOffDataH={setDayOffDataH}
        dayOffDataS={dayOffDataS}   setDayOffDataS={setDayOffDataS}
        paidLeaveDataH={paidLeaveDataH} setPaidLeaveDataH={setPaidLeaveDataH}
        paidLeaveDataS={paidLeaveDataS} setPaidLeaveDataS={setPaidLeaveDataS}
        closedDaysH={closedDaysH} closedDaysS={closedDaysS}
        closedDatesH={closedDatesH} closedDatesS={closedDatesS}
        overrideOpenDates={Array.isArray(overrideOpenDates)?overrideOpenDates:[]}
      />

      {/* -- 予約モーダル（左スライドパネル） -- */}
      <BookingModal
        isOpen={modalOpen} onClose={handleCloseModal} type={modalType}
        initialData={modalData} isNew={modalIsNew}
        dateLabel={dateLabel} timeSlot={modalSlot}
        onSave={handleSaveModal} onDelete={handleDeleteModal}
        onOpenLoanerPicker={handleOpenLoanerPicker} pendingLoanerId={pendingLoanerId}
        pendingRentalId={pendingRentalId} pendingRentalRec={pendingRentalRec}
        rentalCarsData={dynRentalCars}
        loanerRes={loanerRes} modalDk={modalDk}
        onDeleteLoaner={handleDeleteLoaner}
        currentUser={currentUser}
        setItems={setItems}
        onOpenSetItemEdit={()=>setShowSetItemEdit(true)}
        allCars={currentLoaners}/>

      {/* -- 休業日設定 -- */}
      <HolidayModal isOpen={showHoliday} onClose={()=>setShowHoliday(false)}
        closedDays={closedDays} setClosedDays={setClosedDays}
        closedDates={closedDates} setClosedDates={setClosedDates}
        overrideOpenDates={Array.isArray(overrideOpenDates)?overrideOpenDates:[]}
        setOverrideOpenDates={setOverrideOpenDates}/>

      {/* -- 休日スタッフモーダル -- */}
      <DayOffModal
        isOpen={showDayOff}
        onClose={()=>setShowDayOff(false)}
        dateLabel={dateLabel}
        staffList={currentStaffList.length>0?currentStaffList:DEFAULT_STAFF_HONTEN}
        selected={dayOffData[dk]||[]}
        onSave={names=>{
          setDayOffData(prev=>({...prev,[dk]:names}));
          setShowDayOff(false);
        }}/>

      {/* -- 空き枠検索 -- */}
      <SearchModal isOpen={showSearch} onClose={()=>setShowSearch(false)}
        inspData={inspData} schedData={schedData}
        closedDays={closedDays} closedDates={closedDates}
        overrideOpenDates={Array.isArray(overrideOpenDates)?overrideOpenDates:[]}
        onNavigate={handleSearchNavigate}/>

      {/* -- セットアイテム編集 -- */}
      <SetItemEditModal
        isOpen={showSetItemEdit}
        onClose={()=>setShowSetItemEdit(false)}
        items={Array.isArray(quickItemsRaw)&&quickItemsRaw.length>0?quickItemsRaw.map(si=>({...si,text:si.text??si.content??si.label??''})):DEFAULT_SET_ITEMS}
        onSave={v=>setSetItems(v)}/>
    </div>
  );
}

function App(){return <ErrorBoundary><AppInner/></ErrorBoundary>;}

// - スタイル定数 -
const NAV_S    ={background:'#4338ca',color:'white',border:'none',borderRadius:7,padding:7,cursor:'pointer',display:'flex',alignItems:'center'};
const BACK_S   ={display:'flex',alignItems:'center',gap:4,padding:'5px 11px',background:'#f3f4f6',border:'none',borderRadius:6,cursor:'pointer',fontWeight:600,fontSize:12,color:'#374151'};
const TBL      ={width:'100%',borderCollapse:'collapse',border:'1px solid #e5e7eb',borderRadius:8,overflow:'hidden',tableLayout:'auto'};
const TD       ={padding:'7px 9px',borderBottom:'1px solid #f3f4f6',borderRight:'1px solid #f3f4f6'};
const LBL      ={display:'block',fontSize:13,fontWeight:700,color:'#374151',marginBottom:5};
const INP      ={width:'100%',padding:'9px 12px',border:'2px solid #e5e7eb',borderRadius:8,fontSize:14,outline:'none',transition:'border .15s',boxSizing:'border-box'};
const SEC_TITLE=(color)=>({fontSize:15,fontWeight:800,marginBottom:0,paddingBottom:5,borderBottom:`3px solid ${color}`,color:'#1e1b4b',margin:0});
const JUMP_BTN =(color)=>({display:'flex',alignItems:'center',gap:3,padding:'5px 10px',borderRadius:6,border:`2px solid ${color}`,background:'white',color,fontWeight:700,fontSize:12,cursor:'pointer'});


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
