<script>
  // ===== 自動アップデート検知（PC版 index と同じ方式・Service Workerなし・HTTPキャッシュのみ） =====
  // iOSのホーム画面PWAはHTMLを長くキャッシュするため、開いたまま/再訪では旧版が残りがち。
  // 画面復帰時と定期に自分自身をno-storeで取得し、__APP_BUILDが変わっていれば更新バナーを表示する。
  // タップ時は cache:'reload' で新HTMLをHTTPキャッシュへ焼き直してから reload するので、確実に新版になる
  // （アプリを消したりURLを打ち直す必要はない）。本番デプロイ時は port_to_main.js が __APP_BUILD を自動更新する。
  window.__APP_BUILD='build-1783933500605';
  (function(){
    var RUNNING=window.__APP_BUILD, shown=false, checking=false;
    function banner(){
      if(shown||!document.body)return; shown=true;
      var b=document.createElement('div');
      b.textContent='🔄 新しいバージョンがあります（タップして更新）';
      b.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:2147483647;background:#0e7490;color:#fff;text-align:center;padding:calc(14px + env(safe-area-inset-bottom,0px)) 12px 14px;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 -2px 12px rgba(0,0,0,.35)';
      b.onclick=async function(){
        b.textContent='更新中…';
        try{await fetch(location.pathname+'?_v='+Date.now(),{cache:'reload'});}catch(e){}
        location.reload();
      };
      document.body.appendChild(b);
    }
    async function check(){
      if(shown||checking||navigator.onLine===false)return; checking=true;
      try{
        var res=await fetch(location.pathname+'?_v='+Date.now(),{cache:'no-store'});
        if(res&&res.ok){
          var t=await res.text();
          var m=t.match(/__APP_BUILD='(build-\d+)'/);
          if(m&&m[1]!==RUNNING)banner();
        }
      }catch(e){}
      checking=false;
    }
    document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible')check();});
    setTimeout(check,30000);
    setInterval(check,15*60*1000);
  })();
</script>

const calIsClosed=(date,cDays=[],cDates=[],ovOpen=[])=>{
  if(!date||isNaN(date))return false;
  const days=Array.isArray(cDays)?cDays:[],dates=Array.isArray(cDates)?cDates:[],ov=Array.isArray(ovOpen)?ovOpen:[];
  if(days.includes(date.getDay()))return true;
  const ds=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  if(dates.includes(ds))return true;
  const d2=getSecondTuesday(date.getFullYear(),date.getMonth());
  if(d2===date.getDate()&&!ov.includes(ds))return true;
  return false;
};

};

const recomputeInspApproval=(rows,limit)=>{
  const lim=(limit!=null)?limit:6;
  const out=rows.map(r=>(r?{...r}:r));
  const active=out
    .map((r,i)=>({r,i}))
    .filter(x=>x.r&&x.r.name&&x.r.course&&x.r.bookingStatus!=='cancelled');
  active.sort((a,b)=>{
    const sa=(a.r.seq!=null)?a.r.seq:a.i;
    const sb=(b.r.seq!=null)?b.r.seq:b.i;
    return sa-sb;
  });
  let conf=0,reg=0;
  for(const {r} of active){
    const isReg=Number(r.course)===3;
    const eligible=(conf<lim)&&(!isReg||reg<3);
    if(eligible){
      delete r.pendingApproval;
      delete r.approved;
      conf++;if(isReg)reg++;
    }else if(r.approved){
      delete r.pendingApproval;
      conf++;if(isReg)reg++;
    }else{
      r.pendingApproval=true;
    }
  }
  return out;
};

      for(const r of Object.values(loanerRes[cid]||{})){

};

const CalendarView=({inspData,closedDays,closedDates,overrideOpen,vsId,onSelectDate})=>{
  const today=new Date();
  const [cur,setCur]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const cy=cur.getFullYear(),cm=cur.getMonth();
  const dim=new Date(cy,cm+1,0).getDate();
  const fdow=new Date(cy,cm,1).getDay();
  const dayCnt=useMemo(()=>{
    const res={};
    for(let d=1;d<=dim;d++){
      const dk=`${cy}-${cm+1}-${d}`;
      const rows=(inspData[dk]||[]).filter(r=>r&&r.name&&!r.pendingApproval&&r.bookingStatus!=='cancelled');
      if(rows.length)res[d]={total:rows.length,courses:rows.reduce((a,r)=>{if(r.course)a[r.course]=(a[r.course]||0)+1;return a;},{})};
    }
    return res;
  },[inspData,cy,cm]);
  const weeks=[];let wk=Array(7).fill(null);
  for(let d=1;d<=dim;d++){const dow=(fdow+d-1)%7;wk[dow]=d;if(dow===6||d===dim){weeks.push([...wk]);wk=Array(7).fill(null);}}
  return(
    <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
      <div style={{padding:'10px 14px',background:'white',borderBottom:'1px solid #f1f5f9',borderTop:'3px solid #1d4ed8',display:'flex',alignItems:'center',gap:8}}
        onTouchStart={e=>{e.currentTarget._sx=e.touches[0].clientX;e.currentTarget._sy=e.touches[0].clientY;}}
        onTouchEnd={e=>{
          const dx=e.changedTouches[0].clientX-(e.currentTarget._sx||0);
          const dy=e.changedTouches[0].clientY-(e.currentTarget._sy||0);
          e.currentTarget._sx=null;
          if(Math.abs(dx)<30||Math.abs(dy)>Math.abs(dx))return;
          setCur(new Date(cy,cm+(dx<0?1:-1),1));
        }}>
        <button onClick={()=>setCur(new Date(cy,cm-1,1))} style={{width:36,height:36,borderRadius:10,border:'2px solid #e5e7eb',background:'white',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>&#8249;</button>
        <div style={{flex:1,textAlign:'center'}}>
          <div style={{fontWeight:900,fontSize:18}}>{cy}年 {cm+1}月</div>
          <div style={{fontSize:10,color:'#94a3b8'}}>← スワイプで月移動 / タップで詳細 →</div>
        </div>
        <button onClick={()=>setCur(new Date(cy,cm+1,1))} style={{width:36,height:36,borderRadius:10,border:'2px solid #e5e7eb',background:'white',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>&#8250;</button>
      </div>
      <div style={{padding:'8px 8px 16px'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
          {DOW.map((d,i)=><div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,color:i===0?'#ef4444':i===6?'#3b82f6':'#64748b',padding:'4px 0'}}>{d}</div>)}
        </div>
        {weeks.map((wk,wi)=>(
          <div key={wi} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:2}}>
            {wk.map((d,di)=>{
              if(!d)return <div key={di}/>;
              const date=new Date(cy,cm,d);
              const closed=calIsClosed(date,closedDays,closedDates,overrideOpen);
              const isToday=d===today.getDate()&&cm===today.getMonth()&&cy===today.getFullYear();
              const isSun=di===0,isSat=di===6,isHol=isHoliday(cy,cm,d);
              const info=dayCnt[d];
              return(
                <div key={di} onClick={()=>!closed&&onSelectDate(`${cy}-${cm+1}-${d}`,cy,cm,d)}
                  style={{borderRadius:10,background:closed?'#f8fafc':isToday?'#dbeafe':'white',border:isToday?'2px solid #3b82f6':'2px solid #f1f5f9',minHeight:58,padding:'5px 3px',cursor:closed?'default':'pointer',opacity:closed?0.4:1,boxShadow:info&&!closed?'0 2px 6px rgba(0,0,0,.08)':'none'}}>
                  <div style={{textAlign:'center',fontWeight:800,fontSize:14,color:isToday?'#1e40af':closed?'#94a3b8':isSun||isHol?'#ef4444':isSat?'#3b82f6':'#1e293b'}}>{d}</div>
                  {info&&!closed&&(
                    <div style={{marginTop:2}}>
                      <div style={{textAlign:'center',fontSize:9,fontWeight:800,color:isToday?'#1e40af':'#374151',marginBottom:1}}>{info.total}台</div>
                      <div style={{display:'flex',gap:1,justifyContent:'center',flexWrap:'wrap'}}>
                        {Object.entries(info.courses).map(([cid,cnt])=>{const c=COURSES.find(co=>co.id===Number(cid));return c?<span key={cid} style={{fontSize:8,fontWeight:700,padding:'0 3px',borderRadius:3,background:c.bg,color:c.color}}>{c.short}{cnt}</span>:null;})}
                      </div>
                    </div>
                  )}
                  {closed&&<div style={{textAlign:'center',fontSize:8,color:'#94a3b8',marginTop:2}}>休</div>}
                </div>
              );
            })}
          </div>
        ))}
        <div style={{marginTop:10,padding:'10px 12px',background:'white',borderRadius:12,border:'1px solid #f1f5f9',display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
          {COURSES.map(c=><span key={c.id} style={{display:'flex',alignItems:'center',gap:3,fontSize:11}}><span style={{width:12,height:12,borderRadius:2,background:c.bg,display:'inline-block'}}/><span style={{color:c.color,fontWeight:700}}>{c.name}</span></span>)}
        </div>
      </div>
    </div>
  );
};

// ══ 予約入力モーダル（新規/編集/削除 + 代車・レンタカー紐付け）══
const EditModal=({mode,initial,vsId,currentUser,staffList,loanerCars,rentalCars,loanerRes,rentalRes,lockedBy,isClosedDk,onSave,onDelete,onClose})=>{
  const isInsp=mode.type==='insp';
  // 休業日には入庫・納車を入れられない（選んだ時点で弾き、元の値に戻す）
  const closedDk=dk=>!!(isClosedDk&&isClosedDk(dk));
  const rejectIfClosed=(dk,what)=>{
    if(!closedDk(dk))return false;
    alert(`🏖 ${dkLabel(dk)} は休業日です。\n${what}日には設定できません（休業日の設定はPC版で変更できます）。`);
    return true;
  };
  const sc=isInsp?'#3730a3':'#0e7490';
  const [form,setForm]=useState(()=>{
    const base={
      ...(isInsp?blankInsp():{name:'',staff:'',carType:'',work:'',loaner:'',loanerId:null,rentalLabel:'',rentalCarId:null,shimi:'',content:'',deliveryDate:'',deliveryTime:''}),
      staff:currentUser?.name||'',
      ...(initial||{}),
    };
    // 新規車検は入庫日デフォルト＝選択日(車検日)。事前入庫のときだけ手動で前の日付に変える。
    if(isInsp&&mode.isNew&&!base.entryDate)base.entryDate=mode.dk;
    return base;
  });
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  const dkParts=mode.dk.split('-').map(Number);
  const defDate=`${dkParts[0]}-${String(dkParts[1]).padStart(2,'0')}-${String(dkParts[2]).padStart(2,'0')}`;
  // 代車選択: 'keep'=変更なし / 'none'=なし / 'loaner' / 'rental'
  const [carKind,setCarKind]=useState('keep');
  const [carSel,setCarSel]=useState('');
  const [carFrom,setCarFrom]=useState(form.entryDate?dkToInputDate(form.entryDate):defDate);
  const [carTo,setCarTo]=useState(form.deliveryDate?dkToInputDate(form.deliveryDate):defDate);
  // 事前入庫/納車の手間削減: 貸出日=入庫日(なければ車検作業日) / 返却日=納車日(なければ車検作業日) を自動連動。
  // ＝車を預けている全期間（入庫〜納車）が代車の期間になる。手動で日付を触ったら以降は自動連動を止める。
  const manualDatesRef=useRef(false);
  useEffect(()=>{
    if(manualDatesRef.current)return;
    setCarFrom(form.entryDate?dkToInputDate(form.entryDate):defDate);
    setCarTo(form.deliveryDate?dkToInputDate(form.deliveryDate):defDate);
  },[form.entryDate,form.deliveryDate,mode.dk,carKind]);
  const bk=isInsp?`insp-${mode.dk}-${mode.idx}`:`sched-${mode.dk}-${mode.slot}`;
  const currentLoanerLbl=getLoanerLabel(loanerRes,mode.dk,initial?.name,initial?.bookingKey||bk,loanerCars);
  const currentBinding=currentLoanerLbl?`🚗 ${currentLoanerLbl}`:(initial?.rentalLabel||initial?.loaner||'');
  const parseD=s=>{const [y,m,d]=String(s).split('-').map(Number);return{y,m0:m-1,d};};
  const availabilityOf=(kind,carId)=>{
    const from=parseD(carFrom),to=parseD(carTo);
    const fromN=toNum(from.y,from.m0,from.d),toN=toNum(to.y,to.m0,to.d);
    const res=kind==='loaner'?loanerRes:rentalRes;
    for(const r of Object.values(res?.[carId]||{})){
      if(r&&r.bookingKey!==bk&&rangesOverlap(r,fromN,toN))return r.user||'使用中';
    }
    return null;
  };
  const doSave=async()=>{
    if(!form.name){setErr('氏名を入力してください');return;}
    if(!form.carType){setErr('車種を入力してください');return;}
    if(isInsp){
      if(!Number(form.course)){setErr('コースを選択してください');return;}
      if(!form.time){setErr('入庫時間を選択してください');return;}
    }else{
      if(!form.work){setErr('作業内容を選択してください');return;}
    }
    let loanerAction=null;
    if(carKind==='none')loanerAction={kind:'none'};
    if(carKind==='loaner'||carKind==='rental'){
      if(!carSel){setErr(carKind==='loaner'?'代車を選択してください':'レンタカーを選択してください');return;}
      const from=parseD(carFrom),to=parseD(carTo);
      if(toNum(from.y,from.m0,from.d)>toNum(to.y,to.m0,to.d)){setErr('代車の期間（開始日と返却日）が逆です');return;}
      const busy=availabilityOf(carKind,carSel);
      if(busy){setErr(`その期間は使用中です（${busy}）`);return;}
      loanerAction={kind:carKind,carId:carSel,from,to};
    }
    setErr('');
    // 受付は即時（モーダルはonSave側で閉じる）。サーバー保存はバックグラウンドで継続し、
    // 結果は画面上部のバナーで通知される。ここで捕まえるのは事前チェック（入庫制限等）のみ。
    try{onSave(form,loanerAction);}
    catch(e){setErr(String(e?.message||e));return;}
  };
  const doDelete=()=>{
    if(!window.confirm(`「${initial?.name||'この予約'}」を削除しますか？\n（紐付いた代車予約も削除されます）`))return;
    try{onDelete();}
    catch(e){setErr('削除に失敗しました: '+(e?.message||e));}
  };
  const LBL={fontSize:11,fontWeight:800,color:'#475569',display:'block',marginBottom:4};
  const INP={width:'100%',padding:'10px 12px',border:'2px solid #e2e8f0',borderRadius:10,outline:'none',background:'white'};
  const staffNames=[...new Set([...(staffList||[]).map(s=>s.name),currentUser?.name].filter(Boolean))];
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:300,display:'flex',flexDirection:'column',justifyContent:'flex-end'}} onClick={saving?undefined:onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:'20px 20px 0 0',maxHeight:'92vh',display:'flex',flexDirection:'column',boxShadow:'0 -8px 40px rgba(0,0,0,.25)',animation:'sheetUp .22s ease'}}>
        <div style={{padding:'13px 18px 10px',borderBottom:`3px solid ${sc}`,display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:16,color:sc}}>{isInsp?'🚗 車検':'⏰ 整備'}{mode.isNew?'の新規予約':'の編集'}</div>
            <div style={{fontSize:11,color:'#94a3b8'}}>{dkParts[1]}月{dkParts[2]}日{!isInsp&&mode.slot?` ${getBaseSlot(mode.slot)}〜`:''}（{vsId==='honten'?'本店':'三田店'}）</div>
          </div>
          <button onClick={onClose} disabled={saving} style={{width:32,height:32,borderRadius:'50%',background:'#f1f5f9',border:'none',fontSize:16,color:'#64748b'}}>✕</button>
        </div>
        {lockedBy&&<div style={{margin:'10px 16px 0',padding:'8px 12px',background:'#fff7ed',border:'1.5px solid #fed7aa',borderRadius:10,fontSize:12,color:'#92400e',fontWeight:700}}>🔒 {lockedBy}さんが編集中の可能性があります。保存は慎重に。</div>}
        <div style={{overflowY:'auto',WebkitOverflowScrolling:'touch',flex:1,padding:'12px 16px 4px',display:'flex',flexDirection:'column',gap:12}}>
          <div>
            <label style={LBL}>氏名 *</label>
            <input value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="お客様名" style={INP}/>
          </div>
          <div style={{display:'flex',gap:10}}>
            <div style={{flex:1}}>
              <label style={LBL}>車種 *</label>
              <input value={form.carType||''} onChange={e=>setForm(p=>({...p,carType:e.target.value}))} placeholder="例：プリウス" style={INP}/>
            </div>
            <div style={{flex:1}}>
              <label style={LBL}>担当</label>
              <select value={form.staff||''} onChange={e=>setForm(p=>({...p,staff:e.target.value}))} style={INP}>
                <option value="">（なし）</option>
                {staffNames.map(n=><option key={n} value={n}>{n}</option>)}
              </select>
            </div>
          </div>
          {isInsp?(
            <React.Fragment>
              <div>
                <label style={LBL}>コース *</label>
                <div style={{display:'flex',gap:6}}>
                  {COURSES.map(c=>(
                    <button key={c.id} onClick={()=>setForm(p=>({...p,course:c.id}))}
                      style={{flex:1,padding:'10px 4px',borderRadius:10,fontWeight:800,fontSize:12,border:`2px solid ${Number(form.course)===c.id?c.color:'#e2e8f0'}`,background:Number(form.course)===c.id?c.bg:'white',color:Number(form.course)===c.id?c.color:'#64748b'}}>
                      {c.name}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',gap:10}}>
                <div style={{flex:1}}>
                  <label style={LBL}>入庫時間 *</label>
                  <select value={form.time||''} onChange={e=>setForm(p=>({...p,time:e.target.value}))} style={INP}>
                    <option value="">選択</option>
                    {SCHED_SLOTS.map(t=><option key={t} value={t}>{specialSlotLabel(t)}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}>
                  <label style={LBL}>特典</label>
                  <div style={{display:'flex',gap:5}}>
                    {TOKUENS.map(t=>(
                      <button key={t.id} onClick={()=>setForm(p=>({...p,tokuten:t.id}))} title={t.name}
                        style={{flex:1,padding:'10px 2px',borderRadius:10,fontWeight:800,fontSize:12,border:`2px solid ${form.tokuten===t.id?'#7c3aed':'#e2e8f0'}`,background:form.tokuten===t.id?'#ede9fe':'white',color:form.tokuten===t.id?'#7c3aed':'#64748b'}}>
                        {t.id}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              {(()=>{
                // 入庫日は既定で選択日(車検日=mode.dk)。前の日付に変えると「事前入庫」扱い（＝色/バナー/戻すボタン表示）。
                const isPre=form.entryDate&&form.entryDate!==mode.dk;
                return(
              <div>
                <label style={LBL}>入庫日 <span style={{fontWeight:400,color:'#94a3b8',fontSize:10}}>既定は選択日。事前入庫（前日・前々日など）なら前の日付に変更</span></label>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <input type="date" value={dkToInputDate(form.entryDate||mode.dk)} onChange={e=>{const v=inputDateToDk(e.target.value)||mode.dk;if(rejectIfClosed(v,'入庫'))return;setForm(p=>({...p,entryDate:v}));}}
                    style={{...INP,flex:1,...(isPre?{border:'2px solid #9a3412',background:'#fff7ed',color:'#9a3412',fontWeight:800}:{})}}/>
                  {isPre&&<button onClick={()=>setForm(p=>({...p,entryDate:mode.dk}))} style={{padding:'0 14px',background:'#f1f5f9',border:'none',borderRadius:10,fontWeight:800,color:'#64748b',fontSize:13}}>当日に戻す</button>}
                </div>
                {isPre&&(()=>{const p=form.entryDate.split('-');return <div style={{fontSize:11,color:'#9a3412',marginTop:4,fontWeight:800}}>🚗 事前入庫：{String(p[1]).padStart(2,'0')}/{String(p[2]).padStart(2,'0')} に入庫</div>;})()}
              </div>
                );
              })()}
              <div>
                <label style={LBL}>備考</label>
                <textarea value={form.note||''} onChange={e=>setForm(p=>({...p,note:e.target.value}))} rows={2} style={{...INP,resize:'none'}}/>
              </div>
            </React.Fragment>
          ):(
            <React.Fragment>
              <div style={{display:'flex',gap:10}}>
                <div style={{flex:1.4}}>
                  <label style={LBL}>作業内容 *</label>
                  <select value={form.work||''} onChange={e=>setForm(p=>({...p,work:e.target.value}))} style={INP}>
                    <option value="">選択</option>
                    {WORKS.map(w=><option key={w.id} value={w.id}>{w.id} {w.name}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}>
                  <label style={LBL}>指・見</label>
                  <select value={form.shimi||''} onChange={e=>setForm(p=>({...p,shimi:e.target.value}))} style={INP}>
                    {SHIMIS.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </div>
              </div>
              <div>
                <label style={LBL}>内容</label>
                <textarea value={form.content||''} onChange={e=>setForm(p=>({...p,content:e.target.value}))} rows={2} style={{...INP,resize:'none'}}/>
              </div>
            </React.Fragment>
          )}
          {/* 納車日（任意・車検/タイムスケジュール共通）。設定すると納車日のタイムスケジュールに派生表示される（行そのものは保存しない） */}
          <div>
            <label style={LBL}>納車日 <span style={{fontWeight:400,color:'#94a3b8',fontSize:10}}>任意。既定は選択日。翌日以降なら日付を変更</span></label>
            {!form.deliveryDate?(
              // 未設定→ボタン。押すと選択日(mode.dk＝車検/予定の日)を既定セット。日付入力もその日を起点に開く。
              <button onClick={()=>{if(rejectIfClosed(mode.dk,'納車'))return;setForm(p=>({...p,deliveryDate:mode.dk,deliveryTime:'未定'}));}}
                style={{width:'100%',padding:'11px 12px',borderRadius:10,border:'2px dashed #6ee7b7',background:'#f0fdf9',color:'#047857',fontWeight:800,fontSize:13}}>
                ＋ 納車日を設定する（選択日から）
              </button>
            ):(
              <React.Fragment>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <input type="date" value={dkToInputDate(form.deliveryDate)}
                    onChange={e=>{const v=inputDateToDk(e.target.value)||mode.dk;if(rejectIfClosed(v,'納車'))return;setForm(p=>({...p,deliveryDate:v,deliveryTime:p.deliveryTime||'未定'}));}}
                    style={{...INP,flex:1,border:'2px solid #047857',background:'#ecfdf5',color:'#047857',fontWeight:800}}/>
                  <button onClick={()=>setForm(p=>({...p,deliveryDate:'',deliveryTime:''}))} style={{padding:'0 14px',background:'#f1f5f9',border:'none',borderRadius:10,fontWeight:800,color:'#64748b',fontSize:16}}>✕</button>
                </div>
                <div style={{marginTop:8}}>
                  <label style={LBL}>納車時間</label>
                  <select value={form.deliveryTime||'未定'} onChange={e=>setForm(p=>({...p,deliveryTime:e.target.value}))}
                    style={{...INP,border:'2px solid #047857',color:'#047857',fontWeight:800}}>
                    {SCHED_SLOTS.map(v=><option key={v} value={v}>{deliverySlotLabel(v)}</option>)}
                  </select>
                  {(()=>{const p=form.deliveryDate.split('-');return <div style={{fontSize:11,color:'#047857',marginTop:4,fontWeight:800}}>🏁 納車：{String(p[1]).padStart(2,'0')}/{String(p[2]).padStart(2,'0')} {deliverySlotLabel(form.deliveryTime||'未定')}</div>;})()}
                </div>
              </React.Fragment>
            )}
          </div>
          <div style={{border:'2px solid #e0f2fe',borderRadius:12,padding:'10px 12px',background:'#f8fdff'}}>
            <div style={{fontSize:12,fontWeight:800,color:'#0369a1',marginBottom:6}}>🔑 代車・レンタカー</div>
            {currentBinding&&carKind==='keep'&&<div style={{fontSize:12,color:'#0c4a6e',marginBottom:6,fontWeight:700}}>現在: {currentBinding}</div>}
            <div style={{display:'flex',gap:5,marginBottom:8}}>
              {[['keep','変更なし'],['none','なし'],['loaner','代車'],['rental','レンタカー']].map(([k,label])=>(
                <button key={k} onClick={()=>{setCarKind(k);setCarSel('');}}
                  style={{flex:1,padding:'8px 2px',borderRadius:8,fontWeight:700,fontSize:11,border:`2px solid ${carKind===k?'#0284c7':'#e2e8f0'}`,background:carKind===k?'#e0f2fe':'white',color:carKind===k?'#0369a1':'#64748b'}}>
                  {label}
                </button>
              ))}
            </div>
            {(carKind==='loaner'||carKind==='rental')&&(
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <div style={{fontSize:10,color:'#0369a1',fontWeight:700,lineHeight:1.4}}>
                  {`自動：貸出日＝${form.entryDate?'入庫日':'車検日'} / 返却日＝${form.deliveryDate?'納車日':'車検日'}。必要な時だけ下で変更`}
                </div>
                <div style={{display:'flex',gap:8}}>
                  <div style={{flex:1}}>
                    <label style={LBL}>貸出日{form.entryDate&&<span style={{color:'#c2410c',fontWeight:800}}>（入庫日）</span>}</label>
                    <input type="date" value={carFrom} onChange={e=>{manualDatesRef.current=true;setCarFrom(e.target.value);}} style={{...INP,padding:'8px 10px'}}/>
                  </div>
                  <div style={{flex:1}}>
                    <label style={LBL}>返却日<span style={{color:form.deliveryDate?'#047857':'#3730a3',fontWeight:800}}>（{form.deliveryDate?'納車日':'車検日'}）</span></label>
                    <input type="date" value={carTo} onChange={e=>{manualDatesRef.current=true;setCarTo(e.target.value);}} style={{...INP,padding:'8px 10px'}}/>
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:4}}>
                  {(carKind==='loaner'?loanerCars:rentalCars).map(car=>{
                    const busy=availabilityOf(carKind,car.id);
                    const sel=String(carSel)===String(car.id);
                    return(
                      <button key={car.id} disabled={!!busy} onClick={()=>setCarSel(car.id)}
                        style={{display:'flex',alignItems:'center',gap:8,padding:'9px 11px',borderRadius:10,textAlign:'left',border:`2px solid ${sel?'#0284c7':busy?'#f1f5f9':'#e2e8f0'}`,background:sel?'#e0f2fe':busy?'#f8fafc':'white',opacity:busy?0.55:1}}>
                        <span style={{fontWeight:800,fontSize:13,color:sel?'#0369a1':'#1e293b',flex:1}}>{car.name}<span style={{fontSize:11,color:'#94a3b8',marginLeft:6}}>{car.num}</span></span>
                        {busy?<span style={{fontSize:10,color:'#dc2626',fontWeight:700}}>使用中: {busy}</span>:sel?<span style={{fontSize:12,color:'#0284c7',fontWeight:900}}>✓</span>:<span style={{fontSize:10,color:'#16a34a',fontWeight:700}}>空き</span>}
                      </button>
                    );
                  })}
                  {(carKind==='loaner'?loanerCars:rentalCars).length===0&&<div style={{fontSize:11,color:'#94a3b8'}}>車両リストが読み込めていません</div>}
                </div>
              </div>
            )}
          </div>
          {err&&<div style={{padding:'9px 12px',background:'#fef2f2',border:'1.5px solid #fca5a5',borderRadius:10,color:'#dc2626',fontSize:12,fontWeight:700}}>⚠ {err}</div>}
        </div>
        <div style={{padding:'10px 16px calc(14px + env(safe-area-inset-bottom,0px))',borderTop:'1px solid #f1f5f9',display:'flex',gap:8}}>
          {!mode.isNew&&onDelete&&(
            <button onClick={doDelete} disabled={saving} style={{padding:'13px 14px',borderRadius:12,border:'2px solid #fca5a5',background:'white',color:'#dc2626',fontWeight:800,fontSize:13}}>🗑 削除</button>
          )}
          <button onClick={doSave} disabled={saving}
            style={{flex:1,padding:'13px 0',borderRadius:12,border:'none',background:saving?'#94a3b8':sc,color:'white',fontWeight:900,fontSize:14,letterSpacing:1}}>
            {saving?'⏳ 保存中...':'✅ 予約確定'}
          </button>
        </div>
      </div>
    </div>
  );
};

const ScheduleView=({inspData,schedDataH,schedDataS,memoDataH,memoDataS,loanerResH,loanerResS,loanerCarsH,loanerCarsS,vsId,initDate,onOpenEdit,schedRestrictions,staffList,dayOffData,closedDays,closedDates,overrideOpen,inspLimits})=>{
  const today=new Date();
  const [ds,setDs]=useState({y:today.getFullYear(),m:today.getMonth(),d:today.getDate()});
  useEffect(()=>{if(initDate)setDs(initDate);},[initDate]);
  const {y,m,d}=ds;
  const dk=`${y}-${m+1}-${d}`;
  const sc=vsId==='honten'?'#1d4ed8':'#dc2626';
  const moveDate=dir=>{const dt=new Date(y,m,d+dir);setDs({y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate()});};
  const isToday_=y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate();
  const dow=new Date(y,m,d).getDay();
  // 元配列のindexを保持したまま表示用に絞り込む（編集・代車紐付けにindexが必須）
  const allRows=(inspData[dk]||[]);
  const irows=allRows.map((r,idx)=>({r,idx})).filter(({r})=>r&&r.name&&r.bookingStatus!=='cancelled');
  const own=irows.filter(({r})=>!normStore(r.store)||normStore(r.store)===vsId);
  const other=irows.filter(({r})=>normStore(r.store)&&normStore(r.store)!==vsId);
  const sorted=[...own,...other];
  const sd=vsId==='honten'?schedDataH:schedDataS;
  const memos=((vsId==='honten'?memoDataH:memoDataS)[dk]||[]);
  const myLoanerRes=vsId==='honten'?loanerResH:loanerResS;
  const myCars=vsId==='honten'?loanerCarsH:loanerCarsS;
  const newInspIdx=(()=>{let i=0;while(i<allRows.length&&allRows[i]&&allRows[i].name)i++;return i;})();
  // 休業日は新規予約を追加できない（PC版handleOpenModalと同じ: 既存予約の編集は休業日でも開ける）
  const isHoliday=calIsClosed(new Date(y,m,d),closedDays||[],closedDates||[],overrideOpen||[]);
  // 台数制限を掛けた日で上限に達していたら車検の新規入力をブロック（制限なしの日は従来どおり7台目=承認待ち）
  const dayLimit=(inspLimits||{})[dk];
  const inspActive=allRows.filter(r=>r&&r.name&&r.bookingStatus!=='cancelled').length;
  const inspLimitFull=dayLimit!=null&&inspActive>=dayLimit;
  const blockNew=()=>alert(`🏖 ${m+1}月${d}日は休業日です。\nこの日には新規の予約を追加できません（休業日の設定はPC版で変更できます）。`);
  const restr=(schedRestrictions||{})[dk];
  const [showRestr,setShowRestr]=useState(false); // 入庫制限バッジをタップした時の内容ポップアップ
  useEffect(()=>{setShowRestr(false);},[dk]);
  const restrExemptIds=(restr&&Array.isArray(restr.exemptWorks))?restr.exemptWorks:[];
  const restrOkWorks=WORKS.filter(w=>restrExemptIds.includes(w.id));
  const restrNgWorks=WORKS.filter(w=>!restrExemptIds.includes(w.id));
  const toMinR=t=>{const[hh,mm]=String(t).split(':').map(Number);return hh*60+mm;};
  const isSlotRestricted=slot=>{
    try{
      if(!restr||!restr.startTime||!restr.endTime||isSpecialSlot(slot))return false;
      const s=toMinR(slot);
      return s>=toMinR(restr.startTime)&&s<toMinR(restr.endTime);
    }catch(e){return false;}
  };
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{flexShrink:0,background:'white',borderBottom:'1px solid #f1f5f9',borderTop:'3px solid #1d4ed8',padding:'10px 14px'}}
        onTouchStart={e=>{e.currentTarget._sx=e.touches[0].clientX;e.currentTarget._sy=e.touches[0].clientY;}}
        onTouchEnd={e=>{
          const dx=e.changedTouches[0].clientX-(e.currentTarget._sx||0);
          const dy=e.changedTouches[0].clientY-(e.currentTarget._sy||0);
          e.currentTarget._sx=null;
          if(Math.abs(dx)<30||Math.abs(dy)>Math.abs(dx))return;
          moveDate(dx<0?1:-1);
        }}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={()=>moveDate(-1)} style={{width:38,height:38,borderRadius:10,border:'2px solid #e5e7eb',background:'white',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center'}}>&#8249;</button>
          <div style={{flex:1,textAlign:'center'}}>
            <div style={{fontWeight:900,fontSize:18,color:dow===0?'#ef4444':dow===6?'#3b82f6':'#1e293b'}}>{m+1}月{d}日（{DOW[dow]}）</div>
            <div style={{fontSize:10,color:'#94a3b8'}}>↕ スワイプで日付移動 / カードをタップで編集</div>
          </div>
          <button onClick={()=>moveDate(1)} style={{width:38,height:38,borderRadius:10,border:'2px solid #e5e7eb',background:'white',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center'}}>&#8250;</button>
        </div>
        {!isToday_&&<button onClick={()=>setDs({y:today.getFullYear(),m:today.getMonth(),d:today.getDate()})} style={{width:'100%',marginTop:6,padding:'5px 0',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:8,fontSize:11,color:'#64748b',fontWeight:600}}>今日に戻る</button>}
      </div>
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        {isHoliday&&(

        <div style={{margin:'10px 12px 0'}}>

            {dayLimit!=null&&<span style={{background:'#fee2e2',color:'#dc2626',border:'1px solid #fca5a5',borderRadius:10,padding:'1px 8px',fontSize:10,fontWeight:800}}>台数制限 最大{dayLimit}台</span>}
            <button onClick={()=>{

                onOpenEdit({type:'insp',dk,idx:newInspIdx,isNew:true});

          </div>
          {sorted.length===0?<div style={{background:'white',borderRadius:12,padding:14,textAlign:'center',color:'#94a3b8',fontSize:12,border:'1px solid #f1f5f9'}}>予約なし</div>:
            sorted.map(({r,idx},i)=>{
              const c=COURSES.find(co=>co.id===Number(r.course));
              const isOther=normStore(r.store)&&normStore(r.store)!==vsId;

              // 代車予約が無く loaner 文字列だけ持つ行があるため、r.loaner へのフォールバックは必須。
              const loaner=getLoanerLabel(myLoanerRes,dk,r.name,r.bookingKey||`insp-${dk}-${idx}`,myCars)||r.loaner||'';
              return(
                <div key={idx} onClick={()=>!isOther&&onOpenEdit({type:'insp',dk,idx,isNew:false})}

          {restr&&showRestr&&(

                <div style={{fontWeight:900,fontSize:14,color:'#dc2626',marginBottom:10}}>🚫 入庫制限 {restr.startTime}〜{restr.endTime}</div>

          {/* 事前入庫（この日に入庫する別日の車検）を派生表示。タップで車検を開く */}
          {(()=>{
            const dos=[];
            Object.keys(inspData||{}).forEach(wdk=>{ if(wdk===dk)return;
              (inspData[wdk]||[]).forEach((r,ix)=>{ if(!r||!r.name||r.entryDate!==dk||r.bookingStatus==='cancelled')return;
                if((normStore(r.store)||'honten')!==vsId)return;
                dos.push({r,wdk,ix});

              <div style={{margin:'0 0 8px',background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:12,padding:'8px 10px'}}>

                  const wl=wdk.split('-');

                  return(
                  <div key={wdk+'-'+ix} onClick={()=>onOpenEdit({type:'insp',dk:wdk,idx:ix,isNew:false})}

                    {r.time&&<span style={{fontSize:11,fontWeight:800,color:'#9a3412'}}>{r.time}</span>}
                    <span style={{fontWeight:800,fontSize:13}}>{r.name}</span>
                    {r.carType&&<span style={{fontSize:11,color:'#64748b'}}>🚗{r.carType}</span>}
                    {loaner&&<span style={{fontSize:11,color:'#0284c7'}}>🔑{loaner}</span>}
                    <span style={{marginLeft:'auto',fontSize:10,fontWeight:800,color:'#9a3412',whiteSpace:'nowrap'}}>→ {wl[1]}/{wl[2]}車検 ›</span>
                  </div>

                })}
              </div>
            );
          })()}
          {/* 納車（この日に納車する車検・予定）を派生表示。タップで元の予約を開く。deliveryDateは任意項目 */}
          {(()=>{
            const dls=[];
            Object.keys(inspData||{}).forEach(wdk=>{
              (inspData[wdk]||[]).forEach((r,ix)=>{ if(!r||!r.name||r.deliveryDate!==dk||r.bookingStatus==='cancelled')return;
                if((normStore(r.store)||'honten')!==vsId)return;
                dls.push({r,wdk,ix,kind:'insp'});
              });
            });
            Object.keys(sd||{}).forEach(wdk=>{
              Object.keys(sd[wdk]||{}).forEach(sk=>{
                const r=sd[wdk][sk];
                if(!r||!r.name||r.deliveryDate!==dk)return;
                if(wdk===dk&&getBaseSlot(sk)===getBaseSlot(r.deliveryTime||'未定'))return; // 自分自身の枠と重なる時は出さない
                dls.push({r,wdk,sk,kind:'sched'});
              });
            });
            if(dls.length===0)return null;
            const slotIx=v=>{const i=SCHED_SLOTS.indexOf(getBaseSlot(v||'未定'));return i<0?999:i;};
            dls.sort((a,b)=>slotIx(a.r.deliveryTime)-slotIx(b.r.deliveryTime));
            return(
              <div style={{margin:'0 0 8px',background:'#ecfdf5',border:'1px solid #a7f3d0',borderRadius:12,padding:'8px 10px'}}>
                <div style={{fontWeight:900,fontSize:12,color:'#047857',marginBottom:4}}>🏁 納車（{dls.length}件）</div>
                {dls.map((d,di)=>{
                  const r=d.r,wl=d.wdk.split('-');
                  const loaner=d.kind==='insp'
                    ?(r.rentalLabel||getLoanerLabel(myLoanerRes,d.wdk,r.name,`insp-${d.wdk}-${d.ix}`,myCars)||r.loaner||'')

                  <div key={'dl-'+d.kind+'-'+d.wdk+'-'+(d.ix??d.sk)+'-'+di}

                    style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap',padding:'6px 2px',borderTop:'1px dashed #a7f3d0',cursor:'pointer'}}>
                    <span style={{fontSize:11,fontWeight:800,color:'#047857'}}>{deliverySlotLabel(r.deliveryTime||'未定')}</span>
                    <span style={{fontWeight:800,fontSize:13}}>{r.name}</span>
                    {r.carType&&<span style={{fontSize:11,color:'#64748b'}}>🚗{r.carType}</span>}
                    {loaner&&<span style={{fontSize:11,color:'#0284c7'}}>🔑{loaner}</span>}
                    <span style={{marginLeft:'auto',fontSize:10,fontWeight:800,color:'#047857',whiteSpace:'nowrap'}}>{wl[1]}/{wl[2]}{d.kind==='insp'?'車検':'予定'} → 納車 ›</span>
                  </div>
                  );
                })}
              </div>
            );
          })()}
          <div style={{background:'white',borderRadius:12,overflow:'hidden',border:'1px solid #e0f2fe'}}>
            {SCHED_SLOTS.map(slot=>{
              const day=sd[dk]||{};
              const subKeys=[slot,...Object.keys(day).filter(k=>k.startsWith(slot+'__'))];
              // 廃止した12:30枠の既存予約は「未定」枠（旧12:30の位置）に取り込んで消さない
              if(slot==='未定'){ if(day['12:30'])subKeys.push('12:30'); subKeys.push(...Object.keys(day).filter(k=>k.startsWith('12:30__'))); }
              const dks=subKeys.filter(k=>{const r=day[k];return r&&r.name;});
              const isEmpty=dks.length===0;
              const spc=isSpecialSlot(slot);
              const restricted=isSlotRestricted(slot); // 入庫制限の時間帯（PC版と同じく整備予約のみ制限）
              // 制限中でも「制限解除の作業」の予約が入っている枠は、入庫時間の欄だけ制限色を残して
              // 案件の内容は白背景にする（入庫できる案件だと一目で分かるように・PC版と共通の考え方）
              const exemptInSlot=restricted&&dks.some(k=>restrExemptIds.includes(day[k]&&day[k].work));
              return(
                <div key={slot} style={{display:'flex',borderBottom:'1px solid #f0fdfa',background:restricted?'#fee2e2':isEmpty?(spc?'#fdfaff':'white'):(spc?'#f5f0ff':'#f0fdfa')}}>
                  <div style={{width:44,flexShrink:0,padding:'8px 4px',fontSize:11,fontWeight:700,color:spc?(isEmpty?'#c4b5fd':'#9333ea'):(isEmpty?'#cbd5e1':'#0e7490'),textAlign:'center',borderRight:`2px solid ${spc?(isEmpty?'#f3e8ff':'#d8b4fe'):(isEmpty?'#f0f9ff':'#99f6e4')}`}}>{slot}</div>
                  <div style={{flex:1,padding:'5px 9px',background:exemptInSlot?'white':undefined}}>
                    {dks.map((key,ki)=>{
                      const r=day[key];
                      const w=WORKS.find(x=>x.id===r.work);
                      const loanerTxt=r.loaner||r.rentalLabel||'';
                      return(
                        <div key={ki} onClick={()=>onOpenEdit({type:'sched',dk,slot:key,isNew:false})}
                          style={{marginBottom:4,cursor:'pointer'}}>
                          <span style={{fontWeight:800,fontSize:13}}>{r.name}</span>
                          {r.carType&&<span style={{fontSize:11,color:'#64748b',marginLeft:5}}>{r.carType}</span>}
                          {(w||r.workType)&&<span style={{marginLeft:5,padding:'1px 5px',background:'#ccfbf1',color:'#0f766e',borderRadius:6,fontSize:10,fontWeight:700}}>{w?w.name:r.workType}</span>}
                          {loanerTxt&&<span style={{marginLeft:5,fontSize:10,color:'#0284c7'}}>🔑{loanerTxt}</span>}
                          <span style={{fontSize:12,color:'#cbd5e1',marginLeft:4}}>›</span>
                          {r.content&&<div style={{fontSize:11,color:'#64748b',marginTop:1}}>{r.content}</div>}
                        </div>
                      );
                    })}
                    <div onClick={()=>{
                        if(isHoliday){blockNew();return;}
                        const free=subKeys.find(k=>!day[k]||!day[k].name)||makeSlotKey(slot,subKeys.length);
                        onOpenEdit({type:'sched',dk,slot:free,isNew:true});
                      }}
                      style={{color:restricted?'#dc2626':isHoliday?'#cbd5e1':isEmpty?'#cbd5e1':'#67e8f9',fontSize:11,cursor:'pointer',padding:'2px 0',fontWeight:restricted?700:400}}>
                      {isHoliday?'休業日（追加不可）':restricted?`🚫 入庫制限 ${restr.startTime}〜${restr.endTime}（制限解除の作業のみ）`:isEmpty?'＋ タップで追加':'＋ 同時刻に追加'}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{margin:'12px 12px 20px'}}>
          <div style={{fontWeight:900,fontSize:13,color:'#7c3aed',marginBottom:6}}>📝 備考・メモ</div>
          {memos.length===0?<div style={{background:'white',borderRadius:12,padding:12,textAlign:'center',color:'#94a3b8',fontSize:12,border:'1px solid #f1f5f9'}}>なし</div>:
            memos.map((m,i)=><div key={i} style={{background:'#faf5ff',borderRadius:10,padding:'8px 11px',marginBottom:4,border:'1px solid #e9d5ff',fontSize:12,color:'#374151'}}>{m.content||m.text||''}</div>)}
        </div>
      </div>
    </div>
  );
};

const LOANER_SECTION_COLORS={honten:'#1d4ed8',sanda:'#dc2626',rental:'#7c3aed'};
const LoanerView=({loanerResH,loanerResS,rentalResData,rentalCars,loanerCarsH,loanerCarsS,vsId})=>{
  const today=new Date();
  const [lm,setLm]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const [selRes,setSelRes]=useState(null); // タップした予約の詳細ポップアップ {r,car,isRental}
  const swipeX=useRef(null);
  const ly=lm.getFullYear(),lmo=lm.getMonth();
  const dim=new Date(ly,lmo+1,0).getDate();
  const sc=vsId==='honten'?'#1d4ed8':'#dc2626';
  const myLoaners=vsId==='honten'?loanerCarsH:loanerCarsS;
  const myLoanerRes=vsId==='honten'?loanerResH:loanerResS;
  const rentals=Array.isArray(rentalCars)&&rentalCars.length>0?rentalCars:DEFAULT_RENTAL_CARS;
  const rentalRes=rentalResData||{};
  const toNumL=(y,m,d)=>y*10000+m*100+d;
  const dates=useMemo(()=>Array.from({length:dim},(_,i)=>{
    const dt=new Date(ly,lmo,i+1);
    return{d:i+1,dow:dt.getDay(),num:toNumL(ly,lmo,i+1)};
  }),[ly,lmo,dim]);
  // lres/rres は {carId: {key: 予約}} のオブジェクト構造（配列ではない）
