<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useMemo,useRef,memo}=React;

const GAS_URL='https://script.google.com/macros/s/AKfycbxyWvIxIyC1EwJUfm4Fy8g6dpBytp7J9wTuT6Dujz-X7V-WzkGkN-bHw2l6rY_B1ST3/exec';
const GAS_API_KEY='hub2026SandaHonten!9xKy';
const STOR='hub-v8-';
const storKey=(base,sid)=>`${STOR}${sid}-${base}`;

const COURSES=[
  {id:1,name:'マッハ車検',  short:'マ',color:'#b91c1c',bg:'#fca5a5'},
  {id:2,name:'クイック車検',short:'ク',color:'#1d4ed8',bg:'#bfdbfe'},
  {id:3,name:'レギュラー',  short:'レ',color:'#d97706',bg:'#fde68a'},
];
const HOLIDAYS_2026=new Set(['2026-1-1','2026-1-12','2026-2-11','2026-2-23','2026-3-20','2026-4-29','2026-5-3','2026-5-4','2026-5-5','2026-7-20','2026-8-11','2026-9-21','2026-9-22','2026-9-23','2026-10-12','2026-11-3','2026-11-23','2026-12-23']);
const isHoliday=(y,m,d)=>HOLIDAYS_2026.has(`${y}-${m+1}-${d}`);
const DOW=['日','月','火','水','木','金','土'];
const TIME_SLOTS=(()=>{const s=[];for(let h=9;h<=18;h++)for(let m=0;m<60;m+=30)s.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);return s;})();

const DEFAULT_STAFF=[
  {uid:'h1',name:'見取大介',    myNumber:1, store:'honten'},
  {uid:'h2',name:'岡上秀一',    myNumber:2, store:'honten'},
  {uid:'h3',name:'竹林直行',    myNumber:3, store:'honten'},
  {uid:'h4',name:'幸田かつのり',myNumber:4, store:'honten'},
  {uid:'h5',name:'魚住圭',      myNumber:5, store:'honten'},
  {uid:'h6',name:'舟田祥子',    myNumber:6, store:'honten'},
  {uid:'h7',name:'江川京志',    myNumber:7, store:'honten'},
  {uid:'h8',name:'ダク',        myNumber:8, store:'honten'},
  {uid:'h9',name:'カビン',      myNumber:9, store:'honten'},
  {uid:'s10',name:'藤原昭人',   myNumber:10,store:'sanda'},
  {uid:'s11',name:'中井啓介',   myNumber:11,store:'sanda'},
  {uid:'s12',name:'宮原てるま', myNumber:12,store:'sanda'},
  {uid:'s13',name:'芦田',       myNumber:13,store:'sanda'},
  {uid:'s14',name:'長谷川',     myNumber:14,store:'sanda'},
  {uid:'s15',name:'石井',       myNumber:15,store:'sanda'},
  {uid:'s16',name:'両澤ちよう', myNumber:16,store:'sanda'},
  {uid:'s17',name:'野呂遥奈',   myNumber:17,store:'sanda'},
  {uid:'s18',name:'河合',       myNumber:18,store:'sanda'},
];
const LOANERS_H=[
  {id:1,name:'ワゴンR',   num:'1234',store:'honten'},{id:2,name:'ムーヴ',    num:'5678',store:'honten'},
  {id:3,name:'N-BOX',    num:'9012',store:'honten'},{id:4,name:'タント',    num:'3456',store:'honten'},
  {id:5,name:'スペーシア',num:'0001',store:'honten'},{id:6,name:'アルト',    num:'0002',store:'honten'},
];
const LOANERS_S=[
  {id:7, name:'スペーシア',num:'7890',store:'sanda'},{id:8, name:'アルト',    num:'2468',store:'sanda'},
  {id:9, name:'ミライース',num:'1357',store:'sanda'},{id:10,name:'デイズ',    num:'8024',store:'sanda'},
  {id:11,name:'ワゴンR',   num:'0003',store:'sanda'},{id:12,name:'N-BOX',    num:'0004',store:'sanda'},
];
const RES_COLORS=['#fca5a5','#86efac','#93c5fd','#fde68a','#c4b5fd','#f9a8d4'];

const sGet=async k=>{
  try{
    const r=await fetch(`${GAS_URL}?key=${encodeURIComponent(k)}&apiKey=${encodeURIComponent(GAS_API_KEY)}`,{cache:'no-store'});
    const t=await r.text();
    if(!t||t==='null'||t.startsWith('error')||t==='unauthorized')return null;
    try{return JSON.parse(t);}catch{return null;}
  }catch{return null;}
};

const normStore=s=>{if(!s)return'';if(s==='honten'||s==='本店')return'honten';if(s==='sanda'||s==='三田店')return'sanda';return s;};
const getSecondTuesday=(y,m)=>{let c=0;for(let d=1;d<=31;d++){const dt=new Date(y,m,d);if(dt.getMonth()!==m)break;if(dt.getDay()===2){c++;if(c===2)return d;}}return null;};
const calIsClosed=(date,cDays=[],cDates=[],ovOpen=[],vsId='honten')=>{
  if(!date||isNaN(date))return false;
  if(cDays.includes(date.getDay()))return true;
  const ds=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  if(cDates.includes(ds))return true;
  // 第2火曜定休は三田店のみ
  if(vsId==='sanda'){
    const d2=getSecondTuesday(date.getFullYear(),date.getMonth());
    if(d2===date.getDate()&&!ovOpen.includes(`${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()}`))return true;
  }
  return false;
};

// ── ログイン ──
const LoginScreen=({onLogin})=>{
  const [num,setNum]=useState('');
  const [err,setErr]=useState('');
  const doLogin=()=>{const n=parseInt(num,10);const s=DEFAULT_STAFF.find(s=>s.myNumber===n);if(!s){setErr('番号が正しくありません');return;}onLogin(s);};
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,background:'linear-gradient(160deg,#1e1b4b,#3730a3 60%,#6d28d9)'}}>
      <div style={{marginBottom:28,textAlign:'center'}}>
        <div style={{fontSize:48,marginBottom:8}}>🚗</div>
        <div style={{color:'white',fontSize:22,fontWeight:900}}>Hub a Nice Day</div>
        <div style={{color:'rgba(255,255,255,.5)',fontSize:11,marginTop:3}}>スマートフォン版 · 閲覧モード</div>
      </div>
      <div style={{width:'100%',maxWidth:340,background:'white',borderRadius:20,padding:26,boxShadow:'0 24px 60px rgba(0,0,0,.35)'}}>
        <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:12,textAlign:'center'}}>スタッフ番号でログイン</div>
        <input type="number" value={num} onChange={e=>setNum(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()}
          placeholder="番号を入力" autoFocus
          style={{width:'100%',padding:'12px 0',fontSize:28,border:'none',borderBottom:'2px solid #e5e7eb',outline:'none',textAlign:'center',fontWeight:800,letterSpacing:6,background:'transparent'}}/>
        {err&&<div style={{color:'#dc2626',fontSize:12,marginTop:6,textAlign:'center'}}>{err}</div>}
        <button onClick={doLogin} style={{width:'100%',marginTop:18,padding:'14px 0',background:'linear-gradient(135deg,#4338ca,#6d28d9)',color:'white',border:'none',borderRadius:14,fontSize:16,fontWeight:800}}>
          ログイン →
        </button>
        <div style={{marginTop:18,borderTop:'1px solid #f1f5f9',paddingTop:14}}>
          <div style={{fontSize:10,color:'#94a3b8',textAlign:'center',marginBottom:8}}>クイック選択</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:5,justifyContent:'center'}}>
            {DEFAULT_STAFF.map(s=>(
              <button key={s.uid} onClick={()=>onLogin(s)}
                style={{padding:'4px 9px',background:s.store==='honten'?'#eff6ff':'#fef2f2',
                  border:`1.5px solid ${s.store==='honten'?'#93c5fd':'#fca5a5'}`,borderRadius:20,
                  fontSize:11,fontWeight:700,color:s.store==='honten'?'#1d4ed8':'#dc2626'}}>
                {s.myNumber}.{s.name}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ── カレンダー画面 ──
const CalendarView=({inspData,closedDays,closedDates,overrideOpen,vsId,onSelectDate})=>{
  const today=new Date();
  const [cur,setCur]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const cy=cur.getFullYear(),cm=cur.getMonth();
  const storeColor=vsId==='honten'?'#1d4ed8':'#dc2626';

  const dim=new Date(cy,cm+1,0).getDate();
  const fdow=new Date(cy,cm,1).getDay();
  const dayCnt=useMemo(()=>{const res={};for(let d=1;d<=dim;d++){const dk=`${cy}-${cm+1}-${d}`;const rows=(inspData[dk]||[]).filter(r=>r&&r.name&&!r.pendingApproval&&r.bookingStatus!=='cancelled');if(rows.length)res[d]={total:rows.length,courses:rows.reduce((a,r)=>{if(r.course)a[r.course]=(a[r.course]||0)+1;return a;},{})};} return res;},[inspData,cy,cm]);
  const weeks=[];let wk=Array(7).fill(null);
  for(let d=1;d<=dim;d++){const dow=(fdow+d-1)%7;wk[dow]=d;if(dow===6||d===dim){weeks.push([...wk]);wk=Array(7).fill(null);}}
  return(
    <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
      <div style={{padding:'10px 14px',background:'white',borderBottom:'1px solid #f1f5f9',borderTop:'3px solid #1d4ed8',display:'flex',alignItems:'center',gap:8}}>
        <button onClick={()=>setCur(new Date(cy,cm-1,1))} style={{width:36,height:36,borderRadius:10,border:'2px solid #e5e7eb',background:'white',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
        <div style={{flex:1,textAlign:'center'}}>
          <div style={{fontWeight:900,fontSize:18}}>{cy}年 {cm+1}月</div>
          <div style={{fontSize:10,color:'#94a3b8'}}>← スワイプで月移動 / タップで詳細 →</div>
        </div>
        <button onClick={()=>setCur(new Date(cy,cm+1,1))} style={{width:36,height:36,borderRadius:10,border:'2px solid #e5e7eb',background:'white',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
      </div>
      <div style={{padding:'8px 8px 16px'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
          {DOW.map((d,i)=><div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,color:i===0?'#ef4444':i===6?'#3b82f6':'#64748b',padding:'4px 0'}}>{d}</div>)}
        </div>
        {weeks.map((wk,wi)=>(
          <div key={wi} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:2}}>
            {wk.map((d,di)=>{
              if(!d)return <div key={di}/>;
              const date=new Date(cy,cm,d);
              const closed=calIsClosed(date,closedDays,closedDates,overrideOpen,vsId);
              const isToday=d===today.getDate()&&cm===today.getMonth()&&cy===today.getFullYear();
              const isSun=di===0,isSat=di===6,isHol=isHoliday(cy,cm,d);
              const info=dayCnt[d];
              return(
                <div key={di} onClick={()=>!closed&&onSelectDate(`${cy}-${cm+1}-${d}`,cy,cm,d)}
                  style={{borderRadius:10,background:closed?'#f8fafc':isToday?'#dbeafe':'white',border:isToday?'2px solid #3b82f6':'2px solid #f1f5f9',minHeight:58,padding:'5px 3px',cursor:closed?'default':'pointer',opacity:closed?0.4:1,boxShadow:info&&!closed?'0 2px 6px rgba(0,0,0,.08)':'none'}}>
                  <div style={{textAlign:'center',fontWeight:800,fontSize:14,color:isToday?'#1e40af':closed?'#94a3b8':isSun||isHol?'#ef4444':isSat?'#3b82f6':'#1e293b'}}>{d}</div>
                  {info&&!closed&&(
                    <div style={{marginTop:2}}>
                      <div style={{textAlign:'center',fontSize:9,fontWeight:800,color:isToday?'#1e40af':'#374151',marginBottom:1}}>{info.total}台</div>
                      <div style={{display:'flex',gap:1,justifyContent:'center',flexWrap:'wrap'}}>
                        {Object.entries(info.courses).map(([cid,cnt])=>{const c=COURSES.find(co=>co.id===Number(cid));return c?<span key={cid} style={{fontSize:8,fontWeight:700,padding:'0 3px',borderRadius:3,background:c.bg,color:c.color}}>{c.short}{cnt}</span>:null;})}
                      </div>
                    </div>
                  )}
                  {closed&&<div style={{textAlign:'center',fontSize:8,color:'#94a3b8',marginTop:2}}>休</div>}
                </div>
              );
            })}
          </div>
        ))}
        <div style={{marginTop:10,padding:'10px 12px',background:'white',borderRadius:12,border:'1px solid #f1f5f9',display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
          {COURSES.map(c=><span key={c.id} style={{display:'flex',alignItems:'center',gap:3,fontSize:11}}><span style={{width:12,height:12,borderRadius:2,background:c.bg,display:'inline-block'}}/><span style={{color:c.color,fontWeight:700}}>{c.name}</span></span>)}
        </div>
      </div>
    </div>
  );
};

// ── 日付詳細モーダル ──
const DayDetailModal=({dk,y,m,d,inspData,schedDataH,schedDataS,memoDataH,memoDataS,vsId,onClose})=>{
  const sc=vsId==='honten'?'#1d4ed8':'#dc2626';
  const normSt=s=>{if(!s)return'';if(s==='honten'||s==='本店')return'honten';if(s==='sanda'||s==='三田店')return'sanda';return s;};
  const irows=(inspData[dk]||[]).filter(r=>r&&r.name);
  const sorted=[...irows.filter(r=>normSt(r.store)===vsId),...irows.filter(r=>!normSt(r.store)),...irows.filter(r=>normSt(r.store)&&normSt(r.store)!==vsId)];
  const sd=vsId==='honten'?schedDataH:schedDataS;
  const sched=Object.entries(sd[dk]||{}).filter(([,r])=>r&&r.name).sort(([a],[b])=>a.localeCompare(b));
  const memos=((vsId==='honten'?memoDataH:memoDataS)[dk]||[]);
  const dow=new Date(y,m,d).getDay();
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:200,display:'flex',flexDirection:'column',justifyContent:'flex-end'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:'20px 20px 0 0',maxHeight:'88vh',display:'flex',flexDirection:'column',boxShadow:'0 -8px 40px rgba(0,0,0,.25)'}}>
        <div style={{padding:'14px 18px 10px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center'}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:18,color:dow===0?'#ef4444':dow===6?'#3b82f6':'#1e293b'}}>{m+1}月{d}日（{DOW[dow]}）</div>
            <div style={{fontSize:11,color:'#94a3b8',marginTop:1}}>車検 {irows.length}台 / 整備 {sched.length}件</div>
          </div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:'50%',background:'#f1f5f9',border:'none',fontSize:16,color:'#64748b'}}>✕</button>
        </div>
        <div style={{overflowY:'auto',WebkitOverflowScrolling:'touch',flex:1,padding:'12px 16px'}}>
          {sorted.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontWeight:800,fontSize:12,color:'#3730a3',marginBottom:8}}>🚗 車検</div>
              {sorted.map((r,i)=>{const c=COURSES.find(co=>co.id===Number(r.course));const isOther=normSt(r.store)&&normSt(r.store)!==vsId;return(
                <div key={i} style={{padding:'9px 11px',marginBottom:5,borderRadius:10,background:isOther?'#f8fafc':'white',border:`1.5px solid ${isOther?'#e2e8f0':sc+'33'}`,borderLeft:`4px solid ${isOther?'#94a3b8':sc}`,opacity:isOther?0.75:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontWeight:800,fontSize:14}}>{r.name}</span>
                    {c&&<span style={{padding:'2px 7px',borderRadius:10,background:c.bg,color:c.color,fontSize:10,fontWeight:700}}>{c.name}</span>}
                    {isOther&&<span style={{fontSize:10,color:'#94a3b8',marginLeft:'auto'}}>{normSt(r.store)==='honten'?'本店':'三田店'}</span>}
                  </div>
                  <div style={{marginTop:3,fontSize:11,color:'#64748b',display:'flex',gap:6,flexWrap:'wrap'}}>
                    {r.carType&&<span>{r.carType}</span>}{r.tokuten&&r.tokuten!=='-'&&<span style={{color:'#7c3aed'}}>特典{r.tokuten}</span>}{r.staff&&<span>{r.staff}</span>}
                  </div>
                  {r.note&&<div style={{marginTop:3,fontSize:11,background:'#f8fafc',borderRadius:6,padding:'3px 7px',color:'#374151'}}>{r.note}</div>}
                </div>
              );})}
            </div>
          )}
          {sched.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontWeight:800,fontSize:12,color:'#0e7490',marginBottom:8}}>⏰ タイムスケジュール</div>
              {sched.map(([key,r],i)=>(
                <div key={i} style={{display:'flex',gap:8,padding:'7px 10px',marginBottom:4,background:'white',borderRadius:10,border:'1.5px solid #e0f2fe',borderLeft:'4px solid #0e7490'}}>
                  <span style={{fontWeight:700,fontSize:11,color:'#0e7490',width:34,flexShrink:0}}>{key.split('-')[0]}</span>
                  <div><span style={{fontWeight:700,fontSize:13}}>{r.name}</span>{r.carType&&<span style={{fontSize:11,color:'#64748b',marginLeft:5}}>{r.carType}</span>}{r.workType&&<span style={{marginLeft:5,padding:'1px 5px',background:'#ccfbf1',color:'#0f766e',borderRadius:6,fontSize:10,fontWeight:700}}>{r.workType}</span>}{r.content&&<div style={{fontSize:11,color:'#64748b',marginTop:1}}>{r.content}</div>}</div>
                </div>
              ))}
            </div>
          )}
          {memos.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontWeight:800,fontSize:12,color:'#7c3aed',marginBottom:8}}>📝 備考・メモ</div>
              {memos.map((m,i)=><div key={i} style={{padding:'8px 10px',marginBottom:4,background:'#faf5ff',borderRadius:10,border:'1px solid #e9d5ff',fontSize:12}}>{m.content||m.text||''}</div>)}
            </div>
          )}
          {sorted.length===0&&sched.length===0&&<div style={{textAlign:'center',color:'#94a3b8',padding:32,fontSize:13}}>この日の予約はありません</div>}
        </div>
      </div>
    </div>
  );
};

// ── スケジュール画面 ──
const ScheduleView=({inspData,schedDataH,schedDataS,memoDataH,memoDataS,loanerResH,loanerResS,vsId})=>{
  const today=new Date();
  const [ds,setDs]=useState({y:today.getFullYear(),m:today.getMonth(),d:today.getDate()});
  const {y,m,d}=ds;
  const dk=`${y}-${m+1}-${d}`;
  const sc=vsId==='honten'?'#1d4ed8':'#dc2626';
  const normSt=s=>{if(!s)return'';if(s==='honten'||s==='本店')return'honten';if(s==='sanda'||s==='三田店')return'sanda';return s;};
  const moveDate=dir=>{const dt=new Date(y,m,d+dir);setDs({y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate()});};
  const isToday_=y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate();
  const dow=new Date(y,m,d).getDay();


  const irows=(inspData[dk]||[]).filter(r=>r&&r.name);
  const sorted=[...irows.filter(r=>normSt(r.store)===vsId),...irows.filter(r=>!normSt(r.store)),...irows.filter(r=>normSt(r.store)&&normSt(r.store)!==vsId)];
  const sd=vsId==='honten'?schedDataH:schedDataS;
  const memos=((vsId==='honten'?memoDataH:memoDataS)[dk]||[]);

  const getLoanerLabel=name=>{
    for(const res of [loanerResH,loanerResS]){
      for(const cid of Object.keys(res||{})){
        for(const r of (res[cid]||[])){if(r.user===name){const car=[...LOANERS_H,...LOANERS_S].find(c=>String(c.id)===String(cid));return car?car.name:'代車';}}
      }
    }
    return '';
  };

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{flexShrink:0,background:'white',borderBottom:'1px solid #f1f5f9',borderTop:'3px solid #1d4ed8',padding:'10px 14px'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={()=>moveDate(-1)} style={{width:38,height:38,borderRadius:10,border:'2px solid #e5e7eb',background:'white',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
          <div style={{flex:1,textAlign:'center'}}>
            <div style={{fontWeight:900,fontSize:18,color:dow===0?'#ef4444':dow===6?'#3b82f6':'#1e293b'}}>{m+1}月{d}日（{DOW[dow]}）</div>
            <div style={{fontSize:10,color:'#94a3b8'}}>↕ スワイプで日付移動</div>
          </div>
          <button onClick={()=>moveDate(1)} style={{width:38,height:38,borderRadius:10,border:'2px solid #e5e7eb',background:'white',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
        </div>
        {!isToday_&&<button onClick={()=>setDs({y:today.getFullYear(),m:today.getMonth(),d:today.getDate()})} style={{width:'100%',marginTop:6,padding:'5px 0',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:8,fontSize:11,color:'#64748b',fontWeight:600}}>今日に戻る</button>}
      </div>
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        {/* 車検 */}
        <div style={{margin:'10px 12px 0'}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
            <span style={{fontWeight:900,fontSize:13,color:'#3730a3'}}>🚗 車検</span>
            <span style={{background:'#e0e7ff',color:'#3730a3',borderRadius:10,padding:'1px 8px',fontSize:11,fontWeight:700}}>{sorted.length}台</span>
          </div>
          {sorted.length===0?<div style={{background:'white',borderRadius:12,padding:14,textAlign:'center',color:'#94a3b8',fontSize:12,border:'1px solid #f1f5f9'}}>予約なし</div>:
            sorted.map((r,i)=>{const c=COURSES.find(co=>co.id===Number(r.course));const isOther=normSt(r.store)&&normSt(r.store)!==vsId;const loaner=getLoanerLabel(r.name);return(
              <div key={i} style={{background:'white',borderRadius:12,padding:'10px 12px',marginBottom:5,borderLeft:`4px solid ${isOther?'#94a3b8':sc}`,boxShadow:'0 1px 4px rgba(0,0,0,.06)',opacity:isOther?0.72:1}}>
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  <span style={{fontWeight:900,fontSize:14,color:isOther?'#64748b':sc}}>{i+1}.</span>
                  <span style={{fontWeight:800,fontSize:15,flex:1}}>{r.name}</span>
                  {c&&<span style={{padding:'2px 8px',borderRadius:10,background:c.bg,color:c.color,fontSize:10,fontWeight:700}}>{c.name}</span>}
                  {isOther&&<span style={{fontSize:10,color:'#94a3b8',padding:'1px 5px',background:'#f1f5f9',borderRadius:6}}>{normSt(r.store)==='honten'?'本店':'三田店'}</span>}
                </div>
                <div style={{marginTop:3,fontSize:11,color:'#64748b',display:'flex',gap:7,flexWrap:'wrap'}}>
                  {r.carType&&<span>🚗 {r.carType}</span>}{loaner&&<span style={{color:'#0284c7'}}>🔑 {loaner}</span>}{r.tokuten&&r.tokuten!=='-'&&<span style={{color:'#7c3aed'}}>🎁 {r.tokuten}</span>}{r.staff&&<span>👤 {r.staff}</span>}
                </div>
                {r.note&&<div style={{marginTop:4,fontSize:11,color:'#374151',background:'#f8fafc',borderRadius:7,padding:'3px 7px'}}>{r.note}</div>}
              </div>
            );})}
        </div>
        {/* タイムスケジュール */}
        <div style={{margin:'12px 12px 0'}}>
          <div style={{fontWeight:900,fontSize:13,color:'#0e7490',marginBottom:6}}>⏰ タイムスケジュール</div>
          <div style={{background:'white',borderRadius:12,overflow:'hidden',border:'1px solid #e0f2fe'}}>
            {TIME_SLOTS.map(slot=>{
              const subKeys=Object.keys(sd[dk]||{}).filter(k=>k===slot||k.startsWith(slot+'-'));
              const dks=subKeys.filter(k=>{const r=sd[dk][k];return r&&r.name;});
              const isEmpty=dks.length===0;
              return(
                <div key={slot} style={{display:'flex',borderBottom:'1px solid #f0fdfa',background:isEmpty?'white':'#f0fdfa'}}>
                  <div style={{width:44,flexShrink:0,padding:'8px 4px',fontSize:11,fontWeight:700,color:isEmpty?'#cbd5e1':'#0e7490',textAlign:'center',borderRight:`2px solid ${isEmpty?'#f0f9ff':'#99f6e4'}`}}>{slot}</div>
                  <div style={{flex:1,padding:'5px 9px'}}>
                    {isEmpty?<span style={{color:'#e2e8f0',fontSize:11}}>—</span>:
                      dks.map((key,ki)=>{const r=sd[dk][key];return(
                        <div key={ki} style={{marginBottom:ki<dks.length-1?5:0}}>
                          <span style={{fontWeight:800,fontSize:13}}>{r.name}</span>
                          {r.carType&&<span style={{fontSize:11,color:'#64748b',marginLeft:5}}>{r.carType}</span>}
                          {r.workType&&<span style={{marginLeft:5,padding:'1px 5px',background:'#ccfbf1',color:'#0f766e',borderRadius:6,fontSize:10,fontWeight:700}}>{r.workType}</span>}
                          {r.loanerLabel&&<span style={{marginLeft:5,fontSize:10,color:'#0284c7'}}>🔑{r.loanerLabel}</span>}
                          {r.content&&<div style={{fontSize:11,color:'#64748b',marginTop:1}}>{r.content}</div>}
                        </div>
                      );})}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        {/* メモ */}
        <div style={{margin:'12px 12px 20px'}}>
          <div style={{fontWeight:900,fontSize:13,color:'#7c3aed',marginBottom:6}}>📝 備考・メモ</div>
          {memos.length===0?<div style={{background:'white',borderRadius:12,padding:12,textAlign:'center',color:'#94a3b8',fontSize:12,border:'1px solid #f1f5f9'}}>なし</div>:
            memos.map((m,i)=><div key={i} style={{background:'#faf5ff',borderRadius:10,padding:'8px 11px',marginBottom:4,border:'1px solid #e9d5ff',fontSize:12,color:'#374151'}}>{m.content||m.text||''}</div>)}
        </div>
      </div>
    </div>
  );
};

// ── 代車画面 ──
const DEFAULT_RENTAL_CARS=[
  {id:'r1',name:'レンタカーA',num:'R001'},{id:'r2',name:'レンタカーB',num:'R002'},
  {id:'r3',name:'レンタカーC',num:'R003'},{id:'r4',name:'レンタカーD',num:'R004'},
  {id:'r5',name:'レンタカーE',num:'R005'},{id:'r6',name:'レンタカーF',num:'R006'},
];
const LOANER_SECTION_COLORS={
  honten:'#1d4ed8', sanda:'#dc2626', rental:'#7c3aed'
};

const LoanerView=({loanerResH,loanerResS,rentalResData,rentalCars,vsId})=>{
  const today=new Date();
  const [lm,setLm]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const ly=lm.getFullYear(),lmo=lm.getMonth();
  const dim=new Date(ly,lmo+1,0).getDate();
  const sc=vsId==='honten'?'#1d4ed8':'#dc2626';

  // 自店舗の代車
  const myLoaners=vsId==='honten'?LOANERS_H:LOANERS_S;
  const myLoanerRes=vsId==='honten'?loanerResH:loanerResS;
  // レンタカー（両店舗共通）
  const rentals=Array.isArray(rentalCars)&&rentalCars.length>0?rentalCars:DEFAULT_RENTAL_CARS;
  const rentalRes=rentalResData||{};

  const toNum=(y,m,d)=>y*10000+m*100+d;
  const dates=useMemo(()=>Array.from({length:dim},(_,i)=>{
    const dt=new Date(ly,lmo,i+1);
    return{d:i+1,dow:dt.getDay(),num:toNum(ly,lmo,i+1)};
  }),[ly,lmo,dim]);

  const getRes=(res,cid,num)=>(res[cid]||[]).find(r=>{
    const s=toNum(r.fy,r.fm,r.fd);
    const e=toNum(r.ty,r.tm,r.td);
    return num>=s&&num<=e;
  });



  const LCAR_COLORS=['#fca5a5','#86efac','#93c5fd','#fde68a','#c4b5fd','#f9a8d4','#6ee7b7','#fbbf24'];
  const RCAR_COLORS=['#d8b4fe','#a5b4fc','#6ee7b7','#fde68a','#fca5a5','#93c5fd'];

  const renderGrid=(cars,res,sectionColor,label)=>(
    <div style={{marginBottom:0}}>
      {/* セクションヘッダー */}
      <div style={{background:sectionColor,padding:'5px 10px',display:'flex',alignItems:'center',gap:6}}>
        <span style={{color:'white',fontWeight:800,fontSize:11}}>{label}</span>
        <span style={{color:'rgba(255,255,255,.7)',fontSize:10}}>{cars.length}台</span>
      </div>
      {cars.map((car,ci)=>(
        <div key={car.id} style={{display:'flex',borderBottom:'1px solid #f1f5f9'}}>
          <div style={{width:80,minWidth:80,padding:'6px 7px',background:'#f8fafc',borderRight:'2px solid #e5e7eb',display:'flex',flexDirection:'column',justifyContent:'center'}}>
            <div style={{fontWeight:700,fontSize:10,color:'#1e293b',lineHeight:1.3}}>{car.name}</div>
            <div style={{fontSize:9,color:'#94a3b8'}}>{car.num}</div>
          </div>
          {dates.map(({d,num})=>{
            const r=getRes(res,car.id,num);
            const colors=label.includes('レンタカー')?RCAR_COLORS:LCAR_COLORS;
            const color=r?colors[ci%colors.length]:'white';
            const isTd=ly===today.getFullYear()&&lmo===today.getMonth()&&d===today.getDate();
            const isStart=r&&r.fd===d&&r.fm===lmo;
            return(
              <div key={d} style={{
                width:32,minWidth:32,height:36,background:color,
                borderRight:'1px solid #f1f5f9',
                borderLeft:isTd?`2px solid ${sc}`:'none',
                position:'relative',overflow:'hidden',
              }}>
                {isStart&&r&&(
                  <div style={{position:'absolute',left:1,top:'50%',transform:'translateY(-50%)',
                    fontSize:7,fontWeight:800,color:'white',textShadow:'0 1px 2px rgba(0,0,0,.7)',
                    whiteSpace:'nowrap',overflow:'hidden',maxWidth:28,lineHeight:1}}>
                    {(r.user||'').slice(0,4)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* 月ナビ */}
      <div style={{flexShrink:0,background:'white',borderBottom:'1px solid #f1f5f9',borderTop:'3px solid #7c3aed',padding:'10px 14px'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={()=>setLm(new Date(ly,lmo-1,1))}
            style={{width:34,height:34,borderRadius:10,border:'2px solid #e5e7eb',background:'white',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
          <div style={{flex:1,textAlign:'center'}}>
            <div style={{fontWeight:900,fontSize:17}}>{ly}年 {lmo+1}月</div>
            <div style={{fontSize:9,color:'#94a3b8'}}>← スワイプで月移動 / 横スクロール可</div>
          </div>
          <button onClick={()=>setLm(new Date(ly,lmo+1,1))}
            style={{width:34,height:34,borderRadius:10,border:'2px solid #e5e7eb',background:'white',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
        </div>
      </div>

      {/* グリッド */}
      <div style={{flex:1,overflow:'auto',WebkitOverflowScrolling:'touch'}}>
        <div style={{minWidth:`${82+dim*32}px`}}>
          {/* 日付ヘッダー（sticky） */}
          <div style={{display:'flex',position:'sticky',top:0,zIndex:10,background:'white',borderBottom:'2px solid #e5e7eb'}}>
            <div style={{width:80,minWidth:80,padding:'6px 7px',fontWeight:700,fontSize:9,color:'#64748b',background:'#f8fafc',borderRight:'2px solid #e5e7eb'}}>代車 / レンタ</div>
            {dates.map(({d,dow})=>{
              const isTd=ly===today.getFullYear()&&lmo===today.getMonth()&&d===today.getDate();
              const isHol=isHoliday(ly,lmo,d);
              return(
                <div key={d} style={{width:32,minWidth:32,textAlign:'center',padding:'3px 1px',background:isTd?'#dbeafe':'white',borderRight:'1px solid #f1f5f9'}}>
                  <div style={{fontSize:8,color:isTd?'#1e40af':dow===0||isHol?'#ef4444':dow===6?'#3b82f6':'#94a3b8',fontWeight:600}}>{DOW[dow]}</div>
                  <div style={{fontSize:11,fontWeight:isTd?800:500,color:isTd?'#1e40af':dow===0||isHol?'#ef4444':dow===6?'#3b82f6':'#1e293b'}}>{d}</div>
                </div>
              );
            })}
          </div>

          {/* 自店舗代車セクション */}
          {renderGrid(myLoaners, myLoanerRes, vsId==='honten'?'#1d4ed8':'#dc2626',
            vsId==='honten'?'本店 代車':'三田店 代車')}

          {/* 区切り */}
          <div style={{height:3,background:'#e5e7eb'}}/>

          {/* レンタカーセクション（両店舗共通） */}
          {renderGrid(rentals, rentalRes, '#7c3aed', 'レンタカー（共通）')}
        </div>

        {/* 凡例 */}
        <div style={{padding:'10px 12px 20px',display:'flex',gap:10,flexWrap:'wrap',alignItems:'center',minWidth:`${82+dim*32}px`}}>
          <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10}}><span style={{width:12,height:12,background:'#fca5a5',borderRadius:2,display:'inline-block'}}/>使用中</span>
          <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10}}><span style={{width:12,height:12,background:'white',border:'1px solid #e2e8f0',borderRadius:2,display:'inline-block'}}/>空き</span>
          <span style={{fontSize:10,color:'#94a3b8'}}>開始日に名前が表示されます</span>
        </div>
      </div>
    </div>
  );
};

// ── メインアプリ ──
const App=()=>{
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('cal');
  const [loading,setLoading]=useState(false);
  const [gasOk,setGasOk]=useState(null);
  const [dayDetail,setDayDetail]=useState(null);
  const [inspData,setInspData]=useState({});
  const [schedDataH,setSchedDataH]=useState({});
  const [schedDataS,setSchedDataS]=useState({});
  const [memoDataH,setMemoDataH]=useState({});
  const [memoDataS,setMemoDataS]=useState({});
  const [loanerResH,setLoanerResH]=useState({});
  const [rentalCars,setRentalCars]=useState([]);
  const [rentalResData,setRentalResData]=useState({});
  const [loanerResS,setLoanerResS]=useState({});
  const [closedDaysH,setClosedDaysH]=useState([]);
  const [closedDaysS,setClosedDaysS]=useState([3]);
  const [closedDates,setClosedDates]=useState([]);
  const [overrideOpen,setOverrideOpen]=useState([]);

  const vsId=user?.store||'honten';
  const sc=vsId==='honten'?'#1d4ed8':'#dc2626';
  const sName=vsId==='honten'?'本店':'三田店';
  const cDays=vsId==='honten'?closedDaysH:closedDaysS;

  const fetchAll=useCallback(async()=>{
    setLoading(true);
    try{
      const [insp,sh,ss,mh,ms,lh,ls,cdh,cds,cdate,ov,rcars,rres]=await Promise.all([
        sGet(STOR+'insp'),sGet(storKey('sched','honten')),sGet(storKey('sched','sanda')),
        sGet(storKey('memo','honten')),sGet(storKey('memo','sanda')),
        sGet(storKey('lres','honten')),sGet(storKey('lres','sanda')),
        sGet(storKey('cdow','honten')),sGet(storKey('cdow-v2','sanda')),
        sGet(storKey('cdate','honten')),sGet(storKey('overrideOpen','honten')),
        sGet(STOR+'rentalcars'),sGet(STOR+'rres'),
      ]);
      if(insp)setInspData(insp);if(sh)setSchedDataH(sh);if(ss)setSchedDataS(ss);
      if(mh)setMemoDataH(mh);if(ms)setMemoDataS(ms);
      if(lh)setLoanerResH(lh);if(ls)setLoanerResS(ls);
      if(Array.isArray(cdh))setClosedDaysH(cdh);if(Array.isArray(cds))setClosedDaysS(cds);
      if(Array.isArray(cdate))setClosedDates(cdate);if(Array.isArray(ov))setOverrideOpen(ov);
      if(Array.isArray(rcars)&&rcars.length>0)setRentalCars(rcars);
      if(rres)setRentalResData(rres);
      setGasOk(true);
    }catch{setGasOk(false);}
    setLoading(false);
  },[]);

  useEffect(()=>{if(user)fetchAll();},[user]);
  if(!user)return <LoginScreen onLogin={setUser}/>;

  const TABS=[{id:'cal',label:'カレンダー',icon:'📅'},{id:'sched',label:'スケジュール',icon:'⏰'},{id:'loaner',label:'代車',icon:'🚙'}];

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {/* ── B×H ヘッダー極小＋フォルダータブ ── */}
      <div style={{flexShrink:0,background:'linear-gradient(135deg,#1e1b4b,#1d4ed8)',paddingTop:'env(safe-area-inset-top,0px)'}}>
        {/* 極小ヘッダー：ロゴ＋GASランプ＋更新のみ */}
        <div style={{padding:'7px 12px',display:'flex',alignItems:'center',gap:6}}>
          <span style={{color:'white',fontSize:12,fontWeight:900,letterSpacing:'.5px'}}>🚗 Hub</span>
          <div style={{width:6,height:6,borderRadius:'50%',background:gasOk===true?'#4ade80':gasOk===false?'#f87171':'#fbbf24',marginLeft:2}}/>
          <div style={{marginLeft:'auto',display:'flex',gap:6}}>
            <button onClick={fetchAll} disabled={loading}
              style={{padding:'3px 10px',background:'rgba(255,255,255,.15)',border:'none',borderRadius:6,color:'white',fontSize:10,fontWeight:700,cursor:'pointer'}}>
              {loading?'⏳':'🔄'}
            </button>
            <button onClick={()=>setUser(null)}
              style={{padding:'3px 8px',background:'rgba(255,255,255,.1)',border:'none',borderRadius:6,color:'rgba(255,255,255,.7)',fontSize:10,cursor:'pointer'}}>
              ↩
            </button>
          </div>
        </div>
        {/* フォルダータブ */}
        <div style={{display:'flex',alignItems:'flex-end',gap:2,padding:'0 8px',background:'linear-gradient(180deg,#1e1b4b,#1e293b)'}}>
          {TABS.map(t=>{
            const isActive=tab===t.id;
            return(
              <div key={t.id} onClick={()=>setTab(t.id)}
                style={{background:isActive?'white':'rgba(255,255,255,.12)',
                  borderRadius:'10px 10px 0 0',
                  padding:isActive?'8px 10px':'6px 8px',
                  display:'flex',flexDirection:'column',alignItems:'center',gap:2,
                  minWidth:isActive?58:54,cursor:'pointer',
                  boxShadow:isActive?'0 -3px 10px rgba(0,0,0,.2)':'none',
                  marginTop:isActive?0:4,transition:'all .15s'}}>
                <div style={{fontSize:isActive?16:13,opacity:isActive?1:.8}}>{t.icon}</div>
                <div style={{fontSize:isActive?7.5:7,fontWeight:isActive?800:400,
                  color:isActive?'#1d4ed8':'rgba(255,255,255,.65)',letterSpacing:'.3px'}}>
                  {t.label}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minHeight:0}}>
        {tab==='sched'&&<ScheduleView inspData={inspData} schedDataH={schedDataH} schedDataS={schedDataS} memoDataH={memoDataH} memoDataS={memoDataS} loanerResH={loanerResH} loanerResS={loanerResS} vsId={vsId}/>}
        {tab==='cal'&&<CalendarView inspData={inspData} closedDays={cDays} closedDates={closedDates} overrideOpen={overrideOpen} vsId={vsId} onSelectDate={(dk,y,m,d)=>setDayDetail({dk,y,m,d})}/>}
        {tab==='loaner'&&<LoanerView loanerResH={loanerResH} loanerResS={loanerResS} rentalResData={rentalResData} rentalCars={rentalCars} vsId={vsId}/>}
      </div>
      {dayDetail&&<DayDetailModal {...dayDetail} inspData={inspData} schedDataH={schedDataH} schedDataS={schedDataS} memoDataH={memoDataH} memoDataS={memoDataS} vsId={vsId} onClose={()=>setDayDetail(null)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
