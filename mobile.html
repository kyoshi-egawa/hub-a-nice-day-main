// ── 通知メール設定 ──
// 保存失敗時の通知メール送信先（ログイン中スタッフごとに1件、通知専用・個人アドレス可）。
// 登録先は共有キー ${STOR}notify-emails の {スタッフ名: アドレス} マップ。
const MailModal=({user,onClose,onSaveEmail})=>{
  const [email,setEmail]=useState('');
  const [loaded,setLoaded]=useState(false);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null); // {ok:bool,text}
  useEffect(()=>{(async()=>{
    const m=await sGet(STOR+'notify-emails');
    setEmail((isPlainObj(m)&&m[user.name])||'');
    setLoaded(true);
  })();},[]);
  const doSave=async(val)=>{
    if(val&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)){setMsg({ok:false,text:'メールアドレスの形式が正しくありません'});return;}
    setBusy(true);setMsg(null);
    try{
      await onSaveEmail(val);
      setMsg({ok:true,text:val?'保存しました。予約の保存に失敗した時、このアドレスへ通知が届きます':'登録を削除しました'});
      setEmail(val);
    }catch(e){setMsg({ok:false,text:'保存を確認できませんでした。電波の良い場所でもう一度お試しください'});}
    setBusy(false);
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:400,display:'flex',flexDirection:'column',justifyContent:'flex-end'}} onClick={busy?undefined:onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:'20px 20px 0 0',padding:'16px 18px calc(18px + env(safe-area-inset-bottom,0px))',boxShadow:'0 -8px 40px rgba(0,0,0,.25)',animation:'sheetUp .22s ease'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:16,color:'#3730a3'}}>✉ 通知メール設定</div>
            <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{user.name}さん宛の通知先（個人のアドレスでOK）</div>
          </div>
          <button onClick={onClose} disabled={busy} style={{width:32,height:32,borderRadius:'50%',background:'#f1f5f9',border:'none',fontSize:16,color:'#64748b'}}>✕</button>
        </div>
        <div style={{fontSize:12,color:'#475569',lineHeight:1.6,background:'#f8fafc',borderRadius:10,padding:'8px 12px',marginBottom:12}}>
          予約がサーバーに保存できなかった時、このアドレスへお知らせメールが届きます（通知専用。返信は不要です）。届いたらアプリで該当日を確認して、予約をし直してください。
        </div>
        {!loaded?<div style={{textAlign:'center',color:'#94a3b8',fontSize:12,padding:12}}>⏳ 読込中...</div>:(
          <React.Fragment>
            <input type="email" inputMode="email" autoComplete="email" value={email} onChange={e=>setEmail(e.target.value.trim())}
              placeholder="example@gmail.com"
              style={{width:'100%',padding:'12px 14px',border:'2px solid #e2e8f0',borderRadius:10,outline:'none',fontSize:16,marginBottom:10}}/>
            {msg&&<div style={{padding:'8px 12px',borderRadius:10,fontSize:12,fontWeight:700,marginBottom:10,background:msg.ok?'#f0fdf4':'#fef2f2',border:`1.5px solid ${msg.ok?'#86efac':'#fca5a5'}`,color:msg.ok?'#15803d':'#dc2626'}}>{msg.text}</div>}
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>doSave('')} disabled={busy||!email}
                style={{padding:'12px 14px',borderRadius:12,border:'2px solid #e2e8f0',background:'white',color:'#64748b',fontWeight:700,fontSize:13}}>登録解除</button>
              <button onClick={()=>doSave(email)} disabled={busy}
                style={{flex:1,padding:'12px 0',borderRadius:12,border:'none',background:busy?'#94a3b8':'#3730a3',color:'white',fontWeight:900,fontSize:14}}>{busy?'⏳ 保存中...':'保存'}</button>
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
};

const App=()=>{
  const [user,setUser]=useState(null);
  const [fadeIn,setFadeIn]=useState(false);
  const [tab,setTab]=useState('cal');
  const [loading,setLoading]=useState(false);
  const [gasOk,setGasOk]=useState(null);
  const [dayDetail,setDayDetail]=useState(null);
  const [schedInitDate,setSchedInitDate]=useState(null);
  const [inspData,setInspData]=useState({});
  const [schedDataH,setSchedDataH]=useState({});
  const [schedDataS,setSchedDataS]=useState({});
  const [memoDataH,setMemoDataH]=useState({});
  const [memoDataS,setMemoDataS]=useState({});
  const [loanerResH,setLoanerResH]=useState({});
  const [rentalCars,setRentalCars]=useState([]);
  const [rentalResData,setRentalResData]=useState({});
  const [loanerResS,setLoanerResS]=useState({});
  const [closedDaysH,setClosedDaysH]=useState([]);
  const [closedDaysS,setClosedDaysS]=useState([3]);
  const [closedDatesH,setClosedDatesH]=useState([]);
  const [closedDatesS,setClosedDatesS]=useState([]); // 個別休業日は店舗別（PC版と同じくcdate-honten/cdate-sanda）
  const [overrideOpen,setOverrideOpen]=useState([]);
  const [loanerCarsH,setLoanerCarsH]=useState(LOANERS_H);
  const [loanerCarsS,setLoanerCarsS]=useState(LOANERS_S);
  const [inspLimits,setInspLimits]=useState({});
  const [schedRestrictions,setSchedRestrictions]=useState({}); // 入庫制限（PC版と同じくSTORなしの共有キー）
  const [dayOffH,setDayOffH]=useState({});
  const [dayOffS,setDayOffS]=useState({});
  const [staffH,setStaffH]=useState([]);
  const [staffS,setStaffS]=useState([]);
  const [editMode,setEditMode]=useState(null); // {type,dk,idx?,slot?,isNew,initial,lockedBy}
  const [saveBanners,setSaveBanners]=useState([]); // 保存状況バナー [{pid,phase:'saving'|'done'|'fail',label,detail,ts}]
  const [mailModal,setMailModal]=useState(false);
  const inflightRef=useRef(new Set()); // このセッションで進行中の保存pid（起動時チェックの誤検出防止）
  const writeGuardRef=useRef(0);   // 書き込み後70秒はポーリング反映を止める（PC版useSharedと同じ考え方）
  const fetchBusyRef=useRef(false); // 前回の取得が未完了なら次を撃たない（GAS同時実行の積み上がり防止）
  const lockHeartbeatRef=useRef(null);
  const curLockKeyRef=useRef(null);
  const upsertBanner=b=>setSaveBanners(list=>{const i=list.findIndex(x=>x.pid===b.pid);if(i<0)return[...list,{ts:Date.now(),...b}].slice(-4);const n=[...list];n[i]={...n[i],...b};return n;});
  const removeBanner=pid=>setSaveBanners(list=>list.filter(x=>x.pid!==pid));

  // ── 楽観オーバーレイ ──
  // 受付した瞬間にローカル表示へエントリを反映し、保存中＋保存完了後75秒（GASキャッシュTTL余裕分）は
  // ポーリング結果にも同じ変更を重ね続ける。これにより「保存が終わるまで予定表に出ない」
  // 「サーバーの古い応答で一瞬消えてまた出る」の両方が起きなくなる。apply は冪等
  // （サーバー値に既に反映済みなら何もしない）であること。
  const overlaysRef=useRef([]); // [{pid,key,apply(data)=>data}]
  const applyOverlays=(key,data)=>overlaysRef.current.filter(o=>o.key===key).reduce((d,o)=>{try{return o.apply(d);}catch{return d;}},data);
  const setterOfKey=key=>{
    if(key===STOR+'insp')return setInspData;
    if(key===storKey('sched','honten'))return setSchedDataH;
    if(key===storKey('sched','sanda'))return setSchedDataS;
    if(key===storKey('lres','honten'))return setLoanerResH;
    if(key===storKey('lres','sanda'))return setLoanerResS;
    if(key===STOR+'rres')return setRentalResData;
    return null;
  };
  const addOverlays=ovs=>{
    overlaysRef.current=[...overlaysRef.current,...ovs];
    ovs.forEach(o=>{const set=setterOfKey(o.key);if(set)set(d=>{try{return o.apply(d);}catch{return d;}});}); // 即時反映
  };
  const dropOverlays=(pid,graceMs)=>{
    if(graceMs>0)setTimeout(()=>{overlaysRef.current=overlaysRef.current.filter(o=>o.pid!==pid);},graceMs);
    else overlaysRef.current=overlaysRef.current.filter(o=>o.pid!==pid);
  };
  const vsId=user?.store||'honten';
  const cDays=vsId==='honten'?closedDaysH:closedDaysS;
  const cDates=vsId==='honten'?closedDatesH:closedDatesS;
  const isClosedDk=useCallback(dk=>dkIsClosed(dk,cDays,cDates,overrideOpen),[cDays,cDates,overrideOpen]);
  const fetchAll=useCallback(async(force)=>{
    if(!force&&writeGuardRef.current>0)return; // 保存直後の古いスナップショットで上書きしない
    if(fetchBusyRef.current)return;
    fetchBusyRef.current=true;
    setLoading(true);
    try{
      const KEYS=[STOR+'insp',storKey('sched','honten'),storKey('sched','sanda'),
        storKey('memo','honten'),storKey('memo','sanda'),
        storKey('lres','honten'),storKey('lres','sanda'),
        storKey('cdow','honten'),storKey('cdow-v2','sanda'),
        storKey('cdate','honten'),storKey('cdate','sanda'),STOR+'override-open',
        STOR+'rentalcars',STOR+'rres',
        storKey('cars','honten'),storKey('cars','sanda'),
        STOR+'inspLimits','schedRestrictions',
        storKey('dayoff','honten'),storKey('dayoff','sanda'),
        storKey('staff-v2','honten'),storKey('staff-v2','sanda')];
      // まとめ読み1リクエスト（GAS未対応の間は従来の並列GETへ自動フォールバック）
      let vals=await sGetMany(KEYS);
      if(!vals)vals=await Promise.all(KEYS.map(k=>sGet(k)));
      const [insp,sh,ss,mh,ms,lh,ls,cdh,cds,cdateH,cdateS,ov,rcars,rres,carsH,carsS,limits,restr,doH,doS,stH,stS]=vals;
      if(writeGuardRef.current>0&&!force){setLoading(false);return;} // 取得中に保存が始まった場合も反映しない
      if(isPlainObj(insp))setInspData(applyOverlays(STOR+'insp',insp));
      if(isPlainObj(sh))setSchedDataH(applyOverlays(storKey('sched','honten'),sh));
      if(isPlainObj(ss))setSchedDataS(applyOverlays(storKey('sched','sanda'),ss));
      if(isPlainObj(mh))setMemoDataH(mh);
      if(isPlainObj(ms))setMemoDataS(ms);
      if(isPlainObj(lh))setLoanerResH(applyOverlays(storKey('lres','honten'),lh));
      if(isPlainObj(ls))setLoanerResS(applyOverlays(storKey('lres','sanda'),ls));
      if(Array.isArray(cdh))setClosedDaysH(cdh);
      if(Array.isArray(cds))setClosedDaysS(cds);
      if(Array.isArray(cdateH))setClosedDatesH(cdateH);
      if(Array.isArray(cdateS))setClosedDatesS(cdateS);
      if(Array.isArray(ov))setOverrideOpen(ov);
      if(Array.isArray(rcars)&&rcars.length>0)setRentalCars(rcars);
      if(isPlainObj(rres))setRentalResData(applyOverlays(STOR+'rres',rres));
      if(Array.isArray(carsH)&&carsH.length>0)setLoanerCarsH(carsH);
      if(Array.isArray(carsS)&&carsS.length>0)setLoanerCarsS(carsS);
      if(isPlainObj(limits))setInspLimits(limits);
      if(isPlainObj(restr))setSchedRestrictions(restr);
      if(isPlainObj(doH))setDayOffH(doH);
      if(isPlainObj(doS))setDayOffS(doS);
      if(Array.isArray(stH))setStaffH(stH);
      if(Array.isArray(stS))setStaffS(stS);
      setGasOk(true);
    }catch{setGasOk(false);}
    finally{fetchBusyRef.current=false;}
    setLoading(false);
  },[]);
  useEffect(()=>{
    if(!user)return;
    fetchAll(true);
    const timer=setInterval(()=>fetchAll(false),15000);
    return ()=>clearInterval(timer);
  },[user]);

  // 起動時チェック: 保存確認が取れる前にアプリが閉じられた予約が残っていないか、サーバーと突き合わせる。
  // 見つからなければ赤バナー＋通知メール（楽観的受付の取りこぼし防止の最後の網）。
  useEffect(()=>{
    if(!user)return;
    (async()=>{
      const stale=loadPending().filter(p=>!inflightRef.current.has(p.pid));
      if(stale.length===0)return;
      savePendingStore(loadPending().filter(p=>inflightRef.current.has(p.pid)));
      for(const p of stale){
        let ok=false;
        try{
          const key=p.type==='insp'?STOR+'insp':storKey('sched',p.store||'honten');
          const data=await sGet(key);
          if(isPlainObj(data)){
            if(p.type==='insp'){
              const r=(data[p.dk]||[])[p.idx];
              ok=p.kind==='delete'
                ?(!r||!r.name||r.name!==p.name)
                :(!!r&&r.name===p.name&&(!p.check?.time||r.time===p.check.time));
            }else{
              const day=data[p.dk]||{};
              ok=p.kind==='delete'
                ?!(day[p.slot]&&day[p.slot].name===p.name)
                :Object.keys(day).some(k=>{const r=day[k];return r&&r.name===p.name&&getBaseSlot(k)===getBaseSlot(p.slot);});
            }
          }
        }catch{}
        if(!ok){
          const label=`${p.name||'予約'}${p.name?'さん':''}の${p.type==='insp'?'車検':'整備'}予約${p.kind==='delete'?'の削除':''}`;
          upsertBanner({pid:p.pid,phase:'fail',label,detail:'前回アプリを閉じた際に保存が完了していない可能性があります。該当日を確認してください'});
          notifyFail(p,'アプリ終了により保存を確認できませんでした（起動時チェックで検出）');
        }
      }
    })();
  },[user]);

  // ── 書き込みレイヤ ──
  // 保存はサーバーの最新値を読み直してから差分適用（read-modify-write）＋読み返し検証。
  // GAS混雑時は書き込みがロック待ちタイムアウト等で「静かに失敗」することがある
  // （no-corsのため失敗を検知できない）。verifyが渡された場合は、書き込み後に
  // サーバーから読み返して自分の変更が反映されたか確認し、未反映なら最新値から
  // 作り直して再送する（最大3回）。それでも確認できなければエラーにして呼び出し側で警告。
  // （2026-07-03 代車予約の無音消失インシデント対策。PC版の読み返し検証と同じ考え方）
  const guardWrite=()=>{
    writeGuardRef.current++;
    setTimeout(()=>{writeGuardRef.current=Math.max(0,writeGuardRef.current-1);},70000);
  };
  const writeShared=async(key,fallbackLocal,mutator,applyLocal,verify)=>{
    guardWrite();
    let next=null;
    for(let attempt=0;attempt<3;attempt++){
      let base=await sGet(key);
      if(!isPlainObj(base))base=isPlainObj(fallbackLocal)?fallbackLocal:{};
      next=mutator(base);
      applyLocal(next);
      await sSet(key,next);
      if(!verify)return next;
      await new Promise(r=>setTimeout(r,1300));
      const echo=await sGet(key);
      if(isPlainObj(echo)&&verify(echo)){applyLocal(echo);return echo;} // 反映確認OK（他端末の変更も取り込む）
    }
    throw new Error('サーバーへの保存を確認できませんでした（通信または混雑）。もう一度お試しください');
  };
  // 検証ヘルパ: lres/rres に指定bookingKeyの予約が「ある」「ない」を確認
  const hasBk=(res,bk)=>Object.values(res||{}).some(days=>Object.values(days||{}).some(r=>r&&r.bookingKey===bk));

  // ── 編集ロック（PC版と同じ locksキー・TTL30秒。モーダル表示中は20秒毎に延長）──
  const acquireLock=async(key,userName)=>{
    const locks=await sGet(STOR+'locks');
    const cur=isPlainObj(locks)?locks:{};
    const lk=cur[key];
    let lockedBy=null;
    if(lk&&Date.now()-lk.lockedAt<LOCK_TTL&&lk.lockedBy!==userName)lockedBy=lk.lockedBy;
    sSet(STOR+'locks',{...cur,[key]:{lockedBy:userName,lockedAt:Date.now()}});
    curLockKeyRef.current=key;
    if(lockHeartbeatRef.current)clearInterval(lockHeartbeatRef.current);
    lockHeartbeatRef.current=setInterval(async()=>{
      const l=await sGet(STOR+'locks');
      const c=isPlainObj(l)?l:{};
      sSet(STOR+'locks',{...c,[key]:{lockedBy:userName,lockedAt:Date.now()}});
    },20000);
    return lockedBy;
  };
  // ロックの所有をモーダルから切り離す（バックグラウンド保存が完了するまでハートビートは継続し、
  // 保存中に他端末が同じ枠を開いたら「編集中」警告が出るようにする）
  const detachLock=()=>{
    const key=curLockKeyRef.current;curLockKeyRef.current=null;
    const hb=lockHeartbeatRef.current;lockHeartbeatRef.current=null;
    return{key,hb};
  };
  const releaseLockHandle=async(h)=>{
    if(!h)return;
    if(h.hb)clearInterval(h.hb);
    if(!h.key)return;
    const l=await sGet(STOR+'locks');
    if(isPlainObj(l)&&l[h.key]){const c={...l};delete c[h.key];sSet(STOR+'locks',c);}
  };
  const releaseLock=async()=>releaseLockHandle(detachLock());
  useEffect(()=>()=>{if(lockHeartbeatRef.current)clearInterval(lockHeartbeatRef.current);},[]);

  const openEdit=useCallback((req)=>{
    // req: {type:'insp'|'sched', dk, idx?, slot?, isNew}
    // initial はローカルデータから即座に作れる（GAS不要）ので、まずモーダルを開く。
    // ロック取得（GAS往復）はタップ→表示の体感を悪くするため、開いた後に裏で取得して
    // 他人が編集中なら lockedBy を後付けで反映する（＝タップ即モーダル表示）。
    const key=req.type==='insp'?lockKeyOf('insp',req.dk,req.idx):lockKeyOf('sched',req.dk,null,req.slot);
    let initial;
    if(req.type==='insp'){
      initial=req.isNew?{}:{...((inspData[req.dk]||[])[req.idx]||{})};
    }else{
      const sd=vsId==='honten'?schedDataH:schedDataS;
      initial=req.isNew?{}:{...((sd[req.dk]||{})[req.slot]||{})};
    }
    setEditMode({...req,initial,lockedBy:null});
    acquireLock(key,user?.name||'モバイル').then(lockedBy=>{
      if(lockedBy)setEditMode(m=>(m&&m.type===req.type&&m.dk===req.dk&&m.idx===req.idx&&m.slot===req.slot)?{...m,lockedBy}:m);
    }).catch(()=>{});
  },[user,inspData,schedDataH,schedDataS,vsId]);

  const closeEdit=useCallback(()=>{
    setEditMode(null);
    releaseLock();
  },[]);

  // 代車/レンタカーの紐付け反映。entryへのラベル書き込みと lres/rres の予約更新を行い、
  // 更新後のentryを返す（PC版 handleSaveModal の pendingLoanerData / pendingRental 処理と同じ結果になる）
  const applyLoanerAction=async(entry,action,bkFinal,userName)=>{
    if(!action)return entry; // 変更なし
    const lresKey=storKey('lres',vsId);
    const myLres=vsId==='honten'?loanerResH:loanerResS;
    const setMyLres=vsId==='honten'?setLoanerResH:setLoanerResS;
    const cleanOwn=res=>{
      const out={};
      for(const cid of Object.keys(res||{})){
        const days={...(res[cid]||{})};
        Object.keys(days).forEach(k=>{if(days[k]?.bookingKey===bkFinal)delete days[k];});
        out[cid]=days;
      }
      return out;
    };
    const colorOf=name=>RES_COLORS[[...String(name||'')].reduce((a,c)=>a+c.charCodeAt(0),0)%RES_COLORS.length];
    if(action.kind==='none'){
      // 別キーへの独立した書き込みは並列化（GASロック側で直列化されるが、読み・検証待ちが重なる分速い）
      await Promise.all([
        writeShared(lresKey,myLres,base=>cleanOwn(base),setMyLres,echo=>!hasBk(echo,bkFinal)),
        writeShared(STOR+'rres',rentalResData,base=>cleanOwn(base),setRentalResData,echo=>!hasBk(echo,bkFinal)),
      ]);
      return {...entry,loaner:'',loanerId:null,rentalLabel:'',rentalCarId:null};
    }
    if(action.kind==='loaner'){
      const cars=vsId==='honten'?loanerCarsH:loanerCarsS;
      const car=cars.find(c=>String(c.id)===String(action.carId));
      const rec={
        id:Date.now(),
        fy:action.from.y,fm:action.from.m0,fd:action.from.d,
        ty:action.to.y,tm:action.to.m0,td:action.to.d,
        user:userName,color:colorOf(userName),bookingKey:bkFinal,
        carName:car?.name,carNum:car?.num,
      };
      await Promise.all([
        writeShared(lresKey,myLres,base=>{
          const cleaned=cleanOwn(base);
          const days={...(cleaned[action.carId]||{})};
          // PC版は開始日をキーにする。別予約と衝突する場合はサフィックスを付けて上書きを防ぐ
          let k=String(action.from.d);
          if(days[k])k=`${action.from.d}_${rec.id}`;
          days[k]=rec;
          return{...cleaned,[action.carId]:days};
        },setMyLres,echo=>Object.values(echo[action.carId]||{}).some(r=>r&&r.id===rec.id&&r.bookingKey===bkFinal)),
        writeShared(STOR+'rres',rentalResData,base=>cleanOwn(base),setRentalResData,echo=>!hasBk(echo,bkFinal)),
      ]);
      return {...entry,loaner:car?`${car.name} (${car.num})`:'',loanerId:action.carId,rentalLabel:'',rentalCarId:null};
    }
    if(action.kind==='rental'){
      const rcar=(rentalCars.length?rentalCars:DEFAULT_RENTAL_CARS).find(c=>String(c.id)===String(action.carId));
      const rec={
        id:Date.now(),
        fy:action.from.y,fm:action.from.m0,fd:action.from.d,
        ty:action.to.y,tm:action.to.m0,td:action.to.d,
        user:userName,color:colorOf(userName),bookingKey:bkFinal,
      };
      await Promise.all([
        writeShared(STOR+'rres',rentalResData,base=>{
          const cleaned=cleanOwn(base);
          const days={...(cleaned[action.carId]||{})};
          days[String(rec.id)]=rec; // PC版addRentalResと同じくidをキーにする
          return{...cleaned,[action.carId]:days};
        },setRentalResData,echo=>Object.values(echo[action.carId]||{}).some(r=>r&&r.id===rec.id&&r.bookingKey===bkFinal)),
        writeShared(lresKey,myLres,base=>cleanOwn(base),setMyLres,echo=>!hasBk(echo,bkFinal)),
      ]);
      return {...entry,loaner:'',loanerId:null,rentalLabel:`🔑 ${rcar?rcar.name:'レンタカー'}${rcar?.num?` (${rcar.num})`:''}`,rentalCarId:action.carId};
    }
    return entry;
  };

  // 保存失敗の通知メール（GAS側の notifyFail アクションが必要。未対応デプロイでは何も送られず'ok'相当で無視される）
  const notifyFail=async(pend,detail)=>{
    const dkp=String(pend.dk||'').split('-');
    const when=dkp.length===3?`${dkp[0]}年${dkp[1]}月${dkp[2]}日`:pend.dk;
    const text=`${when} の${pend.type==='insp'?'車検':'タイムスケジュール'}${pend.kind==='delete'?'予約の削除':'予約'}「${pend.name}」（操作: ${pend.by||'不明'}）がサーバーに保存できていない可能性があります。\nアプリで該当日を確認し、登録されていなければお手数ですがもう一度操作してください。\n詳細: ${detail||'-'}`;
    const body=JSON.stringify({action:'notifyFail',apiKey:GAS_API_KEY,emailsKey:STOR+'notify-emails',user:pend.by||'',env:STOR==='hub-v8-'?'本番':'DEV',detail:text});
    try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body});}
    catch{
      await new Promise(r=>setTimeout(r,1500));
      try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body});}catch{}
    }
  };

  // 通知メールアドレスの登録（{スタッフ名:アドレス} マップを読み返し検証つきで更新）
  const saveNotifyEmail=async(email)=>{
    const name=user?.name;
    if(!name)throw new Error('ログイン情報がありません');
    await writeShared(STOR+'notify-emails',{},base=>{
      const n={...base};
      if(email)n[name]=email;else delete n[name];
      return n;
    },()=>{},echo=>email?echo[name]===email:!(name in echo));
  };

  // サーバー保存の本体（読み返し検証つき）。handleSaveから切り離されてバックグラウンドで実行される
  const saveCore=async(req,form,loanerAction)=>{
    const userName=form.name||user?.name||'';
    if(req.type==='insp'){
      const bkFinal=`insp-${req.dk}-${req.idx}`;
      const entry=await applyLoanerAction({...form},loanerAction,bkFinal,userName);
      let placedPending=false,placedSeq=null;
      await writeShared(STOR+'insp',inspData,base=>{
        const rows=((base[req.dk]||[]).map(r=>r||blankInsp()));
        while(rows.length<=req.idx)rows.push(blankInsp());
        const prevRow=rows[req.idx];
        // PC版と同じseq規則: アクティブ予約の編集はseq維持、新規/キャンセル枠への予約は新seq
        // （再試行時に自分の行が既に書けていた場合はseqが引き継がれるので二重にならない）
        const editingActive=!!(prevRow&&prevRow.name&&prevRow.bookingStatus!=='cancelled');
        const seq=editingActive?(prevRow.seq!=null?prevRow.seq:Date.now()):Date.now();
        placedSeq=seq;
        rows[req.idx]={...entry,store:normStore(prevRow?.store)||vsId,seq,bookingStatus:'confirmed'};
        const dayLimit=inspLimits[req.dk]??6;
        const wasPending=editingActive&&!!prevRow.pendingApproval;
        const recomputed=recomputeInspApproval(rows,dayLimit);
        placedPending=!!(recomputed[req.idx]&&recomputed[req.idx].pendingApproval&&!wasPending);
        return{...base,[req.dk]:recomputed};
      },setInspData,echo=>{
        const r=(echo[req.dk]||[])[req.idx];
        return !!r&&r.name===entry.name&&r.seq===placedSeq;
      });
      if(placedPending)alert('⚠️ 1日の上限を超えたため、本店承認が必要です（通常6台／レギュラー車検3台）。この予約は承認待ちになります。');
    }else{
      const sdKey=storKey('sched',vsId);
      const sd=vsId==='honten'?schedDataH:schedDataS;
      const setSd=vsId==='honten'?setSchedDataH:setSchedDataS;
      // 新規はサーバーの最新値で空きサブ枠を確定してから代車bookingKeyを発行する
      let slotFinal=req.slot;
      if(req.isNew){
        const fresh=await sGet(sdKey);
        const day=(isPlainObj(fresh)?fresh:sd)[req.dk]||{};
        const baseSlot=getBaseSlot(req.slot);
        let sub=0,k=baseSlot;
        while(day[k]&&day[k].name){sub++;k=makeSlotKey(baseSlot,sub);}
        slotFinal=k;
      }
      const bkFinal=`sched-${req.dk}-${slotFinal}`;
      const entry=await applyLoanerAction({...form},loanerAction,bkFinal,userName);
      const placedId=Date.now();
      await writeShared(sdKey,sd,base=>{
        const day={...(base[req.dk]||{})};
        // 直前に他端末で埋まった場合はさらに次の空きへ（自分の書き込み済みエントリ=placedIdは除外し、
        // 再試行時に二重登録しない。代車のbkとずれた場合もデータは壊れず表示は氏名フォールバックで追従）
        if(req.isNew&&day[slotFinal]&&day[slotFinal].name&&day[slotFinal].id!==placedId){
          const baseSlot=getBaseSlot(slotFinal);
          let sub=0,k=baseSlot;
          while(day[k]&&day[k].name&&day[k].id!==placedId){sub++;k=makeSlotKey(baseSlot,sub);}
          slotFinal=k;
        }
        day[slotFinal]={...entry,id:placedId};
        return{...base,[req.dk]:day};
      },setSd,echo=>{
        const r=(echo[req.dk]||{})[slotFinal];
        return !!r&&r.id===placedId;
      });
    }
  };

  // 楽観的受付: ローカルで判定できる事前チェックが通ったら即モーダルを閉じてバナー表示し、
  // サーバー保存（読み返し検証つき）はバックグラウンドで継続する。結果はバナーで通知し、
  // 失敗時は通知メール＋サーバー最新値への再同期を行う。
  const handleSave=useCallback((form,loanerAction)=>{
    const req=editMode;
    if(!req)return;
    // 休業日チェック（受付前に弾く）。新規予約は休業日に作れず、入庫日・納車日にも休業日は指定できない。
    if(req.isNew&&isClosedDk(req.dk))throw new Error(`🏖 ${dkLabel(req.dk)} は休業日です。新規予約は追加できません`);
    // 台数制限を掛けた日の上限到達（別端末が先に埋めた場合もここで弾く）
    if(req.isNew&&req.type==='insp'&&inspLimits[req.dk]!=null){
      const _lim=inspLimits[req.dk];
      const _cnt=(inspData[req.dk]||[]).filter(r=>r&&r.name&&r.bookingStatus!=='cancelled').length;
      if(_cnt>=_lim)throw new Error(`🚫 ${dkLabel(req.dk)} は台数制限（最大${_lim}台）に達しているため、車検の予約はできません`);
    }
    if(form.entryDate&&isClosedDk(form.entryDate))throw new Error(`🏖 入庫日 ${dkLabel(form.entryDate)} は休業日です。別の日を選んでください`);
    if(form.deliveryDate&&isClosedDk(form.deliveryDate))throw new Error(`🏖 納車日 ${dkLabel(form.deliveryDate)} は休業日です。別の日を選んでください`);
    // 入庫制限チェック（PC版handleSaveModalと同じルール。受付前に弾いてモーダル内に表示する）
    if(req.type!=='insp'){
      const restriction=schedRestrictions[req.dk];
      if(restriction){
        const toMin=t=>{const[h,m]=String(t).split(':').map(Number);return h*60+m;};
        const slotMin=toMin(getBaseSlot(req.slot));
        if(slotMin>=toMin(restriction.startTime)&&slotMin<toMin(restriction.endTime)){
          const isExempt=restriction.exemptWorks&&restriction.exemptWorks.includes(form.work);
          if(!isExempt)throw new Error(`🚫 この時間帯（${restriction.startTime}〜${restriction.endTime}）は入庫制限中です。制限解除されている作業内容のみ予約可能です`);
        }
      }
    }
    const pid=`${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
    const label=`${form.name}さんの${req.type==='insp'?'車検':'整備'}予約`;
    const pend={pid,kind:'save',type:req.type,dk:req.dk,idx:req.idx,slot:req.slot,store:vsId,name:form.name,by:user?.name||'',check:{time:form.time||'',work:form.work||''},ts:Date.now()};
    addPending(pend);inflightRef.current.add(pid);
    const lockHandle=detachLock();

    // ── 楽観オーバーレイの構築（予定表・代車表へ今すぐ反映）──
    const bkOpt=req.type==='insp'?`insp-${req.dk}-${req.idx}`:`sched-${req.dk}-${req.slot}`;
    const colorOf=name=>RES_COLORS[[...String(name||'')].reduce((a,c)=>a+c.charCodeAt(0),0)%RES_COLORS.length];
    let displayEntry={...form};
    const ovs=[];
    const rmBkOv=res=>{const out={};for(const cid of Object.keys(res||{})){const days={...(res[cid]||{})};Object.keys(days).forEach(k=>{if(days[k]?.bookingKey===bkOpt)delete days[k];});out[cid]=days;}return out;};
    if(loanerAction&&loanerAction.kind==='none'){
      displayEntry={...displayEntry,loaner:'',loanerId:null,rentalLabel:'',rentalCarId:null};
      ovs.push({pid,key:storKey('lres',vsId),apply:rmBkOv});
      ovs.push({pid,key:STOR+'rres',apply:rmBkOv});
    }
    if(loanerAction&&(loanerAction.kind==='loaner'||loanerAction.kind==='rental')){
      const isLoaner=loanerAction.kind==='loaner';
      const cars=isLoaner?(vsId==='honten'?loanerCarsH:loanerCarsS):(rentalCars.length?rentalCars:DEFAULT_RENTAL_CARS);
      const car=cars.find(c=>String(c.id)===String(loanerAction.carId));
      displayEntry=isLoaner
        ?{...displayEntry,loaner:car?`${car.name} (${car.num})`:'',loanerId:loanerAction.carId,rentalLabel:'',rentalCarId:null}
        :{...displayEntry,loaner:'',loanerId:null,rentalLabel:`🔑 ${car?car.name:'レンタカー'}${car?.num?` (${car.num})`:''}`,rentalCarId:loanerAction.carId};
      const rec={id:Date.now(),fy:loanerAction.from.y,fm:loanerAction.from.m0,fd:loanerAction.from.d,
        ty:loanerAction.to.y,tm:loanerAction.to.m0,td:loanerAction.to.d,
        user:form.name,color:colorOf(form.name),bookingKey:bkOpt,
        ...(isLoaner?{carName:car?.name,carNum:car?.num}:{})};
      ovs.push({pid,key:isLoaner?storKey('lres',vsId):STOR+'rres',apply:res=>{
        // サーバーに同bookingKeyの予約が既にあれば何もしない（冪等）
        if(Object.values(res||{}).some(days=>Object.values(days||{}).some(r=>r&&r.bookingKey===bkOpt)))return res;
        const days={...(res?.[loanerAction.carId]||{})};
        days[`opt-${rec.id}`]=rec;
        return{...res,[loanerAction.carId]:days};
      }});
    }
    if(req.type==='insp'){
      const entryOpt={...blankInsp(),...displayEntry,store:vsId,bookingStatus:'confirmed'};
      const reflected=r=>r&&r.name===form.name&&r.time===(form.time||'')&&String(r.course)===String(form.course)&&(r.note||'')===(form.note||'');
      ovs.push({pid,key:STOR+'insp',apply:data=>{
        const rows=((data[req.dk]||[]).map(r=>r||blankInsp()));
        while(rows.length<=req.idx)rows.push(blankInsp());
        if(reflected(rows[req.idx]))return data; // サーバー反映済みならサーバー版を尊重
        rows[req.idx]=entryOpt;
        return{...data,[req.dk]:rows};
      }});
    }else{
      const entryOpt={...displayEntry};
      const reflected=r=>r&&r.name===form.name&&(r.work||'')===(form.work||'')&&(r.content||'')===(form.content||'');
      ovs.push({pid,key:storKey('sched',vsId),apply:data=>{
        const day={...(data[req.dk]||{})};
        if(Object.entries(day).some(([k,r])=>reflected(r)&&getBaseSlot(k)===getBaseSlot(req.slot)))return data;
        day[req.slot]=entryOpt;
        return{...data,[req.dk]:day};
      }});
    }
    addOverlays(ovs);

    upsertBanner({pid,phase:'saving',label});
    setEditMode(null);
    (async()=>{
      try{
        await saveCore(req,form,loanerAction);
        upsertBanner({pid,phase:'done',label});
        setTimeout(()=>removeBanner(pid),6000);
        dropOverlays(pid,75000); // GAS読み取りキャッシュ(60s)が入れ替わるまで重ね続ける
      }catch(e){
        dropOverlays(pid,0);
        upsertBanner({pid,phase:'fail',label,detail:String(e?.message||e)});
        notifyFail(pend,String(e?.message||e));
        fetchAll(true); // 楽観表示をサーバーの実際の状態に揃える
      }finally{
        removePendingStore(pid);inflightRef.current.delete(pid);
        releaseLockHandle(lockHandle);
      }
    })();
  },[editMode,user,vsId,inspData,schedDataH,schedDataS,loanerResH,loanerResS,rentalResData,rentalCars,loanerCarsH,loanerCarsS,inspLimits,schedRestrictions,isClosedDk]);

  // 削除の本体（読み返し検証つき）。バックグラウンドで実行される
  const deleteCore=async(req)=>{
    const bk=req.type==='insp'?`insp-${req.dk}-${req.idx}`:`sched-${req.dk}-${req.slot}`;
    const deletedSeq=req.initial?.seq;
    const deletedName=req.initial?.name;
    if(req.type==='insp'){
      await writeShared(STOR+'insp',inspData,base=>{
        const rows=((base[req.dk]||[]).map(r=>r||blankInsp()));
        if(req.idx<rows.length)rows[req.idx]=blankInsp();
        while(rows.length>0&&!rows[rows.length-1]?.name)rows.pop();
        const recomputed=recomputeInspApproval(rows,inspLimits[req.dk]??6);
        return{...base,[req.dk]:recomputed.length>0?recomputed:[]};
      },setInspData,echo=>{
        const r=(echo[req.dk]||[])[req.idx];
        return !r||!r.name||(deletedSeq!=null?r.seq!==deletedSeq:r.name!==deletedName);
      });
    }else{
      const sdKey=storKey('sched',vsId);
      const sd=vsId==='honten'?schedDataH:schedDataS;
      const setSd=vsId==='honten'?setSchedDataH:setSchedDataS;
      const deletedId=req.initial?.id;
      await writeShared(sdKey,sd,base=>{
        const day={...(base[req.dk]||{})};
        delete day[req.slot];
        return{...base,[req.dk]:day};
      },setSd,echo=>{
        const r=(echo[req.dk]||{})[req.slot];
        return !r||!r.name||(deletedId!=null?r.id!==deletedId:r.name!==deletedName);
      });
    }
    // bookingKeyに紐づく代車・レンタカー予約を連動削除（PC版handleDeleteModalと同じ）
    const lresKey=storKey('lres',vsId);
    const myLres=vsId==='honten'?loanerResH:loanerResS;
    const setMyLres=vsId==='honten'?setLoanerResH:setLoanerResS;
    const cleanBk=res=>{
      const out={};
      for(const cid of Object.keys(res||{})){
        const days={...(res[cid]||{})};
        Object.keys(days).forEach(k=>{if(days[k]?.bookingKey===bk)delete days[k];});
        out[cid]=days;
      }
      return out;
    };
    await Promise.all([
      writeShared(lresKey,myLres,base=>cleanBk(base),setMyLres,echo=>!hasBk(echo,bk)),
      writeShared(STOR+'rres',rentalResData,base=>cleanBk(base),setRentalResData,echo=>!hasBk(echo,bk)),
    ]);
  };

  // 削除も保存と同じ楽観的受付（即モーダルを閉じてバックグラウンド実行＋バナー通知）
  const handleDelete=useCallback(()=>{
    const req=editMode;
    if(!req)return;
    const nm=req.initial?.name||'';
    const pid=`${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
    const label=`${nm||'予約'}${nm?'さん':''}の${req.type==='insp'?'車検':'整備'}予約の削除`;
    const pend={pid,kind:'delete',type:req.type,dk:req.dk,idx:req.idx,slot:req.slot,store:vsId,name:nm,by:user?.name||'',check:{},ts:Date.now()};
    addPending(pend);inflightRef.current.add(pid);
    const lockHandle=detachLock();

    // 楽観オーバーレイ: 画面からは今すぐ消す（冪等: サーバー側で既に消えていれば何もしない）
    const bkDel=req.type==='insp'?`insp-${req.dk}-${req.idx}`:`sched-${req.dk}-${req.slot}`;
    const rmBkDel=res=>{const out={};for(const cid of Object.keys(res||{})){const days={...(res[cid]||{})};Object.keys(days).forEach(k=>{if(days[k]?.bookingKey===bkDel)delete days[k];});out[cid]=days;}return out;};
    const ovs=[];
    if(req.type==='insp'){
      ovs.push({pid,key:STOR+'insp',apply:data=>{
        const rows=((data[req.dk]||[]).map(r=>r||blankInsp()));
        if(!(nm&&rows[req.idx]&&rows[req.idx].name===nm))return data;
        rows[req.idx]=blankInsp();
        while(rows.length>0&&!rows[rows.length-1]?.name)rows.pop();
        return{...data,[req.dk]:rows};
      }});
    }else{
      ovs.push({pid,key:storKey('sched',vsId),apply:data=>{
        const day={...(data[req.dk]||{})};
        if(!(day[req.slot]&&day[req.slot].name===nm))return data;
        delete day[req.slot];
        return{...data,[req.dk]:day};
      }});
    }
    ovs.push({pid,key:storKey('lres',vsId),apply:rmBkDel});
    ovs.push({pid,key:STOR+'rres',apply:rmBkDel});
    addOverlays(ovs);

    upsertBanner({pid,phase:'saving',label});
    setEditMode(null);
    (async()=>{
      try{
        await deleteCore(req);
        upsertBanner({pid,phase:'done',label});
        setTimeout(()=>removeBanner(pid),6000);
        dropOverlays(pid,75000);
      }catch(e){
        dropOverlays(pid,0);
        upsertBanner({pid,phase:'fail',label,detail:String(e?.message||e)});
        notifyFail(pend,String(e?.message||e));
        fetchAll(true);
      }finally{
        removePendingStore(pid);inflightRef.current.delete(pid);
        releaseLockHandle(lockHandle);
      }
    })();
  },[editMode,user,vsId,inspData,schedDataH,schedDataS,loanerResH,loanerResS,rentalResData,inspLimits]);

  if(!user)return <LoginScreen onLogin={u=>{setUser(u);setFadeIn(true);}}/>;
  const TABS=[{id:'cal',label:'カレンダー',icon:'📅'},{id:'sched',label:'スケジュール',icon:'⏰'},{id:'loaner',label:'代車',icon:'🚙'}];
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',position:'relative'}}>
      {fadeIn&&<div style={{position:'absolute',inset:0,background:'white',zIndex:999,animation:'loginFadeIn 2.5s ease forwards',pointerEvents:'none'}} onAnimationEnd={()=>setFadeIn(false)}/>}
      <div style={{flexShrink:0,background:'linear-gradient(135deg,#1e1b4b,#1d4ed8)',paddingTop:'env(safe-area-inset-top,0px)'}}>
        <div style={{padding:'7px 12px',display:'flex',alignItems:'center',gap:6}}>
          <span style={{color:'white',fontSize:12,fontWeight:900,letterSpacing:'.5px'}}>🚗 Hub</span>
          <span style={{color:'rgba(255,255,255,.45)',fontSize:9,fontWeight:700,padding:'1px 5px',border:'1px solid rgba(255,255,255,.25)',borderRadius:8}}>v{MOBILE_VERSION}</span>
          <div style={{width:6,height:6,borderRadius:'50%',background:gasOk===true?'#4ade80':gasOk===false?'#f87171':'#fbbf24',marginLeft:2}}/>
          <span style={{color:'rgba(255,255,255,.55)',fontSize:10,fontWeight:700}}>{user.name}（{vsId==='honten'?'本店':'三田店'}）</span>
          <div style={{marginLeft:'auto',display:'flex',gap:6}}>
            <button onClick={()=>fetchAll(true)} disabled={loading}
              style={{padding:'3px 10px',background:'rgba(255,255,255,.15)',border:'none',borderRadius:6,color:'white',fontSize:10,fontWeight:700,cursor:'pointer'}}> {loading?'⏳':'🔄'} </button>
            <button onClick={()=>setMailModal(true)}
              style={{padding:'3px 8px',background:'rgba(255,255,255,.1)',border:'none',borderRadius:6,color:'rgba(255,255,255,.7)',fontSize:10,cursor:'pointer'}}> ✉ </button>
            <button onClick={()=>setUser(null)}
              style={{padding:'3px 8px',background:'rgba(255,255,255,.1)',border:'none',borderRadius:6,color:'rgba(255,255,255,.7)',fontSize:10,cursor:'pointer'}}> ↩ </button>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'flex-end',gap:2,padding:'0 8px',background:'linear-gradient(180deg,#1e1b4b,#1e293b)'}}>
          {TABS.map(t=>{
            const isActive=tab===t.id;
            return(
              <div key={t.id} onClick={()=>setTab(t.id)}
                style={{background:isActive?'white':'rgba(255,255,255,.12)',borderRadius:'10px 10px 0 0',padding:isActive?'8px 10px':'6px 8px',display:'flex',flexDirection:'column',alignItems:'center',gap:2,minWidth:isActive?58:54,cursor:'pointer',boxShadow:isActive?'0 -3px 10px rgba(0,0,0,.2)':'none',marginTop:isActive?0:4,transition:'all .15s'}}>
                <div style={{fontSize:isActive?16:13,opacity:isActive?1:.8}}>{t.icon}</div>
                <div style={{fontSize:isActive?7.5:7,fontWeight:isActive?800:400,color:isActive?'#1d4ed8':'rgba(255,255,255,.65)',letterSpacing:'.3px'}}> {t.label} </div>
              </div>
            );
          })}
        </div>
      </div>
      {saveBanners.length>0&&(
        <div style={{flexShrink:0,display:'flex',flexDirection:'column',gap:4,padding:'6px 8px',background:'#f1f5f9'}}>
          {saveBanners.map(b=>{
            const st=b.phase==='saving'?{bg:'#eef2ff',bd:'#a5b4fc',fg:'#3730a3',icon:'📨'}
              :b.phase==='done'?{bg:'#f0fdf4',bd:'#86efac',fg:'#15803d',icon:'✅'}
              :{bg:'#fef2f2',bd:'#fca5a5',fg:'#dc2626',icon:'⚠️'};
            return(
              <div key={b.pid} style={{display:'flex',alignItems:'flex-start',gap:7,padding:'8px 10px',borderRadius:10,background:st.bg,border:`1.5px solid ${st.bd}`}}>
                <span style={{fontSize:13,lineHeight:1.3}}>{st.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:800,color:st.fg,lineHeight:1.35}}>
                    {b.phase==='saving'&&`${b.label}を受け付けました（サーバー反映を確認中… このまま操作できます）`}
                    {b.phase==='done'&&`${b.label}を反映しました`}
                    {b.phase==='fail'&&`${b.label}が保存できていません。お手数ですが内容を確認して、もう一度操作してください`}
                  </div>
                  {b.phase==='fail'&&b.detail&&<div style={{fontSize:10,color:'#991b1b',marginTop:2,lineHeight:1.4}}>{b.detail}</div>}
                </div>
                {b.phase!=='saving'&&<button onClick={()=>removeBanner(b.pid)}
                  style={{flexShrink:0,width:22,height:22,borderRadius:'50%',border:'none',background:'rgba(0,0,0,.06)',color:st.fg,fontSize:11,fontWeight:700}}>✕</button>}
              </div>
            );
          })}
        </div>
      )}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minHeight:0}}>
        {tab==='sched'&&<ScheduleView inspData={inspData} schedDataH={schedDataH} schedDataS={schedDataS} memoDataH={memoDataH} memoDataS={memoDataS}
          loanerResH={loanerResH} loanerResS={loanerResS} loanerCarsH={loanerCarsH} loanerCarsS={loanerCarsS} vsId={vsId} initDate={schedInitDate} onOpenEdit={openEdit}
          schedRestrictions={schedRestrictions}
          staffList={((vsId==='honten'?staffH:staffS).length>0?(vsId==='honten'?staffH:staffS):DEFAULT_STAFF.filter(s=>s.store===vsId)).filter(s=>s.badge!=='president'&&s.myNumber!==0)}
          dayOffData={vsId==='honten'?dayOffH:dayOffS}
          closedDays={cDays} closedDates={cDates} overrideOpen={overrideOpen} inspLimits={inspLimits}/>}
        {tab==='cal'&&<CalendarView inspData={inspData} closedDays={cDays} closedDates={cDates} overrideOpen={overrideOpen} vsId={vsId}
          onSelectDate={(dk,y,m,d)=>setDayDetail({dk,y,m,d})}/>}
        {tab==='loaner'&&<LoanerView loanerResH={loanerResH} loanerResS={loanerResS} rentalResData={rentalResData} rentalCars={rentalCars}
          loanerCarsH={loanerCarsH} loanerCarsS={loanerCarsS} vsId={vsId}/>}
      </div>
      {dayDetail&&<DayDetailModal {...dayDetail} inspData={inspData} schedDataH={schedDataH} schedDataS={schedDataS} memoDataH={memoDataH} memoDataS={memoDataS} vsId={vsId}
        onClose={()=>setDayDetail(null)}
        onGoSchedule={(y,m,d)=>{setSchedInitDate({y,m,d});setTab('sched');setDayDetail(null);}}/>}
      {editMode&&<EditModal
        mode={editMode}
        initial={editMode.initial}
        vsId={vsId}
        currentUser={user}
        staffList={DEFAULT_STAFF.filter(s=>s.store===vsId)}
        loanerCars={vsId==='honten'?loanerCarsH:loanerCarsS}
        rentalCars={rentalCars.length?rentalCars:DEFAULT_RENTAL_CARS}
        loanerRes={vsId==='honten'?loanerResH:loanerResS}
        rentalRes={rentalResData}
        lockedBy={editMode.lockedBy}
        isClosedDk={isClosedDk}
        onSave={handleSave}
        onDelete={editMode.isNew?null:handleDelete}
        onClose={closeEdit}/>}
      {mailModal&&<MailModal user={user} onClose={()=>setMailModal(false)} onSaveEmail={saveNotifyEmail}/>}
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
